<script>
  // Normalize roster trade-asset labeling from MFL script output.
  (function () {
    function renameBlindBidLabels(root) {
      var scope = root || document;
      var nodes = scope.querySelectorAll(
        "#MFLroster .roster_assets td, #MFLroster .roster_assets th, #MFLroster td, #MFLroster th"
      );
      nodes.forEach(function (node) {
        if (!node || !node.childNodes || !node.childNodes.length) return;
        for (var i = 0; i < node.childNodes.length; i += 1) {
          var child = node.childNodes[i];
          if (!child || child.nodeType !== Node.TEXT_NODE) continue;
          if (child.nodeValue && child.nodeValue.indexOf("Blind Bidding Dollars") !== -1) {
            child.nodeValue = child.nodeValue.replace(/Blind Bidding Dollars/gi, "Salary");
          }
        }
      });
    }

    function initLabelOverride() {
      if (!document.body || document.body.id !== "body_options_07") return;
      renameBlindBidLabels(document);
      var obs = new MutationObserver(function (mutations) {
        mutations.forEach(function (m) {
          renameBlindBidLabels(m.target || document);
        });
      });
      obs.observe(document.body, { childList: true, subtree: true });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initLabelOverride);
    } else {
      initLabelOverride();
    }
  })();
</script>
