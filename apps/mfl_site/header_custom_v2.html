    function markPlayerRow(row, isTaxi) {
      if (!row || !row.querySelector("td.player")) return;
      var table = row.closest("table.report");
      var meta = resolveTeamMetaForTable(table);
      var yearsBucket = yearsBucketFromRow(row);
      var yearsCell = row.querySelector("td.contractyear");
      var yearsRaw = safeStr(yearsCell && yearsCell.textContent);
      var typeCell = row.querySelector("td.contractstatus");
      var typeLabel = normalizeText((typeCell && typeCell.textContent) || "");
      row.classList.add("ups-roster-data-row");
      row.setAttribute("data-ups-player-row", "1");
      row.setAttribute("data-ups-player-name", playerNameFromRow(row));
      row.setAttribute("data-ups-player-pos", positionFromRow(row));
      row.setAttribute("data-ups-team-id", safeStr(meta.fid));
      row.setAttribute("data-ups-team-name", lowerText(meta.teamName || ""));
      row.setAttribute("data-ups-division-id", safeStr(meta.divisionId));
      row.setAttribute("data-ups-division-name", lowerText(meta.divisionName || ""));
      row.setAttribute("data-ups-contract-years", yearsRaw);
      row.setAttribute("data-ups-contract-years-bucket", yearsBucket);
      row.setAttribute("data-ups-contract-type-label", typeLabel);
      row.setAttribute("data-ups-contract-type-key", lowerText(typeLabel));
      if (isTaxi) row.setAttribute("data-ups-taxi-row", "1");
    }

    function markPrimaryColumns(row) {
      if (!row || row.dataset.upsRosterRowUi === "1") return;
      if (!row.querySelector("td.player")) return;
      row.dataset.upsRosterRowUi = "1";
      row.classList.add("ups-roster-data-row");
      if (!row.hasAttribute("data-ups-original-order")) {
        row.setAttribute("data-ups-original-order", String(Number(row.rowIndex || 0)));
      }
    }

    function annotateTableCellLabels(table) {
      if (!table || table.dataset.upsCellLabels === "1") return;
      var headerRow = Array.from(table.querySelectorAll("tr")).find(function (row) {
        return !!row.querySelector("th");
      });
      if (!headerRow) return;

      var headerCells = Array.from(headerRow.querySelectorAll("th,td"));
      var labelsByClass = Object.create(null);
      var labelsByIndex = Object.create(null);

      headerCells.forEach(function (cell, idx) {
        var label = normalizeText(cell.textContent || "");
        if (!label) return;
        labelsByIndex[String(idx)] = label;
        safeStr(cell.className).split(/\s+/).filter(Boolean).forEach(function (cls) {
          if (!labelsByClass[cls]) labelsByClass[cls] = label;
        });
      });

      Array.from(table.querySelectorAll('tr[data-ups-player-row="1"]')).forEach(function (row) {
        Array.from(row.querySelectorAll("td")).forEach(function (cell, idx) {
          var label = "";
          safeStr(cell.className).split(/\s+/).some(function (cls) {
            if (labelsByClass[cls]) {
              label = labelsByClass[cls];
              return true;
            }
            return false;
          });
          if (!label) label = labelsByIndex[String(idx)] || "";
          if (!label) label = "Value";
          cell.setAttribute("data-ups-label", label);
        });
      });

      table.dataset.upsCellLabels = "1";
    }

    function ensureRowDetailsToggle(row) {
      if (!row || row.getAttribute("data-ups-player-row") !== "1") return;
      var playerCell = row.querySelector("td.player");
      if (!playerCell) return;
      if (playerCell.querySelector(".ups-roster-row-more")) return;
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ups-roster-row-more";
      btn.textContent = "More";
      btn.setAttribute("aria-expanded", "false");
      btn.setAttribute("title", "Show more player details");
      playerCell.appendChild(btn);
      if (!row.hasAttribute("data-ups-row-expanded")) row.setAttribute("data-ups-row-expanded", "0");
    }

    function decorateTaxiSection(table) {
      if (!table) return;
      var rows = Array.from(table.querySelectorAll("tr"));
      var inTaxi = false;
      var taxiHeader = null;
      var taxiCount = 0;

      rows.forEach(function (row) {
        row.removeAttribute("data-ups-taxi-header");
        row.removeAttribute("data-ups-taxi-summary-row");
        row.removeAttribute("data-ups-taxi-row");
      });

      rows.forEach(function (row) {
        var rowText = normalizeText(row.textContent || "");
        var hasToggle = !!row.querySelector(".ups-roster-taxi-toggle");

        if (!inTaxi && (hasToggle || /^taxi squad$/i.test(rowText))) {
          inTaxi = true;
          taxiHeader = row;
          row.setAttribute("data-ups-taxi-header", "1");
          return;
        }

        if (!inTaxi) return;

        row.setAttribute("data-ups-taxi-row", "1");
        if (row.querySelector("td.player")) taxiCount += 1;

        if (/total players on taxi squad/i.test(rowText)) {
          row.setAttribute("data-ups-taxi-summary-row", "1");
          inTaxi = false;
        }
      });

      if (taxiHeader) {
        table.setAttribute("data-ups-taxi-count", String(taxiCount));
        ensureTaxiHeaderButton(table, taxiHeader, taxiCount);
      } else {
        table.removeAttribute("data-ups-taxi-count");
      }
    }

    function renderRosterSummary(table) {
      if (!table) return;
      var caption = table.querySelector("caption");
      if (!caption) return;
      caption.classList.add("ups-roster-caption");

      var wrap = table.closest(".mobile-wrap");
      if (wrap) {
        wrap.classList.add("ups-roster-team-card");
        var teamMeta = resolveTeamMetaForTable(table);
        if (teamMeta.fid) wrap.setAttribute("data-ups-team-id", teamMeta.fid);
        if (teamMeta.teamName) wrap.setAttribute("data-ups-team-name", teamMeta.teamName);
      }

      var meta = caption.querySelector(".ups-roster-caption-meta");
      if (!meta) {
        meta = document.createElement("div");
        meta.className = "ups-roster-caption-meta";
        caption.appendChild(meta);
      }
      meta.textContent = "";

      var playerRows = Array.from(table.querySelectorAll('tr[data-ups-player-row="1"]'));
      var totalPlayers = playerRows.length;
      var visiblePlayers = playerRows.filter(function (row) { return !row.hidden; }).length;
      var taxiCountAttr = parseInt(safeStr(table.getAttribute("data-ups-taxi-count")), 10);
      var taxiCount = Number.isFinite(taxiCountAttr) ? taxiCountAttr : playerRows.filter(function (row) {
        return row.getAttribute("data-ups-taxi-row") === "1";
      }).length;
      var salaryTotal = 0;

      playerRows.forEach(function (row) {
        var salaryCell = row.querySelector("td.salary");
        var salaryNum = parseMoney(salaryCell && salaryCell.textContent);
        if (Number.isFinite(salaryNum)) salaryTotal += salaryNum;
      });

      var warningTexts = Array.from(table.querySelectorAll("tr .warning, tr b.warning"))
        .map(function (node) { return normalizeText(node.textContent || ""); })
        .filter(Boolean);
      var capTone = "success";
      var capValue = "Compliant";

      if (warningTexts.length) {
        var joined = warningTexts.join(" | ");
        var warningType = classifyWarningText(joined);
        if (warningType === "Over Cap") {
          capTone = "danger";
          var capAmount = parseMoney(joined);
          capValue = capAmount != null ? ("Over " + formatMoneyCompact(Math.abs(capAmount))) : "Over Cap";
        } else if (warningType === "Invalid") {
          capTone = "warning";
          capValue = "Invalid Roster";
        } else {
          capTone = "warning";
          capValue = "Needs Review";
        }
      }

      var playersLabel = isFilterActive() ? (String(visiblePlayers) + "/" + String(totalPlayers)) : String(totalPlayers);
      meta.appendChild(buildSummaryChip("Players", playersLabel, "info"));
      meta.appendChild(buildSummaryChip("Salary", formatMoneyCompact(salaryTotal), "neutral"));
      meta.appendChild(buildSummaryChip("Taxi", String(taxiCount), "neutral"));
      meta.appendChild(buildSummaryChip("Status", capValue, capTone));

      var toggle = caption.querySelector(".ups-roster-team-toggle");
      if (!toggle) {
        toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "ups-roster-team-toggle";
        caption.appendChild(toggle);
      }
      updateTeamCollapseUi(table);
    }

    function renderRosterSummaries() {
      if (!isRosterPage()) return;
      muteMutationObserver(150);
      getRosterTables().forEach(renderRosterSummary);
    }

    function rowMatchesFilters(row) {
      if (!row || row.getAttribute("data-ups-player-row") !== "1") return true;
      var name = safeStr(row.getAttribute("data-ups-player-name") || "");
      var pos = safeStr(row.getAttribute("data-ups-player-pos") || "").toUpperCase();
      var teamId = safeStr(row.getAttribute("data-ups-team-id") || "");
      var yearsBucket = safeStr(row.getAttribute("data-ups-contract-years-bucket") || "");
      var typeKey = lowerText(row.getAttribute("data-ups-contract-type-key") || "");
      if (rosterUiState.search && name.indexOf(rosterUiState.search) === -1) return false;
      if (rosterUiState.positions && rosterUiState.positions.length && rosterUiState.positions.indexOf(pos) === -1) return false;
      if (rosterUiState.teams && rosterUiState.teams.length && rosterUiState.teams.indexOf(teamId) === -1) return false;
      if (rosterUiState.years && rosterUiState.years.length && rosterUiState.years.indexOf(yearsBucket) === -1) return false;
      if (rosterUiState.contractTypes && rosterUiState.contractTypes.length && rosterUiState.contractTypes.indexOf(typeKey) === -1) return false;
      return true;
    }

    function applyRosterViewState() {
      if (!isRosterPage()) return;
      var filterActive = isFilterActive();
      var root = getRosterRoot();
      if (root) root.classList.toggle("ups-roster-filter-active", filterActive);

      getRosterTables().forEach(function (table) {
        sortTableRows(table);
        var taxiCollapsed = getTaxiCollapsed(table);
        var visibleMatchCount = 0;
        var teamCollapsed = getTeamCollapsed(table);

        Array.from(table.querySelectorAll("tr")).forEach(function (row) {
          if (row.querySelector("td.player")) {
            var match = rowMatchesFilters(row);
            var hideByTaxi = taxiCollapsed && row.getAttribute("data-ups-taxi-row") === "1";
            row.hidden = !match || hideByTaxi;
            if (!row.hidden) visibleMatchCount += 1;
            return;
          }

          if (row.getAttribute("data-ups-taxi-header") === "1") {
            row.hidden = false;
            return;
          }

          if (row.getAttribute("data-ups-taxi-row") === "1" || row.getAttribute("data-ups-taxi-summary-row") === "1") {
            row.hidden = taxiCollapsed;
            return;
          }

          row.hidden = false;
        });

        table.classList.toggle("ups-roster-no-match", filterActive && visibleMatchCount === 0);
        table.hidden = filterActive && visibleMatchCount === 0;

        var body = table.tBodies && table.tBodies[0];
        var effectiveCollapsed = !filterActive && teamCollapsed;
        if (body) body.hidden = effectiveCollapsed;
        updateTeamCollapseUi(table, effectiveCollapsed);

        var wrap = table.closest(".mobile-wrap");
        if (wrap && wrap.querySelector("table.report") === table) {
          wrap.hidden = !!table.hidden;
        }

        var hostCell = table.closest("td.two_column_layout");
        if (hostCell && hostCell.querySelectorAll("table.report").length === 1 && hostCell.querySelector("table.report") === table) {
          hostCell.hidden = !!table.hidden;
        }

        var toggle = table.querySelector(".ups-roster-taxi-toggle");
        if (toggle) toggle.setAttribute("aria-expanded", taxiCollapsed ? "false" : "true");
      });

      Array.from(document.querySelectorAll("#body_options_07 table.two_column_layout > tbody > tr")).forEach(function (layoutRow) {
        var cells = Array.prototype.filter.call(layoutRow.children || [], function (child) {
          return child && child.tagName === "TD" && /\btwo_column_layout\b/.test(safeStr(child.className));
        });
        if (!cells.length) return;
        var hasRosterCell = cells.some(function (cell) { return !!cell.querySelector("table.report"); });
        if (!hasRosterCell) return;
        layoutRow.hidden = cells.every(function (cell) { return cell.hidden; });
      });
    }

    function enhanceRosterTables() {
      if (!isRosterPage()) return;

      getRosterTables().forEach(function (table) {
        Array.from(table.querySelectorAll("tr")).forEach(function (row) {

      best.name +
      " (" +
      best.team +
      ")  •  " +
      best.pts.toFixed(1) +
      " pts"
    );
  }

  function buildTaggedPlayersText(tagSubs) {
    if (!Array.isArray(tagSubs) || !tagSubs.length) return "No submitted tags yet.";
    var maxSeason = 0;
    tagSubs.forEach(function (r) {
      var s = safeInt(r && (r.season || r.year));
      if (s > maxSeason) maxSeason = s;
    });
    var scoped = tagSubs.filter(function (r) {
      var s = safeInt(r && (r.season || r.year));
      return maxSeason ? s === maxSeason : true;
    });
    var names = scoped
      .slice()
      .sort(function (a, b) {
        return safeStr(a && a.franchise_name).localeCompare(safeStr(b && b.franchise_name)) ||
          safeStr(a && a.player_name).localeCompare(safeStr(b && b.player_name));
      })
      .slice(0, 24)
      .map(function (r) {
        var player = safeStr(r && r.player_name);
        var team = safeStr(r && r.franchise_name);
        return player && team ? player + " (" + team + ")" : player || team;
      })
      .filter(Boolean);
    var suffix = scoped.length > names.length ? "  •  +" + (scoped.length - names.length) + " more" : "";
    return maxSeason + " submitted tags (" + scoped.length + "): " + names.join("  •  ") + suffix;
  }

  function render(lanes, draftYear) {
    var laneHtml = lanes
      .map(function (lane) {
        return (
          '<div class="ups-marquee-lane">' +
          '<div class="ups-marquee-label">' + htmlEsc(lane.label) + "</div>" +
          '<div class="ups-marquee-body">' + htmlEsc(lane.body) + "</div>" +
          "</div>"
        );
      })
      .join("");

    mount.innerHTML =
      '<div class="ups-marquee-header">' +
      '<div class="ups-marquee-title">UPS League Pulse</div>' +
      '<div class="ups-marquee-subtitle">Draft / Champions / Expiring Rookies / Tags • ' + htmlEsc(String(draftYear || "")) + "</div>" +
      "</div>" +
      '<div class="ups-marquee-lanes">' + laneHtml + "</div>";
  }

  function boot() {
    var selectedYear = getYear();
    var leagueId = getLeagueId();
    var version = "v1.0.2";
    var cacheKey = String(Date.now());
    var baseCandidates = [
      "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@" + (String(window.UPS_RELEASE_SHA || "").trim() || version) + "/",
      "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@" + version + "/"
    ];

    var championsPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/champions_panels.json?v=" + cacheKey;
      })
    ).catch(function () {
      return {};
    });

    var tagTrackingPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/ccc/tag_tracking.json?v=" + cacheKey;
      })
    ).catch(function () {
      return { rows: [] };
    });

    var tagSubPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/ccc/tag_submissions.json?v=" + cacheKey;
      })
    ).catch(function () {
      return { rows: [] };
    });

    var draftPromise = fetchFirstJson([
      "https://api.myfantasyleague.com/" +
        encodeURIComponent(selectedYear) +
        "/export?TYPE=draftResults&L=" +
        encodeURIComponent(leagueId) +
        "&JSON=1&_=" +
        cacheKey
    ]).catch(function () {
      return {};
    });

    Promise.all([championsPromise, tagTrackingPromise, tagSubPromise, draftPromise]).then(function (all) {
      var champions = all[0] || {};
      var trackingRaw = all[1] || {};
      var tagSubsRaw = all[2] || {};
      var draftRaw = all[3] || {};

      var tagTrackingRows = Array.isArray(trackingRaw)
        ? trackingRaw
        : Array.isArray(trackingRaw.rows)
        ? trackingRaw.rows
        : Array.isArray(trackingRaw.tag_tracking)
        ? trackingRaw.tag_tracking
        : [];

      var tagSubs = Array.isArray(tagSubsRaw)
        ? tagSubsRaw
        : Array.isArray(tagSubsRaw.rows)
        ? tagSubsRaw.rows
        : Array.isArray(tagSubsRaw.submissions)
        ? tagSubsRaw.submissions
        : [];

      var fidToName = buildFranchiseMap(tagTrackingRows);
      var rookiePicks = normalizeDraftPicks(draftRaw);
      var rookieText = rookiePicks.length
        ? rookiePicks
            .map(function (p) {
              var pickNo = p.round + "." + pad2(p.pick);
              var team = fidToName[p.franchise] || p.franchise;
              var player = p.player || "On the Clock";
              return pickNo + " " + team + " - " + player;
            })
            .join("  •  ")
        : "No rookie draft picks available yet.";

      var lanes = [
        { label: "Rookie Draft (First 24)", body: rookieText },
        { label: "Champions Ring Of Honor (2010-2026)", body: buildRingOfHonorText(champions) },
        { label: "Highest Scoring Expiring Rookie", body: buildTopExpiringRookieText(tagTrackingRows) },
        { label: "Submitted Tagged Players", body: buildTaggedPlayersText(tagSubs) }
      ];
      render(lanes, selectedYear);
    }).catch(function () {
      render(
        [
          { label: "Rookie Draft (First 24)", body: "Unable to load draft data." },
          { label: "Champions Ring Of Honor (2010-2026)", body: "Unable to load champions data." },
          { label: "Highest Scoring Expiring Rookie", body: "Unable to load expiring rookie data." },
          { label: "Submitted Tagged Players", body: "Unable to load tag submission data." }
        ],
        selectedYear
      );
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
<script>
(function () {
  var banner = document.getElementById("upsDevBanner");
  if (!banner) return;
  var TEST_LEAGUE_ID = "25625";
  function readLeagueId() {
    try {
      var u = new URL(window.location.href || "");
      var byParam = String(u.searchParams.get("L") || "").replace(/\D/g, "");
      if (byParam) return byParam;
      var byPath = String((String(u.pathname || "").match(/\/home\/(\d+)(?:\/|$)/i) || [])[1] || "").replace(/\D/g, "");
      if (byPath) return byPath;
    } catch (e) {}
    var byGlobal = String(window.league_id || window.LEAGUE_ID || "").replace(/\D/g, "");
    if (byGlobal) return byGlobal;
    try {
      var raw = String(document.cookie || "");
      if (raw) {
        var parts = raw.split(";");
        for (var i = 0; i < parts.length; i += 1) {
          var p = String(parts[i] || "").trim();
          if (!p) continue;
          var eq = p.indexOf("=");
          var key = eq >= 0 ? p.slice(0, eq).trim() : p;
          var val = eq >= 0 ? p.slice(eq + 1).trim() : "";
          if (key === "MFL_LAST_LEAGUE_ID" && val) {
            var fromCookie = decodeURIComponent(val).replace(/\D/g, "");
            if (fromCookie) return fromCookie;
          }
        }
      }
    } catch (e) {}
    return "";
  }
  if (readLeagueId() !== TEST_LEAGUE_ID) return;
  banner.style.display = "flex";
})();
</script>
