<script>
  // Normalize Contract Command Center deep-links: move ccc* params to hash so MFL doesn't validate them.
  (function () {
    var u = new URL(window.location.href || "");
    var hasCcc =
      u.searchParams.has("cccAction") ||
      u.searchParams.has("cccPlayer") ||
      u.searchParams.has("cccFranchise") ||
      u.searchParams.has("cccSeason") ||
      u.searchParams.has("cccYears");
    if (!hasCcc) return;
    var moduleName = (u.searchParams.get("MODULE") || "").toUpperCase();
    if (moduleName !== "MESSAGE2" && moduleName !== "MESSAGE16") return;

    var h = new URLSearchParams();
    ["cccAction", "cccPlayer", "cccFranchise", "cccSeason", "cccYears"].forEach(function (k) {
      var v = u.searchParams.get(k);
      if (v !== null && v !== undefined && v !== "") h.set(k, v);
    });

    u.search = "?MODULE=MESSAGE2";
    u.hash = h.toString();

    if (u.toString() !== window.location.href) {
      window.location.replace(u.toString());
    }
  })();

  // Debug helper: add `&UPS_DEBUG=1` to any URL to confirm which header build is loaded.
  (function () {
    try {
      var u = new URL(window.location.href);
      if (u.searchParams.get("UPS_DEBUG") !== "1") return;
    } catch (e) {
      return;
    }
    window.__UPS_DEBUG = true;
    document.addEventListener("DOMContentLoaded", function () {
      try {
        var el = document.createElement("div");
        el.id = "upsDebugBadge";
        el.textContent = "UPS header build: 2026.02.16.16";
        el.style.cssText =
          "position:fixed;right:10px;bottom:10px;z-index:999999;" +
          "padding:6px 10px;border-radius:999px;" +
          "background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.25);" +
          "color:#fff;font:700 12px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;";
        document.body.appendChild(el);
      } catch (e) {}
    });
  })();
</script>

<script>
  document.title = "UPS Salary Cap Dynasty League";

  /* Font size + theme persistence */
  window.increaseFont = true;
  (function () {
    try {
      var key = "fontSize_" + year + "_" + league_id;
      if (localStorage.hasOwnProperty(key)) {
        var setStyle = localStorage.getItem(key);
        if (setStyle && setStyle !== "undefined") {
          document.documentElement.setAttribute("style", setStyle);
        }
      }
    } catch (e) {}
  })();

  function setTheme(year, league_id, themeName) {
    if (typeof themeName !== "string") return;
    localStorage.setItem("theme_" + year + "_" + league_id, themeName);
    document.documentElement.className = themeName;
  }

  function upsThemeStorageKey() {
    var y = typeof year !== "undefined" ? year : "";
    var l = typeof league_id !== "undefined" ? league_id : "";
    return "ups_mode_" + y + "_" + l;
  }

  function normalizeUPSMode(mode) {
    return String(mode || "").toLowerCase() === "light" ? "light" : "dark";
  }

  function getUPSMode() {
    return normalizeUPSMode(document.documentElement.getAttribute("data-ups-mode") || "dark");
  }

  function applyUPSMode(mode, persist) {
    var nextMode = normalizeUPSMode(mode);
    document.documentElement.setAttribute("data-ups-mode", nextMode);
    document.documentElement.style.colorScheme = nextMode;
    window.UPS_THEME_MODE = nextMode;
    if (persist) {
      try {
        localStorage.setItem(upsThemeStorageKey(), nextMode);
      } catch (e) {}
    }
    try {
      document.dispatchEvent(new CustomEvent("ups-theme-change", { detail: { mode: nextMode } }));
    } catch (e) {}
  }

  window.setUPSMode = function (mode) {
    applyUPSMode(mode, true);
  };

  window.toggleUPSMode = function () {
    applyUPSMode(getUPSMode() === "dark" ? "light" : "dark", true);
  };

  (function () {
    var key = "theme_" + year + "_" + league_id;
    var storedTheme = localStorage.getItem(key) || "";
    if (storedTheme) {
      document.documentElement.className = storedTheme;
    } else {
      document.documentElement.removeAttribute("class");
    }

    var upsMode = "";
    try {
      upsMode = localStorage.getItem(upsThemeStorageKey()) || "";
    } catch (e) {}
    if (!upsMode && storedTheme.toLowerCase().indexOf("light") !== -1) {
      upsMode = "light";
    }
    applyUPSMode(upsMode || "dark", false);
  })();
</script>

<script>
  (function () {
    function updateThemeToggleUi() {
      var mode = typeof window.getUPSMode === "function" ? window.getUPSMode() : "dark";
      var btn = document.getElementById("upsThemeToggle");
      if (!btn) return;
      var label = btn.querySelector(".ups-theme-toggle-label");
      if (label) label.textContent = mode === "dark" ? "Theme: Dark" : "Theme: Light";
      btn.setAttribute("aria-pressed", mode === "light" ? "true" : "false");
      btn.setAttribute("title", mode === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function initThemeToggle() {
      var btn = document.getElementById("upsThemeToggle");
      if (btn && !btn.dataset.wired) {
        btn.dataset.wired = "1";
        btn.addEventListener("click", function () {
          if (typeof window.toggleUPSMode === "function") {
            window.toggleUPSMode();
            return;
          }
          if (typeof window.getUPSMode === "function" && typeof window.setUPSMode === "function") {
            var next = window.getUPSMode() === "dark" ? "light" : "dark";
            window.setUPSMode(next);
          }
        });
      }
      updateThemeToggleUi();
    }

    document.addEventListener("ups-theme-change", function () {
      updateThemeToggleUi();
    });

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        initThemeToggle();
      });
    } else {
      initThemeToggle();
    }
  })();
</script>

    ];

    function formatPct(value) {
      var n = parseFloat(value);
      if (isNaN(n)) return "--";
      return (n * 100).toFixed(1) + "%";
    }

    function buildRecentRow(item) {
      var row = document.createElement("div");
      row.className = "ups-hero-item ups-hero-item--champ";

      var year = document.createElement("div");
      year.className = "ups-hero-year";
      year.textContent = String(item.year || "");

      var main = document.createElement("div");
      main.className = "ups-hero-main";

      var name = document.createElement("div");
      name.className = "ups-hero-name";
      name.textContent = String(item.franchise || "");

      var meta = document.createElement("div");
      meta.className = "ups-hero-meta";
      meta.innerHTML =
        "All-Play " + formatPct(item.allPlayPct) + " <span class=\"ups-hero-trophies\">| Title #" + String(item.titleNumber || 1) + " x&#127942;</span>";

      main.appendChild(name);
      main.appendChild(meta);

      row.appendChild(year);
      row.appendChild(main);
      return row;
    }

    function buildLeaderRow(item) {
      var row = document.createElement("div");
      row.className = "ups-hero-item ups-hero-item--leader";

      var main = document.createElement("div");
      main.className = "ups-hero-main";

      var name = document.createElement("div");
      name.className = "ups-hero-name";
      name.textContent = String(item.franchise || "");

      var meta = document.createElement("div");
      meta.className = "ups-hero-meta";
      meta.textContent = String(item.years || "");

      var count = document.createElement("span");
      count.className = "ups-hero-count";
      count.textContent = String(item.titles || 0);
      count.title = String(item.titles || 0) + " title(s)";

      main.appendChild(name);
      main.appendChild(meta);

      row.appendChild(main);
      row.appendChild(count);
      return row;
    }

    function normalizeRecentRows(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .map(function (item) {
          var iconRaw = String(item && item.icon || "");
          var icon = iconRaw.replace(/^http:\/\//i, "https://");
          return {
            year: parseInt(item && item.year, 10) || 0,
            franchise: String(item && item.franchise || ""),
            icon: icon,
            allPlayPct:
              item && item.allPlayPct !== undefined
                ? item.allPlayPct
                : item && item.all_play_pct !== undefined
                ? item.all_play_pct
                : 0,
            titleNumber:
              item && item.titleNumber !== undefined
                ? item.titleNumber
                : item && item.title_number !== undefined
                ? item.title_number
                : 1
          };
        })
        .filter(function (item) {
          return item.year > 0 && item.franchise;
        });
    }

    function normalizeLeaderRows(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .map(function (item) {
          var iconRaw = String(item && item.icon || "");
          var icon = iconRaw.replace(/^http:\/\//i, "https://");
          return {
            franchise: String(item && item.franchise || ""),
            icon: icon,
            titles: parseInt(item && item.titles, 10) || 0,
            years: String(item && item.years || "")
          };
        })
        .filter(function (item) {
          return item.franchise;
        });
    }

    function render(recentWinners, titleLeaders) {
      var recentEl = document.getElementById("upsRecentWinners");
      var leadersEl = document.getElementById("upsTitleLeaders");
      if (!recentEl || !leadersEl) return;
      recentEl.innerHTML = "";
      leadersEl.innerHTML = "";

      for (var i = 0; i < recentWinners.length; i += 1) {
        recentEl.appendChild(buildRecentRow(recentWinners[i]));
      }
      for (var j = 0; j < titleLeaders.length; j += 1) {
        leadersEl.appendChild(buildLeaderRow(titleLeaders[j]));
      }
    }

    function readPayload(raw) {
      if (!raw || typeof raw !== "object") return null;
      var recent = normalizeRecentRows(raw.recent_winners || raw.recentWinners || []);
      var leaders = normalizeLeaderRows(raw.title_leaders || raw.titleLeaders || []);
      if (!recent.length || !leaders.length) return null;
      return { recent: recent, leaders: leaders };
    }

    function loadDynamicPanels() {
      var cacheKey = String(Date.now());
      var candidates = [
        "https://rawcdn.githack.com/keithcreelman/upsmflproduction/v1.0.2/site/champions_panels.json?v=" + cacheKey,
        "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@v1.0.2/site/champions_panels.json?v=" + cacheKey
      ];

      function attempt(idx) {
        if (idx >= candidates.length) {
          render(fallbackRecentWinners, fallbackTitleLeaders);
          return;
        }
        fetch(candidates[idx], { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (json) {
            var payload = readPayload(json);
            if (!payload) throw new Error("Invalid champion panel payload");
            render(payload.recent, payload.leaders);
          })
          .catch(function () {
            attempt(idx + 1);
          });
      }

      attempt(0);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadDynamicPanels);
    } else {
      loadDynamicPanels();
    }
  })();
</script>

<script>
  // CCC embed helper for MFL home-page messages:
  // MFL sometimes injects message HTML with innerHTML, which makes <script> tags inert.
  // Loading the CCC embed loader from the header ensures it executes.
  (function () {
    if (window.__ups_ccc_header_autoload) return;
    window.__ups_ccc_header_autoload = true;

    function safeUpper(v) {
      return String(v || "").trim().toUpperCase();
    }

    function safeStr(v) {
      return String(v || "").trim();
    }

    function getCurrentLeagueId() {
      var g = safeStr(window.league_id || window.LEAGUE_ID || "");
      if (g) return g;
      try {
        var u = new URL(window.location.href);
        var q = safeStr(u.searchParams.get("L") || "");
        if (q) return q;
      } catch (e) {}
      var m = safeStr(window.location.pathname).match(/\/home\/(\d+)(?:\/|$)/i);
      return m && m[1] ? safeStr(m[1]) : "";
    }

    function getCurrentYear() {
      var g = safeStr(window.year || window.YEAR || "");
      if (g) return g;
      try {
        var u = new URL(window.location.href);
        var q = safeStr(u.searchParams.get("YEAR") || "");
        if (q) return q;
      } catch (e) {}
      var m = safeStr(window.location.pathname).match(/\/(\d{4})\//);
      if (m && m[1]) return safeStr(m[1]);
      return String(new Date().getFullYear());
    }

    function buildCanonicalCccRouteUrl() {
      var L = getCurrentLeagueId();
      var YEAR = getCurrentYear();
      if (!L || !YEAR) return "";
      return (
        window.location.origin +
        "/" +
        encodeURIComponent(YEAR) +
        "/home/" +
        encodeURIComponent(L) +
        "?MODULE=MESSAGE2&UPS_CCC_FORCE_MAIN=1"
      );
    }

    function isForceMainRequested() {
      try {
        var u = new URL(window.location.href);
        if (safeStr(u.searchParams.get("UPS_CCC_FORCE_MAIN")) === "1") return true;
        var h = new URLSearchParams(safeStr(window.location.hash).replace(/^#/, ""));
        return safeStr(h.get("UPS_CCC_FORCE_MAIN")) === "1";
      } catch (e) {
        return false;
      }
    }

    function getModuleName() {
      try {
        var u = new URL(window.location.href);
        return safeUpper(u.searchParams.get("MODULE") || "");
      } catch (e) {
        return "";
      }
    }

    function getEmbeddedFrame() {
      return (
        document.querySelector(
          'iframe[src*="mfl_hpm16_contractcommandcenter.html"], iframe[src*="contractcommandcenter"], iframe[src*="/site/ccc/"]'
        ) || null
      );
    }

    function normalizeEmbeddedFrameToMain(frame) {
      if (!frame) return false;
      var raw = String(frame.getAttribute("src") || "").trim();
      if (!raw) return false;
      var next = raw;

      if (/keithcreelman\.github\.io\/upsmflproduction/i.test(next)) {
        var q = "";
        try {
          q = String(new URL(next, window.location.href).search || "");
        } catch (e) {}
        next =
          "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@main/site/ccc/mfl_hpm16_contractcommandcenter.html" +
          q;
      }

      next = next.replace(
        /https?:\/\/rawcdn\.githack\.com\/keithcreelman\/upsmflproduction\/(?:main|dev|v[0-9][^/]*|ext-[^/]+)\//i,
        "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@main/"
      );
      next = next.replace(
        /https?:\/\/cdn\.jsdelivr\.net\/gh\/keithcreelman\/upsmflproduction@(?:dev|v[0-9][^/]*|ext-[^/]+)/i,
        "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@main"
      );

      if (next !== raw) {
        frame.setAttribute("src", next);
        return true;
      }
      return false;
    }

      );

    function normalizeCccUrlToMain(raw) {
      var next = String(raw || "").trim();
      if (!next) return "";
      if (/keithcreelman\.github\.io\/upsmflproduction/i.test(next)) {
        return buildCanonicalCccRouteUrl() || next;
      }
      next = next.replace(
        /https?:\/\/rawcdn\.githack\.com\/keithcreelman\/upsmflproduction\/(?:main|dev|v[0-9][^/]*|ext-[^/]+)\//i,
        "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@main/"
      );
      next = next.replace(
        /https?:\/\/cdn\.jsdelivr\.net\/gh\/keithcreelman\/upsmflproduction@(?:dev|v[0-9][^/]*|ext-[^/]+)/i,
        "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@main"
      );

    function isCccCandidateHref(href) {
      var s = safeStr(href).toLowerCase();
      if (!s) return false;

        s.indexOf("contractcommandcenter") !== -1 ||
        s.indexOf("/site/ccc/") !== -1 ||
        s.indexOf("mfl_hpm_embed_loader.js") !== -1 ||
        s.indexOf("mfl_hpm16_contractcommandcenter.html") !== -1 ||
        s.indexOf("keithcreelman.github.io/upsmflproduction") !== -1
      );

    function normalizeCccAnchorsToMain() {
      var links = document.querySelectorAll(
        'a[href*="upsmflproduction"], a[href*="contractcommandcenter"], a[href*="keithcreelman.github.io/upsmflproduction"]'

        document.getElementById("container-wrap") ||

        anchor.parentNode.insertBefore(mount, anchor.nextSibling);

    function clearLegacyCccEmbeds() {
      var nodes = document.querySelectorAll(
        'iframe[src], script[src*="mfl_hpm_embed_loader.js"], script[src*="ccc.js"], script[src*="ccc_bridge.js"]'
      );

        "https://rawcdn.githack.com/keithcreelman/upsmflproduction/main/site/ccc/mfl_hpm_embed_loader.js?v=" + cacheKey
      ];

      function tryLoader(idx) {
        if (idx >= loaderCandidates.length) return;
        var s = document.createElement("script");
        s.src = loaderCandidates[idx];
        s.async = true;
        s.onerror = function () {
          tryLoader(idx + 1);
        };
        document.body.appendChild(s);

      tryLoader(0);

    document.addEventListener(
      "click",

<script>
  // Show current franchise identity (icon + team name) in the Hotlinks header.
  (function () {
    function pad4(v) {
      var d = String(v || "").replace(/\D/g, "");
      return d ? d.padStart(4, "0").slice(-4) : "";
    }

    function tryUrlParam(name) {
      try {
        var u = new URL(window.location.href);
        var v = u.searchParams.get(name);
        return v == null ? "" : String(v);
      } catch (e) {
        return "";
      }
    }

    function getFid() {
      var fid = pad4(window.FRANCHISE_ID || window.franchise_id || "");
      if (fid && fid !== "0000") return fid;

      // Commissioner pages often run as franchise_id=0000.
      // Use URL param or the "Select Franchise" control when present.
      fid = pad4(tryUrlParam("FRANCHISE_ID") || tryUrlParam("FRANCHISE") || tryUrlParam("F") || "");
      if (fid && fid !== "0000") return fid;

      try {
        var sel =
          document.querySelector('form.reportform select[name="FRANCHISE"]') ||
          document.querySelector('form[name="SELECT_FRANCHISE"] select[name="FRANCHISE"]');
        if (sel && sel.value) {
          fid = pad4(sel.value);
          if (fid && fid !== "0000") return fid;
        }
      } catch (e) {}

      return "";
    }

    function getFranchiseName(fid) {
      try {
        var key = "fid_" + fid;
        if (
          window.franchiseDatabase &&
          window.franchiseDatabase[key] &&
          window.franchiseDatabase[key].name
        ) {
          return String(window.franchiseDatabase[key].name || "").trim();
        }
      } catch (e) {}
      // Fallback: read the selected franchise name from the reportform dropdown.
      try {
        var sel =
          document.querySelector('form.reportform select[name="FRANCHISE"]') ||
          document.querySelector('form[name="SELECT_FRANCHISE"] select[name="FRANCHISE"]');
        if (sel && sel.options && sel.selectedIndex >= 0) {
          var opt = sel.options[sel.selectedIndex];
          var txt = opt ? String(opt.text || "").trim() : "";
          if (txt) return txt;
        }
      } catch (e) {}
      return "";
    }

    function isHttpUrl(v) {
      var s = String(v || "").trim();
      return s.indexOf("http://") === 0 || s.indexOf("https://") === 0;
    }

    function candidateIconUrls(fid) {
      var host = window.baseURLStatic || window.baseURLDynamic || (window.location ? window.location.origin : "");
      var lid = String(window.league_id || "").trim();
      var yr = parseInt(String(window.year || ""), 10);
      if (!yr) return [];
      var leagueIds = [];
      function addLeagueId(v) {
        var s = String(v || "").replace(/\D/g, "");
        if (!s || leagueIds.indexOf(s) !== -1) return;
        leagueIds.push(s);
      }
      addLeagueId(lid);
      if (!leagueIds.length) return [];
      var out = [];
      var seen = {};
      function push(url) {
        var s = String(url || "").trim();
        if (!s) return;
        s = s.replace(/^http:\/\//i, "https://");
        if (seen[s]) return;
        seen[s] = 1;
        out.push(s);
      }
      try {
        var key = "fid_" + fid;
        var rec = window.franchiseDatabase && window.franchiseDatabase[key];
        if (rec && isHttpUrl(rec.icon)) push(rec.icon);
        if (rec && isHttpUrl(rec.logo)) push(rec.logo);
      } catch (e) {}
      var bases = [];
      leagueIds.forEach(function (curLid) {
        bases.push(host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic2025/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic2019/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_logo" + fid);
        bases.push(host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_logo" + fid);
        bases.push(host + "/fflnetdynamic2025/" + curLid + "_franchise_logo" + fid);

      });
      bases.forEach(function (b) {
        push(b + ".png");
        push(b + ".jpg");
        push(b + ".jpeg");
        push(b + ".gif");
      });
      return out;
    }

    function setIconWithFallback(img, urls) {
      if (!img) return;
      var list = Array.isArray(urls) ? urls.filter(Boolean) : [];
      if (!list.length) {
        img.style.display = "none";
        img.removeAttribute("src");
        return;
      }
      var i = 0;
      function tryNext() {
        if (i >= list.length) {
          img.removeAttribute("src");
          img.style.display = "none";
          return;
        }
        img.style.display = "";
        img.src = list[i];
        i += 1;
      }
      img.onload = function () {
        img.style.display = "";
      };
      img.onerror = function () {
        tryNext();
      };
      tryNext();
    }

    function initOnce() {
      var wrap = document.getElementById("upsFranchiseIdentity");
      var nameEl = document.getElementById("upsFranchiseName");
      var iconEl = document.getElementById("upsFranchiseIcon");
      if (!wrap || !nameEl || !iconEl) return;

      var fid = getFid();
      if (!fid) return false;

      var name = getFranchiseName(fid);
      if (!name) return false;

      nameEl.textContent = name;
      wrap.hidden = false;
      setIconWithFallback(iconEl, candidateIconUrls(fid));
      return true;
    }

    function attempt(retries) {
      if (initOnce()) return;
      if (retries <= 0) return;
      setTimeout(function () {
        attempt(retries - 1);
      }, 250);
    }

    function wireSelect() {
      try {
        var sel =
          document.querySelector('form.reportform select[name="FRANCHISE"]') ||
          document.querySelector('form[name="SELECT_FRANCHISE"] select[name="FRANCHISE"]');
        if (!sel || sel.dataset.upsWired) return;
        sel.dataset.upsWired = "1";
        sel.addEventListener("change", function () {
          attempt(12);
        });
      } catch (e) {}
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        wireSelect();
        attempt(24);
      });
    } else {
      wireSelect();
      attempt(24);
    }

    // Late-load fallback for pages where globals populate after other scripts.
    window.addEventListener("load", function () {
      wireSelect();
      attempt(24);
    });
  })();
</script>

<script>
/*
UPS COMPACT STANDINGS
Works on:
• Standings page
• Home page standings module
Replaces bulky default grid with compact toggle view + franchise icons
*/

(function () {
  function safeStr(v) { return v === null || v === undefined ? "" : String(v).trim(); }
  function htmlEsc(v) { return safeStr(v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  function pad4(v) { var d = safeStr(v).replace(/\D/g, ""); return d ? d.padStart(4, "0").slice(-4) : ""; }

  function moduleFromUrl() {
    try { var u = new URL(window.location.href); return safeStr(u.searchParams.get("MODULE")).toLowerCase(); }
    catch (e) { return ""; }
  }

  function normalizeHeader(t) {
    return safeStr(t).toLowerCase().replace(/&nbsp;/g, " ")
      .replace(/[^a-z0-9%]+/g, " ").replace(/\s+/g, " ").trim();
  }

  function parseNumber(txt) {
    var m = safeStr(txt).replace(/,/g, "").match(/-?\d+(?:\.\d+)?/);
    return m ? Number(m[0]) : null;
  }

  function parseWltText(txt) {
    var m = safeStr(txt).match(/(\d+)\s*[-/]\s*(\d+)\s*[-/]\s*(\d+)/);
    if (!m) return null;
    return { w: Number(m[1]), l: Number(m[2]), t: Number(m[3]) };
  }

  function pctFromWlt(wlt) {
    if (!wlt) return null;
    var g = Number(wlt.w || 0) + Number(wlt.l || 0) + Number(wlt.t || 0);
    if (!g) return null;
    return (Number(wlt.w || 0) + Number(wlt.t || 0) * 0.5) / g;
  }

  function fmtWlt(wlt) { if (!wlt) return " - "; return [wlt.w, wlt.l, wlt.t].join("-"); }
  function fmtPct(v) { if (v === null || v === undefined || isNaN(Number(v))) return " - "; return Number(v).toFixed(3); }

  function isStandingsPage() {
    var mod = moduleFromUrl();
    if (mod === "standings") return true;
    if (document.getElementById("standings")) return true;
    try {
      var u = new URL(window.location.href);
      var o = safeStr(u.searchParams.get("O"));
      if (o === "03" || o === "3" || o === "31") return true;
    } catch (e) {}
    var bodyId = safeStr(document.body && document.body.id).toLowerCase();
    if (bodyId.indexOf("body_options_03") === 0 || bodyId.indexOf("body_options_31") === 0) return true;
    if (bodyId.indexOf("standings") !== -1) return true;
    var probe = document.querySelector("table.report th, .report table th");
    if (probe) {
      var txt = normalizeHeader(probe.textContent || "");
      if (txt.indexOf("all play") !== -1 || txt.indexOf("franchise") !== -1) return true;
    }
    return false;
  }

  function findStandingsTable() {
    var hp = document.querySelector("table.homepagemodule.report#standings");
    if (hp) return hp;
    var candidates = Array.from(document.querySelectorAll(
      "#container-wrap table.report, #container-wrap .report table, table.report"
    ));
    for (var i = 0; i < candidates.length; i += 1) {
      var t = candidates[i];
      var headers = Array.from(t.querySelectorAll("thead th, tr:first-child th, tr:first-child td"))
        .map(function (el) { return normalizeHeader(el.textContent || ""); })
        .filter(Boolean)
        .join(" | ");
      var caption = normalizeHeader((t.querySelector("caption") || {}).textContent || "");
      if (headers && /franchise|team|all play|overall|division|record|w l t|ap /.test(headers)) return t;
      if (caption && /standings|all play|overall/.test(caption)) return t;
    }
    return candidates[0] || null;
  }

  function findIndexByRegex(headersNorm, regexes, used) {
    for (var r = 0; r < regexes.length; r += 1) {
      var re = regexes[r];
      for (var i = 0; i < headersNorm.length; i += 1) {
        if (used && used[i]) continue;
        if (re.test(headersNorm[i])) return i;
      }
    }
    return -1;
  }

  function buildColumnMap(headers) {
    var used = {};

    c.divT = findIndexByRegex(headers, [/div.*\bt\b/, /^dt$/], used);

    c.overallW = findIndexByRegex(headers, [/^w$/, /^wins$/], used);

    c.overallL = findIndexByRegex(headers, [/^l$/, /^losses$/], used);
    if (c.overallL >= 0) used[c.overallL] = 1;
    c.overallT = findIndexByRegex(headers, [/^t$/, /^ties$/], used);
    if (c.overallT >= 0) used[c.overallT] = 1;

    c.allplayPct = findIndexByRegex(headers, [/all ?play.*(%|pct)/, /^ap pct$/, /^appct$/], null);
    c.overallPct = findIndexByRegex(headers, [/overall.*(%|pct)/, /^pct$/, /^win %$/, /^win pct$/], null);
    c.divPct = findIndexByRegex(headers, [/div.*(%|pct)/], null);

    c.pointsFor = findIndexByRegex(headers, [/^pf$/, /points for/, /pts for/], null);
    c.offPoints = findIndexByRegex(headers, [/off.*points/, /off points/, /off pts/], null);
    c.defPoints = findIndexByRegex(headers, [/def.*points/, /def points/, /def pts/], null);
    c.potential = findIndexByRegex(headers, [/potential points/, /pot points/, /^pp$/], null);
    c.efficiency = findIndexByRegex(headers, [/efficiency/, /eff rating/, /^eff$/], null);
    return c;
  }

  function readCell(row, idx) {
    if (!row || idx < 0 || !row.cells || idx >= row.cells.length) return "";
    return safeStr(row.cells[idx].textContent || "");
  }

  function franchiseNameFromDatabase(fid) {
    var id = pad4(fid);
    if (!id) return "";
    try {
      var db = window.franchiseDatabase || {};
      var rec = db["fid_" + id] || db[id];
      return safeStr(rec && (rec.name || rec.franchise_name || rec.abbrev || ""));
    } catch (e) {}
    return "";
  }

  function extractFranchiseFromFiconCell(row) {
    var cell = row && row.cells ? row.cells[0] : null;
    if (!cell) return { id: "", name: "" };
    var a = cell.querySelector("a[href]");
    if (a) {
      var href = safeStr(a.getAttribute("href"));
      var m = href.match(/[?&](?:FRANCHISE_ID|FRANCHISE|F)=([0-9]{1,4})/i);
      if (m) return { id: pad4(m[1]), name: "" };
    }
    var img = cell.querySelector("img[src]");
    if (img) {
      var src = safeStr(img.getAttribute("src"));
      var mSrc = src.match(/_franchise_(?:icon|logo)(\d{1,4})/i);
      if (mSrc) return { id: pad4(mSrc[1]), name: "" };
    }
    return { id: "", name: "" };
  }

  function extractFranchise(row, teamIdx) {
    var teamCell = teamIdx >= 0 && row.cells && row.cells[teamIdx] ? row.cells[teamIdx] : row.cells[0];
    if (!teamCell) return { id: "", name: "" };
    var link = teamCell.querySelector("a");
    var text = safeStr(teamCell.textContent || "");
    var fid = "";
    if (link) {
      var cls = safeStr(link.className);
      var mCls = cls.match(/franchise_(\d{1,4})/i);
      if (mCls) fid = pad4(mCls[1]);
      if (!fid) {
        var href = safeStr(link.getAttribute("href"));
        var mHref = href.match(/[?&](?:FRANCHISE_ID|FRANCHISE|F)=([0-9]{1,4})/i);
        if (mHref) fid = pad4(mHref[1]);
      }
    }
    if (!text && row && row.cells) {
      for (var i = 0; i < row.cells.length; i += 1) {
        var candidate = safeStr(row.cells[i].textContent || "");
        if (!candidate) continue;
        if (/^\d+(\.\d+)?$/.test(candidate)) continue;
        if (/^\d+\s*[-/]\s*\d+\s*[-/]\s*\d+$/.test(candidate)) continue;
        if (/^(w|l|t|pf|pa|pct|points?)$/i.test(candidate)) continue;
        text = candidate;
        break;
      }
    }
    if (!text && fid) text = franchiseNameFromDatabase(fid);
    return { id: fid, name: text };
  }

  function candidateIconUrls(fid) {
    function isUrl(v) { return /^https?:\/\//i.test(safeStr(v)); }
    if (!fid) return [];
    var host = window.baseURLStatic || window.baseURLDynamic || (window.location ? window.location.origin : "");
    var lid = safeStr(window.league_id || "");
    var yr = parseInt(safeStr(window.year || ""), 10);
    if (!yr) return [];
    var leagueIds = [];
    function addLeagueId(v) {
      var s = safeStr(v).replace(/\D/g, "");
      if (!s || leagueIds.indexOf(s) !== -1) return;
      leagueIds.push(s);
    }
    addLeagueId(lid);
    if (!leagueIds.length) return [];
    var out = [];
    var seen = {};
    function push(url) {
      var s = safeStr(url).replace(/^http:\/\//i, "https://");
      if (!s || seen[s]) return;
      seen[s] = 1;
      out.push(s);
    }
    try {
      var key = "fid_" + fid;
      var rec = window.franchiseDatabase && window.franchiseDatabase[key];
      if (rec && isUrl(rec.icon)) push(rec.icon);
      if (rec && isUrl(rec.logo)) push(rec.logo);
    } catch (e) {}
    leagueIds.forEach(function (curLid) {
      [
        host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic2025/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic2019/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_logo" + fid,
        host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_logo" + fid,
        host + "/fflnetdynamic2025/" + curLid + "_franchise_logo" + fid,
        host + "/fflnetdynamic2019/" + curLid + "_franchise_logo" + fid
      ].forEach(function (base) {
        push(base + ".png");
        push(base + ".jpg");
        push(base + ".jpeg");
        push(base + ".gif");
      });
    });
    return out;
  }

  function setIconWithFallback(img, urls) {
    var list = Array.isArray(urls) ? urls.filter(Boolean) : [];
    if (!img || !list.length) {
      if (img) img.style.display = "none";
      return;
    }
    var i = 0;
    function next() {
      if (i >= list.length) {
        img.style.display = "none";
        img.removeAttribute("src");
        return;
      }
      img.style.display = "";
      img.src = list[i];
      i += 1;
    }
    img.onload = function () { img.style.display = ""; };
    img.onerror = function () { next(); };
    next();
  }

  function buildRowData(row, map) {
    var fr = extractFranchise(row, map.team);
    if (!fr.id && (!fr.name || map.team < 0)) fr = extractFranchiseFromFiconCell(row);
    if (!fr.id && !fr.name) return null;
    if (!fr.name) fr.name = "Franchise " + (fr.id || "");

    var allplay = parseWltText(readCell(row, map.allplayCombined));
    if (!allplay && map.allplayW >= 0 && map.allplayL >= 0 && map.allplayT >= 0) {
      allplay = {
        w: Number(parseNumber(readCell(row, map.allplayW)) || 0),
        l: Number(parseNumber(readCell(row, map.allplayL)) || 0),
        t: Number(parseNumber(readCell(row, map.allplayT)) || 0)
      };
    }

    var overall = parseWltText(readCell(row, map.overallCombined));
    if (!overall && map.overallW >= 0 && map.overallL >= 0 && map.overallT >= 0) {
      overall = {
        w: Number(parseNumber(readCell(row, map.overallW)) || 0),
        l: Number(parseNumber(readCell(row, map.overallL)) || 0),
        t: Number(parseNumber(readCell(row, map.overallT)) || 0)
      };
    }

    var div = parseWltText(readCell(row, map.divCombined));
    if (!div && map.divW >= 0 && map.divL >= 0 && map.divT >= 0) {
      div = {
        w: Number(parseNumber(readCell(row, map.divW)) || 0),
        l: Number(parseNumber(readCell(row, map.divL)) || 0),
        t: Number(parseNumber(readCell(row, map.divT)) || 0)
      };
    }

    var allPct = parseNumber(readCell(row, map.allplayPct));
    if (allPct !== null && allPct > 1) allPct = allPct / 100;
    if (allPct === null) allPct = pctFromWlt(allplay);
    var ovPct = parseNumber(readCell(row, map.overallPct));
    if (ovPct !== null && ovPct > 1) ovPct = ovPct / 100;
    if (ovPct === null) ovPct = pctFromWlt(overall);
    var divPct = parseNumber(readCell(row, map.divPct));
    if (divPct !== null && divPct > 1) divPct = divPct / 100;
    if (divPct === null) divPct = pctFromWlt(div);

    return {
      franchiseId: fr.id,
      franchiseName: fr.name,
      allplay: allplay,
      overall: overall,
      div: div,
      allPct: allPct,
      overallPct: ovPct,
      divPct: divPct,
      pointsFor: parseNumber(readCell(row, map.pointsFor)),
      offPoints: parseNumber(readCell(row, map.offPoints)),

      potential: parseNumber(readCell(row, map.potential)),

  function buildRows(table, map) {
    var trs = Array.from(table.querySelectorAll("tbody tr"));
    if (!trs.length) trs = Array.from(table.querySelectorAll("tr")).slice(1);
    var out = [];
    trs.forEach(function (tr) {
      var rec = buildRowData(tr, map);
      if (!rec || !rec.franchiseName) return;
      if (/totals?|average/i.test(rec.franchiseName)) return;
      out.push(rec);
    });
    return out;
  }

  function formatMetric(v) {
    if (v === null || v === undefined || isNaN(Number(v))) return " - ";
    var n = Number(v);
    return Number.isInteger(n) ? n.toLocaleString() : n.toFixed(1);

  function renderCompact(wrapper, rows, view) {
    var isRecords = view === "records";
    var isPct = view === "pct";
    var head = isRecords
      ? "<th>All Play</th><th>Overall</th><th>Divisional</th>"
      : isPct
      ? "<th>All Play %</th><th>Overall %</th><th>Divisional %</th>"
      : "<th>PF</th><th>Off Pts</th><th>Def Pts</th><th>Potential</th><th>Efficiency</th>";

    var body = rows.map(function (r) {
      var extra = isRecords
        ? "<td>" + fmtWlt(r.allplay) + "</td><td>" + fmtWlt(r.overall) + "</td><td>" + fmtWlt(r.div) + "</td>"
        : isPct
        ? "<td>" + fmtPct(r.allPct) + "</td><td>" + fmtPct(r.overallPct) + "</td><td>" + fmtPct(r.divPct) + "</td>"
        : "<td>" + formatMetric(r.pointsFor) + "</td><td>" + formatMetric(r.offPoints) + "</td><td>" + formatMetric(r.defPoints) +
          "</td><td>" + formatMetric(r.potential) + "</td><td>" + formatMetric(r.efficiency) + "</td>";
      return '<tr><td><div class="ups-standings-franchise"><img class="ups-standings-icon" alt="" data-fid="' +
        htmlEsc(r.franchiseId || "") + '" /><span class="ups-standings-name">' + htmlEsc(r.franchiseName) +
        "</span></div></td>" + extra + "</tr>";
    }).join("");

    wrapper.querySelector(".ups-standings-table").innerHTML =
      "<thead><tr><th>Franchise</th>" + head + "</tr></thead><tbody>" + body + "</tbody>";

    Array.from(wrapper.querySelectorAll(".ups-standings-toggle")).forEach(function (btn) {
      var v = safeStr(btn.getAttribute("data-view") || "");
      btn.classList.toggle("is-active", v === view);
    });

    Array.from(wrapper.querySelectorAll(".ups-standings-icon")).forEach(function (img) {
      var fid = pad4(img.getAttribute("data-fid"));
      if (!fid) {
        img.style.display = "none";
        return;
      }
      setIconWithFallback(img, candidateIconUrls(fid));
    });
  }

  function initCompactStandings() {
    var table = findStandingsTable();
    if (!table) return;
    if (table.dataset.upsStandingsDone === "1") return;
    var rows = [];
    var map = null;
    var parseTable = function (candidate) {
      if (!candidate) return { rows: [], map: null };
      var headersLocal = Array.from(candidate.querySelectorAll("thead th, tr:first-child th, tr:first-child td"))
        .map(function (el) { return normalizeHeader(el.textContent || ""); });
      if (!headersLocal.length) return { rows: [], map: null };
      var mapLocal = buildColumnMap(headersLocal);
      var rowsLocal = buildRows(candidate, mapLocal);

    var best = parseTable(table);
    rows = best.rows;
    map = best.map;
    if (rows.length < 2) {
      var allCandidates = Array.from(document.querySelectorAll("#container-wrap table.report, #container-wrap .report table, table.report"));
      allCandidates.forEach(function (candidate) {

          map = parsed.map;

    if (rows.length < 2 || !map) return;

    var existing = document.getElementById("ups-standings-compact");
    if (existing) existing.remove();

    var wrapper = document.createElement("section");
    wrapper.id = "ups-standings-compact";

      '<button type="button" class="ups-standings-toggle" data-view="records">W-L-T</button>' +

    try {
      var saved = sessionStorage.getItem("ups_standings_view");
      if (saved === "records" || saved === "pct" || saved === "points") view = saved;

    renderCompact(wrapper, rows, view);

    wrapper.addEventListener("click", function (e) {
      var btn = e.target && e.target.closest ? e.target.closest(".ups-standings-toggle") : null;

    });

  function init() {

      }
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

		  // Some MFL skins render light-on-light spans/divs; force readable contrast.
		  (function () {
	    function isRelevantPage() {
	      var id = String(document.body && document.body.id ? document.body.id : "");
	      if (id === "body_commissioner_setup" || id.indexOf("body_csetup") === 0) return true;
	      try {
	        if (
	          document.querySelector("form.reportform") ||
	          document.querySelector(".reportnavigation, .reportNavigation, .reportnavigationheader, .reportNavigationHeader")
	        ) {
	          return true;
	        }
	      } catch (e) {}
	      return false;
	    }

	    function parseRgb(s) {
	      var m = String(s || "").match(/rgba?\\((\\d+),\\s*(\\d+),\\s*(\\d+)(?:,\\s*([0-9.]+))?\\)/i);
	      if (!m) return null;
	      return {
	        r: parseInt(m[1], 10),
	        g: parseInt(m[2], 10),
	        b: parseInt(m[3], 10),
	        a: m[4] ? parseFloat(m[4]) : 1
	      };
	    }

	    function isWhite(c) {
	      if (!c) return false;
	      return c.r >= 245 && c.g >= 245 && c.b >= 245 && (c.a == null || c.a >= 0.85);
	    }

	    function isLightText(c) {
	      if (!c) return false;
	      return c.r >= 210 && c.g >= 210 && c.b >= 210 && (c.a == null || c.a >= 0.75);
	    }

	    function patchNode(el) {
	      if (!el || el.dataset.upsSpanFixed === "1") return;
	      var cs = window.getComputedStyle(el);
	      var bg = parseRgb(cs.backgroundColor);
	      if (!isWhite(bg)) return;
	      var fg = parseRgb(cs.color);
	      if (!isLightText(fg)) return;
	      el.style.backgroundColor = "rgba(15, 27, 48, 0.85)";
	      el.style.color = "var(--ups-text)";
	      el.style.borderRadius = "10px";
	      el.dataset.upsSpanFixed = "1";

	    function fixSpanContrast() {
	      if (!isRelevantPage()) return;
	      var root = document.getElementById("container-wrap") || document;
	      var nodes = root.querySelectorAll("span, td, div");
	      for (var i = 0; i < nodes.length; i += 1) {
	        patchNode(nodes[i]);
	      }
	    }

	    var scheduleTimer = null;
	    function scheduleFix() {
	      if (scheduleTimer) return;
	      scheduleTimer = setTimeout(function () {
	        scheduleTimer = null;
	        fixSpanContrast();
	      }, 80);
	    }

	    function init() {
	      fixSpanContrast();
	      setTimeout(fixSpanContrast, 350);
	      setTimeout(fixSpanContrast, 900);
	      if (!window.MutationObserver) return;
	      var root = document.getElementById("container-wrap") || document.body;
	      if (!root) return;
	      var observer = new MutationObserver(scheduleFix);
	      observer.observe(root, { childList: true, subtree: true, attributes: true, attributeFilter: ["style", "class"] });
	    }

	    if (document.readyState === "loading") {
	      document.addEventListener("DOMContentLoaded", init);
	    } else {
	      init();
	    }
	  })();

      '<div class="ups-marquee-title">UPS League Pulse</div>' +
      '<div class="ups-marquee-subtitle">Draft / Champions / Expiring Rookies / Tags • ' + htmlEsc(String(draftYear || "")) + "</div>" +
      "</div>" +
      '<div class="ups-marquee-lanes">' + laneHtml + "</div>";
  }

  function boot() {
    var selectedYear = getYear();
    var leagueId = getLeagueId();
    var version = "v1.0.2";
    var cacheKey = String(Date.now());
    var baseCandidates = [
      "https://rawcdn.githack.com/keithcreelman/upsmflproduction/" + version + "/",
      "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@" + version + "/"
    ];

    var championsPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/champions_panels.json?v=" + cacheKey;
      })
    ).catch(function () {
      return {};
    });

    var tagTrackingPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/ccc/tag_tracking.json?v=" + cacheKey;
      })
    ).catch(function () {
      return { rows: [] };
    });

    var tagSubPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/ccc/tag_submissions.json?v=" + cacheKey;
      })
    ).catch(function () {
      return { rows: [] };
    });

    var draftPromise = fetchFirstJson([
      "https://api.myfantasyleague.com/" +
        encodeURIComponent(selectedYear) +
        "/export?TYPE=draftResults&L=" +
        encodeURIComponent(leagueId) +
        "&JSON=1&_=" +
        cacheKey
    ]).catch(function () {
      return {};
    });

    Promise.all([championsPromise, tagTrackingPromise, tagSubPromise, draftPromise]).then(function (all) {
      var champions = all[0] || {};
      var trackingRaw = all[1] || {};
      var tagSubsRaw = all[2] || {};
      var draftRaw = all[3] || {};

      var tagTrackingRows = Array.isArray(trackingRaw)
        ? trackingRaw
        : Array.isArray(trackingRaw.rows)
        ? trackingRaw.rows
        : Array.isArray(trackingRaw.tag_tracking)
        ? trackingRaw.tag_tracking
        : [];

      var tagSubs = Array.isArray(tagSubsRaw)
        ? tagSubsRaw
        : Array.isArray(tagSubsRaw.rows)
        ? tagSubsRaw.rows
        : Array.isArray(tagSubsRaw.submissions)
        ? tagSubsRaw.submissions
        : [];

      var fidToName = buildFranchiseMap(tagTrackingRows);
      var rookiePicks = normalizeDraftPicks(draftRaw);
      var rookieText = rookiePicks.length
        ? rookiePicks
            .map(function (p) {
              var pickNo = p.round + "." + pad2(p.pick);
              var team = fidToName[p.franchise] || p.franchise;
              var player = p.player || "On the Clock";
              return pickNo + " " + team + " - " + player;
            })
            .join("  •  ")
        : "No rookie draft picks available yet.";

      var lanes = [
        { label: "Rookie Draft (First 24)", body: rookieText },
        { label: "Champions Ring Of Honor (2010-2026)", body: buildRingOfHonorText(champions) },
        { label: "Highest Scoring Expiring Rookie", body: buildTopExpiringRookieText(tagTrackingRows) },
        { label: "Submitted Tagged Players", body: buildTaggedPlayersText(tagSubs) }
      ];
      render(lanes, selectedYear);
    }).catch(function () {
      render(
        [
          { label: "Rookie Draft (First 24)", body: "Unable to load draft data." },
          { label: "Champions Ring Of Honor (2010-2026)", body: "Unable to load champions data." },
          { label: "Highest Scoring Expiring Rookie", body: "Unable to load expiring rookie data." },
          { label: "Submitted Tagged Players", body: "Unable to load tag submission data." }
        ],
        selectedYear
      );
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
