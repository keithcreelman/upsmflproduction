<script>
  // Normalize Contract Command Center deep-links: move ccc* params to hash so MFL doesn't validate them.
  (function () {
    var u = new URL(window.location.href || "");
    var hasCcc =
      u.searchParams.has("cccAction") ||
      u.searchParams.has("cccPlayer") ||
      u.searchParams.has("cccFranchise") ||
      u.searchParams.has("cccSeason") ||
      u.searchParams.has("cccYears");
    if (!hasCcc) return;
    var moduleName = (u.searchParams.get("MODULE") || "").toUpperCase();
    if (moduleName !== "MESSAGE2" && moduleName !== "MESSAGE16") return;

    var h = new URLSearchParams();
    ["cccAction", "cccPlayer", "cccFranchise", "cccSeason", "cccYears"].forEach(function (k) {
      var v = u.searchParams.get(k);
      if (v !== null && v !== undefined && v !== "") h.set(k, v);
    });

    u.search = "?MODULE=MESSAGE2";
    u.hash = h.toString();

    if (u.toString() !== window.location.href) {
      window.location.replace(u.toString());
    }
  })();
</script>

<script>
  document.title = "UPS Salary Cap Dynasty League";

  /* Font size + theme persistence */
  window.increaseFont = true;
  (function () {
    try {
      var key = "fontSize_" + year + "_" + league_id;
      if (localStorage.hasOwnProperty(key)) {
        var setStyle = localStorage.getItem(key);
        if (setStyle && setStyle !== "undefined") {
          document.documentElement.setAttribute("style", setStyle);
        }
      }
    } catch (e) {}
  })();

  function setTheme(year, league_id, themeName) {
    if (typeof themeName !== "string") return;
    localStorage.setItem("theme_" + year + "_" + league_id, themeName);
    document.documentElement.className = themeName;
  }

  function upsThemeStorageKey() {
    var y = typeof year !== "undefined" ? year : "";
    var l = typeof league_id !== "undefined" ? league_id : "";
    return "ups_mode_" + y + "_" + l;
  }

  function normalizeUPSMode(mode) {
    return String(mode || "").toLowerCase() === "light" ? "light" : "dark";
  }

  function getUPSMode() {
    return normalizeUPSMode(document.documentElement.getAttribute("data-ups-mode") || "dark");
  }

  function applyUPSMode(mode, persist) {
    var nextMode = normalizeUPSMode(mode);
    document.documentElement.setAttribute("data-ups-mode", nextMode);
    document.documentElement.style.colorScheme = nextMode;
    window.UPS_THEME_MODE = nextMode;
    if (persist) {
      try {
        localStorage.setItem(upsThemeStorageKey(), nextMode);
      } catch (e) {}
    }
    try {
      document.dispatchEvent(new CustomEvent("ups-theme-change", { detail: { mode: nextMode } }));
    } catch (e) {}
  }

  window.setUPSMode = function (mode) {
    applyUPSMode(mode, true);
  };

  window.toggleUPSMode = function () {
    applyUPSMode(getUPSMode() === "dark" ? "light" : "dark", true);
  };

  (function () {
    var key = "theme_" + year + "_" + league_id;
    var storedTheme = localStorage.getItem(key) || "";
    if (storedTheme) {
      document.documentElement.className = storedTheme;
    } else {
      document.documentElement.removeAttribute("class");
    }

    var upsMode = "";
    try {
      upsMode = localStorage.getItem(upsThemeStorageKey()) || "";
    } catch (e) {}
    if (!upsMode && storedTheme.toLowerCase().indexOf("light") !== -1) {
      upsMode = "light";
    }
    applyUPSMode(upsMode || "dark", false);
  })();
</script>

<script>
  (function () {
    var trigger = document.querySelector(".MFLSkinSelectionbtn");
    var panel = document.getElementById("myMFLSkinSelection");
    var overlay = document.querySelector(".ThemeSwith_overlay");
    var closeBtn = document.getElementById("MFLSkinSelectionClose");
    if (!trigger || !panel || !overlay) return;

    function closePanel() {
      panel.style.display = "none";
      overlay.style.display = "none";
    }

    function openPanel() {
      panel.style.display = "block";
      overlay.style.display = "block";
    }

    trigger.addEventListener("click", function (evt) {
      evt.preventDefault();
      if (panel.style.display === "block") {
        closePanel();
      } else {
        openPanel();
      }
    });

    if (closeBtn) closeBtn.addEventListener("click", closePanel);
    overlay.addEventListener("click", closePanel);
  })();
</script>

<script>
  (function () {
    function updateThemeToggleUi() {
      var mode = typeof window.getUPSMode === "function" ? window.getUPSMode() : "dark";
      var btn = document.getElementById("upsThemeToggle");
      if (!btn) return;
      var label = btn.querySelector(".ups-theme-toggle-label");
      if (label) label.textContent = mode === "dark" ? "Theme: Dark" : "Theme: Light";
      btn.setAttribute("aria-pressed", mode === "light" ? "true" : "false");
      btn.setAttribute("title", mode === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function initThemeToggle() {
      var btn = document.getElementById("upsThemeToggle");
      if (btn && !btn.dataset.wired) {
        btn.dataset.wired = "1";
        btn.addEventListener("click", function () {
          if (typeof window.toggleUPSMode === "function") {
            window.toggleUPSMode();
            return;
          }
          if (typeof window.getUPSMode === "function" && typeof window.setUPSMode === "function") {
            var next = window.getUPSMode() === "dark" ? "light" : "dark";
            window.setUPSMode(next);
          }
        });
      }
      updateThemeToggleUi();
    }

    document.addEventListener("ups-theme-change", function () {
      updateThemeToggleUi();
    });

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        initThemeToggle();
      });
    } else {
      initThemeToggle();
    }
  })();
</script>

<script>
  /*
   * Deep-link + roster/popup quick actions for Extension/Restructure.
   * This adds actionable buttons in O=07 rows and player popup cards.
   */
  (function () {
    var enableRosterContractActions = false;

    function safeStr(v) {
      return v === null || v === undefined ? "" : String(v).trim();
    }

    function pad4(fid) {
      var d = safeStr(fid).replace(/\D/g, "");
      return d ? d.padStart(4, "0").slice(-4) : "";
    }

    function parsePidFromHref(href) {
      try {
        var u = new URL(href, location.origin);
        return safeStr(u.searchParams.get("P"));
      } catch (e) {
        return "";
      }
    }

    function parseMoney(text) {
      var clean = safeStr(text).replace(/[^0-9.-]/g, "");
      var n = parseFloat(clean);
      return isNaN(n) ? 0 : n;
    }

    function getFidFromRow(row) {
      var table = row ? row.closest("table") : null;
      if (!table) return "";

      var cls = safeStr(table.className);
      var m = cls.match(/franchise_(\d{4})/);
      if (m) return pad4(m[1]);

      var capLink = table.querySelector("caption a[class*='franchise_']");
      if (capLink) {
        var capClass = safeStr(capLink.className);
        var m2 = capClass.match(/franchise_(\d{4})/);
        if (m2) return pad4(m2[1]);
      }
      return "";
    }

    function pendingActionKey() {
      return "ccc_pending_action_" + safeStr(year) + "_" + safeStr(league_id);
    }

    function savePendingAction(action, item) {
      try {
        var payload = {
          action: safeStr(action).toLowerCase(),
          playerId: safeStr(item && item.playerId),
          franchiseId: pad4(item && item.franchiseId),
          years: Math.max(1, Math.min(2, parseInt(item && item.years, 10) || 1)),
          ts: Date.now()
        };
        if (!payload.action || !payload.playerId) return;
        localStorage.setItem(pendingActionKey(), JSON.stringify(payload));
      } catch (e) {}
    }

    function getPendingAction() {
      try {
        var raw = localStorage.getItem(pendingActionKey());
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        if (!parsed || !parsed.action || !parsed.playerId) return null;

        var ageMs = Date.now() - (parseInt(parsed.ts, 10) || 0);
        if (ageMs > 30 * 60 * 1000) {
          localStorage.removeItem(pendingActionKey());
          return null;
        }

        return {
          action: safeStr(parsed.action).toLowerCase(),
          playerId: safeStr(parsed.playerId),
          franchiseId: pad4(parsed.franchiseId),
          years: Math.max(1, Math.min(2, parseInt(parsed.years, 10) || 1))
        };
      } catch (e) {
        return null;
      }
    }

    function clearPendingAction() {
      try {
        localStorage.removeItem(pendingActionKey());
      } catch (e) {}
    }

    function buildActionUrl(action, item) {
      var payload = {
        cccAction: safeStr(action).toLowerCase(),
        cccPlayer: safeStr(item && item.playerId),
        cccFranchise: pad4(item && item.franchiseId),
        cccSeason: safeStr(year),
        cccYears: Math.max(1, Math.min(2, parseInt(item && item.years, 10) || 1))
      };

      savePendingAction(action, item);

      var u = new URL(location.origin + "/" + year + "/home/" + league_id);
      u.searchParams.set("MODULE", "MESSAGE2");

      var h = new URLSearchParams();
      if (payload.cccAction) h.set("cccAction", payload.cccAction);
      if (payload.cccPlayer) h.set("cccPlayer", payload.cccPlayer);
      if (payload.cccFranchise) h.set("cccFranchise", payload.cccFranchise);
      if (payload.cccSeason) h.set("cccSeason", payload.cccSeason);
      if (payload.cccAction === "extension") h.set("cccYears", safeStr(payload.cccYears));
      u.hash = h.toString();

      return u.toString();
    }

    function rookieLike(value) {
      var s = safeStr(value).toLowerCase();
      return s === "r" || s.indexOf("r-") === 0 || s.indexOf("rookie") !== -1;
    }

    function computeEligibility(contract) {
      var years = parseInt(contract.years, 10) || 0;
      var salary = parseMoney(contract.salary);
      var statusLower = safeStr(contract.status).toLowerCase();
      var infoLower = safeStr(contract.info).toLowerCase();
      var noFurtherExt =
        infoLower.indexOf("no further extensions") !== -1 ||
        infoLower.indexOf("not eligible for tag or extension") !== -1;
      var expiredRookie =
        infoLower.indexOf("expired rookie") !== -1 ||
        (rookieLike(contract.status) && years <= 0);

      return {
        extensionEligible: (years === 1 || expiredRookie) && !statusLower.includes("tag") && !noFurtherExt,
        restructureEligible: years >= 2 && years <= 3 && salary > 1000 && !rookieLike(contract.status)
      };
    }

    var rosterEligibilityByPid = new Map();

    function scanRosterEligibility() {
      if (document.body.id !== "body_options_07") return;

      var rows = Array.from(document.querySelectorAll("#body_options_07 tr"));
      rows.forEach(function (row) {
        var cell = row.querySelector("td.player");
        if (!cell) return;

        var playerLink = cell.querySelector('a[href*="player?L="]');
        if (!playerLink) return;

        var pid = parsePidFromHref(playerLink.getAttribute("href") || "");
        if (!pid) return;

        var salaryCell = row.querySelector("td.salary");
        var yearsCell = row.querySelector("td.contractyear");
        var statusCell = row.querySelector("td.contractstatus");
        var infoCell = row.querySelector("td.contractinfo");

        if (!salaryCell || !yearsCell || !statusCell || !infoCell) return;

        var fid = getFidFromRow(row);
        var contract = {
          salary: salaryCell.textContent,
          years: yearsCell.textContent,
          status: statusCell.textContent,
          info: infoCell.textContent
        };
        var elig = computeEligibility(contract);

        rosterEligibilityByPid.set(pid, {
          playerId: pid,
          playerName: safeStr(playerLink.textContent),
          franchiseId: fid,
          years: parseInt(contract.years, 10) || 0,
          salary: parseMoney(contract.salary),
          status: safeStr(contract.status),
          info: safeStr(contract.info),
          extensionEligible: elig.extensionEligible,
          restructureEligible: elig.restructureEligible
        });
      });
    }

    function renderRosterQuickActions() {
      if (document.body.id !== "body_options_07") return;

      var rows = Array.from(document.querySelectorAll("#body_options_07 tr"));
      rows.forEach(function (row) {
        var cell = row.querySelector("td.player");
        if (!cell) return;

        if (cell.querySelector(".ccc-quick-actions")) return;

        var playerLink = cell.querySelector('a[href*="player?L="]');
        if (!playerLink) return;

        var pid = parsePidFromHref(playerLink.getAttribute("href") || "");
        if (!pid) return;

        var info = rosterEligibilityByPid.get(pid);
        if (!info) return;
        if (!info.extensionEligible && !info.restructureEligible) return;

        var wrap = document.createElement("span");
        wrap.className = "ccc-quick-actions";

        if (info.extensionEligible) {
          var ext = document.createElement("button");
          ext.type = "button";
          ext.className = "ccc-action-btn ext";
          ext.textContent = "Extension";
          ext.setAttribute("data-ccc-action", "extension");
          ext.setAttribute("data-ccc-pid", pid);
          ext.setAttribute("data-ccc-fid", info.franchiseId || "");
          wrap.appendChild(ext);
        }

        if (info.restructureEligible) {
          var rs = document.createElement("button");
          rs.type = "button";
          rs.className = "ccc-action-btn rs";
          rs.textContent = "Restructure";
          rs.setAttribute("data-ccc-action", "restructure");
          rs.setAttribute("data-ccc-pid", pid);
          rs.setAttribute("data-ccc-fid", info.franchiseId || "");
          wrap.appendChild(rs);
        }

        cell.appendChild(wrap);
      });
    }

    function extractPopupPid(popupRoot) {
      if (!popupRoot) return "";
      var a = popupRoot.querySelector('a[href*="player?L="]');
      if (!a) return "";
      return parsePidFromHref(a.getAttribute("href") || "");
    }

    function renderPopupQuickActions() {
      var popup = document.getElementById("MFLPlayerPopupContainer");
      if (!popup) return;

      var pid = extractPopupPid(popup);
      if (!pid) return;

      var info = rosterEligibilityByPid.get(pid);
      var existing = popup.querySelector("#cccPopupQuickActions");

      if (!info || (!info.extensionEligible && !info.restructureEligible)) {
        if (existing) existing.remove();
        return;
      }

      var panel = existing || document.createElement("div");
      panel.id = "cccPopupQuickActions";
      panel.className = "ccc-popup-actions";

      var html = '<div class="ccc-popup-actions-title">Contract Actions</div><span class="ccc-quick-actions">';

      if (info.extensionEligible) {
        html +=
          '<button type="button" class="ccc-action-btn ext" data-ccc-action="extension" data-ccc-pid="' +
          pid +
          '" data-ccc-fid="' +
          (info.franchiseId || "") +
          '">Extension</button>';
      }

      if (info.restructureEligible) {
        html +=
          '<button type="button" class="ccc-action-btn rs" data-ccc-action="restructure" data-ccc-pid="' +
          pid +
          '" data-ccc-fid="' +
          (info.franchiseId || "") +
          '">Restructure</button>';
      }

      html += '</span><div class="ccc-popup-actions-note">Opens Contract Command Center with this player preloaded.</div>';
      panel.innerHTML = html;

      if (!existing) {
        var target = popup.querySelector("table") || popup;
        target.parentNode.insertBefore(panel, target.nextSibling);
      }
    }

    function onQuickActionClick(evt) {
      var btn = evt.target && evt.target.closest ? evt.target.closest(".ccc-action-btn[data-ccc-action]") : null;
      if (!btn) return;
      evt.preventDefault();
      evt.stopPropagation();

      var action = safeStr(btn.getAttribute("data-ccc-action")).toLowerCase();
      var pid = safeStr(btn.getAttribute("data-ccc-pid"));
      var fid = pad4(btn.getAttribute("data-ccc-fid"));
      if (!action || !pid) return;

      location.href = buildActionUrl(action, {
        playerId: pid,
        franchiseId: fid,
        years: 1
      });
    }

    function wireMessage16IframeBridge() {
      var qs = new URLSearchParams(location.search || "");
      var moduleName = safeStr(qs.get("MODULE")).toUpperCase();
      if (moduleName !== "MESSAGE2" && moduleName !== "MESSAGE16") return;

      var frame = document.querySelector('iframe[src*="contractcommandcenter"]');
      if (!frame) return;

      try {
        var src = new URL(frame.getAttribute("src"), location.href);
        src.searchParams.set("L", safeStr(league_id));
        src.searchParams.set("YEAR", safeStr(year));

        var hashQs = new URLSearchParams((location.hash || "").replace(/^#/, ""));
        var actionQuery = safeStr(qs.get("cccAction")) || safeStr(hashQs.get("cccAction"));
        var playerQuery = safeStr(qs.get("cccPlayer")) || safeStr(hashQs.get("cccPlayer"));
        var franchiseQuery = safeStr(qs.get("cccFranchise")) || safeStr(hashQs.get("cccFranchise"));
        var seasonQuery = safeStr(qs.get("cccSeason")) || safeStr(hashQs.get("cccSeason"));
        var yearsQuery = safeStr(qs.get("cccYears")) || safeStr(hashQs.get("cccYears"));

        var hasQueryAction = !!(actionQuery && playerQuery);
        var pending = hasQueryAction ? null : getPendingAction();

        if (hasQueryAction) {
          src.searchParams.set("cccAction", actionQuery);
          src.searchParams.set("cccPlayer", playerQuery);
          if (franchiseQuery) src.searchParams.set("cccFranchise", franchiseQuery);
          if (seasonQuery) src.searchParams.set("cccSeason", seasonQuery);
          if (yearsQuery) src.searchParams.set("cccYears", yearsQuery);
        } else if (pending) {
          src.searchParams.set("cccAction", pending.action);
          src.searchParams.set("cccPlayer", pending.playerId);
          if (pending.franchiseId) src.searchParams.set("cccFranchise", pending.franchiseId);
          src.searchParams.set("cccSeason", safeStr(year));
          if (pending.action === "extension") src.searchParams.set("cccYears", safeStr(pending.years));
          clearPendingAction();
        }

        frame.setAttribute("src", src.toString());
      } catch (e) {}

      window.addEventListener("message", function (event) {
        if (!event || !event.data) return;

        if (event.data.type === "ccc-height") {
          var h = Number(event.data.height || 0);
          if (h > 0) frame.style.height = Math.max(960, Math.ceil(h) + 24) + "px";
        }
      });
    }

    function initRosterEnhancements() {
      if (!enableRosterContractActions) return;
      if (document.body.id !== "body_options_07") return;

      var attempts = 0;
      var timer = setInterval(function () {
        attempts += 1;
        scanRosterEligibility();
        renderRosterQuickActions();
        renderPopupQuickActions();
        if (attempts >= 18) clearInterval(timer);
      }, 400);

      var observer = new MutationObserver(function () {
        scanRosterEligibility();
        renderRosterQuickActions();
        renderPopupQuickActions();
      });
      observer.observe(document.body, { childList: true, subtree: true });

      document.addEventListener("click", onQuickActionClick, true);
    }

    function init() {
      initRosterEnhancements();
      wireMessage16IframeBridge();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>
