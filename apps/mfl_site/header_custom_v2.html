      }

      setMultiSelectValues(select, selectedValues || []);
    }

    function renderContractTypesSelectOptions(select, items, selectedValues) {
      if (!select) return;

      var sig = (items || []).map(function (it) {
        return [safeStr(it.value), safeStr(it.label), safeStr(it.groupLabel || "All Other")].join(":");

        select.dataset.upsSig = sig;

    function renderMultiSelectOptions(select, items, selectedValues) {
      if (!select) return;
      var sig = (items || []).map(function (it) { return safeStr(it.value) + ":" + safeStr(it.label); }).join("|");
      if (select.dataset.upsSig !== sig) {
        select.innerHTML = (items || []).map(function (it) {
          var value = safeStr(it.value).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      setMultiSelectValues(select, selectedValues || []);

    function syncToolbarFilterControls(toolbar) {
      if (!toolbar) return;
      var sets = buildToolbarOptionSets();
      function prune(selected, items) {
        var allowed = Object.create(null);
        (items || []).forEach(function (it) { allowed[safeStr(it.value)] = true; });
        return uniq((selected || []).filter(function (v) { return !!allowed[safeStr(v)]; }));

      rosterUiState.divisions = [];
      rosterUiState.positions = prune(rosterUiState.positions, sets.positions);
      rosterUiState.years = prune(rosterUiState.years, sets.years);
      rosterUiState.contractTypes = prune(rosterUiState.contractTypes, sets.contractTypes);

      var teamItems = [{ value: "__ALL__", label: "All Teams" }].concat(sets.teams || []);

      renderTeamsSelectOptions(toolbar.querySelector("#upsRosterTeams"), teamItems, teamSelected);

      renderMultiSelectOptions(toolbar.querySelector("#upsRosterYears"), sets.years, rosterUiState.years);
      renderContractTypesSelectOptions(toolbar.querySelector("#upsRosterTypes"), sets.contractTypes, rosterUiState.contractTypes);

      var yearsSel = toolbar.querySelector("#upsRosterYears");
      var typesSel = toolbar.querySelector("#upsRosterTypes");

      if (posSel) posSel.size = Math.max(4, Math.min(10, (sets.positions || []).length || 4));
      if (yearsSel) yearsSel.size = Math.max(3, Math.min(5, (sets.years || []).length || 3));

    function ensureToolbar() {
      var anchor = getRosterHost();

      var toolbar = document.getElementById("upsRosterToolbar");
      if (!toolbar) {
        toolbar = document.createElement("section");

        toolbar.innerHTML =
          '<div class="ups-roster-toolbar-left">' +
            '<label class="ups-roster-toolbar-field">' +

            "</label>" +
            '<label class="ups-roster-toolbar-field">' +
              '<span>Teams</span>' +
              '<select id="upsRosterTeams" multiple size="6"></select>' +
            "</label>" +
            '<label class="ups-roster-toolbar-field">' +
              '<span>Positions</span>' +
              '<select id="upsRosterPositions" multiple size="6"></select>' +
            "</label>" +
            '<label class="ups-roster-toolbar-field">' +
              '<span>Years Left</span>' +
              '<select id="upsRosterYears" multiple size="4"></select>' +
            "</label>" +
            '<label class="ups-roster-toolbar-field">' +
              '<span>Contract Type</span>' +
              '<select id="upsRosterTypes" multiple size="6"></select>' +
            "</label>" +
            '<button type="button" class="ups-roster-toolbar-reset" data-ups-roster-clear="1">Reset</button>' +
          "</div>" +
          '<div class="ups-roster-toolbar-help">Tip: click options on/off to toggle multiple selections (Cmd/Ctrl still works too).</div>' +
          '<div class="ups-roster-toolbar-status" id="upsRosterToolbarStatus">Showing all players</div>';

        anchor.parentNode.insertBefore(toolbar, anchor);
      }

      if (toolbar.dataset.upsWired !== "1") {
        toolbar.dataset.upsWired = "1";

        var searchInput = toolbar.querySelector("#upsRosterSearch");
        var wireMulti = function (id, stateKey, normalizeFn) {
          var el = toolbar.querySelector(id);
          if (!el) return;

          function commitValues(values) {
            if (stateKey === "teams") {
              if (values.indexOf("__ALL__") !== -1) {
                values = [];
              } else {
                values = values.filter(function (v) { return safeStr(v) !== "__ALL__"; });
              }
            }
            rosterUiState[stateKey] = uniq(values.map(function (v) {
              return normalizeFn ? normalizeFn(v) : safeStr(v);
            }).filter(Boolean));
            saveRosterFilterState();
            applyRosterViewState();
            renderRosterSummaries();
            updateToolbarStatus();
          }

          el.addEventListener("change", function () {
            commitValues(selectedMultiValues(el));
          });

          // Native multi-select requires Cmd/Ctrl to deselect. Toggle on direct click so users
          // can click again to remove a selection.
          el.addEventListener("mousedown", function (evt) {
            var target = evt && evt.target;
            if (!target || target.tagName !== "OPTION") return;
            if (target.disabled || safeStr(target.getAttribute("data-ups-group-header")) === "1") return;

            // Let keyboard/multi-modifier behavior work normally when explicitly used.
            if (evt.metaKey || evt.ctrlKey || evt.shiftKey || evt.altKey) return;

            evt.preventDefault();

            var priorScrollTop = el.scrollTop;
            var wasSelected = !!target.selected;
            target.selected = !wasSelected;

            // "All Teams" is exclusive; selecting it clears others visually before commit.
            if (stateKey === "teams" && safeStr(target.value) === "__ALL__" && target.selected) {
              Array.prototype.forEach.call(el.options || [], function (opt) {
                if (opt !== target) opt.selected = false;
              });
            } else if (stateKey === "teams" && safeStr(target.value) !== "__ALL__" && target.selected) {
              Array.prototype.forEach.call(el.options || [], function (opt) {
                if (safeStr(opt.value) === "__ALL__") opt.selected = false;
              });
            }

            el.focus();
            el.scrollTop = priorScrollTop;
            commitValues(selectedMultiValues(el));
          });
        };

        if (searchInput) {
          searchInput.addEventListener("input", function () {
            rosterUiState.search = lowerText(searchInput.value || "");
            saveRosterFilterState();
            applyRosterViewState();
            renderRosterSummaries();
            updateToolbarStatus();
          });
        }

        wireMulti("#upsRosterTeams", "teams", function (v) { return safeStr(v); });
        wireMulti("#upsRosterPositions", "positions", function (v) { return safeStr(v).toUpperCase(); });
        wireMulti("#upsRosterYears", "years", function (v) { return safeStr(v); });
        wireMulti("#upsRosterTypes", "contractTypes", function (v) { return lowerText(v); });
      }

      syncToolbarFilterControls(toolbar);

      var searchInputNow = toolbar.querySelector("#upsRosterSearch");
      if (searchInputNow && searchInputNow.value !== rosterUiState.search) searchInputNow.value = rosterUiState.search;

      toolbar.classList.toggle("is-filtering", isFilterActive());
      return toolbar;
    }

    function updateToolbarStatus() {
      var toolbar = document.getElementById("upsRosterToolbar");
      if (!toolbar) return;
      var status = toolbar.querySelector("#upsRosterToolbarStatus");
      if (!status) return;

      var allRows = Array.from(document.querySelectorAll("#body_options_07 table.report tr"));
      var totalPlayers = 0, matchedPlayers = 0;
      var matchedActive = 0, matchedTaxi = 0, matchedIr = 0;
      var matchedY3 = 0, matchedY2 = 0, matchedY1 = 0;

      allRows.forEach(function (row) {
        if (!row.querySelector("td.player")) return;
        totalPlayers += 1;
        var match = rowMatchesFilters(row);
        if (!match) return;
        matchedPlayers += 1;

        var isTaxi = row.getAttribute("data-ups-taxi-row") === "1";
        var isIr = !!(row.classList && row.classList.contains("IRtoggle"));
        if (isTaxi) matchedTaxi += 1;
        else if (isIr) matchedIr += 1;
        else matchedActive += 1;

        var yb = safeStr(row.getAttribute("data-ups-contract-years-bucket") || "");
        if (yb === "3") matchedY3 += 1;
        else if (yb === "2") matchedY2 += 1;
        else if (yb === "1") matchedY1 += 1;
      });

      var parts = [];
      if (isFilterActive()) {
        parts.push(String(matchedPlayers) + " / " + String(totalPlayers) + " players");
      } else {
        parts.push(String(totalPlayers) + " players");
      }
      parts.push("Active " + String(matchedActive));
      parts.push("Taxi " + String(matchedTaxi));
      parts.push("IR " + String(matchedIr));
      parts.push("Contract Years: 3yr " + String(matchedY3) + ", 2yr " + String(matchedY2) + ", 1yr " + String(matchedY1));
      if (rosterUiState.teams && rosterUiState.teams.length) parts.push("Teams: " + rosterUiState.teams.length);
      if (rosterUiState.positions && rosterUiState.positions.length) parts.push("Pos: " + rosterUiState.positions.join(", "));
      if (rosterUiState.years && rosterUiState.years.length) parts.push("Years: " + rosterUiState.years.join(", "));
      if (rosterUiState.contractTypes && rosterUiState.contractTypes.length) parts.push("Types: " + rosterUiState.contractTypes.length);
      if (rosterUiState.search) parts.push('"' + rosterUiState.search + '"');
      status.textContent = parts.join(" • ");
    }

    function isFilterActive() {
      return !!(
        rosterUiState.search ||
        (rosterUiState.positions && rosterUiState.positions.length) ||
        (rosterUiState.teams && rosterUiState.teams.length) ||
        (rosterUiState.years && rosterUiState.years.length) ||
        (rosterUiState.contractTypes && rosterUiState.contractTypes.length)
      );
    }

    function parseContractParts(raw) {
      var out = { chips: [], extras: [] };
      if (!raw) return out;

      var parts = raw.split("|").map(function (p) { return safeStr(p); }).filter(Boolean);
      if (!parts.length) {
        out.extras.push(raw);
        return out;
      }

      parts.forEach(function (part) {
        var lower = part.toLowerCase();
        var value = "";

        if (/^cl\b/i.test(part)) {
          value = textAfterPrefix(part, /^cl\s*(.*)$/i);
          out.chips.push({ label: "CL", value: value || "?", tone: "neutral" });
          return;
        }
        if (/^tcv\b/i.test(part)) {
          value = textAfterPrefix(part, /^tcv\s*(.*)$/i);
          out.chips.push({ label: "TCV", value: value || "?", tone: "neutral" });
          return;
        }
        if (/^aav\b/i.test(part)) {
          value = textAfterPrefix(part, /^aav\s*(.*)$/i);
          out.chips.push({ label: "AAV", value: value || "?", tone: "neutral" });
          return;
        }
        if (/^ext\s*:/i.test(part)) {
          value = textAfterPrefix(part, /^ext\s*:\s*(.*)$/i);
          out.chips.push({ label: "Ext", value: value || "Yes", tone: "accent" });
          return;
        }
        if (/^gtd\s*:/i.test(part)) {
          value = textAfterPrefix(part, /^gtd\s*:\s*(.*)$/i);
          out.chips.push({ label: "GTD", value: value || "Yes", tone: "accent" });
          return;
        }
        if (lower.indexOf("option eligible") !== -1) {
          out.chips.push({ label: "Option", value: "Eligible", tone: "accent" });
          return;
        }
        if (lower.indexOf("no further extension") !== -1 || lower.indexOf("no further extensions") !== -1) {
          out.chips.push({ label: "Ext", value: "Locked", tone: "accent" });
          return;
        }
        if (/^y\d+\s*-/i.test(part)) {
          out.extras.push(part);
          return;
        }

        out.extras.push(part);
      });

      return out;
    }

    function makeChip(token) {
      var chip = document.createElement("span");
      chip.className = "ups-contract-chip" + (token.tone === "accent" ? " is-accent" : "");

      var label = document.createElement("span");
      label.className = "ups-contract-chip-label";
      label.textContent = safeStr(token.label);

      var val = document.createElement("span");
      val.className = "ups-contract-chip-value";
      val.textContent = safeStr(token.value);

      chip.appendChild(label);
      chip.appendChild(val);
      return chip;
    }

    function enhanceContractInfoCell(cell) {
      if (!cell || cell.dataset.upsContractUi === "1") return;

      var raw = normalizeText(cell.textContent || "");
      if (!raw) {
        cell.dataset.upsContractUi = "1";
        cell.classList.add("ups-contractinfo-cell", "is-empty");
        return;
      }

      var parsed = parseContractParts(raw);
      if (!parsed.chips.length && !parsed.extras.length) {
        cell.dataset.upsContractUi = "1";
        return;
      }

      cell.dataset.upsContractUi = "1";
      cell.classList.add("ups-contractinfo-cell");
      cell.setAttribute("title", raw);
      cell.textContent = raw;
    }

    function ensureTaxiHeaderButton(table, row, count) {
      if (!table || !row) return;
      var cell = row.querySelector("th,td");
      if (!cell) return;

      row.setAttribute("data-ups-taxi-header", "1");
      row.classList.add("ups-roster-taxi-header-row");

      var rawLabel = safeStr(cell.getAttribute("data-ups-taxi-label") || "");
      if (!rawLabel) {
        rawLabel = normalizeText(cell.textContent || "") || "Taxi Squad";
        cell.setAttribute("data-ups-taxi-label", rawLabel);
      }

      var btn = cell.querySelector(".ups-roster-taxi-toggle");
      if (!btn) {
        cell.textContent = "";
        btn = document.createElement("button");
        btn.type = "button";
        btn.className = "ups-roster-taxi-toggle";

        var left = document.createElement("span");
        left.className = "ups-roster-taxi-left";

        var caret = document.createElement("span");
        caret.className = "ups-roster-taxi-caret";
        caret.setAttribute("aria-hidden", "true");
        caret.textContent = "▸";

        var label = document.createElement("span");
        label.className = "ups-roster-taxi-label";

        left.appendChild(caret);
        left.appendChild(label);

        var countEl = document.createElement("span");
        countEl.className = "ups-roster-taxi-count";

        btn.appendChild(left);
        btn.appendChild(countEl);
        cell.appendChild(btn);
      }

      var collapsed = getTaxiCollapsed(table);
      btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
      btn.querySelector(".ups-roster-taxi-label").textContent = (collapsed ? "Show " : "Hide ") + rawLabel;
      btn.querySelector(".ups-roster-taxi-count").textContent = "";
      btn.setAttribute("title", (collapsed ? "Show " : "Hide ") + rawLabel);
    }

    function markPlayerRow(row, isTaxi) {
      if (!row || !row.querySelector("td.player")) return;
      var table = row.closest("table.report");
      var meta = resolveTeamMetaForTable(table);
      var yearsBucket = yearsBucketFromRow(row);
      var yearsCell = row.querySelector("td.contractyear");
      var yearsRaw = safeStr(yearsCell && yearsCell.textContent);
      var typeCell = row.querySelector("td.contractstatus");
      var typeLabel = normalizeText((typeCell && typeCell.textContent) || "");
      row.classList.add("ups-roster-data-row");
      row.setAttribute("data-ups-player-row", "1");
      row.setAttribute("data-ups-player-name", playerNameFromRow(row));
      row.setAttribute("data-ups-player-pos", positionFromRow(row));
      row.setAttribute("data-ups-team-id", safeStr(meta.fid));
      row.setAttribute("data-ups-team-name", lowerText(meta.teamName || ""));
      row.setAttribute("data-ups-division-id", safeStr(meta.divisionId));
      row.setAttribute("data-ups-division-name", lowerText(meta.divisionName || ""));
      row.setAttribute("data-ups-contract-years", yearsRaw);
      row.setAttribute("data-ups-contract-years-bucket", yearsBucket);
      row.setAttribute("data-ups-contract-type-label", typeLabel);
      row.setAttribute("data-ups-contract-type-key", lowerText(typeLabel));
      if (isTaxi) row.setAttribute("data-ups-taxi-row", "1");
    }

    function markPrimaryColumns(row) {
      if (!row || row.dataset.upsRosterRowUi === "1") return;
      if (!row.querySelector("td.player")) return;
      row.dataset.upsRosterRowUi = "1";
      row.classList.add("ups-roster-data-row");
    }

    function decorateTaxiSection(table) {
      if (!table) return;
      var rows = Array.from(table.querySelectorAll("tr"));
      var inTaxi = false;
      var taxiHeader = null;
      var taxiCount = 0;

      rows.forEach(function (row) {
        row.removeAttribute("data-ups-taxi-header");
        row.removeAttribute("data-ups-taxi-summary-row");
        row.removeAttribute("data-ups-taxi-row");
      });

      rows.forEach(function (row) {
        var rowText = normalizeText(row.textContent || "");
        var hasToggle = !!row.querySelector(".ups-roster-taxi-toggle");

        if (!inTaxi && (hasToggle || /^taxi squad$/i.test(rowText))) {
          inTaxi = true;
          taxiHeader = row;
          row.setAttribute("data-ups-taxi-header", "1");
          return;
        }

        if (!inTaxi) return;

        row.setAttribute("data-ups-taxi-row", "1");
        if (row.querySelector("td.player")) taxiCount += 1;

        if (/total players on taxi squad/i.test(rowText)) {
          row.setAttribute("data-ups-taxi-summary-row", "1");
          inTaxi = false;
        }
      });

      if (taxiHeader) {
        table.setAttribute("data-ups-taxi-count", String(taxiCount));
        ensureTaxiHeaderButton(table, taxiHeader, taxiCount);
      } else {
        table.removeAttribute("data-ups-taxi-count");
      }
    }

    function renderRosterSummary(table) {
      if (!table) return;
      var caption = table.querySelector("caption");
      if (!caption) return;

      var meta = caption.querySelector(".ups-roster-caption-meta");
      if (meta) meta.remove();
    }

    function renderRosterSummaries() {
      if (!isRosterPage()) return;
      muteMutationObserver(150);
      getRosterTables().forEach(renderRosterSummary);
    }

    function rowMatchesFilters(row) {
      if (!row || row.getAttribute("data-ups-player-row") !== "1") return true;
      var name = safeStr(row.getAttribute("data-ups-player-name") || "");
      var pos = safeStr(row.getAttribute("data-ups-player-pos") || "").toUpperCase();
      var teamId = safeStr(row.getAttribute("data-ups-team-id") || "");
      var yearsBucket = safeStr(row.getAttribute("data-ups-contract-years-bucket") || "");
      var typeKey = lowerText(row.getAttribute("data-ups-contract-type-key") || "");
      if (rosterUiState.search && name.indexOf(rosterUiState.search) === -1) return false;
      if (rosterUiState.positions && rosterUiState.positions.length && rosterUiState.positions.indexOf(pos) === -1) return false;
      if (rosterUiState.teams && rosterUiState.teams.length && rosterUiState.teams.indexOf(teamId) === -1) return false;
      if (rosterUiState.years && rosterUiState.years.length && rosterUiState.years.indexOf(yearsBucket) === -1) return false;
      if (rosterUiState.contractTypes && rosterUiState.contractTypes.length && rosterUiState.contractTypes.indexOf(typeKey) === -1) return false;
      return true;
    }

    function applyRosterViewState() {
      if (!isRosterPage()) return;
      var filterActive = isFilterActive();
      var root = getRosterRoot();
      if (root) root.classList.toggle("ups-roster-filter-active", filterActive);

      getRosterTables().forEach(function (table) {
        var taxiCollapsed = getTaxiCollapsed(table);
        var visibleMatchCount = 0;

        Array.from(table.querySelectorAll("tr")).forEach(function (row) {
          if (row.querySelector("td.player")) {
            var match = rowMatchesFilters(row);
            var hideByTaxi = taxiCollapsed && row.getAttribute("data-ups-taxi-row") === "1";
            row.hidden = !match || hideByTaxi;
            if (!row.hidden) visibleMatchCount += 1;
            return;
          }

          if (row.getAttribute("data-ups-taxi-header") === "1") {
            row.hidden = false;
            return;
          }

          if (row.getAttribute("data-ups-taxi-row") === "1" || row.getAttribute("data-ups-taxi-summary-row") === "1") {
            row.hidden = taxiCollapsed;
            return;
          }

          row.hidden = false;
        });

        table.classList.toggle("ups-roster-no-match", filterActive && visibleMatchCount === 0);
        table.hidden = filterActive && visibleMatchCount === 0;

        var wrap = table.closest(".mobile-wrap");
        if (wrap && wrap.querySelector("table.report") === table) {
          wrap.hidden = !!table.hidden;
        }

        var hostCell = table.closest("td.two_column_layout");
        if (hostCell && hostCell.querySelectorAll("table.report").length === 1 && hostCell.querySelector("table.report") === table) {
          hostCell.hidden = !!table.hidden;
        }

        var toggle = table.querySelector(".ups-roster-taxi-toggle");
        if (toggle) toggle.setAttribute("aria-expanded", taxiCollapsed ? "false" : "true");
      });

      Array.from(document.querySelectorAll("#body_options_07 table.two_column_layout > tbody > tr")).forEach(function (layoutRow) {
        var cells = Array.prototype.filter.call(layoutRow.children || [], function (child) {
          return child && child.tagName === "TD" && /\btwo_column_layout\b/.test(safeStr(child.className));
        });
        if (!cells.length) return;
        var hasRosterCell = cells.some(function (cell) { return !!cell.querySelector("table.report"); });
        if (!hasRosterCell) return;
        layoutRow.hidden = cells.every(function (cell) { return cell.hidden; });
      });
    }

    function enhanceRosterTables() {
      if (!isRosterPage()) return;

      getRosterTables().forEach(function (table) {
        Array.from(table.querySelectorAll("tr")).forEach(function (row) {
          markPrimaryColumns(row);
          var infoCell = row.querySelector("td.contractinfo");
          if (infoCell) enhanceContractInfoCell(infoCell);
          markPlayerRow(row, false);
        });
        decorateTaxiSection(table);
        Array.from(table.querySelectorAll('tr[data-ups-taxi-row="1"]')).forEach(function (row) {
          if (row.querySelector("td.player")) markPlayerRow(row, true);
        });
      });
    }

    function onClick(e) {
      var clearBtn = e.target && e.target.closest ? e.target.closest("[data-ups-roster-clear='1']") : null;
      if (clearBtn) {
        rosterUiState.search = "";
        rosterUiState.positions = [];
        rosterUiState.teams = [];
        rosterUiState.divisions = [];
        rosterUiState.years = [];
        rosterUiState.contractTypes = [];
        var toolbar = ensureToolbar();
        if (toolbar) {
          var searchEl = toolbar.querySelector("#upsRosterSearch");
          var teamsEl = toolbar.querySelector("#upsRosterTeams");
          var posEl = toolbar.querySelector("#upsRosterPositions");
          var yearsEl = toolbar.querySelector("#upsRosterYears");
          var typesEl = toolbar.querySelector("#upsRosterTypes");
          if (searchEl) searchEl.value = "";
          setMultiSelectValues(teamsEl, []);
          setMultiSelectValues(posEl, []);
          setMultiSelectValues(yearsEl, []);
          setMultiSelectValues(typesEl, []);
        }
        saveRosterFilterState();
        applyRosterViewState();
        renderRosterSummaries();
        updateToolbarStatus();
        return;
      }

      var taxiToggle = e.target && e.target.closest ? e.target.closest(".ups-roster-taxi-toggle") : null;
      if (taxiToggle) {
        var table = taxiToggle.closest("table.report");
        if (table) {
          setTaxiCollapsed(table, !getTaxiCollapsed(table));
          applyRosterViewState();
          renderRosterSummaries();
          updateToolbarStatus();
        }
        return;
      }

      var btn = e.target && e.target.closest ? e.target.closest(".ups-contract-more") : null;
      if (!btn) return;
      var stack = btn.closest(".ups-contract-stack");
      if (!stack) return;
      var details = stack.querySelector(".ups-contract-fulltext");
      if (!details) return;
      var open = btn.getAttribute("aria-expanded") === "true";
      btn.setAttribute("aria-expanded", open ? "false" : "true");
      btn.textContent = open ? "More" : "Less";
      details.hidden = open;
      stack.classList.toggle("is-expanded", !open);
    }

    function refreshRosterUi() {
      enhanceRosterTables();
      ensureToolbar();
      applyRosterViewState();
      renderRosterSummaries();
      updateToolbarStatus();
    }

    function init() {
      if (!isRosterPage()) return;

      try {
        var savedSearch = sessionStorage.getItem("ups_roster_search");
        if (savedSearch) rosterUiState.search = lowerText(savedSearch);
        rosterUiState.positions = loadStoredList("ups_roster_positions").map(function (v) { return safeStr(v).toUpperCase(); });
        rosterUiState.teams = loadStoredList("ups_roster_teams");
        rosterUiState.divisions = [];
        rosterUiState.years = loadStoredList("ups_roster_years");
        rosterUiState.contractTypes = loadStoredList("ups_roster_contract_types").map(lowerText);
        if (!rosterUiState.positions.length) {
          var savedPos = sessionStorage.getItem("ups_roster_position");
          if (savedPos && safeStr(savedPos).toUpperCase() !== "ALL") {
            rosterUiState.positions = [safeStr(savedPos).toUpperCase()];
          }
        }
      } catch (e) {}

      refreshRosterUi();
      document.addEventListener("click", onClick, true);
      document.addEventListener("input", function (evt) {
        var el = evt && evt.target;
        if (!el || el.id !== "upsRosterSearch") return;
        saveRosterFilterState();
      }, true);

      if (!window.MutationObserver) return;
      var root = getRosterRoot();
      if (!root) return;

      var pending = false;
      var obs = new MutationObserver(function () {
        if (Date.now() < observerMuteUntil) return;
        if (pending) return;
        pending = true;
        setTimeout(function () {
          pending = false;
          refreshRosterUi();
        }, 80);
      });
      obs.observe(root, { childList: true, subtree: true });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>

<script>
(function () {
  var mount = document.getElementById("upsMarquee");
  if (!mount) return;

  function safeStr(v) {
    return v === null || v === undefined ? "" : String(v);
  }

  function safeInt(v) {
    var n = parseInt(String(v).replace(/[^\d-]/g, ""), 10);
    return isNaN(n) ? 0 : n;
  }

  function htmlEsc(v) {
    return safeStr(v)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function pad2(v) {
    return String(v).padStart(2, "0");
  }

  function getLeagueId() {
    try {
      var u = new URL(window.location.href);
      var q = u.searchParams.get("L");
      if (q) return q;
    } catch (e) {}
    var m = String(window.location.pathname || "").match(/\/home\/(\d+)(?:\/|$)/i);
    if (m && m[1]) return String(m[1]);
    if (typeof league_id !== "undefined" && league_id) return String(league_id);
    return "";
  }

  function getYear() {
    try {
      var u = new URL(window.location.href);
      var q = u.searchParams.get("YEAR");
      if (q) return q;
    } catch (e) {}
    var m = String(window.location.pathname || "").match(/\/(\d{4})\//);
    if (m && m[1]) return String(m[1]);
    if (typeof year !== "undefined" && year) return String(year);
    return String(new Date().getFullYear());
  }

  function fetchFirstJson(urls) {
    function attempt(i) {
      if (i >= urls.length) return Promise.reject(new Error("all fetch candidates failed"));
      return fetch(urls[i], { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .catch(function () {
          return attempt(i + 1);
        });
    }
    return attempt(0);
  }

  function collectDraftPicks(node, out) {
    if (!node) return;
    if (Array.isArray(node)) {
      for (var i = 0; i < node.length; i += 1) collectDraftPicks(node[i], out);
      return;
    }
    if (typeof node !== "object") return;
    var hasRound = node.round !== undefined;
    var hasPick = node.pick !== undefined;
    var hasFranchise = node.franchise !== undefined || node.franchise_id !== undefined;
    if (hasRound && hasPick && hasFranchise) {
      out.push({
        round: safeInt(node.round),
        pick: safeInt(node.pick),
        franchise: safeStr(node.franchise || node.franchise_id || ""),
        player: safeStr(node.player || node.player_name || "")
      });
    }
    var keys = Object.keys(node);
    for (var k = 0; k < keys.length; k += 1) collectDraftPicks(node[keys[k]], out);
  }

  function normalizeDraftPicks(raw) {
    var out = [];
    collectDraftPicks(raw, out);
    out = out
      .filter(function (p) {
        return p.round > 0 && p.pick > 0 && p.franchise;
      })
      .sort(function (a, b) {
        return a.round - b.round || a.pick - b.pick;
      });
    var seen = {};
    var unique = [];
    for (var i = 0; i < out.length; i += 1) {
      var key = out[i].round + "|" + out[i].pick + "|" + out[i].franchise;
      if (seen[key]) continue;
      seen[key] = 1;
      unique.push(out[i]);
    }
    return unique.slice(0, 24);
  }

  function buildFranchiseMap(tagTrackingRows) {
    var map = {};
    (tagTrackingRows || []).forEach(function (r) {
      var fid = safeStr(r && r.franchise_id).replace(/\D/g, "").padStart(4, "0").slice(-4);
      if (!fid) return;
      if (!map[fid]) map[fid] = safeStr(r && r.franchise_name) || fid;
    });
    return map;
  }

  function buildRingOfHonorText(championsPayload) {
    var yearToWinner = {};
    var recent = championsPayload && championsPayload.recent_winners;
    var leaders = championsPayload && championsPayload.title_leaders;

    if (Array.isArray(recent)) {
      recent.forEach(function (r) {
        var y = safeInt(r && r.year);
        if (y) yearToWinner[y] = safeStr(r.franchise || "");
      });
    }

    if (Array.isArray(leaders)) {
      leaders.forEach(function (r) {
        var owner = safeStr(r && r.franchise);
        safeStr(r && r.years)
          .split(",")
          .forEach(function (rawYear) {
            var y = safeInt(rawYear);
            if (!y) return;
            if (!yearToWinner[y]) yearToWinner[y] = owner;
          });
      });
    }

    var parts = [];
    for (var y = 2010; y <= 2026; y += 1) {
      parts.push(y + ": " + (yearToWinner[y] || "TBD"));
    }
    return parts.join("  •  ");
  }

  function buildTopExpiringRookieText(tagTrackingRows) {
    var best = null;
    (tagTrackingRows || []).forEach(function (r) {
      var years = safeInt(r && r.contract_year);
      var statusText =
        (safeStr(r && r.contract_status) + " " + safeStr(r && r.contract_info)).toLowerCase();
      if (years > 1) return;
      if (statusText.indexOf("rookie") === -1) return;
      var pts = Number(r && r.points_total || 0);
      if (!best || pts > best.pts) {
        best = {
          name: safeStr(r && r.player_name),
          team: safeStr(r && r.franchise_name),
          pts: pts
        };
      }
    });
    if (!best) return "No expiring rookie candidates yet.";
    return (
      best.name +
      " (" +
      best.team +
      ")  •  " +
      best.pts.toFixed(1) +
      " pts"
    );
  }

  function buildTaggedPlayersText(tagSubs) {
    if (!Array.isArray(tagSubs) || !tagSubs.length) return "No submitted tags yet.";
    var maxSeason = 0;
    tagSubs.forEach(function (r) {
      var s = safeInt(r && (r.season || r.year));
      if (s > maxSeason) maxSeason = s;
    });
    var scoped = tagSubs.filter(function (r) {
      var s = safeInt(r && (r.season || r.year));
      return maxSeason ? s === maxSeason : true;
    });
    var names = scoped
      .slice()
      .sort(function (a, b) {
        return safeStr(a && a.franchise_name).localeCompare(safeStr(b && b.franchise_name)) ||
          safeStr(a && a.player_name).localeCompare(safeStr(b && b.player_name));
      })
      .slice(0, 24)
      .map(function (r) {
        var player = safeStr(r && r.player_name);
        var team = safeStr(r && r.franchise_name);
        return player && team ? player + " (" + team + ")" : player || team;
      })
      .filter(Boolean);
    var suffix = scoped.length > names.length ? "  •  +" + (scoped.length - names.length) + " more" : "";
    return maxSeason + " submitted tags (" + scoped.length + "): " + names.join("  •  ") + suffix;
  }

  function render(lanes, draftYear) {
    var laneHtml = lanes
      .map(function (lane) {
        return (
          '<div class="ups-marquee-lane">' +
          '<div class="ups-marquee-label">' + htmlEsc(lane.label) + "</div>" +
          '<div class="ups-marquee-body">' + htmlEsc(lane.body) + "</div>" +
          "</div>"
        );
      })
      .join("");

    mount.innerHTML =
      '<div class="ups-marquee-header">' +
      '<div class="ups-marquee-title">UPS League Pulse</div>' +
      '<div class="ups-marquee-subtitle">Draft / Champions / Expiring Rookies / Tags • ' + htmlEsc(String(draftYear || "")) + "</div>" +
      "</div>" +
      '<div class="ups-marquee-lanes">' + laneHtml + "</div>";
  }

  function boot() {
    var selectedYear = getYear();
    var leagueId = getLeagueId();
    var version = "v1.0.2";
    var cacheKey = String(Date.now());
    var baseCandidates = [
      "https://rawcdn.githack.com/keithcreelman/upsmflproduction/" + version + "/",
      "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@" + version + "/"
    ];

    var championsPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/champions_panels.json?v=" + cacheKey;
      })
    ).catch(function () {
      return {};
    });

    var tagTrackingPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/ccc/tag_tracking.json?v=" + cacheKey;
      })
    ).catch(function () {
      return { rows: [] };
    });

    var tagSubPromise = fetchFirstJson(
      baseCandidates.map(function (base) {
        return base + "site/ccc/tag_submissions.json?v=" + cacheKey;
      })
    ).catch(function () {
      return { rows: [] };
    });

    var draftPromise = fetchFirstJson([
      "https://api.myfantasyleague.com/" +
        encodeURIComponent(selectedYear) +
        "/export?TYPE=draftResults&L=" +
        encodeURIComponent(leagueId) +
        "&JSON=1&_=" +
        cacheKey
    ]).catch(function () {
      return {};
    });

    Promise.all([championsPromise, tagTrackingPromise, tagSubPromise, draftPromise]).then(function (all) {
      var champions = all[0] || {};
      var trackingRaw = all[1] || {};
      var tagSubsRaw = all[2] || {};
      var draftRaw = all[3] || {};

      var tagTrackingRows = Array.isArray(trackingRaw)
        ? trackingRaw
        : Array.isArray(trackingRaw.rows)
        ? trackingRaw.rows
        : Array.isArray(trackingRaw.tag_tracking)
        ? trackingRaw.tag_tracking
        : [];

      var tagSubs = Array.isArray(tagSubsRaw)
        ? tagSubsRaw
        : Array.isArray(tagSubsRaw.rows)
        ? tagSubsRaw.rows
        : Array.isArray(tagSubsRaw.submissions)
        ? tagSubsRaw.submissions
        : [];

      var fidToName = buildFranchiseMap(tagTrackingRows);
      var rookiePicks = normalizeDraftPicks(draftRaw);
      var rookieText = rookiePicks.length
        ? rookiePicks
            .map(function (p) {
              var pickNo = p.round + "." + pad2(p.pick);
              var team = fidToName[p.franchise] || p.franchise;
              var player = p.player || "On the Clock";
              return pickNo + " " + team + " - " + player;
            })
            .join("  •  ")
        : "No rookie draft picks available yet.";

      var lanes = [
        { label: "Rookie Draft (First 24)", body: rookieText },
        { label: "Champions Ring Of Honor (2010-2026)", body: buildRingOfHonorText(champions) },
        { label: "Highest Scoring Expiring Rookie", body: buildTopExpiringRookieText(tagTrackingRows) },
        { label: "Submitted Tagged Players", body: buildTaggedPlayersText(tagSubs) }
      ];
      render(lanes, selectedYear);
    }).catch(function () {
      render(
        [
          { label: "Rookie Draft (First 24)", body: "Unable to load draft data." },
          { label: "Champions Ring Of Honor (2010-2026)", body: "Unable to load champions data." },
          { label: "Highest Scoring Expiring Rookie", body: "Unable to load expiring rookie data." },
          { label: "Submitted Tagged Players", body: "Unable to load tag submission data." }
        ],
        selectedYear
      );
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
<script>
(function () {
  var banner = document.getElementById("upsDevBanner");
  if (!banner) return;
  var href = String(window.location.href || "");
  var isDevLoader = !!document.querySelector('script[src*="@dev/site/loader.js"]');
  var devLeagueId = String(window.UPS_DEV_LEAGUE_ID || "").replace(/\D/g, "");
  var isTestLeague = false;
  if (devLeagueId) {
    var esc = devLeagueId.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    var byParam = new RegExp("[?&]L=" + esc + "(?:[&#]|$)");
    var byPath = new RegExp("/home/" + esc + "(?:[/?#]|$)");
    isTestLeague = byParam.test(href) || byPath.test(href);
  }
  if (!isDevLoader && !isTestLeague) return;
  banner.style.display = "flex";
})();
</script>
