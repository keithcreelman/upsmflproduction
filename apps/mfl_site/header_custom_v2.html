<script>
  // Hard redirect guard: never allow CCC message routes to stay on leaked dev league.
  (function () {
    try {
      var prodLeague = String(window.UPS_CCC_PROD_LEAGUE_ID || "74598").replace(/\D/g, "");
      var devLeague = String(window.UPS_DEV_LEAGUE_ID || "25625").replace(/\D/g, "");
      if (!prodLeague || !devLeague || prodLeague === devLeague) return;

      var u = new URL(window.location.href || "");
      var moduleName = String(u.searchParams.get("MODULE") || "").toUpperCase();
      if (moduleName !== "MESSAGE2") return;
      if (String(u.searchParams.get("UPS_ALLOW_DEV_CCC") || "") === "1") return;

      var m = String(u.pathname || "").match(/\/home\/(\d+)(?:\/|$)/i);
      var pathLeague = m && m[1] ? String(m[1]) : "";
      if (pathLeague !== devLeague) return;

      u.pathname = String(u.pathname || "").replace(/\/home\/\d+(?:\/|$)/i, "/home/" + prodLeague);
      window.location.replace(u.toString());
    } catch (e) {}
  })();

  // Normalize Contract Command Center deep-links: move ccc* params to hash so MFL doesn't validate them.
  (function () {
    var u = new URL(window.location.href || "");
    var hasCcc =
      u.searchParams.has("cccAction") ||
      u.searchParams.has("cccPlayer") ||
      u.searchParams.has("cccFranchise") ||
      u.searchParams.has("cccSeason") ||
      u.searchParams.has("cccYears");
    if (!hasCcc) return;
    var moduleName = (u.searchParams.get("MODULE") || "").toUpperCase();
    if (moduleName !== "MESSAGE2") return;

    var h = new URLSearchParams();
    ["cccAction", "cccPlayer", "cccFranchise", "cccSeason", "cccYears"].forEach(function (k) {
      var v = u.searchParams.get(k);
      if (v !== null && v !== undefined && v !== "") h.set(k, v);
    });

    u.search = "?MODULE=MESSAGE2";
    u.hash = h.toString();

    if (u.toString() !== window.location.href) {
      window.location.replace(u.toString());
    }
  })();

  // Debug helper: add `&UPS_DEBUG=1` to any URL to confirm which header build is loaded.
  (function () {
    try {
      var u = new URL(window.location.href);
      if (u.searchParams.get("UPS_DEBUG") !== "1") return;
    } catch (e) {
      return;
    }
    window.__UPS_DEBUG = true;
    document.addEventListener("DOMContentLoaded", function () {
      try {
        var el = document.createElement("div");
        el.id = "upsDebugBadge";
        el.textContent = "UPS header build: 2026.02.21.3";
        el.style.cssText =
          "position:fixed;right:10px;bottom:10px;z-index:999999;" +
          "padding:6px 10px;border-radius:999px;" +
          "background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.25);" +
          "color:#fff;font:700 12px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;";
        document.body.appendChild(el);
      } catch (e) {}
    });
  })();
</script>

<script>
  document.title = "UPS Salary Cap Dynasty League";

  /* Font size + theme persistence */
  window.increaseFont = true;
  (function () {
    try {
      var key = "fontSize_" + year + "_" + league_id;
      if (localStorage.hasOwnProperty(key)) {
        var setStyle = localStorage.getItem(key);
        if (setStyle && setStyle !== "undefined") {
          document.documentElement.setAttribute("style", setStyle);
        }
      }
    } catch (e) {}
  })();

  function setTheme(year, league_id, themeName) {
    if (typeof themeName !== "string") return;
    localStorage.setItem("theme_" + year + "_" + league_id, themeName);
    document.documentElement.className = themeName;
    try {
      var inferredMode = String(themeName || "").toLowerCase().indexOf("light") !== -1 ? "light" : "dark";
      if (typeof applyUPSMode === "function") {
        applyUPSMode(inferredMode, true);
      } else {
        document.documentElement.setAttribute("data-ups-mode", inferredMode);
      }
    } catch (e) {}
  }

  function upsThemeStorageKey() {
    var y = typeof year !== "undefined" ? year : "";
    var l = typeof league_id !== "undefined" ? league_id : "";
    return "ups_mode_" + y + "_" + l;
  }

  function normalizeUPSMode(mode) {
    return String(mode || "").toLowerCase() === "light" ? "light" : "dark";
  }

  function getUPSMode() {
    return normalizeUPSMode(document.documentElement.getAttribute("data-ups-mode") || "dark");
  }

  function applyUPSMode(mode, persist) {
    var nextMode = normalizeUPSMode(mode);
    document.documentElement.setAttribute("data-ups-mode", nextMode);
    document.documentElement.style.colorScheme = nextMode;
    window.UPS_THEME_MODE = nextMode;
    if (persist) {
      try {
        localStorage.setItem(upsThemeStorageKey(), nextMode);
      } catch (e) {}
    }
    try {
      document.dispatchEvent(new CustomEvent("ups-theme-change", { detail: { mode: nextMode } }));
    } catch (e) {}
  }

  window.setUPSMode = function (mode) {
    applyUPSMode(mode, true);
  };

  window.toggleUPSMode = function () {
    applyUPSMode(getUPSMode() === "dark" ? "light" : "dark", true);
  };

  (function () {
    var key = "theme_" + year + "_" + league_id;
    var storedTheme = localStorage.getItem(key) || "";
    if (storedTheme) {
      document.documentElement.className = storedTheme;
    } else {
      document.documentElement.removeAttribute("class");
    }

    var upsMode = "";
    try {
      upsMode = localStorage.getItem(upsThemeStorageKey()) || "";
    } catch (e) {}
    if (!upsMode && storedTheme.toLowerCase().indexOf("light") !== -1) {
      upsMode = "light";
    }
    applyUPSMode(upsMode || "dark", false);

    if (window.MutationObserver) {
      var htmlEl = document.documentElement;
      var lastClass = htmlEl.className || "";
      var htmlClassObs = new MutationObserver(function () {
        var nextClass = htmlEl.className || "";
        if (nextClass === lastClass) return;
        lastClass = nextClass;
        var inferred = nextClass.toLowerCase().indexOf("light") !== -1 ? "light" : "dark";
        if (inferred !== getUPSMode()) {
          applyUPSMode(inferred, false);
        }
      });
      htmlClassObs.observe(htmlEl, { attributes: true, attributeFilter: ["class"] });
    }
  })();
</script>

<script>
  (function () {
    function updateThemeToggleUi() {
      var mode = typeof window.getUPSMode === "function" ? window.getUPSMode() : "dark";
      var btn = document.getElementById("upsThemeToggle");
      if (!btn) return;
      var label = btn.querySelector(".ups-theme-toggle-label");
      if (label) label.textContent = mode === "dark" ? "Theme: Dark" : "Theme: Light";
      btn.setAttribute("aria-pressed", mode === "light" ? "true" : "false");
      btn.setAttribute("title", mode === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function initThemeToggle() {
      var btn = document.getElementById("upsThemeToggle");
      if (btn && !btn.dataset.wired) {
        btn.dataset.wired = "1";
        btn.addEventListener("click", function () {
          if (typeof window.toggleUPSMode === "function") {
            window.toggleUPSMode();
            return;
          }
          if (typeof window.getUPSMode === "function" && typeof window.setUPSMode === "function") {
            var next = window.getUPSMode() === "dark" ? "light" : "dark";
            window.setUPSMode(next);
          }
        });
      }
      updateThemeToggleUi();
    }

    function initOwnerActionsMenu() {
      var wrap = document.getElementById("upsOwnerActionsWrap");
      var btn = document.getElementById("upsOwnerActionsToggle");
      var menu = document.getElementById("upsOwnerActionsMenu");
      if (!wrap || !btn || !menu || btn.dataset.wired) return;
      btn.dataset.wired = "1";

      function setOpen(next) {
        var open = !!next;
        wrap.classList.toggle("is-open", open);
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        if (open) menu.removeAttribute("hidden");
        else menu.setAttribute("hidden", "");
      }

      btn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        setOpen(!wrap.classList.contains("is-open"));
      });

      menu.addEventListener("click", function () {
        setOpen(false);
      });

      document.addEventListener("click", function (e) {
        if (!wrap.contains(e.target)) setOpen(false);
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") setOpen(false);
      });

      window.addEventListener("resize", function () {
        if (window.innerWidth > 900) setOpen(false);
      });
    }

    document.addEventListener("ups-theme-change", function () {
      updateThemeToggleUi();
    });

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        initThemeToggle();
        initOwnerActionsMenu();
      });
    } else {
      initThemeToggle();
      initOwnerActionsMenu();
    }
  })();
</script>

    }

    function tryUrlParam(name) {

        var v = u.searchParams.get(name);
        return v == null ? "" : String(v);
      } catch (e) {
        return "";
      }
    }

    function getFid() {
      var fid = pad4(window.FRANCHISE_ID || window.franchise_id || "");
      if (fid && fid !== "0000") return fid;

      // Commissioner pages often run as franchise_id=0000.
      // Use URL param or the "Select Franchise" control when present.
      fid = pad4(tryUrlParam("FRANCHISE_ID") || tryUrlParam("FRANCHISE") || tryUrlParam("F") || "");

        }
      } catch (e) {}

      return "";
    }

    function getFranchiseName(fid) {
      try {
        var key = "fid_" + fid;
        if (
          window.franchiseDatabase &&
          window.franchiseDatabase[key] &&
          window.franchiseDatabase[key].name
        ) {
          return String(window.franchiseDatabase[key].name || "").trim();
        }
      } catch (e) {}
      // Fallback: read the selected franchise name from the reportform dropdown.
      try {
        var sel =
          document.querySelector('form.reportform select[name="FRANCHISE"]') ||
          document.querySelector('form[name="SELECT_FRANCHISE"] select[name="FRANCHISE"]');
        if (sel && sel.options && sel.selectedIndex >= 0) {

          var txt = opt ? String(opt.text || "").trim() : "";

        }
      } catch (e) {}
      return "";
    }

    function isHttpUrl(v) {
      var s = String(v || "").trim();
      return s.indexOf("http://") === 0 || s.indexOf("https://") === 0;
    }

    function candidateIconUrls(fid) {
      var host = window.baseURLStatic || window.baseURLDynamic || (window.location ? window.location.origin : "");
      var lid = "";
      var yr = 0;
      try {
        var u = new URL(window.location.href);
        lid = String(u.searchParams.get("L") || "").trim();
        yr = parseInt(String(u.searchParams.get("YEAR") || ""), 10) || 0;
      } catch (e) {}
      if (!lid) {
        var lm = String(window.location.pathname || "").match(/\/home\/(\d+)(?:\/|$)/i);
        if (lm && lm[1]) lid = String(lm[1]).trim();
      }
      if (!yr) {
        var ym = String(window.location.pathname || "").match(/\/(\d{4})\//);

      if (!lid) lid = String(window.league_id || "").trim();
      if (!yr) yr = parseInt(String(window.year || ""), 10) || 0;
      if (!yr) return [];
      var leagueIds = [];
      function addLeagueId(v) {
        var s = String(v || "").replace(/\D/g, "");
        if (!s || leagueIds.indexOf(s) !== -1) return;
        leagueIds.push(s);
      }
      addLeagueId(lid);
      if (!leagueIds.length) return [];
      var out = [];
      var seen = {};
      function push(url) {
        var s = String(url || "").trim();
        if (!s) return;
        s = s.replace(/^http:\/\//i, "https://");
        if (seen[s]) return;
        seen[s] = 1;
        out.push(s);
      }
      try {
        var key = "fid_" + fid;
        var rec = window.franchiseDatabase && window.franchiseDatabase[key];
        if (rec && isHttpUrl(rec.icon)) push(rec.icon);

        push(b + ".png");
        push(b + ".jpg");
        push(b + ".jpeg");
        push(b + ".gif");
      });
      return out;
    }

    function setIconWithFallback(img, urls) {
      if (!img) return;
      var list = Array.isArray(urls) ? urls.filter(Boolean) : [];
      if (!list.length) {
        img.style.display = "none";
        img.removeAttribute("src");
        return;
      }
      var i = 0;
      function tryNext() {
        if (i >= list.length) {
          img.removeAttribute("src");
          img.style.display = "none";
          return;
        }
        img.style.display = "";
        img.src = list[i];
        i += 1;
      }
      img.onload = function () {
        img.style.display = "";
      };
      img.onerror = function () {
        tryNext();
      };
      tryNext();
    }

    function initOnce() {
      var wrap = document.getElementById("upsFranchiseIdentity");
      var nameEl = document.getElementById("upsFranchiseName");

      var fid = getFid();
      if (!fid) return false;

      var name = getFranchiseName(fid);
      if (!name) return false;

      nameEl.textContent = name;
      wrap.hidden = false;
      setIconWithFallback(iconEl, candidateIconUrls(fid));
      return true;
    }

    function attempt(retries) {
      if (initOnce()) return;
      if (retries <= 0) return;
      setTimeout(function () {
        attempt(retries - 1);
      }, 250);
    }

    function wireSelect() {
      try {
        var sel =
          document.querySelector('form.reportform select[name="FRANCHISE"]') ||
          document.querySelector('form[name="SELECT_FRANCHISE"] select[name="FRANCHISE"]');
        if (!sel || sel.dataset.upsWired) return;
        sel.dataset.upsWired = "1";
        sel.addEventListener("change", function () {
          attempt(12);
        });
      } catch (e) {}
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        wireSelect();
        attempt(24);
      });
    } else {
      wireSelect();
      attempt(24);
    }

    // Late-load fallback for pages where globals populate after other scripts.
    window.addEventListener("load", function () {
      wireSelect();
      attempt(24);
    });
  })();
</script>

<script>
/*
UPS COMPACT STANDINGS
Works on:
• Standings page
• Home page standings module
Replaces bulky default grid with compact toggle view + franchise icons
*/

(function () {
  function safeStr(v) { return v === null || v === undefined ? "" : String(v).trim(); }
  function htmlEsc(v) { return safeStr(v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
  function pad4(v) { var d = safeStr(v).replace(/\D/g, ""); return d ? d.padStart(4, "0").slice(-4) : ""; }

  function moduleFromUrl() {
    try { var u = new URL(window.location.href); return safeStr(u.searchParams.get("MODULE")).toLowerCase(); }
    catch (e) { return ""; }
  }

  function optionFromUrl() {
    try { var u = new URL(window.location.href); return safeStr(u.searchParams.get("O")); }
    catch (e) { return ""; }
  }

  function isHomePath() {
    return /\/\d{4}\/home\/\d+/i.test(safeStr(window.location.pathname));
  }

  function normalizeHeader(t) {
    return safeStr(t).toLowerCase().replace(/&nbsp;/g, " ")
      .replace(/[^a-z0-9%]+/g, " ").replace(/\s+/g, " ").trim();
  }

  function parseNumber(txt) {
    var m = safeStr(txt).replace(/,/g, "").match(/-?\d+(?:\.\d+)?/);
    return m ? Number(m[0]) : null;
  }

  function parseWltText(txt) {
    var m = safeStr(txt).match(/(\d+)\s*[-/]\s*(\d+)\s*[-/]\s*(\d+)/);
    if (!m) return null;
    return { w: Number(m[1]), l: Number(m[2]), t: Number(m[3]) };
  }

  function pctFromWlt(wlt) {
    if (!wlt) return null;
    var g = Number(wlt.w || 0) + Number(wlt.l || 0) + Number(wlt.t || 0);
    if (!g) return null;
    return (Number(wlt.w || 0) + Number(wlt.t || 0) * 0.5) / g;
  }

  function fmtWlt(wlt) { if (!wlt) return " - "; return [wlt.w, wlt.l, wlt.t].join("-"); }
  function fmtPct(v) { if (v === null || v === undefined || isNaN(Number(v))) return " - "; return Number(v).toFixed(3); }

  function isStandingsPage() {
    var mod = moduleFromUrl();
    if (mod === "standings") return true;
    var o = optionFromUrl();
    if (o === "03" || o === "3" || o === "31") return true;
    var bodyId = safeStr(document.body && document.body.id).toLowerCase();
    if (bodyId.indexOf("body_options_03") === 0 || bodyId.indexOf("body_options_31") === 0) return true;
    if (!isHomePath()) return false;
    if (document.querySelector("table.homepagemodule.report#standings")) return true;
    if (document.getElementById("standings")) return true;
    return false;
  }

  function findStandingsTable() {
    var hp = document.querySelector("table.homepagemodule.report#standings");
    if (hp) return hp;
    var candidates = Array.from(document.querySelectorAll(
      "#container-wrap table.report, #container-wrap .report table, table.report"
    ));
    for (var i = 0; i < candidates.length; i += 1) {
      var t = candidates[i];
      var headers = Array.from(t.querySelectorAll("thead th, tr:first-child th, tr:first-child td"))
        .map(function (el) { return normalizeHeader(el.textContent || ""); })
        .filter(Boolean)
        .join(" | ");
      var caption = normalizeHeader((t.querySelector("caption") || {}).textContent || "");
      if (headers && /franchise|team|all play|overall|division|record|w l t|ap /.test(headers)) return t;
      if (caption && /standings|all play|overall/.test(caption)) return t;
    }
    return candidates[0] || null;
  }

  function findIndexByRegex(headersNorm, regexes, used) {
    for (var r = 0; r < regexes.length; r += 1) {
      var re = regexes[r];
      for (var i = 0; i < headersNorm.length; i += 1) {
        if (used && used[i]) continue;
        if (re.test(headersNorm[i])) return i;
      }
    }
    return -1;
  }

  function buildColumnMap(headers) {
    var used = {};
    var c = {};
    c.team = findIndexByRegex(headers, [/^franchise$/, /^team$/, /franchise|team/], used);
    if (c.team >= 0) used[c.team] = 1;

    c.allplayCombined = findIndexByRegex(headers, [/all ?play.*w.*l.*t/, /all ?play/], used);
    if (c.allplayCombined >= 0) used[c.allplayCombined] = 1;
    c.divCombined = findIndexByRegex(headers, [/div.*w.*l.*t/, /division.*w.*l.*t/, /divisional/], used);
    if (c.divCombined >= 0) used[c.divCombined] = 1;
    c.overallCombined = findIndexByRegex(headers, [/overall.*w.*l.*t/, /^record$/, /w l t/], used);
    if (c.overallCombined >= 0) used[c.overallCombined] = 1;

    c.allplayW = findIndexByRegex(headers, [/all ?play.*\bw\b/, /^ap w$/, /^apw$/], used);
    if (c.allplayW >= 0) used[c.allplayW] = 1;
    c.allplayL = findIndexByRegex(headers, [/all ?play.*\bl\b/, /^ap l$/, /^apl$/], used);
    if (c.allplayL >= 0) used[c.allplayL] = 1;
    c.allplayT = findIndexByRegex(headers, [/all ?play.*\bt\b/, /^ap t$/, /^apt$/], used);
    if (c.allplayT >= 0) used[c.allplayT] = 1;

    c.divW = findIndexByRegex(headers, [/div.*\bw\b/, /^dw$/], used);
    if (c.divW >= 0) used[c.divW] = 1;
    c.divL = findIndexByRegex(headers, [/div.*\bl\b/, /^dl$/], used);
    if (c.divL >= 0) used[c.divL] = 1;
    c.divT = findIndexByRegex(headers, [/div.*\bt\b/, /^dt$/], used);
    if (c.divT >= 0) used[c.divT] = 1;

    c.overallW = findIndexByRegex(headers, [/^w$/, /^wins$/], used);
    if (c.overallW >= 0) used[c.overallW] = 1;
    c.overallL = findIndexByRegex(headers, [/^l$/, /^losses$/], used);
    if (c.overallL >= 0) used[c.overallL] = 1;
    c.overallT = findIndexByRegex(headers, [/^t$/, /^ties$/], used);
    if (c.overallT >= 0) used[c.overallT] = 1;

    c.allplayPct = findIndexByRegex(headers, [/all ?play.*(%|pct)/, /^ap pct$/, /^appct$/], null);
    c.overallPct = findIndexByRegex(headers, [/overall.*(%|pct)/, /^pct$/, /^win %$/, /^win pct$/], null);
    c.divPct = findIndexByRegex(headers, [/div.*(%|pct)/], null);

    c.pointsFor = findIndexByRegex(headers, [/^pf$/, /points for/, /pts for/], null);
    c.offPoints = findIndexByRegex(headers, [/off.*points/, /off points/, /off pts/], null);
    c.defPoints = findIndexByRegex(headers, [/def.*points/, /def points/, /def pts/], null);
    c.potential = findIndexByRegex(headers, [/potential points/, /pot points/, /^pp$/], null);
    c.efficiency = findIndexByRegex(headers, [/efficiency/, /eff rating/, /^eff$/], null);
    return c;
  }

  function readCell(row, idx) {
    if (!row || idx < 0 || !row.cells || idx >= row.cells.length) return "";
    return safeStr(row.cells[idx].textContent || "");
  }

  function franchiseNameFromDatabase(fid) {
    var id = pad4(fid);
    if (!id) return "";
    try {
      var db = window.franchiseDatabase || {};
      var rec = db["fid_" + id] || db[id];
      return safeStr(rec && (rec.name || rec.franchise_name || rec.abbrev || ""));
    } catch (e) {}
    return "";
  }

  function extractFranchiseFromFiconCell(row) {
    var cell = row && row.cells ? row.cells[0] : null;
    if (!cell) return { id: "", name: "" };
    var a = cell.querySelector("a[href]");
    if (a) {
      var href = safeStr(a.getAttribute("href"));
      var m = href.match(/[?&](?:FRANCHISE_ID|FRANCHISE|F)=([0-9]{1,4})/i);
      if (m) return { id: pad4(m[1]), name: "" };
    }
    var img = cell.querySelector("img[src]");
    if (img) {
      var src = safeStr(img.getAttribute("src"));
      var mSrc = src.match(/_franchise_(?:icon|logo)(\d{1,4})/i);
      if (mSrc) return { id: pad4(mSrc[1]), name: "" };
    }
    return { id: "", name: "" };
  }

  function extractFranchise(row, teamIdx) {
    var teamCell = teamIdx >= 0 && row.cells && row.cells[teamIdx] ? row.cells[teamIdx] : row.cells[0];
    if (!teamCell) return { id: "", name: "" };
    var link = teamCell.querySelector("a");
    var text = safeStr(teamCell.textContent || "");
    var fid = "";
    if (link) {
      var cls = safeStr(link.className);
      var mCls = cls.match(/franchise_(\d{1,4})/i);
      if (mCls) fid = pad4(mCls[1]);
      if (!fid) {
        var href = safeStr(link.getAttribute("href"));
        var mHref = href.match(/[?&](?:FRANCHISE_ID|FRANCHISE|F)=([0-9]{1,4})/i);
        if (mHref) fid = pad4(mHref[1]);
      }
    }
    if (!text && row && row.cells) {
      for (var i = 0; i < row.cells.length; i += 1) {
        var candidate = safeStr(row.cells[i].textContent || "");
        if (!candidate) continue;
        if (/^\d+(\.\d+)?$/.test(candidate)) continue;
        if (/^\d+\s*[-/]\s*\d+\s*[-/]\s*\d+$/.test(candidate)) continue;
        if (/^(w|l|t|pf|pa|pct|points?)$/i.test(candidate)) continue;
        text = candidate;
        break;
      }
    }
    if (!text && fid) text = franchiseNameFromDatabase(fid);
    return { id: fid, name: text };
  }

  function candidateIconUrls(fid) {
    function isUrl(v) { return /^https?:\/\//i.test(safeStr(v)); }
    if (!fid) return [];
    var host = window.baseURLStatic || window.baseURLDynamic || (window.location ? window.location.origin : "");
    var lid = "";
    var yr = 0;
    try {
      var u = new URL(window.location.href);
      lid = safeStr(u.searchParams.get("L") || "");
      yr = parseInt(safeStr(u.searchParams.get("YEAR") || ""), 10) || 0;
    } catch (e) {}
    if (!lid) {
      var lm = safeStr(window.location.pathname).match(/\/home\/(\d+)(?:\/|$)/i);
      if (lm && lm[1]) lid = safeStr(lm[1]);
    }
    if (!yr) {
      var ym = safeStr(window.location.pathname).match(/\/(\d{4})\//);
      if (ym && ym[1]) yr = parseInt(safeStr(ym[1]), 10) || 0;
    }
    if (!lid) lid = safeStr(window.league_id || "");
    if (!yr) yr = parseInt(safeStr(window.year || ""), 10) || 0;
    if (!yr) return [];
    var leagueIds = [];
    function addLeagueId(v) {
      var s = safeStr(v).replace(/\D/g, "");
      if (!s || leagueIds.indexOf(s) !== -1) return;
      leagueIds.push(s);
    }
    addLeagueId(lid);
    if (!leagueIds.length) return [];
    var out = [];
    var seen = {};
    function push(url) {
      var s = safeStr(url).replace(/^http:\/\//i, "https://");
      if (!s || seen[s]) return;
      seen[s] = 1;
      out.push(s);
    }
    try {
      var key = "fid_" + fid;
      var rec = window.franchiseDatabase && window.franchiseDatabase[key];
      if (rec && isUrl(rec.icon)) push(rec.icon);
      if (rec && isUrl(rec.logo)) push(rec.logo);
    } catch (e) {}
    leagueIds.forEach(function (curLid) {
      [
        host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic2025/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic2019/" + curLid + "_franchise_icon" + fid,
        host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_logo" + fid,
        host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_logo" + fid,
        host + "/fflnetdynamic2025/" + curLid + "_franchise_logo" + fid,
        host + "/fflnetdynamic2019/" + curLid + "_franchise_logo" + fid
      ].forEach(function (base) {
        push(base + ".png");
        push(base + ".jpg");
        push(base + ".jpeg");
        push(base + ".gif");
      });
    });
    return out;
  }

  function setIconWithFallback(img, urls) {
    var list = Array.isArray(urls) ? urls.filter(Boolean) : [];
    if (!img || !list.length) {
      if (img) img.style.display = "none";
      return;
    }
    var i = 0;
    function next() {
      if (i >= list.length) {
        img.style.display = "none";
        img.removeAttribute("src");
        return;
      }
      img.style.display = "";
      img.src = list[i];
      i += 1;
    }
    img.onload = function () { img.style.display = ""; };
    img.onerror = function () { next(); };
    next();
  }

  function buildRowData(row, map) {
    var fr = extractFranchise(row, map.team);
    if (!fr.id && (!fr.name || map.team < 0)) fr = extractFranchiseFromFiconCell(row);
    if (!fr.id && !fr.name) return null;
    if (!fr.name) fr.name = "Franchise " + (fr.id || "");

    var allplay = parseWltText(readCell(row, map.allplayCombined));
    if (!allplay && map.allplayW >= 0 && map.allplayL >= 0 && map.allplayT >= 0) {
      allplay = {
        w: Number(parseNumber(readCell(row, map.allplayW)) || 0),
        l: Number(parseNumber(readCell(row, map.allplayL)) || 0),
        t: Number(parseNumber(readCell(row, map.allplayT)) || 0)
      };
    }

    var overall = parseWltText(readCell(row, map.overallCombined));
    if (!overall && map.overallW >= 0 && map.overallL >= 0 && map.overallT >= 0) {
      overall = {
        w: Number(parseNumber(readCell(row, map.overallW)) || 0),
        l: Number(parseNumber(readCell(row, map.overallL)) || 0),
        t: Number(parseNumber(readCell(row, map.overallT)) || 0)
      };
    }

    var div = parseWltText(readCell(row, map.divCombined));
    if (!div && map.divW >= 0 && map.divL >= 0 && map.divT >= 0) {
      div = {
        w: Number(parseNumber(readCell(row, map.divW)) || 0),
        l: Number(parseNumber(readCell(row, map.divL)) || 0),
        t: Number(parseNumber(readCell(row, map.divT)) || 0)
      };
    }

    var allPct = parseNumber(readCell(row, map.allplayPct));
    if (allPct !== null && allPct > 1) allPct = allPct / 100;
    if (allPct === null) allPct = pctFromWlt(allplay);
    var ovPct = parseNumber(readCell(row, map.overallPct));
    if (ovPct !== null && ovPct > 1) ovPct = ovPct / 100;
    if (ovPct === null) ovPct = pctFromWlt(overall);
    var divPct = parseNumber(readCell(row, map.divPct));
    if (divPct !== null && divPct > 1) divPct = divPct / 100;
    if (divPct === null) divPct = pctFromWlt(div);

    return {
      franchiseId: fr.id,
      franchiseName: fr.name,
      allplay: allplay,
      overall: overall,
      div: div,
      allPct: allPct,
      overallPct: ovPct,
      divPct: divPct,
      pointsFor: parseNumber(readCell(row, map.pointsFor)),
      offPoints: parseNumber(readCell(row, map.offPoints)),
      defPoints: parseNumber(readCell(row, map.defPoints)),
      potential: parseNumber(readCell(row, map.potential)),
      efficiency: parseNumber(readCell(row, map.efficiency))
    };
  }

  function buildRows(table, map) {
    var trs = Array.from(table.querySelectorAll("tbody tr"));
    if (!trs.length) trs = Array.from(table.querySelectorAll("tr")).slice(1);
    var out = [];
    trs.forEach(function (tr) {
      var rec = buildRowData(tr, map);
      if (!rec || !rec.franchiseName) return;
      if (/totals?|average/i.test(rec.franchiseName)) return;
      out.push(rec);
    });
    return out;
  }

  function formatMetric(v) {
    if (v === null || v === undefined || isNaN(Number(v))) return " - ";
    var n = Number(v);
    return Number.isInteger(n) ? n.toLocaleString() : n.toFixed(1);
  }

  function renderCompact(wrapper, rows, view) {
    var isRecords = view === "records";
    var isPct = view === "pct";
    var head = isRecords
      ? "<th>All Play</th><th>Overall</th><th>Divisional</th>"
      : isPct
      ? "<th>All Play %</th><th>Overall %</th><th>Divisional %</th>"
      : "<th>PF</th><th>Off Pts</th><th>Def Pts</th><th>Potential</th><th>Efficiency</th>";

    var body = rows.map(function (r) {
      var extra = isRecords
        ? "<td>" + fmtWlt(r.allplay) + "</td><td>" + fmtWlt(r.overall) + "</td><td>" + fmtWlt(r.div) + "</td>"
        : isPct
        ? "<td>" + fmtPct(r.allPct) + "</td><td>" + fmtPct(r.overallPct) + "</td><td>" + fmtPct(r.divPct) + "</td>"
        : "<td>" + formatMetric(r.pointsFor) + "</td><td>" + formatMetric(r.offPoints) + "</td><td>" + formatMetric(r.defPoints) +
          "</td><td>" + formatMetric(r.potential) + "</td><td>" + formatMetric(r.efficiency) + "</td>";
      return '<tr><td><div class="ups-standings-franchise"><img class="ups-standings-icon" alt="" data-fid="' +
        htmlEsc(r.franchiseId || "") + '" /><span class="ups-standings-name">' + htmlEsc(r.franchiseName) +
        "</span></div></td>" + extra + "</tr>";
    }).join("");

    wrapper.querySelector(".ups-standings-table").innerHTML =
      "<thead><tr><th>Franchise</th>" + head + "</tr></thead><tbody>" + body + "</tbody>";

    Array.from(wrapper.querySelectorAll(".ups-standings-toggle")).forEach(function (btn) {
      var v = safeStr(btn.getAttribute("data-view") || "");
      btn.classList.toggle("is-active", v === view);
    });

    Array.from(wrapper.querySelectorAll(".ups-standings-icon")).forEach(function (img) {
      var fid = pad4(img.getAttribute("data-fid"));
      if (!fid) {
        img.style.display = "none";
        return;
      }
      setIconWithFallback(img, candidateIconUrls(fid));
    });
  }

  function initCompactStandings() {
    var table = findStandingsTable();
    if (!table) return;
    if (table.dataset.upsStandingsDone === "1") return;
    var rows = [];
    var map = null;
    var parseTable = function (candidate) {
      if (!candidate) return { rows: [], map: null };
      var headersLocal = Array.from(candidate.querySelectorAll("thead th, tr:first-child th, tr:first-child td"))
        .map(function (el) { return normalizeHeader(el.textContent || ""); });
      if (!headersLocal.length) return { rows: [], map: null };
      var mapLocal = buildColumnMap(headersLocal);
      var rowsLocal = buildRows(candidate, mapLocal);
      return { rows: rowsLocal, map: mapLocal };
    };
    var best = parseTable(table);
    rows = best.rows;
    map = best.map;
    if (rows.length < 2) {
      var allCandidates = Array.from(document.querySelectorAll("#container-wrap table.report, #container-wrap .report table, table.report"));
      allCandidates.forEach(function (candidate) {
        var parsed = parseTable(candidate);
        if (parsed.rows.length > rows.length) {
          table = candidate;
          rows = parsed.rows;
          map = parsed.map;
        }
      });
    }
    if (rows.length < 2 || !map) return;

    var existing = document.getElementById("ups-standings-compact");
    if (existing) existing.remove();

    var wrapper = document.createElement("section");
    wrapper.id = "ups-standings-compact";
    wrapper.innerHTML =
      '<div class="ups-standings-header">' +
      '<div class="ups-standings-title">Standings Snapshot</div>' +
      '<div class="ups-standings-controls">' +
      '<button type="button" class="ups-standings-toggle" data-view="records">W-L-T</button>' +
      '<button type="button" class="ups-standings-toggle" data-view="pct">Percentages</button>' +
      '<button type="button" class="ups-standings-toggle" data-view="points">Points</button>' +
      "</div></div>" +
      '<div class="ups-standings-table-wrap"><table class="ups-standings-table"></table></div>';

    var report = table.closest(".report, .homepagemodule.report") || table;
    report.parentNode.insertBefore(wrapper, report);

    var view = "records";
    try {
      var saved = sessionStorage.getItem("ups_standings_view");
      if (saved === "records" || saved === "pct" || saved === "points") view = saved;
    } catch (e) {}
    renderCompact(wrapper, rows, view);

    wrapper.addEventListener("click", function (e) {
      var btn = e.target && e.target.closest ? e.target.closest(".ups-standings-toggle") : null;
      if (!btn) return;
      var next = safeStr(btn.getAttribute("data-view") || "records");
      renderCompact(wrapper, rows, next);
      try { sessionStorage.setItem("ups_standings_view", next); } catch (err) {}
    });

    report.style.display = "none";
    table.dataset.upsStandingsDone = "1";
  }

  function init() {
    if (!isStandingsPage()) return;
    var attempts = 0;
    var timer = setInterval(function () {
      attempts += 1;
      initCompactStandings();
      if (attempts >= 25) clearInterval(timer);
    }, 250);
    if (window.MutationObserver) {
      var root = document.getElementById("container-wrap") || document.body;
      if (root) {
        var obs = new MutationObserver(function () { initCompactStandings(); });
        obs.observe(root, { childList: true, subtree: true });
      }
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<script>
/* Mobile-only collapsible shells for homepage modules (standings snapshot + owner widget). */
(function () {
  var MOBILE_MAX = 900;
  var KEYS = {
    standings: "ups_mod_standings_mobile_v1",
    ownerHub: "ups_mod_ownerhub_mobile_v1"
  };
  var mobileRuntimeStarted = false;
  var mobileObserver = null;
  var syncQueued = false;

  function isMobileLayout() {
    try {
      return window.matchMedia ? window.matchMedia("(max-width: " + MOBILE_MAX + "px)").matches : window.innerWidth <= MOBILE_MAX;
    } catch (e) {
      return window.innerWidth <= MOBILE_MAX;
    }
  }

  function readPref(key) {
    try { return sessionStorage.getItem(key) || ""; } catch (e) { return ""; }
  }

  function writePref(key, collapsed) {
    try { sessionStorage.setItem(key, collapsed ? "closed" : "open"); } catch (e) {}
  }

  function resolveCollapsed(key, mobileDefault) {
    var saved = readPref(key);
    if (saved === "closed") return true;
    if (saved === "open") return false;
    return !!mobileDefault;
  }

  function setChevronButton(btn, collapsed) {
    if (!btn) return;
    btn.textContent = collapsed ? "▸" : "▾";
    btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
    btn.setAttribute("title", collapsed ? "Expand module" : "Collapse module");
  }

  function applyStandingsCollapsed(wrapper, collapsed, persist) {
    if (!wrapper) return;
    var next = isMobileLayout() ? !!collapsed : false;
    wrapper.setAttribute("data-collapsed-mobile", next ? "1" : "0");
    setChevronButton(wrapper.querySelector(".ups-standings-mobile-toggle"), next);
    if (persist) writePref(KEYS.standings, next);
  }

  function applyOwnerHubCollapsed(shell, collapsed, persist) {
    if (!shell) return;
    var next = isMobileLayout() ? !!collapsed : false;
    shell.setAttribute("data-collapsed-mobile", next ? "1" : "0");
    var body = shell.querySelector(".ups-collapsible-module-body");
    if (body) body.hidden = next;
    setChevronButton(shell.querySelector(".ups-collapsible-module-toggle"), next);
    if (persist) writePref(KEYS.ownerHub, next);
  }

  function ensureStandingsCollapse() {
    var wrapper = document.getElementById("ups-standings-compact");
    if (!wrapper) return;
    var header = wrapper.querySelector(".ups-standings-header");
    var title = wrapper.querySelector(".ups-standings-title");
    if (!header || !title) return;

    var main = header.querySelector(".ups-standings-header-main");
    if (!main) {
      main = document.createElement("div");
      main.className = "ups-standings-header-main";
      header.insertBefore(main, header.firstChild);
      main.appendChild(title);
    } else if (!main.contains(title)) {
      main.appendChild(title);
    }

    var btn = header.querySelector(".ups-standings-mobile-toggle");
    if (!btn) {
      btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ups-standings-mobile-toggle";
      btn.setAttribute("aria-label", "Toggle standings snapshot");
      main.appendChild(btn);
    }
    if (!btn.dataset.wired) {
      btn.dataset.wired = "1";
      btn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        var collapsed = wrapper.getAttribute("data-collapsed-mobile") === "1";
        applyStandingsCollapsed(wrapper, !collapsed, true);
      });
    }

    applyStandingsCollapsed(wrapper, resolveCollapsed(KEYS.standings, true), false);
  }

  function ensureOwnerHubCollapse() {
    var mount = document.getElementById("uowMount");
    if (!mount || !mount.parentNode) return;

    var shell = mount.closest ? mount.closest("#ups-owner-hub-shell") : null;
    if (!shell) {
      shell = document.createElement("section");
      shell.id = "ups-owner-hub-shell";
      shell.className = "ups-collapsible-module";
      shell.innerHTML =
        '<div class="ups-collapsible-module-header">' +
          '<div class="ups-collapsible-module-title">Owner Hub</div>' +
          '<button type="button" class="ups-collapsible-module-toggle" aria-label="Toggle owner hub"></button>' +
        '</div>' +
        '<div class="ups-collapsible-module-body"></div>';
      mount.parentNode.insertBefore(shell, mount);
      shell.querySelector(".ups-collapsible-module-body").appendChild(mount);
    }

    var btn = shell.querySelector(".ups-collapsible-module-toggle");
    if (btn && !btn.dataset.wired) {
      btn.dataset.wired = "1";
      btn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        var collapsed = shell.getAttribute("data-collapsed-mobile") === "1";
        applyOwnerHubCollapsed(shell, !collapsed, true);
      });
    }

    applyOwnerHubCollapsed(shell, resolveCollapsed(KEYS.ownerHub, true), false);
  }

  function syncAll() {
    ensureStandingsCollapse();
    ensureOwnerHubCollapse();
  }

  function scheduleSync() {
    if (syncQueued) return;
    syncQueued = true;
    setTimeout(function () {
      syncQueued = false;
      syncAll();
    }, 50);
  }

  function startMobileRuntime() {
    if (mobileRuntimeStarted || !isMobileLayout()) return;
    mobileRuntimeStarted = true;

    var tries = 0;
    var timer = setInterval(function () {
      tries += 1;
      syncAll();
      if (tries >= 50) clearInterval(timer);
    }, 250);

    if (window.MutationObserver) {
      var root = document.body || document.documentElement;
      if (root) {
        mobileObserver = new MutationObserver(function () { scheduleSync(); });
        try { mobileObserver.observe(root, { childList: true, subtree: true }); } catch (e) {}
        setTimeout(function () {
          try {
            if (mobileObserver) mobileObserver.disconnect();
          } catch (e) {}
          mobileObserver = null;
        }, 15000);
      }
    }

    syncAll();
  }

  window.addEventListener("resize", function () {
    if (!isMobileLayout()) return;
    startMobileRuntime();
    scheduleSync();
  });

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", startMobileRuntime);
  } else {
    startMobileRuntime();
  }
})();
</script>

<script>
/* Franchise Abilities (O=93): if MFL's horizontal/frozen-table wrapper paints over the
   controls under our theme, flatten it back to a plain scrollable table so checkboxes
   remain visible and usable. */
(function () {
  function isFranchiseAbilitiesPage() {
    return !!(document.body && document.body.id === "body_options_93");
  }

  function scoreTable(table) {
    if (!table) return -1;
    var checkboxes = table.querySelectorAll('input[type="checkbox"]').length;
    var inputs = table.querySelectorAll("input, select, textarea").length;
    var labels = table.querySelectorAll("label").length;
    var cells = table.querySelectorAll("td, th").length;
    return (checkboxes * 10) + (inputs * 4) + (labels * 2) + Math.min(cells, 500);
  }

  function bestInteractiveTable(root) {
    if (!root) return null;
    var tables = Array.prototype.slice.call(root.querySelectorAll("table"));
    if (!tables.length) return null;
    var best = null;
    var bestScore = -1;
    tables.forEach(function (t) {
      var s = scoreTable(t);
      if (s > bestScore) {
        bestScore = s;
        best = t;
      }
    });
    if (!(bestScore > 0 && best)) return null;
    var checkboxCount = best.querySelectorAll('input[type="checkbox"]').length;
    var inputCount = best.querySelectorAll("input, select, textarea").length;
    if (checkboxCount < 4 && inputCount < 4) return null;
    return best;
  }

  function scoreFranchiseTable(table) {
    if (!table) return -1;
    var imgs = table.querySelectorAll("img").length;
    var checkboxes = table.querySelectorAll('input[type="checkbox"]').length;
    var cells = table.querySelectorAll("td, th").length;
    var rows = table.querySelectorAll("tr").length;
    var txt = String(table.textContent || "").replace(/\s+/g, " ").toLowerCase();
    var hasFranchiseHeader = txt.indexOf("franchise") >= 0;
    return (imgs * 25) + (hasFranchiseHeader ? 30 : 0) + Math.min(cells, 200) + Math.min(rows * 2, 80) - (checkboxes * 8);
  }

  function bestFranchiseTable(root, exclude) {
    if (!root) return null;
    var tables = Array.prototype.slice.call(root.querySelectorAll("table"));
    var best = null;
    var bestScore = -1;
    tables.forEach(function (t) {
      if (!t || t === exclude) return;
      var s = scoreFranchiseTable(t);
      if (s > bestScore) {
        bestScore = s;
        best = t;
      }
    });
    // Require a meaningful image-bearing table to avoid grabbing another header clone.
    if (!best) return null;
    if (best.querySelectorAll("img").length < 2) return null;
    return best;
  }

  function nearestFranchiseSiblingTable(wrap, exclude) {
    if (!wrap || !wrap.parentNode) return null;
    var parent = wrap.parentNode;
    var siblings = Array.prototype.slice.call(parent.children || []);
    var best = null;
    var bestScore = -1;
    siblings.forEach(function (node) {
      if (!node || node === wrap) return;
      if (node.nodeType !== 1) return;
      var tables = node.tagName === "TABLE" ? [node] : Array.prototype.slice.call(node.querySelectorAll ? node.querySelectorAll("table") : []);
      tables.forEach(function (t) {
        if (!t || t === exclude) return;
        var cls = String(t.className || "");
        // Favor MFL frozen/hz helper tables.
        var hzBoost = /(^|\\s)hz[-_]/i.test(cls) || /hz-/i.test(cls) ? 40 : 0;

  function scrubInlineLayout(root) {
    if (!root) return;
    var descendants = root.querySelectorAll("*");
    Array.prototype.forEach.call(descendants, function (el) {
      // Remove inline layout constraints that come from frozen-table clones.
      if (!el || !el.style) return;
      if (el.tagName === "INPUT" || el.tagName === "SELECT" || el.tagName === "TEXTAREA") return;
      if (el.tagName === "IMG") return;
      el.style.left = "";
      el.style.top = "";
      el.style.right = "";
      el.style.bottom = "";
      el.style.transform = "";
      el.style.position = "";
      el.style.zIndex = "";
      el.style.width = "";
      el.style.height = "";
      el.style.minWidth = "";
      el.style.maxWidth = "";
      el.style.minHeight = "";
      el.style.maxHeight = "";
      el.style.overflow = "";
      el.style.clip = "";
      el.style.clipPath = "";
      el.style.opacity = "";
      el.style.visibility = "";
    });
  }

  function flattenWrapper(wrap) {
    if (!wrap || wrap.dataset.upsO93Flattened === "1") return;
    var table = bestInteractiveTable(wrap);
    if (!table) return;
    var franchiseTable = bestFranchiseTable(wrap, table);
    var franchiseSiblingTable = null;
    if (!franchiseTable || franchiseTable === table) {
      franchiseSiblingTable = nearestFranchiseSiblingTable(wrap, table);
      franchiseTable = franchiseSiblingTable || franchiseTable;
    }

    // Preserve the real interactive table and remove the frozen/overlay clones.
    wrap.dataset.upsO93Flattened = "1";
    wrap.classList.add("ups-o93-plain-wrap");
    wrap.classList.remove("hz-table-scroll");

    var nextRoot = table;
    if (franchiseTable && franchiseTable !== table) {
      var grid = document.createElement("div");
      grid.className = "ups-o93-plain-grid";
      var left = document.createElement("div");
      left.className = "ups-o93-plain-left";
      var right = document.createElement("div");
      right.className = "ups-o93-plain-main";
      if (franchiseSiblingTable && franchiseSiblingTable === franchiseTable) {
        left.appendChild(franchiseTable.cloneNode(true));
      } else {
        left.appendChild(franchiseTable);
      }
      right.appendChild(table);
      grid.appendChild(left);
      grid.appendChild(right);
      nextRoot = grid;

    try {
      wrap.replaceChildren(nextRoot);
    } catch (e) {

    if (!isFranchiseAbilitiesPage()) return;

  var attempts = 0;

    if (root) {
      var obs = new MutationObserver(function () { repair(); });
      try { obs.observe(root, { childList: true, subtree: true }); } catch (e) {}
      setTimeout(function () { try { obs.disconnect(); } catch (e) {} }, 15000);
    }
  }
})();

(function () {
  function visibleTabCount() {
    var wrap = document.getElementById("tabmenu-wrap");
    if (!wrap) return -1;
    var items = Array.prototype.filter.call(wrap.querySelectorAll("li"), function (li) {
      if (!li) return false;
      var txt = String(li.textContent || "").replace(/\s+/g, " ").trim();
      if (!txt) return false;
      var cs = window.getComputedStyle ? window.getComputedStyle(li) : null;
      if (cs && (cs.display === "none" || cs.visibility === "hidden")) return false;
      return !!(li.offsetParent || (cs && cs.position === "fixed"));
    });
    if (items.length) return items.length;
    var links = Array.prototype.filter.call(wrap.querySelectorAll("a"), function (a) {
      if (!a) return false;
      var txt = String(a.textContent || "").replace(/\s+/g, " ").trim();
      if (!txt) return false;
      var cs = window.getComputedStyle ? window.getComputedStyle(a) : null;
      if (cs && (cs.display === "none" || cs.visibility === "hidden")) return false;
      return !!(a.offsetParent || (cs && cs.position === "fixed"));
    });
    return links.length;
  }

  function applyTabMenuVisibility() {
    var wrap = document.getElementById("tabmenu-wrap");
    if (!wrap) return;
    var title = document.getElementById("tab_title");
    var count = visibleTabCount();
    var hide = count >= 0 && count <= 1;
    wrap.style.display = hide ? "none" : "";
    if (title) title.style.display = hide ? "none" : "";
  }

  var tries = 0;
  var timer = setInterval(function () {

    if (tries >= 40) clearInterval(timer);
  }, 250);

  if (window.MutationObserver) {
    var root = document.body || document.documentElement;
    if (root) {
      var obs = new MutationObserver(function () { applyTabMenuVisibility(); });
      try { obs.observe(root, { childList: true, subtree: true }); } catch (e) {}
      setTimeout(function () { try { obs.disconnect(); } catch (e) {} }, 15000);
    }
  }
})();

		<script>
		  // Some MFL skins render light-on-light spans/divs; force readable contrast.
		  (function () {
	    function isRelevantPage() {
	      var id = String(document.body && document.body.id ? document.body.id : "");
	      if (id === "body_commissioner_setup" || id.indexOf("body_csetup") === 0) return true;
	      try {
	        if (
	          document.querySelector("form.reportform") ||
	          document.querySelector(".reportnavigation, .reportNavigation, .reportnavigationheader, .reportNavigationHeader")
	        ) {
	          return true;
	        }
	      } catch (e) {}
	      return false;
	    }

	    function parseRgb(s) {
	      var m = String(s || "").match(/rgba?\\((\\d+),\\s*(\\d+),\\s*(\\d+)(?:,\\s*([0-9.]+))?\\)/i);
	      if (!m) return null;
	      return {
	        r: parseInt(m[1], 10),
	        g: parseInt(m[2], 10),
	        b: parseInt(m[3], 10),
	        a: m[4] ? parseFloat(m[4]) : 1
	      };
	    }

	    function isWhite(c) {
	      if (!c) return false;
	      return c.r >= 245 && c.g >= 245 && c.b >= 245 && (c.a == null || c.a >= 0.85);
	    }

	    function isLightText(c) {
	      if (!c) return false;
	      return c.r >= 210 && c.g >= 210 && c.b >= 210 && (c.a == null || c.a >= 0.75);
	    }

	    function patchNode(el) {
	      if (!el || el.dataset.upsSpanFixed === "1") return;
	      var cs = window.getComputedStyle(el);
	      var bg = parseRgb(cs.backgroundColor);
	      if (!isWhite(bg)) return;
	      var fg = parseRgb(cs.color);
	      if (!isLightText(fg)) return;
	      el.style.backgroundColor = "rgba(15, 27, 48, 0.85)";
	      el.style.color = "var(--ups-text)";
	      el.style.borderRadius = "10px";
	      el.dataset.upsSpanFixed = "1";
	    }

	    function fixSpanContrast() {
	      if (!isRelevantPage()) return;
	      var root = document.getElementById("container-wrap") || document;
	      var nodes = root.querySelectorAll("span, td, div");
	      for (var i = 0; i < nodes.length; i += 1) {
	        patchNode(nodes[i]);
	      }
	    }

	    var scheduleTimer = null;
	    function scheduleFix() {
	      if (scheduleTimer) return;
	      scheduleTimer = setTimeout(function () {
	        scheduleTimer = null;
	        fixSpanContrast();
	      }, 80);
	    }

	    function init() {
	      fixSpanContrast();
	      setTimeout(fixSpanContrast, 350);
	      setTimeout(fixSpanContrast, 900);
	      if (!window.MutationObserver) return;
	      var root = document.getElementById("container-wrap") || document.body;
	      if (!root) return;
	      var observer = new MutationObserver(scheduleFix);
	      observer.observe(root, { childList: true, subtree: true, attributes: true, attributeFilter: ["style", "class"] });
	    }

	    if (document.readyState === "loading") {
	      document.addEventListener("DOMContentLoaded", init);
	    } else {
	      init();
	    }
	  })();
	</script>

<script>
  /*
   * Deep-link + roster/popup quick actions for Extension/Restructure.
   * This adds actionable buttons in O=07 rows and player popup cards.
   */
  (function () {
    var enableRosterContractActions = false;

    function safeStr(v) {
      return v === null || v === undefined ? "" : String(v).trim();
    }

    function pad4(fid) {
      var d = safeStr(fid).replace(/\D/g, "");
      return d ? d.padStart(4, "0").slice(-4) : "";
    }

    function parsePidFromHref(href) {
      try {
        var u = new URL(href, location.origin);
        return safeStr(u.searchParams.get("P"));
      } catch (e) {
        return "";
      }
    }

    function parseMoney(text) {
      var clean = safeStr(text).replace(/[^0-9.-]/g, "");
      var n = parseFloat(clean);
      return isNaN(n) ? 0 : n;
    }

    function getFidFromRow(row) {
      var table = row ? row.closest("table") : null;
      if (!table) return "";

      var cls = safeStr(table.className);
      var m = cls.match(/franchise_(\d{4})/);
      if (m) return pad4(m[1]);

      var capLink = table.querySelector("caption a[class*='franchise_']");
      if (capLink) {
        var capClass = safeStr(capLink.className);
        var m2 = capClass.match(/franchise_(\d{4})/);
        if (m2) return pad4(m2[1]);
      }
      return "";
    }

    function getActiveLeagueId() {
      var devLeague = String(window.UPS_DEV_LEAGUE_ID || "25625").replace(/\D/g, "");
      var prodLeague = String(window.UPS_CCC_PROD_LEAGUE_ID || "74598").replace(/\D/g, "");
      var pathLeague = "";
      var globalLeague = typeof league_id !== "undefined" && league_id ? safeStr(league_id) : "";
      var m = safeStr(window.location.pathname).match(/\/home\/(\d+)(?:\/|$)/i);
      if (m && m[1]) pathLeague = safeStr(m[1]);
      try {
        var u = new URL(window.location.href);
        var q = safeStr(u.searchParams.get("L"));
        if (q && q !== devLeague) return q;
        if (q && q === devLeague) {
          if (pathLeague && pathLeague !== q) return pathLeague;
          if (globalLeague && globalLeague !== q) return globalLeague;
          return q;
        }
      } catch (e) {}
      if (pathLeague) return pathLeague;
      if (globalLeague) return globalLeague;
      return prodLeague || "";
    }

    function getActiveYear() {
      try {
        var u = new URL(window.location.href);
        var q = safeStr(u.searchParams.get("YEAR"));
        if (q) return q;
      } catch (e) {}
      var m = safeStr(window.location.pathname).match(/\/(\d{4})\//);
      if (m && m[1]) return safeStr(m[1]);
      if (typeof year !== "undefined" && year) return safeStr(year);
      return String(new Date().getFullYear());
    }

    function pendingActionKey() {
      return "ccc_pending_action_" + safeStr(getActiveYear()) + "_" + safeStr(getActiveLeagueId());
    }

    function savePendingAction(action, item) {
      try {
        var payload = {
          action: safeStr(action).toLowerCase(),
          playerId: safeStr(item && item.playerId),
          franchiseId: pad4(item && item.franchiseId),
          years: Math.max(1, Math.min(2, parseInt(item && item.years, 10) || 1)),
          ts: Date.now()
        };
        if (!payload.action || !payload.playerId) return;
        localStorage.setItem(pendingActionKey(), JSON.stringify(payload));
      } catch (e) {}
    }

    function getPendingAction() {
      try {
        var raw = localStorage.getItem(pendingActionKey());
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        if (!parsed || !parsed.action || !parsed.playerId) return null;

        var ageMs = Date.now() - (parseInt(parsed.ts, 10) || 0);
        if (ageMs > 30 * 60 * 1000) {
          localStorage.removeItem(pendingActionKey());
          return null;
        }

        return {
          action: safeStr(parsed.action).toLowerCase(),
          playerId: safeStr(parsed.playerId),
          franchiseId: pad4(parsed.franchiseId),
          years: Math.max(1, Math.min(2, parseInt(parsed.years, 10) || 1))
        };
      } catch (e) {
        return null;
      }
    }

    function clearPendingAction() {
      try {
        localStorage.removeItem(pendingActionKey());
      } catch (e) {}
    }

    function buildActionUrl(action, item) {
      var activeYear = getActiveYear();
      var activeLeague = getActiveLeagueId();
      var payload = {
        cccAction: safeStr(action).toLowerCase(),
        cccPlayer: safeStr(item && item.playerId),
        cccFranchise: pad4(item && item.franchiseId),
        cccSeason: safeStr(activeYear),
        cccYears: Math.max(1, Math.min(2, parseInt(item && item.years, 10) || 1))
      };

      savePendingAction(action, item);

      var u = new URL(location.origin + "/" + activeYear + "/home/" + activeLeague);
      u.searchParams.set("MODULE", "MESSAGE2");

      var h = new URLSearchParams();
      if (payload.cccAction) h.set("cccAction", payload.cccAction);
      if (payload.cccPlayer) h.set("cccPlayer", payload.cccPlayer);
      if (payload.cccFranchise) h.set("cccFranchise", payload.cccFranchise);
      if (payload.cccSeason) h.set("cccSeason", payload.cccSeason);
      if (payload.cccAction === "extension") h.set("cccYears", safeStr(payload.cccYears));
      u.hash = h.toString();

      return u.toString();
    }

    function rookieLike(value) {
      var s = safeStr(value).toLowerCase();
      return s === "r" || s.indexOf("r-") === 0 || s.indexOf("rookie") !== -1;
    }

    function computeEligibility(contract) {
      var years = parseInt(contract.years, 10) || 0;
      var salary = parseMoney(contract.salary);
      var statusLower = safeStr(contract.status).toLowerCase();
      var infoLower = safeStr(contract.info).toLowerCase();
      var noFurtherExt =
        infoLower.indexOf("no further extensions") !== -1 ||
        infoLower.indexOf("not eligible for tag or extension") !== -1;
      var expiredRookie =
        infoLower.indexOf("expired rookie") !== -1 ||
        (rookieLike(contract.status) && years <= 0);

      return {
        extensionEligible: (years === 1 || expiredRookie) && !statusLower.includes("tag") && !noFurtherExt,
        restructureEligible: years >= 2 && years <= 3 && salary > 1000 && !rookieLike(contract.status)
      };
    }

    var rosterEligibilityByPid = new Map();

    function scanRosterEligibility() {
      if (document.body.id !== "body_options_07") return;

      var rows = Array.from(document.querySelectorAll("#body_options_07 tr"));
      rows.forEach(function (row) {
        var cell = row.querySelector("td.player");
        if (!cell) return;

        var playerLink = cell.querySelector('a[href*="player?L="]');
        if (!playerLink) return;

        var pid = parsePidFromHref(playerLink.getAttribute("href") || "");
        if (!pid) return;

        var salaryCell = row.querySelector("td.salary");
        var yearsCell = row.querySelector("td.contractyear");
        var statusCell = row.querySelector("td.contractstatus");
        var infoCell = row.querySelector("td.contractinfo");

        if (!salaryCell || !yearsCell || !statusCell || !infoCell) return;

        var fid = getFidFromRow(row);
        var contract = {
          salary: salaryCell.textContent,
          years: yearsCell.textContent,
          status: statusCell.textContent,
          info: infoCell.textContent
        };
        var elig = computeEligibility(contract);

        rosterEligibilityByPid.set(pid, {
          playerId: pid,
          playerName: safeStr(playerLink.textContent),
          franchiseId: fid,
          years: parseInt(contract.years, 10) || 0,
          salary: parseMoney(contract.salary),
          status: safeStr(contract.status),
          info: safeStr(contract.info),
          extensionEligible: elig.extensionEligible,
          restructureEligible: elig.restructureEligible
        });
      });
    }

    function renderRosterQuickActions() {
      if (document.body.id !== "body_options_07") return;

      var rows = Array.from(document.querySelectorAll("#body_options_07 tr"));
      rows.forEach(function (row) {
        var cell = row.querySelector("td.player");
        if (!cell) return;

        if (cell.querySelector(".ccc-quick-actions")) return;

        var playerLink = cell.querySelector('a[href*="player?L="]');
        if (!playerLink) return;

        var pid = parsePidFromHref(playerLink.getAttribute("href") || "");
        if (!pid) return;

        var info = rosterEligibilityByPid.get(pid);
        if (!info) return;
        if (!info.extensionEligible && !info.restructureEligible) return;

        var wrap = document.createElement("span");
        wrap.className = "ccc-quick-actions";

        if (info.extensionEligible) {
          var ext = document.createElement("button");
          ext.type = "button";
          ext.className = "ccc-action-btn ext";
          ext.textContent = "Extension";
          ext.setAttribute("data-ccc-action", "extension");
          ext.setAttribute("data-ccc-pid", pid);
          ext.setAttribute("data-ccc-fid", info.franchiseId || "");
          wrap.appendChild(ext);
        }

        if (info.restructureEligible) {
          var rs = document.createElement("button");
          rs.type = "button";
          rs.className = "ccc-action-btn rs";
          rs.textContent = "Restructure";
          rs.setAttribute("data-ccc-action", "restructure");
          rs.setAttribute("data-ccc-pid", pid);
          rs.setAttribute("data-ccc-fid", info.franchiseId || "");
          wrap.appendChild(rs);
        }

        cell.appendChild(wrap);
      });
    }

    function extractPopupPid(popupRoot) {
      if (!popupRoot) return "";
      var a = popupRoot.querySelector('a[href*="player?L="]');
      if (!a) return "";
      return parsePidFromHref(a.getAttribute("href") || "");
    }

    function renderPopupQuickActions() {
      var popup = document.getElementById("MFLPlayerPopupContainer");
      if (!popup) return;

      var pid = extractPopupPid(popup);
      if (!pid) return;

      var info = rosterEligibilityByPid.get(pid);
      var existing = popup.querySelector("#cccPopupQuickActions");

      if (!info || (!info.extensionEligible && !info.restructureEligible)) {
        if (existing) existing.remove();
        return;
      }

      var panel = existing || document.createElement("div");
      panel.id = "cccPopupQuickActions";
      panel.className = "ccc-popup-actions";

      var html = '<div class="ccc-popup-actions-title">Contract Actions</div><span class="ccc-quick-actions">';

      if (info.extensionEligible) {
        html +=
          '<button type="button" class="ccc-action-btn ext" data-ccc-action="extension" data-ccc-pid="' +
          pid +
          '" data-ccc-fid="' +
          (info.franchiseId || "") +
          '">Extension</button>';
      }

      if (info.restructureEligible) {
        html +=
          '<button type="button" class="ccc-action-btn rs" data-ccc-action="restructure" data-ccc-pid="' +
          pid +
          '" data-ccc-fid="' +
          (info.franchiseId || "") +
          '">Restructure</button>';
      }

      html += '</span><div class="ccc-popup-actions-note">Opens Contract Command Center with this player preloaded.</div>';
      panel.innerHTML = html;

      if (!existing) {
        var target = popup.querySelector("table") || popup;
        target.parentNode.insertBefore(panel, target.nextSibling);
      }
    }

    function onQuickActionClick(evt) {
      var btn = evt.target && evt.target.closest ? evt.target.closest(".ccc-action-btn[data-ccc-action]") : null;
      if (!btn) return;
      evt.preventDefault();
      evt.stopPropagation();

      var action = safeStr(btn.getAttribute("data-ccc-action")).toLowerCase();
      var pid = safeStr(btn.getAttribute("data-ccc-pid"));
      var fid = pad4(btn.getAttribute("data-ccc-fid"));
      if (!action || !pid) return;

      location.href = buildActionUrl(action, {
        playerId: pid,
        franchiseId: fid,

    }

    function wireMessage2IframeBridge() {
      var qs = new URLSearchParams(location.search || "");
      var moduleName = safeStr(qs.get("MODULE")).toUpperCase();
      if (moduleName !== "MESSAGE2") return;

      var frame = document.querySelector('iframe[src*="contractcommandcenter"]');
      if (!frame) return;

      try {
        var src = new URL(frame.getAttribute("src"), location.href);
        src.searchParams.set("L", safeStr(getActiveLeagueId()));
        src.searchParams.set("YEAR", safeStr(getActiveYear()));

        var hashQs = new URLSearchParams((location.hash || "").replace(/^#/, ""));
        var actionQuery = safeStr(qs.get("cccAction")) || safeStr(hashQs.get("cccAction"));
        var playerQuery = safeStr(qs.get("cccPlayer")) || safeStr(hashQs.get("cccPlayer"));
        var franchiseQuery = safeStr(qs.get("cccFranchise")) || safeStr(hashQs.get("cccFranchise"));
        var seasonQuery = safeStr(qs.get("cccSeason")) || safeStr(hashQs.get("cccSeason"));
        var yearsQuery = safeStr(qs.get("cccYears")) || safeStr(hashQs.get("cccYears"));

        var hasQueryAction = !!(actionQuery && playerQuery);
        var pending = hasQueryAction ? null : getPendingAction();

        if (hasQueryAction) {
          src.searchParams.set("cccAction", actionQuery);
          src.searchParams.set("cccPlayer", playerQuery);
          if (franchiseQuery) src.searchParams.set("cccFranchise", franchiseQuery);
          if (seasonQuery) src.searchParams.set("cccSeason", seasonQuery);
          if (yearsQuery) src.searchParams.set("cccYears", yearsQuery);
        } else if (pending) {
          src.searchParams.set("cccAction", pending.action);
          src.searchParams.set("cccPlayer", pending.playerId);
          if (pending.franchiseId) src.searchParams.set("cccFranchise", pending.franchiseId);
          src.searchParams.set("cccSeason", safeStr(getActiveYear()));
          if (pending.action === "extension") src.searchParams.set("cccYears", safeStr(pending.years));
          clearPendingAction();
        }

        frame.setAttribute("src", src.toString());
      } catch (e) {}

      window.addEventListener("message", function (event) {
        if (!event || !event.data) return;

        if (event.data.type === "ccc-height") {
          var h = Number(event.data.height || 0);
          if (h > 0) {
            var next = Math.max(960, Math.ceil(h));
            var now = parseInt(String(frame.style.height || "0").replace(/[^0-9]/g, ""), 10) || 0;
            if (Math.abs(next - now) >= 2) frame.style.height = next + "px";
          }
        }
      });
    }

    function initRosterEnhancements() {
      if (!enableRosterContractActions) return;
      if (document.body.id !== "body_options_07") return;

      var attempts = 0;
      var timer = setInterval(function () {
        attempts += 1;
        scanRosterEligibility();
        renderRosterQuickActions();
        renderPopupQuickActions();
        if (attempts >= 18) clearInterval(timer);
      }, 400);

      var observer = new MutationObserver(function () {
        scanRosterEligibility();
        renderRosterQuickActions();
        renderPopupQuickActions();
      });
      observer.observe(document.body, { childList: true, subtree: true });

      document.addEventListener("click", onQuickActionClick, true);
    }

    function init() {
      initRosterEnhancements();
      wireMessage2IframeBridge();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();

<script>
  // Rosters page: normalize contract details and add roster filters.
  (function () {
    if (window.__ups_roster_contract_ui_v2) return;
    window.__ups_roster_contract_ui_v2 = true;

    var rosterUiState = {
      search: "",
      positions: [],
      teams: [],
      divisions: [],
      years: [],
      contractTypes: []
    };
    var observerMuteUntil = 0;

    function safeStr(v) {
      return v === null || v === undefined ? "" : String(v).trim();
    }

    function muteMutationObserver(ms) {
      var dur = Number(ms || 0);
      observerMuteUntil = Date.now() + (dur > 0 ? dur : 120);
    }

    function isRosterPage() {
      var bodyId = safeStr(document.body && document.body.id).toLowerCase();
      if (bodyId.indexOf("body_options_07") === 0) return true;
      try {
        var u = new URL(window.location.href);
        return safeStr(u.searchParams.get("O")) === "07";
      } catch (e) {
        return false;
      }
    }

    function normalizeText(v) {
      return safeStr(v)
        .replace(/\u00a0/g, " ")
        .replace(/\s*\|\s*/g, " | ")
        .replace(/\s+/g, " ")
        .replace(/\s+\|/g, " |")
        .replace(/\|\s+/g, "| ")
        .trim();
    }

    function lowerText(v) {
      return normalizeText(v).toLowerCase();
    }

    function uniq(values) {
      var seen = Object.create(null);
      var out = [];
      (values || []).forEach(function (v) {
        var key = safeStr(v);
        if (!key || seen[key]) return;
        seen[key] = true;

    function selectedMultiValues(select) {

      });
    }

    function saveRosterFilterState() {
      try {
        sessionStorage.setItem("ups_roster_search", rosterUiState.search || "");
        sessionStorage.setItem("ups_roster_positions", JSON.stringify(rosterUiState.positions || []));

        sessionStorage.setItem("ups_roster_divisions", JSON.stringify(rosterUiState.divisions || []));

    function loadStoredList(key) {
      try {
        var raw = sessionStorage.getItem(key);
        if (!raw) return [];

        return Array.isArray(parsed) ? uniq(parsed.map(safeStr).filter(Boolean)) : [];
      } catch (e) {
        return [];
      }
    }

    function textAfterPrefix(part, rx) {
      var m = part.match(rx);
      return m ? safeStr(m[1]) : "";
    }

    function parseMoney(text) {
      var raw = safeStr(text).replace(/\u2212/g, "-");
      if (!raw) return null;
      var match = raw.match(/\$?\s*-?\d[\d,]*(?:\.\d+)?|\$-?\d[\d,]*(?:\.\d+)?/);
      if (!match) return null;
      var cleaned = match[0].replace(/\$/g, "").replace(/,/g, "").replace(/\s+/g, "");
      var n = Number(cleaned);
      return Number.isFinite(n) ? n : null;
    }

    function formatMoneyCompact(n) {
      if (!Number.isFinite(n)) return "";
      var sign = n < 0 ? "-" : "";
      var abs = Math.abs(Math.round(n));
      if (abs >= 1000 && abs % 1000 === 0) return sign + "$" + String(abs / 1000) + "K";
      return sign + "$" + abs.toLocaleString();
    }

    function formatDeltaCompact(n) {
      if (!Number.isFinite(n)) return "";
      var sign = n > 0 ? "+" : n < 0 ? "-" : "";
      var abs = Math.abs(Math.round(n));
      if (abs >= 1000 && abs % 1000 === 0) return sign + String(abs / 1000) + "K";
      return sign + abs.toLocaleString();
    }

    function positionFromRow(row) {
      if (!row) return "";
      var link = row.querySelector("td.player a");
      if (!link) return "";
      var m = safeStr(link.className).match(/\bposition_([a-z]+)\b/i);
      return m ? safeStr(m[1]).toUpperCase() : "";
    }

    function playerNameFromRow(row) {
      if (!row) return "";

      if (!link) return "";

    }

    function extractFidFromNode(node) {
      if (!node) return "";
      var cls = safeStr(node.className);
      var m = cls.match(/franchise_(\d{1,4})/i);
      if (m && m[1]) return m[1].padStart(4, "0");
      var href = safeStr(node.getAttribute && node.getAttribute("href"));
      m = href.match(/[?&]F=(\d{1,4})\b/i);
      if (m && m[1]) return m[1].padStart(4, "0");
      return "";
    }

    function resolveTeamMetaForTable(table) {
      if (!table) return { fid: "", teamName: "", divisionId: "", divisionName: "" };

      var fid = safeStr(table.getAttribute("data-ups-team-id"));
      var teamName = safeStr(table.getAttribute("data-ups-team-name"));
      var divisionId = safeStr(table.getAttribute("data-ups-division-id"));
      var divisionName = safeStr(table.getAttribute("data-ups-division-name"));
      if (fid && teamName && divisionId && divisionName) {
        return { fid: fid, teamName: teamName, divisionId: divisionId, divisionName: divisionName };
      }

      var caption = table.querySelector("caption");
      var captionLink = caption && caption.querySelector("a[class*='franchise_']");
      fid =
        extractFidFromNode(table) ||
        extractFidFromNode(captionLink || caption) ||
        fid;

      var franchiseDbKey = fid ? ("fid_" + fid) : "";
      var franchiseMeta = (typeof franchiseDatabase !== "undefined" && franchiseDbKey && franchiseDatabase && franchiseDatabase[franchiseDbKey]) ? franchiseDatabase[franchiseDbKey] : null;

      teamName =
        safeStr(table.getAttribute("data-ups-team-name")) ||
        safeStr(franchiseMeta && franchiseMeta.name) ||
        safeStr(caption && caption.querySelector && caption.querySelector("img[alt]") && caption.querySelector("img[alt]").getAttribute("alt")) ||
        normalizeText((caption && caption.textContent) || "").replace(/^-\s*/, "");

      divisionId =
        safeStr(table.getAttribute("data-ups-division-id")) ||
        safeStr(franchiseMeta && franchiseMeta.division);

      var divMeta = (typeof leagueDivisions !== "undefined" && leagueDivisions && divisionId && leagueDivisions[divisionId]) ? leagueDivisions[divisionId] : null;
      divisionName =
        safeStr(table.getAttribute("data-ups-division-name")) ||
        safeStr(divMeta && divMeta.name) ||
        (divisionId ? ("Division " + divisionId) : "");

      if (fid) table.setAttribute("data-ups-team-id", fid);
      if (teamName) table.setAttribute("data-ups-team-name", teamName);
      if (divisionId) table.setAttribute("data-ups-division-id", divisionId);
      if (divisionName) table.setAttribute("data-ups-division-name", divisionName);

      return { fid: fid, teamName: teamName, divisionId: divisionId, divisionName: divisionName };
    }

    function yearsBucketFromRow(row) {
      var yearsCell = row && row.querySelector("td.contractyear");
      var yearsText = safeStr(yearsCell && yearsCell.textContent);
      if (!yearsText) return "";
      var yearsNum = parseInt(yearsText, 10);
      if (!Number.isFinite(yearsNum)) return "";
      if (yearsNum >= 3) return "3";
      if (yearsNum < 0) return "";
      return String(yearsNum);
    }

    function getRosterTables() {
      return Array.from(document.querySelectorAll("#body_options_07 table.report"));
    }

    function getRosterHost() {
      return (
        document.getElementById("MFLroster") ||
        document.querySelector("#body_options_07 table.two_column_layout") ||
        document.querySelector("#body_options_07 table.report")
      );
    }

    function getRosterRoot() {
      return document.getElementById("MFLroster") || document.getElementById("options_07") || document.body;
    }

    function getRosterTableKey(table) {
      if (!table) return "";
      var existing = safeStr(table.getAttribute("data-ups-roster-key"));
      if (existing) return existing;

      var captionLink = table.querySelector("caption a[class*='franchise_']");
      var cls = safeStr(captionLink && captionLink.className);
      var m = cls.match(/franchise_(\d{1,4})/i);
      var key = m ? ("fid_" + m[1].padStart(4, "0")) : ("idx_" + Math.random().toString(36).slice(2, 9));
      table.setAttribute("data-ups-roster-key", key);
      return key;
    }

    function setTaxiCollapsed(table, collapsed) {
      if (!table) return;
      table.setAttribute("data-ups-taxi-collapsed", collapsed ? "1" : "0");
      try {
        var key = getRosterTableKey(table);
        if (key) sessionStorage.setItem("ups_roster_taxi_" + key, collapsed ? "1" : "0");
      } catch (e) {}
    }

    function getTaxiCollapsed(table) {
      if (!table) return true;
      var current = safeStr(table.getAttribute("data-ups-taxi-collapsed"));
      if (current === "0" || current === "1") return current === "1";
      try {
        var saved = sessionStorage.getItem("ups_roster_taxi_" + getRosterTableKey(table));
        if (saved === "0" || saved === "1") {
          table.setAttribute("data-ups-taxi-collapsed", saved);
          return saved === "1";
        }
      } catch (e) {}
      table.setAttribute("data-ups-taxi-collapsed", "1");
      return true;

    function buildSummaryChip(label, value, tone) {
      var chip = document.createElement("span");

      var labelEl = document.createElement("span");

      labelEl.textContent = safeStr(label);

      valueEl.className = "ups-roster-summary-value";
      valueEl.textContent = safeStr(value);

      chip.appendChild(labelEl);
      chip.appendChild(valueEl);
      return chip;
    }

    function classifyWarningText(text) {
      var s = lowerText(text);
      if (!s) return "";
      if (s.indexOf("invalid roster") !== -1) return "Invalid";
      if (s.indexOf("salary cap") !== -1 && s.indexOf("exceeded") !== -1) return "Over Cap";
      return "Warning";
    }

    function buildToolbarOptionSets() {
      var teamMap = Object.create(null);
      var divMap = Object.create(null);
      var posMap = Object.create(null);
      var typeMap = Object.create(null);
      var yearsMap = Object.create(null);

      getRosterTables().forEach(function (table) {
        var meta = resolveTeamMetaForTable(table);
        if (meta.fid) {
          teamMap[meta.fid] = {
            value: meta.fid,
            label: meta.teamName || meta.fid,
            groupId: safeStr(meta.divisionId || ""),
            groupLabel: safeStr(meta.divisionName || "")
          };
        }
        if (meta.divisionId) {
          divMap[meta.divisionId] = { value: meta.divisionId, label: meta.divisionName || ("Division " + meta.divisionId) };
        }

        Array.from(table.querySelectorAll('tr[data-ups-player-row="1"]')).forEach(function (row) {
          var pos = safeStr(row.getAttribute("data-ups-player-pos")).toUpperCase();
          if (pos) posMap[pos] = { value: pos, label: pos };

          var yearsBucket = safeStr(row.getAttribute("data-ups-contract-years-bucket"));
          if (yearsBucket) {
            yearsMap[yearsBucket] = { value: yearsBucket, label: yearsBucket + " year" + (yearsBucket === "1" ? "" : "s") };
          }

          var typeKey = safeStr(row.getAttribute("data-ups-contract-type-key"));
          var typeLabel = safeStr(row.getAttribute("data-ups-contract-type-label"));
          if (typeKey && typeLabel) {
            var groupLabel = "All Other";
            if (typeKey.indexOf("rookie") !== -1) {
              groupLabel = "Rookie";
            } else if (
              typeKey === "fl" ||
              typeKey === "bl" ||
              typeKey.indexOf("front") !== -1 ||
              typeKey.indexOf("back") !== -1 ||
              typeKey.indexOf("load") !== -1
            ) {
              groupLabel = "Loaded";
            }
            typeMap[typeKey] = { value: typeKey, label: typeLabel, groupLabel: groupLabel };
          }
        });
      });

      var yearOrder = { "3": 0, "2": 1, "1": 2, "0": 3 };
      function sortByLabel(a, b) { return safeStr(a.label).localeCompare(safeStr(b.label)); }

      return {
        teams: Object.keys(teamMap).map(function (k) { return teamMap[k]; }).sort(function (a, b) {
          var ag = safeStr(a.groupLabel || a.groupId || "");
          var bg = safeStr(b.groupLabel || b.groupId || "");
          return ag.localeCompare(bg) || sortByLabel(a, b);
        }),
        divisions: Object.keys(divMap).map(function (k) { return divMap[k]; }).sort(sortByLabel),
        positions: ["QB","RB","WR","TE","PK","PN","DT","DE","LB","CB","S"]

          var groupOrder = { "Rookie": 0, "Loaded": 1, "All Other": 2 };
          var ag = safeStr(a.groupLabel || "All Other");
          var bg = safeStr(b.groupLabel || "All Other");
          return (groupOrder[ag] || 99) - (groupOrder[bg] || 99) || sortByLabel(a, b);

    function renderTeamsSelectOptions(select, items, selectedValues) {
      if (!select) return;

      var sig = (items || []).map(function (it) {
        return [

          if (safeStr(it.value) === "__ALL__") {

              options: []

        order.forEach(function (gKey) {
          var group = groups[gKey];
          var gLabel = safeStr(group.label).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
