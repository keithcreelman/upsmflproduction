<script>
  // Legacy global safety guards (custom tabs removed; keep no-op shims to avoid hard crashes).
  (function () {
    function noop() {}
    var fakeTabsShim = {
      onReady: function (cb) {
        if (typeof cb === "function") {
          try { cb(); } catch (e) {}
        }
      },
      init: noop,
      mount: noop,
      destroy: noop
    };
    if (!window.MFL_customTabs_FakeTabs || typeof window.MFL_customTabs_FakeTabs !== "object") {
      window.MFL_customTabs_FakeTabs = fakeTabsShim;
    }
    if (!window.MFL_customTabs || typeof window.MFL_customTabs !== "object") {
      window.MFL_customTabs = window.MFL_customTabs_FakeTabs;
    }
    if (!window.customTabs || typeof window.customTabs !== "object") {
      window.customTabs = window.MFL_customTabs_FakeTabs;
    }
    if (!window.FakeTabs || typeof window.FakeTabs !== "object") {
      window.FakeTabs = window.MFL_customTabs_FakeTabs;
    }
    if (!window.MFLGlobalCache || typeof window.MFLGlobalCache !== "object") {
      window.MFLGlobalCache = {
        onReady: function (cb) {
          if (typeof cb === "function") {
            try { cb(); } catch (e) {}
          }
        },
        get: function () { return null; },
        set: noop,
        remove: noop
      };
    } else if (typeof window.MFLGlobalCache.onReady !== "function") {
      window.MFLGlobalCache.onReady = function (cb) {
        if (typeof cb === "function") {
          try { cb(); } catch (e) {}
        }
      };
    }
    if (!Array.isArray(window.reportNflByeWeeks_ar)) window.reportNflByeWeeks_ar = [];
    if (!Array.isArray(window.reportNflByeWeeksArray)) window.reportNflByeWeeksArray = window.reportNflByeWeeks_ar;
  })();

  // Hard redirect guard: never allow CCC message routes to stay on leaked dev league.
  (function () {
    try {
      var prodLeague = String(window.UPS_CCC_PROD_LEAGUE_ID == null ? "" : window.UPS_CCC_PROD_LEAGUE_ID).replace(/\D/g, "");
      var devLeague = String(window.UPS_DEV_LEAGUE_ID == null ? "" : window.UPS_DEV_LEAGUE_ID).replace(/\D/g, "");
      if (!prodLeague || !devLeague || prodLeague === devLeague) return;

      var u = new URL(window.location.href || "");
      var moduleName = String(u.searchParams.get("MODULE") || "").toUpperCase();
      if (moduleName !== "MESSAGE2") return;
      if (String(u.searchParams.get("UPS_ALLOW_DEV_CCC") || "") === "1") return;

      var m = String(u.pathname || "").match(/\/home\/(\d+)(?:\/|$)/i);
      var pathLeague = m && m[1] ? String(m[1]) : "";
      if (pathLeague !== devLeague) return;

      u.pathname = String(u.pathname || "").replace(/\/home\/\d+(?:\/|$)/i, "/home/" + prodLeague);
      window.location.replace(u.toString());
    } catch (e) {}
  })();

  // Normalize Contract Command Center deep-links: move ccc* params to hash so MFL doesn't validate them.
  (function () {
    var u = new URL(window.location.href || "");
    var hasCcc =
      u.searchParams.has("cccAction") ||
      u.searchParams.has("cccPlayer") ||
      u.searchParams.has("cccFranchise") ||
      u.searchParams.has("cccSeason") ||
      u.searchParams.has("cccYears");
    if (!hasCcc) return;
    var moduleName = (u.searchParams.get("MODULE") || "").toUpperCase();
    if (moduleName !== "MESSAGE2") return;

    var h = new URLSearchParams();
    ["cccAction", "cccPlayer", "cccFranchise", "cccSeason", "cccYears"].forEach(function (k) {
      var v = u.searchParams.get(k);
      if (v !== null && v !== undefined && v !== "") h.set(k, v);
    });

    u.search = "?MODULE=MESSAGE2";
    u.hash = h.toString();

    if (u.toString() !== window.location.href) {
      window.location.replace(u.toString());
    }
  })();

  // Option 05 trade-intent shim: send counter/trade-action flows to Trade War Room (MESSAGE6).
  (function () {
    function s(v) {
      return v == null ? "" : String(v).trim();
    }
    function isOptionParam(v, n) {
      var x = s(v).replace(/^0+/, "");
      return x === String(n);
    }
    function validOfferKey(v) {
      var digits = s(v).replace(/\D/g, "");
      if (!digits || digits === "0") return "";
      return digits;
    }
    function readLeagueId(u) {
      var q = s(u.searchParams.get("L"));
      if (q) return q.replace(/\D/g, "");
      var pathMatch = s(u.pathname).match(/\/home\/(\d+)(?:\/|$)/i);
      if (pathMatch && pathMatch[1]) return s(pathMatch[1]).replace(/\D/g, "");
      var g = s(window.league_id || window.LEAGUE_ID || "").replace(/\D/g, "");
      if (g) return g;
      try {
        var raw = s(document.cookie || "");
        if (raw) {
          var parts = raw.split(";");
          for (var i = 0; i < parts.length; i += 1) {
            var p = s(parts[i]);
            if (!p) continue;
            var eq = p.indexOf("=");
            var key = eq >= 0 ? s(p.slice(0, eq)) : p;
            var val = eq >= 0 ? s(p.slice(eq + 1)) : "";
            if (key === "MFL_LAST_LEAGUE_ID" && val) {
              var fromCookie = decodeURIComponent(val).replace(/\D/g, "");
              if (fromCookie) return fromCookie;
            }
          }
        }
      } catch (e) {}
      var fallback = s(window.UPS_CCC_PROD_LEAGUE_ID == null ? "" : window.UPS_CCC_PROD_LEAGUE_ID).replace(/\D/g, "");
      return fallback;
    }
    function readYear(u) {
      var q = s(u.searchParams.get("YEAR"));
      if (q) return q.replace(/\D/g, "");
      var m = s(u.pathname).match(/\/(\d{4})\//);
      if (m && m[1]) return s(m[1]);
      var g = s(window.year || window.YEAR || "").replace(/\D/g, "");
      if (g) return g;
      return String(new Date().getFullYear());
    }
    function getWarRoomUrl() {
      var u = null;
      try {
        u = new URL(window.location.href || "");
      } catch (e) {
        return window.location.href;
      }
      var league = readLeagueId(u);
      if (!league) return window.location.href;
      var year = readYear(u) || String(new Date().getFullYear());
      return (
        window.location.origin +
        "/" +
        encodeURIComponent(year) +
        "/home/" +
        encodeURIComponent(league) +
        "?MODULE=MESSAGE6=N"
      );
    }
    window.getWarRoomUrl = getWarRoomUrl;
    function extractOfferKeyFromUrl(u) {
      var keys = [
        "TRADEID", "tradeid", "TRADE_ID", "trade_id",
        "TID", "tid", "OFFERID", "offerid", "UID", "uid"
      ];
      var i;
      for (i = 0; i < keys.length; i += 1) {
        var v = s(u.searchParams.get(keys[i]));
        if (v) return validOfferKey(v);
      }
      return "";
    }
    function extractOfferKeyFromDom() {
      try {
        var els = document.querySelectorAll(
          'input[type="hidden"],input[name*="trade" i],input[name*="offer" i],a[href*="trade" i],a[href*="offer" i]'
        );
        var i;
        for (i = 0; i < els.length; i += 1) {
          var node = els[i];
          var raw =
            s(node.value) + " " +
            s(node.getAttribute("name")) + " " +
            s(node.getAttribute("id")) + " " +
            s(node.getAttribute("href"));
          var m = raw.match(/(?:tradeid|TRADEID|trade_id|offerid|OFFERID|tid|TID)[^0-9]*([0-9]+)/);
          if (m && m[1]) return validOfferKey(m[1]);
        }
        var html = s(document.documentElement && document.documentElement.innerHTML).slice(0, 500000);
        var m2 = html.match(/(?:tradeid|TRADEID|trade_id|offerid|OFFERID|tid|TID)[^0-9]{0,12}([0-9]+)/);
        return m2 && m2[1] ? validOfferKey(m2[1]) : "";
      } catch (e) {
        return "";
      }
    }
    function isWarRoomRoute(u, href, bodyId) {
      var mod = s(u.searchParams.get("MODULE")).toUpperCase();
      if (mod.indexOf("MESSAGE6") === 0) return true;
      if (/[?&]MODULE=MESSAGE6(?:=N)?(?:&|$)/i.test(href)) return true;
      if (bodyId === "body_options_06") return true;
      return false;
    }
    function hasTradeIntent(u, offerKeyFromUrl, offerKeyFromDom) {
      if (validOfferKey(u.searchParams.get("twb_load_offer"))) return true;
      if (s(u.searchParams.get("twb_mode")).toLowerCase() === "counter") return true;
      if (offerKeyFromUrl || offerKeyFromDom) return true;
      if (document.querySelector('form[action*="trade_offer" i] input[name*="TRADE_ID" i], form[action*="trade_offer" i] input[name*="tradeid" i], input[name="TRADE_ID"], input[name="trade_id"]')) {
        return true;
      }
      return false;
    }
    function runShim() {
      try {
        var u = new URL(window.location.href || "");
        var href = s(window.location.href).toLowerCase();
        var bodyId = s(document.body && document.body.id).toLowerCase();
        var optionVal =
          s(u.searchParams.get("O")) ||
          s(u.searchParams.get("o")) ||
          s(u.searchParams.get("OPTION")) ||
          s(u.searchParams.get("option"));

        if (isWarRoomRoute(u, href, bodyId)) {
          try {
            sessionStorage.removeItem("twb_counter_offer_id");
            sessionStorage.removeItem("twb_redirect_from_o5");
            sessionStorage.removeItem("twb_redirected_from_o5");
            sessionStorage.removeItem("twb_mode");
            sessionStorage.removeItem("twb_o5_redirect_guard");
          } catch (e) {}
          return;
        }

        var option5ByDom = bodyId === "body_options_05";
        var isOption5 =
          isOptionParam(optionVal, 5) ||
          /[?&](?:o|option)=0?5(?:&|$)/i.test(href) ||
          option5ByDom;
        if (!isOption5) return;
        if (s(u.searchParams.get("twb_allow_o05")) === "1") return;

        var offerKeyFromUrl = extractOfferKeyFromUrl(u);
        var offerKeyFromDom = extractOfferKeyFromDom();
        if (!hasTradeIntent(u, offerKeyFromUrl, offerKeyFromDom)) return;
        var offerKey = offerKeyFromUrl || offerKeyFromDom;

        var target = new URL(getWarRoomUrl(), window.location.href);
        if (offerKey) {
          target.searchParams.set("twb_load_offer", offerKey);
          target.searchParams.set("twb_mode", "counter");
        }

        var guardKey = "twb_o5_redirect_guard";
        var guardVal = "";
        try { guardVal = s(sessionStorage.getItem(guardKey)); } catch (e) {}
        var guardToken = offerKey || "NO_OFFER_KEY";
        if (guardVal === guardToken) {
          if (!offerKey) showFallbackBanner(target.toString());
          return;
        }
        try {
          sessionStorage.setItem(guardKey, guardToken);
          if (offerKey) sessionStorage.setItem("twb_counter_offer_id", offerKey);
          sessionStorage.setItem("twb_redirect_from_o5", offerKey || "");
          sessionStorage.setItem("twb_redirected_from_o5", offerKey || "");
          if (offerKey) sessionStorage.setItem("twb_mode", "counter");
        } catch (e) {}
        window.location.replace(target.toString());
      } catch (e) {}
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", runShim, { once: true });
    } else {
      runShim();
    }
  })();

  // Debug helper: add `&UPS_DEBUG=1` to any URL to confirm which header build is loaded.
  (function () {
    try {
      var u = new URL(window.location.href);
      if (u.searchParams.get("UPS_DEBUG") !== "1") return;
    } catch (e) {
      return;
    }
    window.__UPS_DEBUG = true;
    document.addEventListener("DOMContentLoaded", function () {
      try {

        el.id = "upsDebugBadge";
        el.textContent = "UPS header build: 2026.02.21.3";

        document.body.appendChild(el);
      } catch (e) {}
    });
  })();
</script>

<script>
  document.title = "UPS Salary Cap Dynasty League";

  /* Font size + theme persistence */
  window.increaseFont = true;
  (function () {
    try {
      var key = "fontSize_" + year + "_" + league_id;
      if (localStorage.hasOwnProperty(key)) {
        var setStyle = localStorage.getItem(key);
        if (setStyle && setStyle !== "undefined") {
          document.documentElement.setAttribute("style", setStyle);
        }
      }
    } catch (e) {}
  })();

  function setTheme(year, league_id, themeName) {
    if (typeof themeName !== "string") return;
    localStorage.setItem("theme_" + year + "_" + league_id, themeName);
    document.documentElement.className = themeName;
    try {
      var inferredMode = String(themeName || "").toLowerCase().indexOf("light") !== -1 ? "light" : "dark";
      if (typeof applyUPSMode === "function") {
        applyUPSMode(inferredMode, true);
      } else {
        document.documentElement.setAttribute("data-ups-mode", inferredMode);
      }
    } catch (e) {}
  }

  function upsThemeStorageKey() {
    var y = typeof year !== "undefined" ? year : "";
    var l = typeof league_id !== "undefined" ? league_id : "";
    return "ups_mode_" + y + "_" + l;
  }

  function normalizeUPSMode(mode) {
    return String(mode || "").toLowerCase() === "light" ? "light" : "dark";
  }

  function getUPSMode() {
    return normalizeUPSMode(document.documentElement.getAttribute("data-ups-mode") || "dark");
  }

  function applyUPSMode(mode, persist) {
    var nextMode = normalizeUPSMode(mode);
    document.documentElement.setAttribute("data-ups-mode", nextMode);
    document.documentElement.style.colorScheme = nextMode;
    window.UPS_THEME_MODE = nextMode;
    if (persist) {
      try {
        localStorage.setItem(upsThemeStorageKey(), nextMode);
      } catch (e) {}
    }
    try {
      document.dispatchEvent(new CustomEvent("ups-theme-change", { detail: { mode: nextMode } }));
    } catch (e) {}
  }

  window.setUPSMode = function (mode) {
    applyUPSMode(mode, true);
  };

  window.toggleUPSMode = function () {
    applyUPSMode(getUPSMode() === "dark" ? "light" : "dark", true);
  };

  (function () {
    var key = "theme_" + year + "_" + league_id;
    var storedTheme = localStorage.getItem(key) || "";
    if (storedTheme) {
      document.documentElement.className = storedTheme;
    } else {
      document.documentElement.removeAttribute("class");
    }

    var upsMode = "";
    try {
      upsMode = localStorage.getItem(upsThemeStorageKey()) || "";
    } catch (e) {}
    if (!upsMode && storedTheme.toLowerCase().indexOf("light") !== -1) {
      upsMode = "light";
    }
    applyUPSMode(upsMode || "dark", false);

    if (window.MutationObserver) {
      var htmlEl = document.documentElement;
      var lastClass = htmlEl.className || "";
      var htmlClassObs = new MutationObserver(function () {
        var nextClass = htmlEl.className || "";
        if (nextClass === lastClass) return;
        lastClass = nextClass;
        var inferred = nextClass.toLowerCase().indexOf("light") !== -1 ? "light" : "dark";
        if (inferred !== getUPSMode()) {
          applyUPSMode(inferred, false);
        }
      });
      htmlClassObs.observe(htmlEl, { attributes: true, attributeFilter: ["class"] });
    }
  })();
</script>

<script>
  (function () {
    function updateThemeToggleUi() {
      var mode = typeof window.getUPSMode === "function" ? window.getUPSMode() : "dark";
      var btn = document.getElementById("upsThemeToggle");
      if (!btn) return;
      var label = btn.querySelector(".ups-theme-toggle-label");
      if (label) label.textContent = mode === "dark" ? "Theme: Dark" : "Theme: Light";
      btn.setAttribute("aria-pressed", mode === "light" ? "true" : "false");
      btn.setAttribute("title", mode === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function initThemeToggle() {
      var btn = document.getElementById("upsThemeToggle");
      if (btn && !btn.dataset.wired) {
        btn.dataset.wired = "1";
        btn.addEventListener("click", function () {
          if (typeof window.toggleUPSMode === "function") {
            window.toggleUPSMode();
            return;
          }
          if (typeof window.getUPSMode === "function" && typeof window.setUPSMode === "function") {
            var next = window.getUPSMode() === "dark" ? "light" : "dark";
            window.setUPSMode(next);
          }
        });
      }
      updateThemeToggleUi();
    }

    function initOwnerActionsMenu() {
      var wrap = document.getElementById("upsOwnerActionsWrap");
      var btn = document.getElementById("upsOwnerActionsToggle");
      var menu = document.getElementById("upsOwnerActionsMenu");
      if (!wrap || !btn || !menu || btn.dataset.wired) return;
      btn.dataset.wired = "1";

      function setOpen(next) {
        var open = !!next;
        wrap.classList.toggle("is-open", open);
        btn.setAttribute("aria-expanded", open ? "true" : "false");
        if (open) menu.removeAttribute("hidden");
        else menu.setAttribute("hidden", "");
      }

      btn.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        setOpen(!wrap.classList.contains("is-open"));
      });

      menu.addEventListener("click", function () {
        setOpen(false);
      });

      document.addEventListener("click", function (e) {
        if (!wrap.contains(e.target)) setOpen(false);
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") setOpen(false);
      });

      window.addEventListener("resize", function () {
        if (window.innerWidth > 900) setOpen(false);
      });
    }

    document.addEventListener("ups-theme-change", function () {
      updateThemeToggleUi();
    });

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        initThemeToggle();
        initOwnerActionsMenu();
      });
    } else {
      initThemeToggle();
      initOwnerActionsMenu();
    }
  })();
</script>

<script>
  // Hero side-panels: recent champions + all-time title leaders.

      { year: 2019, franchise: "Josh Martel", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0007.png", allPlayPct: 0.670, titleNumber: 1 },
      { year: 2018, franchise: "Steve Bousquet", icon: "https://www48.myfantasyleague.com/fflnetdynamic2024/74598_franchise_icon0006.jpg", allPlayPct: 0.744, titleNumber: 2 },
      { year: 2017, franchise: "Steve Bousquet", icon: "https://www48.myfantasyleague.com/fflnetdynamic2024/74598_franchise_icon0006.jpg", allPlayPct: 0.793, titleNumber: 1 },
      { year: 2016, franchise: "Bear Dunn", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0009.png", allPlayPct: 0.776, titleNumber: 1 }

    var fallbackTitleLeaders = [
      { franchise: "Shawn Blake", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0010.png", titles: 3, years: "2011, 2015, 2023" },
      { franchise: "Ryan Bousquet", icon: "https://www45.myfantasyleague.com/fflnetdynamic2014/30590_franchise_icon0001.jpg", titles: 2, years: "2014, 2021" },
      { franchise: "Josh Martel", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0007.png", titles: 2, years: "2019, 2020" },
      { franchise: "Steve Bousquet", icon: "http://i1218.photobucket.com/albums/dd420/creelmank/Team%20Minis/GoodinDaHoodMINI.png", titles: 2, years: "2017, 2018" },
      { franchise: "Brian Cutting", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0004.png", titles: 1, years: "2025" },
      { franchise: "Eric Martel", icon: "https://www48.myfantasyleague.com/fflnetdynamic2022/74598_franchise_logo0005.png", titles: 1, years: "2024" },
      { franchise: "Matt Gerardi", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0003.png", titles: 1, years: "2022" },
      { franchise: "Bear Dunn", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0009.png", titles: 1, years: "2016" },
      { franchise: "Derrick Whitman", icon: "https://www48.myfantasyleague.com/fflnetdynamic2022/74598_franchise_icon0002.png", titles: 1, years: "2013" },
      { franchise: "Kris Lake", icon: "https://www48.myfantasyleague.com/fflnetdynamic2019/74598_franchise_icon0003.png", titles: 1, years: "2012" }
    ];

    function formatPct(value) {
      var n = parseFloat(value);
      if (isNaN(n)) return "--";
      return (n * 100).toFixed(1) + "%";
    }

    function buildRecentRow(item) {
      var row = document.createElement("div");
      row.className = "ups-hero-item ups-hero-item--champ";

      var year = document.createElement("div");
      year.className = "ups-hero-year";
      year.textContent = String(item.year || "");

      var main = document.createElement("div");
      main.className = "ups-hero-main";

      var name = document.createElement("div");
      name.className = "ups-hero-name";
      name.textContent = String(item.franchise || "");

      var meta = document.createElement("div");
      meta.className = "ups-hero-meta";
      meta.innerHTML =
        "All-Play " + formatPct(item.allPlayPct) + " <span class=\"ups-hero-trophies\">| Title #" + String(item.titleNumber || 1) + " x&#127942;</span>";

      main.appendChild(name);
      main.appendChild(meta);

      row.appendChild(year);
      row.appendChild(main);
      return row;
    }

    function buildLeaderRow(item) {
      var row = document.createElement("div");
      row.className = "ups-hero-item ups-hero-item--leader";

      var main = document.createElement("div");
      main.className = "ups-hero-main";

      var name = document.createElement("div");
      name.className = "ups-hero-name";
      name.textContent = String(item.franchise || "");

      var meta = document.createElement("div");
      meta.className = "ups-hero-meta";
      meta.textContent = String(item.years || "");

      var count = document.createElement("span");
      count.className = "ups-hero-count";
      count.textContent = String(item.titles || 0);
      count.title = String(item.titles || 0) + " title(s)";

      main.appendChild(name);
      main.appendChild(meta);

      row.appendChild(main);
      row.appendChild(count);
      return row;
    }

    function normalizeRecentRows(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .map(function (item) {
          var iconRaw = String(item && item.icon || "");
          var icon = iconRaw.replace(/^http:\/\//i, "https://");
          return {
            year: parseInt(item && item.year, 10) || 0,
            franchise: String(item && item.franchise || ""),
            icon: icon,
            allPlayPct:
              item && item.allPlayPct !== undefined
                ? item.allPlayPct
                : item && item.all_play_pct !== undefined
                ? item.all_play_pct
                : 0,
            titleNumber:
              item && item.titleNumber !== undefined
                ? item.titleNumber
                : item && item.title_number !== undefined
                ? item.title_number
                : 1
          };
        })
        .filter(function (item) {
          return item.year > 0 && item.franchise;
        });
    }

    function normalizeLeaderRows(rows) {
      if (!Array.isArray(rows)) return [];
      return rows
        .map(function (item) {
          var iconRaw = String(item && item.icon || "");
          var icon = iconRaw.replace(/^http:\/\//i, "https://");
          return {
            franchise: String(item && item.franchise || ""),
            icon: icon,
            titles: parseInt(item && item.titles, 10) || 0,
            years: String(item && item.years || "")
          };
        })
        .filter(function (item) {
          return item.franchise;
        });
    }

    function render(recentWinners, titleLeaders) {
      var recentEl = document.getElementById("upsRecentWinners");
      var leadersEl = document.getElementById("upsTitleLeaders");
      if (!recentEl || !leadersEl) return;
      recentEl.innerHTML = "";
      leadersEl.innerHTML = "";

      for (var i = 0; i < recentWinners.length; i += 1) {
        recentEl.appendChild(buildRecentRow(recentWinners[i]));
      }
      for (var j = 0; j < titleLeaders.length; j += 1) {
        leadersEl.appendChild(buildLeaderRow(titleLeaders[j]));
      }
    }

    function readPayload(raw) {
      if (!raw || typeof raw !== "object") return null;
      var recent = normalizeRecentRows(raw.recent_winners || raw.recentWinners || []);
      var leaders = normalizeLeaderRows(raw.title_leaders || raw.titleLeaders || []);
      if (!recent.length || !leaders.length) return null;
      return { recent: recent, leaders: leaders };
    }

    function loadDynamicPanels() {
      var cacheKey = String(Date.now());
      var releaseRef = String(window.UPS_RELEASE_SHA || "v1.0.2").trim() || "v1.0.2";
      var candidates = [
        "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@" + releaseRef + "/site/champions_panels.json?v=" + cacheKey,
        "https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@v1.0.2/site/champions_panels.json?v=" + cacheKey
      ];

      function attempt(idx) {
        if (idx >= candidates.length) {
          render(fallbackRecentWinners, fallbackTitleLeaders);
          return;
        }
        fetch(candidates[idx], { cache: "no-store" })
          .then(function (res) {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
          })
          .then(function (json) {
            var payload = readPayload(json);
            if (!payload) throw new Error("Invalid champion panel payload");
            render(payload.recent, payload.leaders);
          })
          .catch(function () {
            attempt(idx + 1);
          });
      }

      attempt(0);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", loadDynamicPanels);
    } else {
      loadDynamicPanels();
    }
  })();
</script>

<script>
  // CCC embed helper for MFL home-page messages:
  // MFL sometimes injects message HTML with innerHTML, which makes <script> tags inert.
  // Loading the CCC embed loader from the header ensures it executes.
  (function () {
    var CCC_HEADER_BUILD = "2026.02.28.2";
    if (window.__ups_ccc_header_autoload === CCC_HEADER_BUILD) return;
    window.__ups_ccc_header_autoload = CCC_HEADER_BUILD;
    var CCC_PROD_LEAGUE_ID = String(window.UPS_CCC_PROD_LEAGUE_ID == null ? "" : window.UPS_CCC_PROD_LEAGUE_ID).replace(/\D/g, "");
    var CCC_DEV_LEAGUE_ID = String(window.UPS_DEV_LEAGUE_ID == null ? "" : window.UPS_DEV_LEAGUE_ID).replace(/\D/g, "");

    function safeUpper(v) {
      return String(v || "").trim().toUpperCase();
    }

    function safeStr(v) {
      return String(v || "").trim();
    }

    function readPathLeagueId() {
      var m = safeStr(window.location.pathname).match(/\/home\/(\d+)(?:\/|$)/i);
      return m && m[1] ? safeStr(m[1]) : "";
    }

    function getCurrentLeagueId() {
      var cookieLeague = "";
      try {
        var raw = safeStr(document.cookie || "");
        if (raw) {
          raw.split(";").forEach(function (part) {
            var p = safeStr(part);
            if (!p) return;
            var idx = p.indexOf("=");
            var key = idx >= 0 ? safeStr(p.slice(0, idx)) : safeStr(p);
            var val = idx >= 0 ? safeStr(p.slice(idx + 1)) : "";
            if (key === "MFL_LAST_LEAGUE_ID" && val) cookieLeague = decodeURIComponent(val);
          });
        }
      } catch (e) {}

      var pathLeague = readPathLeagueId();
      var globalLeague = safeStr(window.league_id || window.LEAGUE_ID || "");

      try {
        var u = new URL(window.location.href);
        var q = safeStr(u.searchParams.get("L") || "");
        if (q) return q;
      } catch (e) {}

      if (pathLeague) return pathLeague;
      if (globalLeague) return globalLeague;
      if (cookieLeague) return cookieLeague;
      if (CCC_PROD_LEAGUE_ID) return CCC_PROD_LEAGUE_ID;
      if (CCC_DEV_LEAGUE_ID) return CCC_DEV_LEAGUE_ID;
      return "";
    }

    function getCurrentYear() {
      try {
        var u = new URL(window.location.href);
        var q = safeStr(u.searchParams.get("YEAR") || "");
        if (q) return q;
      } catch (e) {}
      var m = safeStr(window.location.pathname).match(/\/(\d{4})\//);
      if (m && m[1]) return safeStr(m[1]);
      var g = safeStr(window.year || window.YEAR || "");
      if (g) return g;
      return String(new Date().getFullYear());
    }

    function buildCanonicalCccRouteUrl() {
      var L = getCurrentLeagueId();
      var YEAR = getCurrentYear();
      if (!L || !YEAR) return "";
      return (
        window.location.origin +
        "/" +
        encodeURIComponent(YEAR) +
        "/home/" +
        encodeURIComponent(L) +
        "?MODULE=MESSAGE2"
      );
    }

    function buildCanonicalWarRoomRouteUrl() {
      var L = getCurrentLeagueId();
      var YEAR = getCurrentYear();
      if (!L || !YEAR) return "";
      return (
        window.location.origin +
        "/" +
        encodeURIComponent(YEAR) +
        "/home/" +
        encodeURIComponent(L) +
        "?MODULE=MESSAGE6=N"
      );
    }
    window.getWarRoomUrl = buildCanonicalWarRoomRouteUrl;

    function buildCanonicalIssueReportRouteUrl() {
      var L = getCurrentLeagueId();
      var YEAR = getCurrentYear();
      if (!L || !YEAR) return "";
      return (
        window.location.origin +
        "/" +
        encodeURIComponent(YEAR) +
        "/home/" +
        encodeURIComponent(L) +
        "?MODULE=MESSAGE17&OPEN_BUG=1&SOURCE_APP=ups-hot-links"
      );
    }

    function buildCanonicalRosterWorkbenchRouteUrl() {
      var L = getCurrentLeagueId();
      var YEAR = getCurrentYear();
      if (!L || !YEAR) return "";
      return (
        window.location.origin +
        "/" +
        encodeURIComponent(YEAR) +
        "/home/" +
        encodeURIComponent(L) +
        "?MODULE=MESSAGE5"
      );
    }
    window.getRosterWorkbenchUrl = buildCanonicalRosterWorkbenchRouteUrl;

    function normalizeHeaderHotlinksToCurrentLeague() {
      var L = getCurrentLeagueId();
      var YEAR = getCurrentYear();
      if (!L || !YEAR) return;

      var origin = window.location.origin;
      var y = encodeURIComponent(YEAR);
      var l = encodeURIComponent(L);

      function setHref(selector, href) {
        var nodes = document.querySelectorAll(selector);
        for (var i = 0; i < nodes.length; i++) {
          nodes[i].setAttribute("href", href);
        }
      }

      setHref("a.full_height_banner", origin + "/" + y + "/home/" + l);
      var canonicalCcc = buildCanonicalCccRouteUrl();
      setHref('a[data-ups-hotlink="ccc"], a.ccc-cta[href*="MODULE=MESSAGE2"]', canonicalCcc || (origin + "/" + y + "/home/" + l + "?MODULE=MESSAGE2"));
      var canonicalIssue = buildCanonicalIssueReportRouteUrl();
      setHref('a[data-ups-hotlink="issue"]', canonicalIssue || (origin + "/" + y + "/home/" + l + "?MODULE=MESSAGE17&OPEN_BUG=1&SOURCE_APP=ups-hot-links"));
      setHref('a.ccc-pill[href*="/lineup"]', origin + "/" + y + "/lineup?L=" + l);
      setHref('a.ccc-pill[href*="/add_drop"]', origin + "/" + y + "/add_drop?L=" + l);
      setHref('a.ccc-pill[href*="/ajax_ls"]', origin + "/" + y + "/ajax_ls?L=" + l);
      var canonicalRosterWorkbench = buildCanonicalRosterWorkbenchRouteUrl();
      if (canonicalRosterWorkbench) {
        setHref('a[data-owner-action="rosters"]', canonicalRosterWorkbench);
      }
      setHref('a[data-owner-action="old-roster"]', origin + "/" + y + "/options?L=" + l + "&O=07");
      var canonicalWarRoom = buildCanonicalWarRoomRouteUrl();
      if (canonicalWarRoom) {
        setHref('a[data-owner-action="trades"]', canonicalWarRoom);
      }
    }

    function getModuleName() {
      try {
        var u = new URL(window.location.href);
        return safeUpper(u.searchParams.get("MODULE") || "");
      } catch (e) {
        return "";
      }
    }

    function enableHomeShellClass() {
      var path = "";
      try {
        path = String(window.location.pathname || "");
      } catch (e) {
        path = "";
      }
      if (!/\/home\/\d+/i.test(path)) return;
      try {
        document.documentElement.classList.add("ups-home-shell");
      } catch (e) {}
      try {
        if (document.body) document.body.classList.add("ups-home-shell");
      } catch (e) {}
    }

    function enableMessage2CccChromeClass() {
      try {
        document.documentElement.classList.add("ups-message2-ccc");
      } catch (e) {}
      try {
        if (document.body) document.body.classList.add("ups-message2-ccc");
      } catch (e) {}
    }

    function removeDuplicateNodes(selector) {
      var nodes = document.querySelectorAll(selector);
      if (!nodes || nodes.length <= 1) return;
      for (var i = 1; i < nodes.length; i++) {
        var n = nodes[i];
        if (n && n.parentNode) n.parentNode.removeChild(n);
      }
    }

    // MESSAGE2 can contain stale copied header shells inside the message body.
    // Preserve the real top-page shell (outside #container-wrap) when possible.
    function removeDuplicateNodesPreferHeader(selector) {
      var nodes = Array.prototype.slice.call(document.querySelectorAll(selector) || []);
      if (!nodes || nodes.length <= 1) return;

      var keep = null;
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (!n || !n.closest) continue;
        if (!n.closest("#container-wrap")) {
          keep = n;
          break;
        }
      }
      if (!keep) keep = nodes[0];

      for (var j = 0; j < nodes.length; j++) {
        var node = nodes[j];
        if (!node || node === keep) continue;
        if (node.parentNode) node.parentNode.removeChild(node);
      }
    }

    function removeAllNodes(selector) {
      var nodes = document.querySelectorAll(selector);
      for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        if (n && n.parentNode) n.parentNode.removeChild(n);
      }
    }

    function dedupeMessage2UpsShells() {
      removeDuplicateNodesPreferHeader(".ups-hero-shell");
      removeDuplicateNodesPreferHeader(".ups-hotlinks-shell");
      removeAllNodes("#upsMarquee, .ups-marquee-shell");
      removeDuplicateNodesPreferHeader("#upsDevBanner");
    }

    function getEmbeddedFrame() {
      return (
        document.querySelector(
          'iframe[src*="mfl_hpm16_contractcommandcenter.html"], iframe[src*="contractcommandcenter"], iframe[src*="/site/ccc/"]'
        ) || null
      );
    }

    function getCccReleaseRef() {
      // Keep CCC on latest main by default, even when other modules are pinned.
      // Set `window.UPS_CCC_RELEASE_SHA` to pin CCC explicitly when needed.
      var releaseRef = safeStr(window.UPS_CCC_RELEASE_SHA || window.UPS_RELEASE_SHA || "main") || "main";
      return encodeURIComponent(releaseRef);
    }

    var CCC_MAIN_IFRAME_URL =
      "https://rawcdn.githack.com/keithcreelman/upsmflproduction/" +
      getCccReleaseRef() +
      "/site/ccc/mfl_hpm16_contractcommandcenter.html";

    function normalizeEmbeddedFrameToMain(frame) {

<script>
  // Show current franchise identity (icon + team name) in the Hotlinks header.
  (function () {
    function pad4(v) {
      var d = String(v || "").replace(/\D/g, "");
      return d ? d.padStart(4, "0").slice(-4) : "";
    }

    function tryUrlParam(name) {
      try {
        var u = new URL(window.location.href);
        var v = u.searchParams.get(name);
        return v == null ? "" : String(v);
      } catch (e) {
        return "";
      }
    }

    function getFid() {
      var fid = pad4(window.FRANCHISE_ID || window.franchise_id || "");
      if (fid && fid !== "0000") return fid;

      // Commissioner pages often run as franchise_id=0000.
      // Use URL param or the "Select Franchise" control when present.
      fid = pad4(tryUrlParam("FRANCHISE_ID") || tryUrlParam("FRANCHISE") || tryUrlParam("F") || "");
      if (fid && fid !== "0000") return fid;

      try {
        var sel =
          document.querySelector('form.reportform select[name="FRANCHISE"]') ||
          document.querySelector('form[name="SELECT_FRANCHISE"] select[name="FRANCHISE"]');
        if (sel && sel.value) {
          fid = pad4(sel.value);
          if (fid && fid !== "0000") return fid;
        }
      } catch (e) {}

      return "";
    }

    function getFranchiseName(fid) {
      try {
        var key = "fid_" + fid;
        if (
          window.franchiseDatabase &&
          window.franchiseDatabase[key] &&
          window.franchiseDatabase[key].name
        ) {
          return String(window.franchiseDatabase[key].name || "").trim();
        }
      } catch (e) {}
      // Fallback: read the selected franchise name from the reportform dropdown.
      try {
        var sel =
          document.querySelector('form.reportform select[name="FRANCHISE"]') ||
          document.querySelector('form[name="SELECT_FRANCHISE"] select[name="FRANCHISE"]');
        if (sel && sel.options && sel.selectedIndex >= 0) {
          var opt = sel.options[sel.selectedIndex];
          var txt = opt ? String(opt.text || "").trim() : "";
          if (txt) return txt;
        }
      } catch (e) {}
      return "";
    }

    function isHttpUrl(v) {
      var s = String(v || "").trim();
      return s.indexOf("http://") === 0 || s.indexOf("https://") === 0;
    }

    function candidateIconUrls(fid) {
      var host = window.baseURLStatic || window.baseURLDynamic || (window.location ? window.location.origin : "");
      var lid = "";
      var yr = 0;
      try {
        var u = new URL(window.location.href);
        lid = String(u.searchParams.get("L") || "").trim();
        yr = parseInt(String(u.searchParams.get("YEAR") || ""), 10) || 0;
      } catch (e) {}
      if (!lid) {
        var lm = String(window.location.pathname || "").match(/\/home\/(\d+)(?:\/|$)/i);
        if (lm && lm[1]) lid = String(lm[1]).trim();
      }
      if (!yr) {
        var ym = String(window.location.pathname || "").match(/\/(\d{4})\//);
        if (ym && ym[1]) yr = parseInt(String(ym[1]), 10) || 0;
      }
      if (!lid) lid = String(window.league_id || "").trim();
      if (!yr) yr = parseInt(String(window.year || ""), 10) || 0;
      if (!yr) return [];
      var leagueIds = [];
      function addLeagueId(v) {
        var s = String(v || "").replace(/\D/g, "");
        if (!s || leagueIds.indexOf(s) !== -1) return;
        leagueIds.push(s);
      }
      addLeagueId(lid);
      if (!leagueIds.length) return [];
      var out = [];
      var seen = {};
      function push(url) {
        var s = String(url || "").trim();
        if (!s) return;
        s = s.replace(/^http:\/\//i, "https://");
        if (seen[s]) return;
        seen[s] = 1;
        out.push(s);
      }
      try {
        var key = "fid_" + fid;
        var rec = window.franchiseDatabase && window.franchiseDatabase[key];
        if (rec && isHttpUrl(rec.icon)) push(rec.icon);
        if (rec && isHttpUrl(rec.logo)) push(rec.logo);
      } catch (e) {}
      var bases = [];
      leagueIds.forEach(function (curLid) {
        bases.push(host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic2025/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic2019/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_logo" + fid);
        bases.push(host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_logo" + fid);

        bases.push(host + "/fflnetdynamic2019/" + curLid + "_franchise_logo" + fid);
      });
      bases.forEach(function (b) {
        push(b + ".png");
        push(b + ".jpg");
        push(b + ".jpeg");
        push(b + ".gif");
      });
      return out;
    }

    function setIconWithFallback(img, urls) {
      if (!img) return;
      var list = Array.isArray(urls) ? urls.filter(Boolean) : [];
      if (!list.length) {
        img.style.display = "none";
        img.removeAttribute("src");
        return;
      }
      var i = 0;
      function tryNext() {
        if (i >= list.length) {
          img.removeAttribute("src");
          img.style.display = "none";
          return;
        }
        img.style.display = "";
        img.src = list[i];
        i += 1;
      }
      img.onload = function () {
        img.style.display = "";
      };
      img.onerror = function () {
        tryNext();
      };
      tryNext();
    }

    function initOnce() {
      var wrap = document.getElementById("upsFranchiseIdentity");
      var nameEl = document.getElementById("upsFranchiseName");
      var iconEl = document.getElementById("upsFranchiseIcon");
      if (!wrap || !nameEl || !iconEl) return;

      var fid = getFid();

<script>
  // Rosters page: prepend franchise icon and keep "icon - franchise name" in caption/header.
  (function () {
    function safeStr(v) {
      return v === null || v === undefined ? "" : String(v).trim();
    }

    function htmlEsc(v) {
      return safeStr(v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function pad4(v) {
      var d = safeStr(v).replace(/\D/g, "");
      return d ? d.padStart(4, "0").slice(-4) : "";
    }

    function isRosterPage() {
      var bodyId = safeStr(document.body && document.body.id).toLowerCase();
      if (bodyId.indexOf("body_options_07") === 0) return true;
      try {
        var u = new URL(window.location.href);
        var o = safeStr(u.searchParams.get("O"));

      } catch (e) {}
      return false;
    }

    function isHttpUrl(v) {
      var s = safeStr(v);
      return s.indexOf("http://") === 0 || s.indexOf("https://") === 0;
    }

    function getFidFromTable(table, caption) {
      var cls = safeStr(table && table.className);
      var m = cls.match(/franchise_(\d{1,4})/);
      if (m) return pad4(m[1]);
      var capLink =
        (caption && caption.querySelector("a[class*='franchise_']")) ||
        (table && table.querySelector("caption a[class*='franchise_']"));
      if (capLink) {
        var capClass = safeStr(capLink.className);
        var m2 = capClass.match(/franchise_(\d{1,4})/);
        if (m2) return pad4(m2[1]);
        var href = safeStr(capLink.getAttribute("href"));
        var mHref = href.match(/[?&](?:FRANCHISE_ID|FRANCHISE|F)=([0-9]{1,4})/i);
        if (mHref) return pad4(mHref[1]);
      }
      var tableFid = safeStr(table && table.getAttribute("data-franchise-id"));
      if (tableFid) return pad4(tableFid);

    }

    function candidateIconUrls(fid) {
      if (!fid) return [];
      var host = window.baseURLStatic || window.baseURLDynamic || (window.location ? window.location.origin : "");
      var lid = "";
      var yr = 0;
      try {
        var u = new URL(window.location.href);
        lid = safeStr(u.searchParams.get("L") || "");
        yr = parseInt(safeStr(u.searchParams.get("YEAR") || ""), 10) || 0;
      } catch (e) {}
      if (!lid) {
        var lm = safeStr(window.location.pathname).match(/\/home\/(\d+)(?:\/|$)/i);
        if (lm && lm[1]) lid = safeStr(lm[1]);
      }
      if (!yr) {

        if (ym && ym[1]) yr = parseInt(safeStr(ym[1]), 10) || 0;
      }
      if (!lid) lid = safeStr(window.league_id || "");
      if (!yr) yr = parseInt(safeStr(window.year || ""), 10) || 0;
      if (!yr) return [];
      var leagueIds = [];
      function addLeagueId(v) {
        var s = safeStr(v).replace(/\D/g, "");
        if (!s || leagueIds.indexOf(s) !== -1) return;
        leagueIds.push(s);
      }
      addLeagueId(lid);
      if (!leagueIds.length) return [];
      var out = [];
      var seen = {};
      function push(url) {
        var s = safeStr(url).replace(/^http:\/\//i, "https://");
        if (!s || seen[s]) return;
        seen[s] = 1;
        out.push(s);
      }
      try {
        var key = "fid_" + fid;
        var rec = window.franchiseDatabase && window.franchiseDatabase[key];
        if (rec && isHttpUrl(rec.icon)) push(rec.icon);
        if (rec && isHttpUrl(rec.logo)) push(rec.logo);
      } catch (e) {}
      var bases = [];
      leagueIds.forEach(function (curLid) {
        bases.push(host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic2025/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic2019/" + curLid + "_franchise_icon" + fid);
        bases.push(host + "/fflnetdynamic" + yr + "/" + curLid + "_franchise_logo" + fid);
        bases.push(host + "/fflnetdynamic" + (yr - 1) + "/" + curLid + "_franchise_logo" + fid);

        push(b + ".jpg");

    function setIconWithFallback(img, urls) {
      if (!img) return;
      var list = Array.isArray(urls) ? urls.filter(Boolean) : [];
      if (!list.length) {
        img.style.display = "none";
        img.removeAttribute("src");
        return;
      }
      var i = 0;
      function tryNext() {
        if (i >= list.length) {
          img.removeAttribute("src");
          img.style.display = "none";
          var next = img.nextElementSibling;
          if (next && next.classList && next.classList.contains("ups-roster-franchise-dash")) {
            next.style.display = "none";
          }
          return;
        }
        img.style.display = "";
        img.src = list[i];
        i += 1;
      }
      img.onload = function () {
        img.style.display = "";
        var next = img.nextElementSibling;
        if (next && next.classList && next.classList.contains("ups-roster-franchise-dash")) {
          next.style.display = "";

      };
      img.onerror = function () {

      tryNext();

    function decorateCaption(caption, fid) {
      if (!caption || !fid) return;
      var holder = caption.querySelector("a") || caption.querySelector("span") || caption;
      if (!holder) return;
      var name = safeStr(holder.getAttribute("data-ups-franchise-name") || holder.textContent || "");
      if (!name) return;
      holder.setAttribute("data-ups-franchise-name", name);

      if (caption.classList.contains("ups-roster-caption") && holder.querySelector(".ups-roster-franchise-name")) {
        return;

      caption.classList.add("ups-roster-caption");

      var img = document.createElement("img");
      img.className = "ups-roster-franchise-icon";
      img.alt = name + " icon";
      setIconWithFallback(img, candidateIconUrls(fid));

      var dash = document.createElement("span");
      dash.className = "ups-roster-franchise-dash";
      dash.textContent = "-";

      var label = document.createElement("span");
      label.className = "ups-roster-franchise-name";
      label.textContent = name;

      holder.appendChild(img);
      holder.appendChild(dash);
      holder.appendChild(label);
    }

    function applyRosterFranchiseHeaders() {
      if (!isRosterPage()) return;
      var captions = document.querySelectorAll("caption");
      for (var i = 0; i < captions.length; i += 1) {
        var caption = captions[i];
        var table = caption.closest("table");
        var fid = getFidFromTable(table, caption);
        if (!fid) continue;
        decorateCaption(caption, fid);
      }

    function init() {
      if (!isRosterPage()) return;
      var attempts = 0;
      var timer = setInterval(function () {
        attempts += 1;
        applyRosterFranchiseHeaders();
        if (attempts >= 20) clearInterval(timer);
      }, 350);

      var root = document.getElementById("MFLroster") || document.body;
      if (!root || !window.MutationObserver) return;
      var observer = new MutationObserver(function () {
        applyRosterFranchiseHeaders();
      });
      observer.observe(root, { childList: true, subtree: true });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
</script>


<script>
/* Franchise Abilities (O=93): if MFL's horizontal/frozen-table wrapper paints over the
   controls under our theme, flatten it back to a plain scrollable table so checkboxes
   remain visible and usable. */
(function () {
  function isFranchiseAbilitiesPage() {
    return !!(document.body && document.body.id === "body_options_93");
  }

  function scoreTable(table) {
    if (!table) return -1;
    var checkboxes = table.querySelectorAll('input[type="checkbox"]').length;
    var inputs = table.querySelectorAll("input, select, textarea").length;
    var labels = table.querySelectorAll("label").length;
    var cells = table.querySelectorAll("td, th").length;
    return (checkboxes * 10) + (inputs * 4) + (labels * 2) + Math.min(cells, 500);
  }

  function bestInteractiveTable(root) {
    if (!root) return null;
    var tables = Array.prototype.slice.call(root.querySelectorAll("table"));
    if (!tables.length) return null;
    var best = null;
    var bestScore = -1;
    tables.forEach(function (t) {
      var s = scoreTable(t);
      if (s > bestScore) {
        bestScore = s;
        best = t;
      }
    });
    if (!(bestScore > 0 && best)) return null;
    var checkboxCount = best.querySelectorAll('input[type="checkbox"]').length;
    var inputCount = best.querySelectorAll("input, select, textarea").length;
    if (checkboxCount < 4 && inputCount < 4) return null;
    return best;
  }

  function scoreFranchiseTable(table) {
    if (!table) return -1;
    var imgs = table.querySelectorAll("img").length;
    var checkboxes = table.querySelectorAll('input[type="checkbox"]').length;
    var cells = table.querySelectorAll("td, th").length;
    var rows = table.querySelectorAll("tr").length;
    var txt = String(table.textContent || "").replace(/\s+/g, " ").toLowerCase();
    var hasFranchiseHeader = txt.indexOf("franchise") >= 0;
    return (imgs * 25) + (hasFranchiseHeader ? 30 : 0) + Math.min(cells, 200) + Math.min(rows * 2, 80) - (checkboxes * 8);
  }

  function bestFranchiseTable(root, exclude) {
    if (!root) return null;
    var tables = Array.prototype.slice.call(root.querySelectorAll("table"));
    var best = null;
    var bestScore = -1;
    tables.forEach(function (t) {
      if (!t || t === exclude) return;
      var s = scoreFranchiseTable(t);
      if (s > bestScore) {
        bestScore = s;
        best = t;
      }
    });
    // Require a meaningful image-bearing table to avoid grabbing another header clone.
    if (!best) return null;
    if (best.querySelectorAll("img").length < 2) return null;
    return best;
  }

  function nearestFranchiseSiblingTable(wrap, exclude) {
    if (!wrap || !wrap.parentNode) return null;
    var parent = wrap.parentNode;
    var siblings = Array.prototype.slice.call(parent.children || []);
    var best = null;
    var bestScore = -1;
    siblings.forEach(function (node) {
      if (!node || node === wrap) return;
      if (node.nodeType !== 1) return;
      var tables = node.tagName === "TABLE" ? [node] : Array.prototype.slice.call(node.querySelectorAll ? node.querySelectorAll("table") : []);
      tables.forEach(function (t) {
        if (!t || t === exclude) return;
        var cls = String(t.className || "");
        // Favor MFL frozen/hz helper tables.
        var hzBoost = /(^|\\s)hz[-_]/i.test(cls) || /hz-/i.test(cls) ? 40 : 0;
        var score = scoreFranchiseTable(t) + hzBoost;
        if (score > bestScore) {
          bestScore = score;
          best = t;
        }
      });
    });
    if (!best) return null;
    if (best.querySelectorAll("img").length < 2) return null;
    return best;
  }

  function scrubInlineLayout(root) {
    if (!root) return;
    var descendants = root.querySelectorAll("*");
    Array.prototype.forEach.call(descendants, function (el) {
      // Remove inline layout constraints that come from frozen-table clones.
      if (!el || !el.style) return;
      if (el.tagName === "INPUT" || el.tagName === "SELECT" || el.tagName === "TEXTAREA") return;
      if (el.tagName === "IMG") return;
      el.style.left = "";
      el.style.top = "";
      el.style.right = "";
      el.style.bottom = "";
      el.style.transform = "";
      el.style.position = "";
      el.style.zIndex = "";
      el.style.width = "";
      el.style.height = "";
      el.style.minWidth = "";
      el.style.maxWidth = "";
      el.style.minHeight = "";
      el.style.maxHeight = "";
      el.style.overflow = "";
      el.style.clip = "";
      el.style.clipPath = "";
      el.style.opacity = "";
      el.style.visibility = "";
    });
  }

  function flattenWrapper(wrap) {
    if (!wrap || wrap.dataset.upsO93Flattened === "1") return;
    var table = bestInteractiveTable(wrap);
    if (!table) return;
    var franchiseTable = bestFranchiseTable(wrap, table);
    var franchiseSiblingTable = null;
    if (!franchiseTable || franchiseTable === table) {
      franchiseSiblingTable = nearestFranchiseSiblingTable(wrap, table);
      franchiseTable = franchiseSiblingTable || franchiseTable;
    }

    // Preserve the real interactive table and remove the frozen/overlay clones.
    wrap.dataset.upsO93Flattened = "1";
    wrap.classList.add("ups-o93-plain-wrap");
    wrap.classList.remove("hz-table-scroll");

    var nextRoot = table;
    if (franchiseTable && franchiseTable !== table) {
      var grid = document.createElement("div");
      grid.className = "ups-o93-plain-grid";
      var left = document.createElement("div");
      left.className = "ups-o93-plain-left";
      var right = document.createElement("div");
      right.className = "ups-o93-plain-main";
      if (franchiseSiblingTable && franchiseSiblingTable === franchiseTable) {
        left.appendChild(franchiseTable.cloneNode(true));
      } else {
        left.appendChild(franchiseTable);
      }
      right.appendChild(table);
      grid.appendChild(left);
      grid.appendChild(right);
      nextRoot = grid;
    }

    try {
      wrap.replaceChildren(nextRoot);
    } catch (e) {
      while (wrap.firstChild) wrap.removeChild(wrap.firstChild);
      wrap.appendChild(nextRoot);
    }

    try { wrap.removeAttribute("style"); } catch (e) {}
    try { table.removeAttribute("style"); } catch (e) {}
    if (franchiseTable && franchiseTable !== table && !franchiseSiblingTable) {
      try { franchiseTable.removeAttribute("style"); } catch (e) {}
    }
    scrubInlineLayout(wrap);
  }

  function repair() {
    if (!isFranchiseAbilitiesPage()) return;
    var wraps = document.querySelectorAll(".mobile-wrap.hz-table-scroll, .mobile-wrap.ups-o93-plain-wrap");
    Array.prototype.forEach.call(wraps, function (wrap) {
      if (wrap.classList.contains("ups-o93-plain-wrap")) return;
      flattenWrapper(wrap);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", repair);
  } else {
    repair();
  }

  var attempts = 0;
  var timer = setInterval(function () {
    attempts += 1;
    repair();
    if (attempts >= 40) clearInterval(timer);
  }, 250);

  if (window.MutationObserver) {
    var root = document.body || document.documentElement;
    if (root) {
      var obs = new MutationObserver(function () { repair(); });
      try { obs.observe(root, { childList: true, subtree: true }); } catch (e) {}
      setTimeout(function () { try { obs.disconnect(); } catch (e) {} }, 15000);
    }
  }
})();
</script>

    function getActiveLeagueId() {

      var pathLeague = "";
      var globalLeague = typeof league_id !== "undefined" && league_id ? safeStr(league_id) : "";
      var m = safeStr(window.location.pathname).match(/\/home\/(\d+)(?:\/|$)/i);
      if (m && m[1]) pathLeague = safeStr(m[1]);
      try {
        var u = new URL(window.location.href);

      var m = safeStr(window.location.pathname).match(/\/(\d{4})\//);
      if (m && m[1]) return safeStr(m[1]);

    function pendingActionKey() {

    function savePendingAction(action, item) {

          years: Math.max(1, Math.min(2, parseInt(item && item.years, 10) || 1)),

          playerId: safeStr(parsed.playerId),

          years: yearsCell.textContent,
          status: statusCell.textContent,
          info: infoCell.textContent

        rosterEligibilityByPid.set(pid, {
          playerId: pid,
          playerName: safeStr(playerLink.textContent),
          franchiseId: fid,
          years: parseInt(contract.years, 10) || 0,
          salary: parseMoney(contract.salary),
          status: safeStr(contract.status),
          info: safeStr(contract.info),
          extensionEligible: elig.extensionEligible,
          restructureEligible: elig.restructureEligible

      });

      var rows = Array.from(document.querySelectorAll("#body_options_07 tr"));

        if (!info) return;
        if (!info.extensionEligible && !info.restructureEligible) return;

        var wrap = document.createElement("span");
        wrap.className = "ccc-quick-actions";

          var rs = document.createElement("button");
          rs.type = "button";
          rs.className = "ccc-action-btn rs";

    function renderPopupQuickActions() {

      if (!popup) return;

      var pid = extractPopupPid(popup);

      var info = rosterEligibilityByPid.get(pid);

      if (!info || (!info.extensionEligible && !info.restructureEligible)) {
        if (existing) existing.remove();

      }

      var panel = existing || document.createElement("div");
      panel.id = "cccPopupQuickActions";
      panel.className = "ccc-popup-actions";

          '" data-ccc-fid="' +

          '">Extension</button>';

        html +=
          '<button type="button" class="ccc-action-btn rs" data-ccc-action="restructure" data-ccc-pid="' +
          pid +
          '" data-ccc-fid="' +
          (info.franchiseId || "") +

      var pid = safeStr(btn.getAttribute("data-ccc-pid"));
      var fid = pad4(btn.getAttribute("data-ccc-fid"));

        playerId: pid,
        franchiseId: fid,

        src.searchParams.set("L", safeStr(getActiveLeagueId()));
        src.searchParams.set("YEAR", safeStr(getActiveYear()));

        var hashQs = new URLSearchParams((location.hash || "").replace(/^#/, ""));
        var actionQuery = safeStr(qs.get("cccAction")) || safeStr(hashQs.get("cccAction"));
        var playerQuery = safeStr(qs.get("cccPlayer")) || safeStr(hashQs.get("cccPlayer"));
        var franchiseQuery = safeStr(qs.get("cccFranchise")) || safeStr(hashQs.get("cccFranchise"));
        var seasonQuery = safeStr(qs.get("cccSeason")) || safeStr(hashQs.get("cccSeason"));
        var yearsQuery = safeStr(qs.get("cccYears")) || safeStr(hashQs.get("cccYears"));

        var hasQueryAction = !!(actionQuery && playerQuery);
        var pending = hasQueryAction ? null : getPendingAction();

        if (hasQueryAction) {
          src.searchParams.set("cccAction", actionQuery);
          src.searchParams.set("cccPlayer", playerQuery);
          if (franchiseQuery) src.searchParams.set("cccFranchise", franchiseQuery);
          if (seasonQuery) src.searchParams.set("cccSeason", seasonQuery);
          if (yearsQuery) src.searchParams.set("cccYears", yearsQuery);
        } else if (pending) {
          src.searchParams.set("cccAction", pending.action);
          src.searchParams.set("cccPlayer", pending.playerId);
          if (pending.franchiseId) src.searchParams.set("cccFranchise", pending.franchiseId);
          src.searchParams.set("cccSeason", safeStr(getActiveYear()));
          if (pending.action === "extension") src.searchParams.set("cccYears", safeStr(pending.years));
          clearPendingAction();

        frame.setAttribute("src", src.toString());
      } catch (e) {}

      window.addEventListener("message", function (event) {
        if (!event || !event.data) return;

        if (event.data.type === "ccc-height") {
          var h = Number(event.data.height || 0);
          if (h > 0) {
            var next = Math.max(960, Math.ceil(h));
            var now = parseInt(String(frame.style.height || "0").replace(/[^0-9]/g, ""), 10) || 0;
            if (Math.abs(next - now) >= 2) frame.style.height = next + "px";
          }

      });
    }

    function initRosterEnhancements() {
      if (!enableRosterContractActions) return;
      if (document.body.id !== "body_options_07") return;

      var attempts = 0;
      var timer = setInterval(function () {
        attempts += 1;
        scanRosterEligibility();
        renderRosterQuickActions();
        renderPopupQuickActions();
        if (attempts >= 18) clearInterval(timer);
      }, 400);

      var observer = new MutationObserver(function () {
        scanRosterEligibility();
        renderRosterQuickActions();
        renderPopupQuickActions();
      });
      observer.observe(document.body, { childList: true, subtree: true });

      document.addEventListener("click", onQuickActionClick, true);
    }

    function init() {
      initRosterEnhancements();
      wireMessage2IframeBridge();

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();

<script>
  // Rosters page: normalize contract details and add roster filters.

    function formatDeltaCompact(n) {
      if (!Number.isFinite(n)) return "";

      var abs = Math.abs(Math.round(n));
      if (abs >= 1000 && abs % 1000 === 0) return sign + String(abs / 1000) + "K";

      if (m && m[1]) return m[1].padStart(4, "0");

      }

      var franchiseMeta = (typeof franchiseDatabase !== "undefined" && franchiseDbKey && franchiseDatabase && franchiseDatabase[franchiseDbKey]) ? franchiseDatabase[franchiseDbKey] : null;

    function sortMetricForRow(row, mode) {
      if (!row) return 0;
      if (mode === "salary_desc" || mode === "salary_asc") {
        var salaryCell = row.querySelector("td.salary");
        return Number(parseMoney(salaryCell && salaryCell.textContent) || 0);
      }
      if (mode === "years_desc" || mode === "years_asc") {
        var yearsCell = row.querySelector("td.contractyear");
        var yearsNum = parseInt(safeStr(yearsCell && yearsCell.textContent), 10);
        return Number.isFinite(yearsNum) ? yearsNum : 0;
      }
      if (mode === "points_desc" || mode === "points_asc") {
        var pointsCell = row.querySelector("td.points");
        var pointsTxt = safeStr(pointsCell && pointsCell.textContent).replace(/,/g, "");
        var pointsNum = parseFloat(pointsTxt);
        return Number.isFinite(pointsNum) ? pointsNum : 0;
      }
      return 0;
    }

    function sortRows(rows, mode) {
      var list = (rows || []).slice();
      if (!list.length) return list;

      if (!mode || mode === "default") {
        list.sort(function (a, b) {
          var ao = parseInt(safeStr(a.getAttribute("data-ups-original-order")), 10);
          var bo = parseInt(safeStr(b.getAttribute("data-ups-original-order")), 10);
          if (!Number.isFinite(ao)) ao = 0;
          if (!Number.isFinite(bo)) bo = 0;
          return ao - bo;
        });
        return list;
      }

      list.sort(function (a, b) {
        if (mode === "name_asc" || mode === "name_desc") {
          var an = safeStr(a.getAttribute("data-ups-player-name"));
          var bn = safeStr(b.getAttribute("data-ups-player-name"));
          var cmpName = an.localeCompare(bn);
          return mode === "name_desc" ? -cmpName : cmpName;
        }

        var av = sortMetricForRow(a, mode);
        var bv = sortMetricForRow(b, mode);
        var cmp = av - bv;
        if (mode === "salary_desc" || mode === "years_desc" || mode === "points_desc") cmp *= -1;
        if (cmp !== 0) return cmp;

        var an2 = safeStr(a.getAttribute("data-ups-player-name"));
        var bn2 = safeStr(b.getAttribute("data-ups-player-name"));
        return an2.localeCompare(bn2);
      });
      return list;
    }

    function replaceRowBlock(tbody, currentRows, nextRows) {
      if (!tbody || !currentRows || !currentRows.length || !nextRows || !nextRows.length) return;
      if (currentRows.length === nextRows.length) {
        var identical = true;
        for (var i = 0; i < currentRows.length; i += 1) {
          if (currentRows[i] !== nextRows[i]) {
            identical = false;
            break;
          }
        }
        if (identical) return;
      }
      var endAnchor = currentRows[currentRows.length - 1].nextSibling;
      var frag = document.createDocumentFragment();
      nextRows.forEach(function (row) { frag.appendChild(row); });
      tbody.insertBefore(frag, endAnchor);
    }

      var allPlayers = Array.from(tbody.querySelectorAll('tr[data-ups-player-row="1"]'));
      if (!allPlayers.length) return;

      var activeRows = allPlayers.filter(function (row) {

      var sortedActive = sortRows(activeRows, mode);

      replaceRowBlock(tbody, taxiRows, sortedTaxi);

    function csvEscape(value) {
      var s = safeStr(value);
      if (s.indexOf('"') !== -1) s = s.replace(/"/g, '""');
      if (/[",\n]/.test(s)) return '"' + s + '"';
      return s;

    function rowsToCsv(rows) {
      if (!rows || !rows.length) return "team_id,team_name,division,player,position,salary,years_left,contract_type,points,bye,special\n";
      var headers = ["team_id","team_name","division","player","position","salary","years_left","contract_type","points","bye","special"];
      var lines = [headers.join(",")];
      rows.forEach(function (row) {
        lines.push(headers.map(function (h) { return csvEscape(row[h]); }).join(","));
      });
      return lines.join("\n") + "\n";
    }

    function downloadTextFile(filename, text, mimeType) {
      var blob = new Blob([text], { type: mimeType || "text/plain;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 0);
    }

    function copyTextToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise(function (resolve, reject) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "readonly");
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          var ok = document.execCommand("copy");
          ta.remove();
          if (ok) resolve();
          else reject(new Error("copy failed"));
        } catch (err) {
          ta.remove();
          reject(err);
        }
      });
    }

          '<div class="ups-roster-toolbar-help">Tip: click options on/off to toggle multiple selections (Cmd/Ctrl still works too). Use Jump To Team for quick navigation.</div>' +
          '<div class="ups-roster-toolbar-status" id="upsRosterToolbarStatus">Showing all players</div>';

        anchor.parentNode.insertBefore(toolbar, anchor);
      }

      if (toolbar.dataset.upsWired !== "1") {
        toolbar.dataset.upsWired = "1";

        var searchInput = toolbar.querySelector("#upsRosterSearch");
        var wireMulti = function (id, stateKey, normalizeFn) {
          var el = toolbar.querySelector(id);
          if (!el) return;

          function commitValues(values) {
            if (stateKey === "teams") {
              if (values.indexOf("__ALL__") !== -1) {
                values = [];
              } else {
                values = values.filter(function (v) { return safeStr(v) !== "__ALL__"; });
              }
            }
            rosterUiState[stateKey] = uniq(values.map(function (v) {
              return normalizeFn ? normalizeFn(v) : safeStr(v);
            }).filter(Boolean));
            saveRosterFilterState();
            applyRosterViewState();
            renderRosterSummaries();
            updateToolbarStatus();
          }

          el.addEventListener("change", function () {
            commitValues(selectedMultiValues(el));
          });

          // Native multi-select requires Cmd/Ctrl to deselect. Toggle on direct click so users
          // can click again to remove a selection.
          el.addEventListener("mousedown", function (evt) {
            var target = evt && evt.target;
            if (!target || target.tagName !== "OPTION") return;
            if (target.disabled || safeStr(target.getAttribute("data-ups-group-header")) === "1") return;

            // Let keyboard/multi-modifier behavior work normally when explicitly used.
            if (evt.metaKey || evt.ctrlKey || evt.shiftKey || evt.altKey) return;

            evt.preventDefault();

            var priorScrollTop = el.scrollTop;
            var wasSelected = !!target.selected;
            target.selected = !wasSelected;

            // "All Teams" is exclusive; selecting it clears others visually before commit.
            if (stateKey === "teams" && safeStr(target.value) === "__ALL__" && target.selected) {
              Array.prototype.forEach.call(el.options || [], function (opt) {
                if (opt !== target) opt.selected = false;
              });
            } else if (stateKey === "teams" && safeStr(target.value) !== "__ALL__" && target.selected) {
              Array.prototype.forEach.call(el.options || [], function (opt) {
                if (safeStr(opt.value) === "__ALL__") opt.selected = false;
              });
            }

            el.focus();
            el.scrollTop = priorScrollTop;
            commitValues(selectedMultiValues(el));
          });
        };

        if (searchInput) {
          searchInput.addEventListener("input", function () {
            rosterUiState.search = lowerText(searchInput.value || "");
            saveRosterFilterState();
            applyRosterViewState();
            renderRosterSummaries();
            updateToolbarStatus();
          });
        }

        var sortInput = toolbar.querySelector("#upsRosterSort");
        if (sortInput) {
          sortInput.addEventListener("change", function () {
            rosterUiState.sort = safeStr(sortInput.value || "default").toLowerCase() || "default";
            saveRosterFilterState();
            applyRosterViewState();
            renderRosterSummaries();
            updateToolbarStatus();
          });
        }

        var jumpInput = toolbar.querySelector("#upsRosterJump");
        if (jumpInput) {
          jumpInput.addEventListener("change", function () {
            var fid = safeStr(jumpInput.value);
            if (!fid) return;
            var table = document.querySelector('#body_options_07 table.report[data-ups-team-id="' + fid + '"]');
            if (!table) return;
            setTeamCollapsed(table, false);
            applyRosterViewState();
            var card = table.closest(".mobile-wrap") || table;
            try {
              card.scrollIntoView({ behavior: "smooth", block: "start" });
            } catch (e) {
              card.scrollIntoView(true);
            }
            jumpInput.value = "";
          });
        }

        wireMulti("#upsRosterTeams", "teams", function (v) { return safeStr(v); });
        wireMulti("#upsRosterPositions", "positions", function (v) { return safeStr(v).toUpperCase(); });
        wireMulti("#upsRosterYears", "years", function (v) { return safeStr(v); });
        wireMulti("#upsRosterTypes", "contractTypes", function (v) { return lowerText(v); });
      }

      syncToolbarFilterControls(toolbar);

      var searchInputNow = toolbar.querySelector("#upsRosterSearch");
      if (searchInputNow && searchInputNow.value !== rosterUiState.search) searchInputNow.value = rosterUiState.search;
      var sortInputNow = toolbar.querySelector("#upsRosterSort");
      if (sortInputNow && sortInputNow.value !== rosterUiState.sort) sortInputNow.value = rosterUiState.sort || "default";

      toolbar.classList.toggle("is-filtering", isFilterActive());
      return toolbar;
    }

    function updateToolbarStatus() {
      var toolbar = document.getElementById("upsRosterToolbar");
      if (!toolbar) return;
      var status = toolbar.querySelector("#upsRosterToolbarStatus");
      if (!status) return;

      var allRows = Array.from(document.querySelectorAll("#body_options_07 table.report tr"));
      var totalPlayers = 0, matchedPlayers = 0;
      var matchedActive = 0, matchedTaxi = 0, matchedIr = 0;
      var matchedY3 = 0, matchedY2 = 0, matchedY1 = 0;

      allRows.forEach(function (row) {
        if (!row.querySelector("td.player")) return;
        totalPlayers += 1;
        var match = rowMatchesFilters(row);
        if (!match) return;
        matchedPlayers += 1;

        var isTaxi = row.getAttribute("data-ups-taxi-row") === "1";
        var isIr = !!(row.classList && row.classList.contains("IRtoggle"));
        if (isTaxi) matchedTaxi += 1;
        else if (isIr) matchedIr += 1;
        else matchedActive += 1;

        var yb = safeStr(row.getAttribute("data-ups-contract-years-bucket") || "");
        if (yb === "3") matchedY3 += 1;
        else if (yb === "2") matchedY2 += 1;
        else if (yb === "1") matchedY1 += 1;
      });

      var parts = [];
      if (isFilterActive()) {
        parts.push(String(matchedPlayers) + " / " + String(totalPlayers) + " players");
      } else {
        parts.push(String(totalPlayers) + " players");
      }
      parts.push("Active " + String(matchedActive));
      parts.push("Taxi " + String(matchedTaxi));
      parts.push("IR " + String(matchedIr));
      parts.push("Contract Years: 3yr " + String(matchedY3) + ", 2yr " + String(matchedY2) + ", 1yr " + String(matchedY1));
      if (rosterUiState.teams && rosterUiState.teams.length) parts.push("Teams: " + rosterUiState.teams.length);
      if (rosterUiState.positions && rosterUiState.positions.length) parts.push("Pos: " + rosterUiState.positions.join(", "));
      if (rosterUiState.years && rosterUiState.years.length) parts.push("Years: " + rosterUiState.years.join(", "));
      if (rosterUiState.contractTypes && rosterUiState.contractTypes.length) parts.push("Types: " + rosterUiState.contractTypes.length);
      if (rosterUiState.sort && rosterUiState.sort !== "default") parts.push("Sort: " + rosterUiState.sort.replace(/_/g, " "));
      if (rosterUiState.search) parts.push('"' + rosterUiState.search + '"');
      status.textContent = parts.join(" • ");
    }

    function isFilterActive() {
      return !!(
        rosterUiState.search ||
        (rosterUiState.positions && rosterUiState.positions.length) ||
        (rosterUiState.teams && rosterUiState.teams.length) ||
        (rosterUiState.years && rosterUiState.years.length) ||
        (rosterUiState.contractTypes && rosterUiState.contractTypes.length)
      );
    }

    function parseContractParts(raw) {
      var out = { chips: [], extras: [] };
      if (!raw) return out;

      var parts = raw.split("|").map(function (p) { return safeStr(p); }).filter(Boolean);
      if (!parts.length) {
        out.extras.push(raw);
        return out;
      }

      parts.forEach(function (part) {
        var lower = part.toLowerCase();
        var value = "";

        if (/^cl\b/i.test(part)) {
          value = textAfterPrefix(part, /^cl\s*(.*)$/i);
          out.chips.push({ label: "CL", value: value || "?", tone: "neutral" });
          return;
        }
        if (/^tcv\b/i.test(part)) {
          value = textAfterPrefix(part, /^tcv\s*(.*)$/i);
          out.chips.push({ label: "TCV", value: value || "?", tone: "neutral" });
          return;
        }
        if (/^aav\b/i.test(part)) {
          value = textAfterPrefix(part, /^aav\s*(.*)$/i);
          out.chips.push({ label: "AAV", value: value || "?", tone: "neutral" });
          return;
        }
        if (/^ext\s*:/i.test(part)) {
          value = textAfterPrefix(part, /^ext\s*:\s*(.*)$/i);
          out.chips.push({ label: "Ext", value: value || "Yes", tone: "accent" });
          return;
        }
        if (/^gtd\s*:/i.test(part)) {
          value = textAfterPrefix(part, /^gtd\s*:\s*(.*)$/i);
          out.chips.push({ label: "GTD", value: value || "Yes", tone: "accent" });
          return;
        }
        if (lower.indexOf("option eligible") !== -1) {
          out.chips.push({ label: "Option", value: "Eligible", tone: "accent" });
          return;
        }
        if (lower.indexOf("no further extension") !== -1 || lower.indexOf("no further extensions") !== -1) {
          out.chips.push({ label: "Ext", value: "Locked", tone: "accent" });
          return;
        }
        if (/^y\d+\s*-/i.test(part)) {
          out.extras.push(part);
          return;
        }

        out.extras.push(part);
      });

      return out;
    }

    function makeChip(token) {
      var chip = document.createElement("span");
      chip.className = "ups-contract-chip" + (token.tone === "accent" ? " is-accent" : "");

      var label = document.createElement("span");
      label.className = "ups-contract-chip-label";
      label.textContent = safeStr(token.label);

      var val = document.createElement("span");
      val.className = "ups-contract-chip-value";
      val.textContent = safeStr(token.value);

      chip.appendChild(label);
      chip.appendChild(val);
      return chip;
    }

    function enhanceContractInfoCell(cell) {
      if (!cell || cell.dataset.upsContractUi === "1") return;

      var raw = normalizeText(cell.textContent || "");
      if (!raw) {
        cell.dataset.upsContractUi = "1";
        cell.classList.add("ups-contractinfo-cell", "is-empty");
        return;
      }

      var parsed = parseContractParts(raw);
      if (!parsed.chips.length && !parsed.extras.length) {
        cell.dataset.upsContractUi = "1";
        return;
      }

      cell.dataset.upsContractUi = "1";
      cell.classList.add("ups-contractinfo-cell");
      cell.setAttribute("title", raw);
      cell.textContent = raw;
    }

    function ensureTaxiHeaderButton(table, row, count) {
      if (!table || !row) return;
      var cell = row.querySelector("th,td");
      if (!cell) return;

      row.setAttribute("data-ups-taxi-header", "1");
      row.classList.add("ups-roster-taxi-header-row");

      var rawLabel = safeStr(cell.getAttribute("data-ups-taxi-label") || "");
      if (!rawLabel) {
        rawLabel = normalizeText(cell.textContent || "") || "Taxi Squad";
        cell.setAttribute("data-ups-taxi-label", rawLabel);
      }

      var btn = cell.querySelector(".ups-roster-taxi-toggle");
      if (!btn) {
        cell.textContent = "";
        btn = document.createElement("button");
        btn.type = "button";
        btn.className = "ups-roster-taxi-toggle";

        var left = document.createElement("span");
        left.className = "ups-roster-taxi-left";

        var caret = document.createElement("span");

        left.appendChild(label);

      btn.querySelector(".ups-roster-taxi-count").textContent = "";
