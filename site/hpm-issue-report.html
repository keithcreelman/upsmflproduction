<style>
  .ups-issue-embed-shell {
    margin: 0.75rem auto;
    max-width: 1220px;
    border: 1px solid rgba(239, 68, 68, 0.55);
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(30, 8, 12, 0.95), rgba(20, 6, 9, 0.95));
    overflow: hidden;
  }

  .ups-issue-embed-head {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 12px;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(239, 68, 68, 0.35);
  }

  .ups-issue-embed-title {
    margin: 0;
    color: #ffe8ea;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .ups-issue-embed-frame {
    display: block;
    width: 100%;
    min-height: 860px;
    border: 0;
    background: transparent;
  }
</style>

<div class="ups-issue-embed-shell">
  <div class="ups-issue-embed-head">
    <p class="ups-issue-embed-title">Report Website Functionality Issue</p>
  </div>
  <iframe
    id="upsIssueEmbedFrame"
    class="ups-issue-embed-frame"
    title="UPS Issue Report Form"
    loading="lazy"
    scrolling="no"></iframe>
</div>

<script>
  (function () {
    function safeStr(v) {
      return String(v || "").trim();
    }

    function readCookie(name) {
      try {
        var raw = safeStr(document.cookie || "");
        if (!raw) return "";
        var parts = raw.split(";");
        for (var i = 0; i < parts.length; i++) {
          var p = safeStr(parts[i]);
          if (!p) continue;
          var eq = p.indexOf("=");
          var key = eq >= 0 ? safeStr(p.slice(0, eq)) : safeStr(p);
          if (key !== name) continue;
          var val = eq >= 0 ? safeStr(p.slice(eq + 1)) : "";
          try {
            return decodeURIComponent(val);
          } catch (e) {
            return val;
          }
        }
      } catch (e) {}
      return "";
    }

    function detectLeagueId() {
      try {
        var u = new URL(window.location.href);
        var byQuery = safeStr(
          u.searchParams.get("L") ||
          u.searchParams.get("league_id") ||
          ""
        ).replace(/\D/g, "");
        if (byQuery) return byQuery;
      } catch (e) {}
      var byPath = safeStr((safeStr(window.location.pathname).match(/\/home\/(\d+)(?:\/|$)/i) || [])[1]).replace(/\D/g, "");
      if (byPath) return byPath;
      var byGlobal = safeStr(window.league_id || window.LEAGUE_ID || "").replace(/\D/g, "");
      if (byGlobal) return byGlobal;
      return "";
    }

    function detectYear() {
      try {
        var u = new URL(window.location.href);
        var byQuery = safeStr(
          u.searchParams.get("YEAR") ||
          u.searchParams.get("season") ||
          ""
        ).replace(/\D/g, "");
        if (byQuery) return byQuery;
      } catch (e) {}
      var byPath = safeStr((safeStr(window.location.pathname).match(/\/(\d{4})\//) || [])[1]).replace(/\D/g, "");
      if (byPath) return byPath;
      var byGlobal = safeStr(window.year || window.YEAR || "").replace(/\D/g, "");
      if (byGlobal) return byGlobal;
      return String(new Date().getFullYear());
    }

    function detectFranchiseId() {
      try {
        var u = new URL(window.location.href);
        var byQuery = safeStr(
          u.searchParams.get("FRANCHISE_ID") ||
          u.searchParams.get("FRANCHISEID") ||
          u.searchParams.get("franchise_id") ||
          u.searchParams.get("F") ||
          ""
        ).replace(/\D/g, "");
        if (byQuery) return byQuery.padStart(4, "0").slice(-4);
      } catch (e) {}
      var byGlobal = safeStr(window.franchise_id || window.FRANCHISE_ID || "").replace(/\D/g, "");
      if (byGlobal) return byGlobal.padStart(4, "0").slice(-4);
      return "";
    }

    function detectMflUserId() {
      try {
        var u = new URL(window.location.href);
        var byQuery = safeStr(
          u.searchParams.get("MFL_USER_ID") ||
          u.searchParams.get("MFLUSERID") ||
          u.searchParams.get("mfl_user_id") ||
          ""
        );
        if (byQuery) return byQuery;
      } catch (e) {}
      return safeStr(readCookie("MFL_USER_ID"));
    }

    function detectTheme() {
      try {
        if (typeof window.getUPSMode === "function") return safeStr(window.getUPSMode() || "dark");
      } catch (e) {}
      var attr = safeStr(document.documentElement && document.documentElement.getAttribute("data-ups-mode"));
      return attr || "dark";
    }

    function buildIssueUrl() {
      var releaseRef = encodeURIComponent(
        safeStr(window.UPS_ISSUE_REPORT_RELEASE_SHA || window.UPS_UOW_RELEASE_SHA || window.UPS_RELEASE_SHA || "bddc313") || "bddc313"
      );
      var base =
        "https://rawcdn.githack.com/keithcreelman/upsmflproduction/" +
        releaseRef +
        "/site/ups_issue_report.html";

      var q = [];
      var L = detectLeagueId();
      var YEAR = detectYear();
      if (L) q.push("L=" + encodeURIComponent(L));
      if (YEAR) q.push("YEAR=" + encodeURIComponent(YEAR));
      var fid = detectFranchiseId();
      if (fid) q.push("FRANCHISE_ID=" + encodeURIComponent(fid));
      var uid = detectMflUserId();
      if (uid) q.push("MFL_USER_ID=" + encodeURIComponent(uid));
      var worker = safeStr(window.UPS_WORKER_URL || "");
      if (worker) q.push("WORKER_URL=" + encodeURIComponent(worker));
      var theme = detectTheme();
      if (theme) q.push("THEME=" + encodeURIComponent(theme));
      q.push("OPEN_BUG=1");
      q.push("SOURCE_APP=" + encodeURIComponent("hpm-3"));
      q.push("v=" + encodeURIComponent(String(Date.now())));
      return base + "?" + q.join("&");
    }

    var frame = document.getElementById("upsIssueEmbedFrame");
    if (!frame) return;

    var url = buildIssueUrl();
    frame.src = url;

    window.addEventListener("message", function (e) {
      if (!frame.contentWindow || e.source !== frame.contentWindow) return;
      var data = e && e.data ? e.data : {};
      if (!data || data.type !== "uow-height") return;
      var next = Number(data.height);
      if (!Number.isFinite(next) || next <= 0) return;
      var clamped = Math.max(760, Math.min(2400, Math.ceil(next)));
      frame.style.height = String(clamped) + "px";
    });
  })();
</script>
