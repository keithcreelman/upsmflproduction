<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link id="uowCss" rel="stylesheet" href="./ups_options_widget.css">

<div id="uowApp">
  <div class="uow-hero">
    <div class="uow-hero-copy">
      <div class="uow-title uow-issue-title">UPS Issue Report</div>
      <div class="uow-issue-discord-note">Submitting an issue sends a Discord message to the commissioner.</div>
    </div>
    <div class="uow-hero-actions">
      <button type="button" id="uowBugBtn" class="uow-ghostBtn uow-bugBtn">Report Website Functionality Issue</button>
    </div>
  </div>

  <div class="uow-card">
    <div class="uow-card-head">
      <div class="uow-card-title">Report Website Functionality Issue</div>
    </div>
    <div class="uow-card-body">
      <div class="uow-form-note">This page is for reporting bugs and data issues. Click the red button above to submit a report.</div>
    </div>
  </div>

  <div id="uowBugModal" class="uow-modal" hidden>
    <div id="uowBugBackdrop" class="uow-modal-backdrop"></div>
    <div class="uow-modal-shell" role="dialog" aria-modal="true" aria-labelledby="uowBugTitle">
      <div class="uow-modal-head">
        <h3 id="uowBugTitle">Report Website Functionality Issue</h3>
        <button type="button" id="uowBugClose" class="uow-modal-close" aria-label="Close">X</button>
      </div>
      <form id="uowBugForm" class="uow-modal-body">
        <div class="uow-form-grid">
          <label class="uow-field">
            Module
            <select id="uowBugModule" class="uow-select" required>
              <option value="trade-war-room">Trade War Room</option>
              <option value="workbench">Workbench</option>
              <option value="front-office">Front Office</option>
              <option value="ups-countdown">UPS Countdown</option>
              <option value="other">Other</option>
            </select>
          </label>

          <label class="uow-field">
            Issue Type
            <select id="uowBugType" class="uow-select" required></select>
          </label>
        </div>

        <label class="uow-field">
          Description
          <textarea id="uowBugDetails" class="uow-textarea" rows="4" maxlength="4000" required placeholder="Describe what happened and why it looks incorrect."></textarea>
        </label>

        <label class="uow-field">
          Screenshots
          <div id="uowBugDropzone" class="uow-dropzone">
            <div class="uow-dropzone-text">Attach screenshots. Drag and drop files here, or choose files. Screenshots are required.</div>
            <input id="uowBugScreenshots" class="uow-input" type="file" accept="image/*" multiple>
          </div>
          <div id="uowBugAttachmentList" class="uow-form-note"></div>
        </label>

        <div class="uow-form-note" id="uowBugContextNote"></div>

        <div class="uow-modal-actions">
          <div id="uowBugStatus" class="uow-form-status" aria-live="polite"></div>
          <button type="button" id="uowBugCancel" class="uow-ghostBtn">Cancel</button>
          <button type="submit" id="uowBugSubmit" class="uow-submitBtn">Submit Report</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  (function () {
    var params = new URLSearchParams(window.location.search || "");
    var v = params.get("cache") || params.get("v") || "";
    var qs = v ? "?v=" + encodeURIComponent(v) : "";
    var css = document.getElementById("uowCss");
    if (css) css.href = "./ups_options_widget.css" + qs;
    var s = document.createElement("script");
    s.src = "./ups_options_widget.js" + qs;
    s.defer = true;
    document.body.appendChild(s);
  })();
</script>
