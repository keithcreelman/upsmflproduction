<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050b18"/>
      <stop offset="0.5" stop-color="#081a30"/>
      <stop offset="1" stop-color="#040914"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd700"/>
      <stop offset="0.45" stop-color="#f5b800"/>
      <stop offset="1" stop-color="#a87400"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-weight: 900; letter-spacing: 2px; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 1px; }
      .mono { font-family: Menlo, Monaco, monospace; font-weight: 700; }
    </style>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>

  <rect x="0" y="330" width="1400" height="90" fill="#071a12"/>
  <rect x="0" y="370" width="1400" height="4" fill="#ffffff" opacity="0.25"/>

  <g transform="translate(120,70)" filter="url(#glow)">
    <ellipse cx="140" cy="60" rx="110" ry="40" fill="url(#gold)"/>
    <rect x="30" y="60" width="220" height="120" rx="30" fill="url(#gold)"/>
    <ellipse cx="140" cy="180" rx="110" ry="40" fill="url(#gold)"/>

    <path d="M30 80 C -30 90 -30 170 30 180" fill="none" stroke="#f5c542" stroke-width="18"/>
    <path d="M250 80 C 310 90 310 170 250 180" fill="none" stroke="#f5c542" stroke-width="18"/>

    <rect x="90" y="210" width="100" height="25" rx="6" fill="#2b2b2b"/>
    <rect x="70" y="235" width="140" height="32" rx="6" fill="#111827"/>

    <ellipse cx="140" cy="120" rx="70" ry="38" fill="#6b3418"/>
    <rect x="134" y="95" width="12" height="50" fill="#fff"/>
    <line x1="120" y1="110" x2="160" y2="110" stroke="#fff" stroke-width="3"/>
    <line x1="120" y1="125" x2="160" y2="125" stroke="#fff" stroke-width="3"/>
    <line x1="120" y1="140" x2="160" y2="140" stroke="#fff" stroke-width="3"/>

    <text x="140" y="255" text-anchor="middle" fill="#f8fafc" class="mono" font-size="22">UPS</text>
  </g>

  <g transform="translate(420,120)">
    <text x="0" y="0" fill="#93c5fd" class="sub" font-size="24">
      UPS SALARY CAP DYNASTY LEAGUE
    </text>

    <text x="0" y="80" fill="#f8fafc" class="title" font-size="68">
      CONTRACT COMMAND CENTER
    </text>

    <text x="0" y="120" fill="#cbd5e1" class="sub" font-size="22">
      Extensions | Restructures | Auctions | Cap Tracking
    </text>
  </g>

  <rect x="420" y="280" width="820" height="6" rx="3" fill="url(#accent)"/>

  <g transform="translate(1120,90)">
    <rect x="0" y="0" width="230" height="230" rx="16" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="115" y="40" text-anchor="middle" fill="#e5e7eb" class="mono" font-size="16">LEAGUE CAP</text>

    <rect x="20" y="70" width="190" height="38" rx="10" fill="#0f213a"/>
    <text x="30" y="94" fill="#22c55e" class="mono" font-size="14">TCV</text>

    <rect x="20" y="120" width="190" height="38" rx="10" fill="#0f213a"/>
    <text x="30" y="144" fill="#60a5fa" class="mono" font-size="14">AAV</text>

    <rect x="20" y="170" width="190" height="38" rx="10" fill="#0f213a"/>
    <text x="30" y="194" fill="#f59e0b" class="mono" font-size="14">YEARS</text>
  </g>
</svg>
