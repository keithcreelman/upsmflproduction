<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UPS Advanced Stats Workbench</title>
<style>
:root{
  --bg:#0b1424; --panel:#13213a; --panel-alt:#1a2a45; --border:#2a3e60;
  --border-strong:#3b5280; --text:#e8effa; --muted:#9fb3d1; --accent:#6aa8ff;
  --ok:#5bd9a2; --warn:#f0c465; --err:#ff7b7b; --smash:#73e68c; --hit:#7cb3ff;
  --contrib:#a8a8a8; --bust:#e07a7a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.asw-shell{max-width:1400px;margin:0 auto;padding:12px}
h1{margin:0 0 8px;font-size:18px;letter-spacing:.02em}
.asw-subtitle{color:var(--muted);font-size:11px;margin-bottom:12px}

/* Primary position tabs — grouped by phase (Offense / Defense / Special) */
.asw-tabs{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--panel);padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.asw-tabs-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-right:4px;padding-left:6px}
.asw-tabs-label:first-child{padding-left:0}
.asw-tab{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:.1s}
.asw-tab:hover{border-color:var(--border-strong)}
.asw-tab[aria-pressed="true"]{background:var(--accent);color:#0a1222;border-color:var(--accent)}
.asw-tabs-sep{width:1px;height:18px;background:var(--border);margin:0 4px}

/* Sub-position chips (shown only for DL / DB) */
.asw-subtabs{display:none;gap:4px;align-items:center;background:var(--panel);padding:6px 12px;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;margin:-8px 0 6px}
.asw-subtabs.visible{display:flex}
.asw-subtabs-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:4px}
.asw-subtab{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:11px;cursor:pointer}
.asw-subtab[aria-pressed="true"]{background:var(--accent);color:#0a1222;border-color:var(--accent);font-weight:700}

/* Filter controls row */
.asw-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--panel);padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.asw-controls label{display:flex;flex-direction:column;gap:2px;font-size:11px;color:var(--muted)}
.asw-controls select,.asw-controls input{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;min-width:100px}
.asw-controls input[type="text"]{min-width:160px}
.asw-controls .asw-chip{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:11px;cursor:pointer;transition:.1s}
.asw-controls .asw-chip[aria-pressed="true"]{background:var(--accent);color:#0a1222;border-color:var(--accent);font-weight:700}

/* Column group toggle chips */
.asw-cols-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--panel);padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.asw-cols-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-right:4px}
.asw-col-chip{background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:11px;cursor:pointer;user-select:none;transition:.1s}
.asw-col-chip:hover{border-color:var(--border-strong)}
.asw-col-chip[aria-pressed="true"]{background:var(--accent);color:#0a1222;border-color:var(--accent);font-weight:700}
.asw-cols-spacer{flex:1}
.asw-filter-toggle{background:var(--panel-alt);color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600}
.asw-filter-toggle:hover{border-color:var(--border-strong);color:var(--text)}
.asw-filter-toggle[aria-pressed="true"]{background:var(--accent);color:#0a1222;border-color:var(--accent)}
.asw-filter-clear{background:transparent;color:var(--warn);border:1px solid var(--warn);border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer}
.asw-filter-clear:hover{background:rgba(240,196,101,.08)}

/* Filter row (third thead row with inline inputs under column headers) */
.asw-table tr.asw-filter-row th{position:sticky;background:var(--panel-alt);padding:2px 4px;border-bottom:1px solid var(--border-strong);cursor:default}
.asw-table tr.asw-filter-row th.group-sep{border-left:1px solid var(--border-strong)}
.asw-table tr.asw-filter-row input{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:3px;padding:2px 5px;font-size:11px;width:100%;min-width:55px;font-family:inherit}
.asw-table tr.asw-filter-row input:focus{border-color:var(--accent);outline:none}
.asw-table tr.asw-filter-row input.active{border-color:var(--accent);background:rgba(106,168,255,.08);color:var(--accent)}
.asw-table tr.asw-filter-row input.invalid{border-color:var(--err);color:var(--err)}
.asw-table tr.asw-filter-row input.num-filter{text-align:right;font-variant-numeric:tabular-nums}
/* Column-header active-filter indicator */
.asw-table tr.asw-col-row th.has-filter::before{content:"•";color:var(--accent);margin-right:3px}

.asw-meta{color:var(--muted);font-size:11px;margin-bottom:6px}
.asw-table-wrap{overflow-x:auto;background:var(--panel);border:1px solid var(--border);border-radius:8px}
table.asw-table{width:100%;border-collapse:collapse;font-size:12px}
.asw-table th,.asw-table td{padding:5px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
/* Group header row */
.asw-table tr.asw-group-row th{position:sticky;top:0;background:var(--panel);color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:10px;padding:4px 8px;border-bottom:1px solid var(--border-strong);text-align:center;cursor:default}
.asw-table tr.asw-group-row th.no-group{color:transparent;border-bottom-color:var(--border)}
.asw-table tr.asw-group-row th.group-sep{border-left:1px solid var(--border-strong)}
/* Column header row */
.asw-table tr.asw-col-row th{position:sticky;background:var(--panel-alt);color:var(--muted);font-weight:600;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;user-select:none}
.asw-table tr.asw-col-row th.group-sep{border-left:1px solid var(--border-strong)}
.asw-table th.num,.asw-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.asw-table th[aria-sort="ascending"]::after{content:" ▲";color:var(--accent)}
.asw-table th[aria-sort="descending"]::after{content:" ▼";color:var(--accent)}
.asw-table td.group-sep{border-left:1px solid var(--border-strong)}
.asw-table tbody tr:hover{background:rgba(106,168,255,.06)}
.asw-table td.name{font-weight:600}
.asw-table td.dim{color:var(--muted)}
.asw-empty{padding:40px;text-align:center;color:var(--muted)}
.asw-loading{padding:20px;text-align:center;color:var(--muted);font-style:italic}
.asw-err{padding:12px;color:var(--err);border:1px solid var(--err);border-radius:4px;background:rgba(255,123,123,.05);margin-bottom:8px}
</style>
</head>
<body>
<div class="asw-shell">
<h1>Advanced Stats Workbench</h1>
<div class="asw-subtitle">NFL on-field counts (nflverse) + snap share + PFR advanced. Tab picks the position; chips pick column groups. Player row click opens full profile (coming soon).</div>

<!-- Primary position tabs -->
<div class="asw-tabs" id="asw-tabs">
  <span class="asw-tabs-label">Offense</span>
  <button type="button" class="asw-tab" data-tab="qb">QB</button>
  <button type="button" class="asw-tab" data-tab="rb" aria-pressed="true">RB</button>
  <button type="button" class="asw-tab" data-tab="wr">WR</button>
  <button type="button" class="asw-tab" data-tab="te">TE</button>
  <button type="button" class="asw-tab" data-tab="flex_o">Flex·O</button>
  <span class="asw-tabs-sep"></span>
  <span class="asw-tabs-label">Defense</span>
  <button type="button" class="asw-tab" data-tab="dl">DL</button>
  <button type="button" class="asw-tab" data-tab="lb">LB</button>
  <button type="button" class="asw-tab" data-tab="db">DB</button>
  <button type="button" class="asw-tab" data-tab="flex_idp">Flex·IDP</button>
  <span class="asw-tabs-sep"></span>
  <span class="asw-tabs-label">Special</span>
  <button type="button" class="asw-tab" data-tab="pk">PK</button>
  <button type="button" class="asw-tab" data-tab="pn">PN</button>
</div>

<!-- Sub-position chips (DL/DB only) -->
<div class="asw-subtabs" id="asw-subtabs">
  <span class="asw-subtabs-label">Sub-position</span>
  <!-- chips injected by JS based on active tab -->
</div>

<!-- Filter row -->
<div class="asw-controls">
  <label>Seasons
    <select id="asw-seasons" multiple size="4" style="min-width:110px; max-height:100px"></select>
    <span style="font-size:10px; color:var(--muted)">⌘/Ctrl multi-select</span>
  </label>
  <label>Team
    <select id="asw-team" multiple size="5" style="min-width:180px; max-height:120px">
      <option value="__ALL__" selected>All (league-wide)</option>
      <option value="FA">Free Agents</option>
    </select>
    <span style="font-size:10px; color:var(--muted)">⌘/Ctrl multi-select</span>
  </label>
  <label>Scope
    <div style="display:flex;gap:4px">
      <button type="button" class="asw-chip" data-scope="ups"  aria-pressed="true"  title="NFL regular season only">UPS</button>
      <button type="button" class="asw-chip" data-scope="full" aria-pressed="false" title="Include playoffs">Full</button>
    </div>
  </label>
  <label>Search
    <input type="text" id="asw-search" placeholder="name contains…">
  </label>
</div>

<!-- Column-group toggle chips + filter-row toggle -->
<div class="asw-cols-bar" id="asw-cols-bar">
  <span class="asw-cols-label">Columns</span>
  <!-- group chips injected by JS, then the filter toggle block appended -->
</div>

<div class="asw-meta" id="asw-meta"></div>
<div class="asw-table-wrap"><div id="asw-body"></div></div>
</div>

<script>
(function(){
  "use strict";

  // ---------- Config ----------
  var API_BASE = (typeof window !== "undefined" && window.UPS_ASW_API_BASE) ||
                 "https://upsmflproduction.keith-creelman.workers.dev";
  var THIS_YEAR = new Date().getFullYear();
  var MIN_SEASON = 2011;
  var LEAGUE_ID = "74598";

  // ---------- Column manifest (single source of truth) ----------
  // Each column: label, num, fmt, cls, title, compute? (derived value)
  var COLS = {
    // Identity
    player_name:         { label:"Player",   cls:"name" },
    team:                { label:"NFL",      cls:"dim" },
    mfl_franchise_name:  { label:"MFL Team", cls:"dim",
      compute: function(r){ return r.mfl_franchise_name || "FA"; } },
    position:            { label:"Pos",      cls:"dim" },
    // Usage — offense
    games:               { label:"G",        num:true },
    off_snaps_total:     { label:"Snaps",    num:true, title:"Offensive snaps" },
    off_snap_rate:       { label:"Snap%",    num:true, fmt:"pct0" },
    // Usage — defense
    def_snaps_total:     { label:"Snaps",    num:true, title:"Defensive snaps" },
    def_snap_rate:       { label:"Snap%",    num:true, fmt:"pct0" },
    // Receiving volume
    targets:             { label:"Tgt",      num:true },
    receptions:          { label:"Rec",      num:true },
    rec_yds:             { label:"RecYd",    num:true },
    rec_tds:             { label:"RecTD",    num:true },
    // Receiving efficiency
    y_per_t:             { label:"Y/T",      num:true, fmt:"dec2",
      title:"Yards per target",
      compute: function(r){ return r.targets ? r.rec_yds / r.targets : null; } },
    y_per_r:             { label:"Y/R",      num:true, fmt:"dec1",
      title:"Yards per reception",
      compute: function(r){ return r.receptions ? r.rec_yds / r.receptions : null; } },
    rec_per_t:           { label:"Catch%",   num:true, fmt:"pct",
      compute: function(r){ return r.targets ? r.receptions / r.targets : null; } },
    // Receiving advanced (PFR, season-level)
    receiving_adot:      { label:"ADOT",     num:true, fmt:"dec1",
      title:"Avg Depth of Target (PFR, 2018+, season-level)" },
    receiving_air_yards: { label:"AirYd",    num:true,
      title:"Total air yards on targets (PFR, season-level)" },
    receiving_yac_per_r: { label:"YAC/R",    num:true, fmt:"dec1",
      title:"Yards after catch per reception (PFR, season-level)" },
    receiving_drops:     { label:"Drops",    num:true,
      title:"Receiver drops (PFR, weekly)" },
    receiving_drop_pct:  { label:"Drop%",    num:true, fmt:"pct0",
      title:"Drops as % of targets (PFR, season-level)" },
    receiving_rat:       { label:"Tgt Rat",  num:true, fmt:"dec1",
      title:"QB rating when targeting this player (PFR)" },
    rec_brtkl:           { label:"Rec BrTkl", num:true,
      title:"Receiving broken tackles (PFR, 2018+)",
      compute: function(r){ return r.receiving_broken_tackles; } },
    rec_per_br:          { label:"Rec/Br",   num:true, fmt:"dec1",
      title:"Receptions per broken tackle",
      compute: function(r){ return (r.receiving_broken_tackles||0) > 0 ? r.receptions / r.receiving_broken_tackles : null; } },
    // Rushing volume
    rush_att:            { label:"RuAtt",    num:true },
    rush_yds:            { label:"RuYd",     num:true },
    rush_tds:            { label:"RuTD",     num:true },
    // Rushing efficiency
    y_per_a:             { label:"Y/A",      num:true, fmt:"dec2",
      title:"Yards per carry",
      compute: function(r){ return r.rush_att ? r.rush_yds / r.rush_att : null; } },
    ybc_per_a:           { label:"YBC/A",    num:true, fmt:"dec2",
      title:"Yards before contact per carry (PFR)",
      compute: function(r){ return r.rush_att ? (r.rushing_yards_before_contact||0) / r.rush_att : null; } },
    yac_per_a:           { label:"YAC/A",    num:true, fmt:"dec2",
      title:"Yards after contact per carry (PFR)",
      compute: function(r){ return r.rush_att ? (r.rushing_yards_after_contact||0) / r.rush_att : null; } },
    rush_brtkl:          { label:"Ru BrTkl", num:true,
      title:"Rushing broken tackles (PFR, 2018+)",
      compute: function(r){ return r.rushing_broken_tackles; } },
    att_per_br:          { label:"Att/Br",   num:true, fmt:"dec1",
      title:"Carries per broken tackle",
      compute: function(r){ return (r.rushing_broken_tackles||0) > 0 ? r.rush_att / r.rushing_broken_tackles : null; } },
    // Red zone (requires nfl_player_redzone population — will be NULL until PBP fetch runs)
    rush_att_i20:        { label:"Ru I20",   num:true, title:"Rush attempts inside opponent 20" },
    rush_att_i5:         { label:"GL I5",    num:true, title:"Goal-line rush attempts inside 5" },
    targets_i20:         { label:"Tgt I20",  num:true, title:"Targets inside opponent 20" },
    targets_ez:          { label:"Tgt EZ",   num:true, title:"End-zone targets" },
    rec_i20:             { label:"Rec I20",  num:true, title:"Receptions inside opponent 20" },
    pass_att_i20:        { label:"Pa I20",   num:true, title:"Pass attempts in Red Zone" },
    pass_att_ez:         { label:"Pa EZ",    num:true, title:"Pass attempts targeting End Zone" },
    // Market share — worker computes ratio against team totals; values 0..1
    target_share:        { label:"Tgt%",     num:true, fmt:"pct",
      title:"Share of team targets (player / team total across selected range)" },
    rec_share:           { label:"Rec%",     num:true, fmt:"pct",
      title:"Share of team receptions" },
    rec_yds_share:       { label:"RecYd%",   num:true, fmt:"pct",
      title:"Share of team receiving yards" },
    rush_share:          { label:"Ru%",      num:true, fmt:"pct",
      title:"Share of team rush attempts" },
    rush_yds_share:      { label:"RuYd%",    num:true, fmt:"pct",
      title:"Share of team rush yards" },
    rz_target_share:     { label:"RZ Tgt%",  num:true, fmt:"pct",
      title:"Share of team red-zone targets" },
    rz_rec_share:        { label:"RZ Rec%",  num:true, fmt:"pct",
      title:"Share of team red-zone receptions" },
    ez_target_share:     { label:"EZ Tgt%",  num:true, fmt:"pct",
      title:"Share of team end-zone targets" },
    rz_rush_share:       { label:"RZ Ru%",   num:true, fmt:"pct",
      title:"Share of team red-zone rushing attempts" },
    gl_rush_share:       { label:"GL Ru%",   num:true, fmt:"pct",
      title:"Share of team goal-line (inside-5) rushing attempts" },
    // Passing volume
    pass_att:            { label:"Att",      num:true },
    pass_cmp:            { label:"Cmp",      num:true },
    pass_yds:            { label:"PaYd",     num:true },
    pass_tds:            { label:"PaTD",     num:true },
    cmp_pct:             { label:"Cmp%",     num:true, fmt:"pct",
      compute: function(r){ return r.pass_att ? r.pass_cmp / r.pass_att : null; } },
    ypa:                 { label:"Y/A",      num:true, fmt:"dec1",
      title:"Yards per attempt",
      compute: function(r){ return r.pass_att ? r.pass_yds / r.pass_att : null; } },
    // Passing turnovers / sacks
    pass_ints:           { label:"Int",      num:true },
    int_pct:             { label:"Int%",     num:true, fmt:"pct",
      compute: function(r){ return r.pass_att ? r.pass_ints / r.pass_att : null; } },
    pass_sacks:          { label:"Sacked",   num:true, title:"Times sacked" },
    // Passing advanced (PFR)
    passing_adot:        { label:"ADOT",     num:true, fmt:"dec1", title:"Intended air yards per attempt (PFR, season)" },
    passing_air_yards:   { label:"AirYd",    num:true, title:"Intended air yards total (PFR, season)" },
    passing_yards_after_catch: { label:"YAC", num:true, title:"Total YAC on completions (PFR, season)" },
    passing_bad_throws:  { label:"BadTh",    num:true, title:"Bad throws (PFR, 2018+)" },
    passing_bad_throw_pct:{label:"BadTh%",   num:true, fmt:"pct0" },
    passing_times_pressured:{label:"Press",  num:true, title:"Times pressured" },
    passing_pressure_pct:{ label:"Press%",   num:true, fmt:"pct0" },
    passing_hurries:     { label:"Hurries",  num:true },
    passing_hits:        { label:"QBHits",   num:true, title:"Times QB was hit" },
    passing_drops:       { label:"RecDrops", num:true, title:"Drops by this QB's receivers" },
    // IDP tackles
    def_tackles_total:   { label:"Tkl",      num:true, title:"Solo tackles" },
    def_tackles_ast:     { label:"Ast",      num:true },
    def_tfl:             { label:"TFL",      num:true },
    // IDP pass rush
    def_sacks:           { label:"Sk",       num:true, fmt:"dec1" },
    def_pass_def:        { label:"PD",       num:true },
    def_pressures:       { label:"Press",    num:true, title:"Pass-rush pressures (PFR, 2018+)" },
    def_press_rate:      { label:"Press%",   num:true, fmt:"pct",
      title:"Pressures per defensive snap (PFR, 2018+)",
      compute: function(r){ return r.def_snaps_total ? (r.def_pressures||0) / r.def_snaps_total : null; } },
    // IDP turnovers
    def_ff:              { label:"FF",       num:true },
    def_fr:              { label:"FR",       num:true, title:"Fumble recoveries" },
    def_ints:            { label:"Int",      num:true },
    def_tds:             { label:"DefTD",    num:true },
    // IDP coverage
    def_completions_allowed: { label:"Cmp Allow", num:true },
    def_yards_allowed:   { label:"Yds Allow", num:true },
    def_passer_rating_allowed: { label:"PsRat Allow", num:true, fmt:"dec1" },
    def_adot:            { label:"cADOT",    num:true, fmt:"dec1", title:"ADOT allowed in coverage (PFR)" },
    // IDP missed tackles
    def_missed_tackles:  { label:"Missed",   num:true, title:"Missed tackles (PFR, 2018+)" },
    def_missed_tackle_pct:{label:"Miss%",    num:true, fmt:"pct0" },
    // Kicker
    fg_made:             { label:"FGM",      num:true },
    fg_miss:             { label:"FG Miss",  num:true,
      compute: function(r){ return (r.fg_att||0) - (r.fg_made||0); } },
    fg_pct:              { label:"FG%",      num:true, fmt:"pct",
      compute: function(r){ return r.fg_att ? r.fg_made / r.fg_att : null; } },
    fg_0_39:             { label:"0-39",     cls:"dim",
      compute: function(r){ return r.fg_att_0_39 ? (r.fg_made_0_39||0) + "/" + r.fg_att_0_39 : null; } },
    fg_40_49:            { label:"40-49",    cls:"dim",
      compute: function(r){ return r.fg_att_40_49 ? (r.fg_made_40_49||0) + "/" + r.fg_att_40_49 : null; } },
    fg_50_59:            { label:"50-59",    cls:"dim",
      compute: function(r){ return r.fg_att_50_59 ? (r.fg_made_50_59||0) + "/" + r.fg_att_50_59 : null; } },
    fg_60plus:           { label:"60+",      cls:"dim",
      compute: function(r){ return r.fg_att_60plus ? (r.fg_made_60plus||0) + "/" + r.fg_att_60plus : null; } },
    avg_fg_dist:         { label:"Avg FG",   num:true, fmt:"dec1",
      title:"Avg distance of made FGs (PBP-derived, exact)",
      compute: function(r){
        // Exact avg from PBP when available; fallback to bucket-midpoint
        // approximation for historical weeks where only the aggregated
        // bucket counts exist. fg_made_pbp will be > 0 once PBP ingest runs.
        if ((r.fg_made_pbp||0) > 0) {
          return (r.fg_distance_sum_made||0) / r.fg_made_pbp;
        }
        var m = (r.fg_made_0_39||0) + (r.fg_made_40_49||0) + (r.fg_made_50_59||0) + (r.fg_made_60plus||0);
        if (!m) return null;

  // ---------- Per-column filter expressions ----------
  // Grammar (per cell):
  //   ""          → no filter
  //   "150"       → >= 150  (bare number defaults to >=)
  //   ">150"      → strictly greater
  //   ">=150"     → at least
  //   "<5"/"<=5"  → strict / inclusive less
  //   "=5"        → exact
  //   "150-300"   → inclusive range
  //   "10%" / "10" on a pct column → 0.10
  //   (fallback for string/dim cols) → substring (case-insensitive)
  function buildPredicate(expr, colKey) {
    if (!expr || !expr.trim()) return null;
    var s = expr.trim();
    var def = COLS[colKey] || {};
    var isPct = def.fmt === "pct" || def.fmt === "pct0";
    var isNumCol = !!def.num;

    function toNum(raw) {
      if (raw == null) return null;
      var hadPct = /%$/.test(raw);
      var n = parseFloat(String(raw).replace(/%$/, "").trim());
      if (isNaN(n)) return null;
      // For pct columns, user typing "10" or "10%" means 0.10.
      // Stored values come as decimals (0.10) from dec cols; pct0 cols
      // may already be in 0-100 form (e.g., 57.3). Let the compare-side
      // normalize — we just bring the filter to the same scale as value.
      if (isPct && (hadPct || n > 1)) n = n / 100;
      return n;
    }
    function normalizeCellForPct(v) {
      // Cell values in pct/pct0 columns are heterogeneous: base `fmt:pct` stores
      // 0-1 decimals; `fmt:pct0` may store 0-1 OR 0-100. Bring > 1 values down.
      if (v == null) return null;
      var n = Number(v);
      if (isNaN(n)) return null;
      if (isPct && n > 1) n = n / 100;
      return n;
    }

    if (isNumCol) {
      // Range "a-b"
      var rangeM = /^(-?\d+(?:\.\d+)?%?)\s*-\s*(-?\d+(?:\.\d+)?%?)$/.exec(s);
      if (rangeM) {
        var lo = toNum(rangeM[1]); var hi = toNum(rangeM[2]);
        if (lo == null || hi == null) return { invalid: true };
        return { test: function(v){
          var n = isPct ? normalizeCellForPct(v) : Number(v);
          return n != null && !isNaN(n) && n >= lo && n <= hi;
        }};
      }
      // Op-prefixed or bare number
      var opM = /^(>=|<=|>|<|=)?\s*(-?\d+(?:\.\d+)?%?)$/.exec(s);
      if (opM) {
        var op = opM[1] || ">=";
        var n = toNum(opM[2]);
        if (n == null) return { invalid: true };
        return { test: function(v){
          var x = isPct ? normalizeCellForPct(v) : Number(v);
          if (x == null || isNaN(x)) return false;
          switch (op) {
            case ">=": return x >= n;
            case "<=": return x <= n;
            case ">":  return x >  n;
            case "<":  return x <  n;
            case "=":  return x === n;
          }
          return false;
        }};
      }
      return { invalid: true };
    }
    // Text columns → substring match
    var lower = s.toLowerCase();
    return { test: function(v){
      return String(v == null ? "" : v).toLowerCase().indexOf(lower) >= 0;
    }};
  }

  // Cached predicates so we don't re-parse on every render cycle. Invalidated
  // whenever state.filters changes.
  var _predicateCache = {};
  function predicateFor(colKey) {
    if (_predicateCache[colKey] !== undefined) return _predicateCache[colKey];
    _predicateCache[colKey] = buildPredicate(state.filters[colKey], colKey);
    return _predicateCache[colKey];
  }
  function invalidatePredicateCache() { _predicateCache = {}; }

  function countActiveFilters() {
    var n = 0;
    Object.keys(state.filters).forEach(function(k){
      if ((state.filters[k] || "").trim()) n++;
    });
    return n;
  }

  // Default-visible groups for the current tab.
  function resetVisibleGroupsForTab(tabId) {
    var tab = TABS[tabId];
    state.visibleGroups = new Set(
      (tab.groups || []).filter(function(g){ return g.defaultOn; }).map(function(g){ return g.id; })
    );
  }

  // ---------- Cell formatting ----------
  function fmtCell(v, fmt){
    if (v == null || v === "" || (typeof v === "number" && isNaN(v))) return "—";
    if (fmt === "dec1") return Number(v).toFixed(1);
    if (fmt === "dec2") return Number(v).toFixed(2);
    if (fmt === "pct")  return (Number(v)*100).toFixed(1)+"%";
    if (fmt === "pct0") {
      var n = Number(v);
      if (n > 0 && n <= 1) n = n * 100;
      return n.toFixed(1)+"%";
    }
    return String(v);
  }

  function getVal(row, colKey){
    var def = COLS[colKey];
    if (def && def.compute) return def.compute(row);
    return row[colKey];
  }

  // ---------- Build the visible column list (respecting group toggles) ----------
  // Returns an array of "blocks" — each block is { groupId, groupLabel, colKeys }.
  // Identity block always first (no group label in the group header row).
  function buildBlocks() {
    var tab = TABS[state.activeTab];
    var blocks = [];
    blocks.push({ groupId: "ident", groupLabel: null, colKeys: tab.ident.slice() });
    (tab.groups || []).forEach(function(g){
      if (!state.visibleGroups.has(g.id)) return;
      blocks.push({ groupId: g.id, groupLabel: g.label, colKeys: g.cols.slice() });
    });
    return blocks;
  }

  function flatCols(blocks) {
    var out = [];
    blocks.forEach(function(b){ b.colKeys.forEach(function(k){ out.push(k); }); });
    return out;
  }

  // ---------- Render table (two-row thead: group headers + column headers) ----------
  function render() {
    var tab = TABS[state.activeTab];
    var blocks = buildBlocks();
    var cols = flatCols(blocks);

    // Ensure a valid sort key
    if (!state.sortKey || cols.indexOf(state.sortKey) < 0) {
      state.sortKey = cols.indexOf(tab.defaultSort) >= 0 ? tab.defaultSort : cols[0];
      state.sortDir = (COLS[state.sortKey] && COLS[state.sortKey].num) ? "desc" : "asc";
    }

    // Filter rows
    var workerPos = tab.workerPos;
    var allRows = state.rowsByWorkerPos[workerPos] || [];
    var rows = allRows.slice();

    // Position filter (client-side, from tab definition)
    var posFilter = tab.positionFilter;
    if (posFilter && posFilter.length) {
      rows = rows.filter(function(r){ return posFilter.indexOf(r.position) >= 0; });
    }
    // Sub-tab filter (DL/DB)
    if (tab.subTabs) {
      var active = tab.subTabs.find(function(st){ return st.id === state.activeSubTab; }) || tab.subTabs[0];
      if (active && active.positions && active.positions.length) {
        rows = rows.filter(function(r){ return active.positions.indexOf(r.position) >= 0; });
      }
    }

    // Search
    var searchQ = (searchEl.value || "").trim().toLowerCase();
    if (searchQ) rows = rows.filter(function(r){
      return String(r.player_name||"").toLowerCase().indexOf(searchQ) !== -1;
    });

    // Per-column filters (only apply to currently visible columns — a filter
    // on a hidden column is parked, not lost, until the group is re-enabled)
    var activeCols = cols.filter(function(k){
      var p = predicateFor(k);
      return p && !p.invalid;
    });
    if (activeCols.length) {
      rows = rows.filter(function(r){
        for (var i = 0; i < activeCols.length; i++) {
          var k = activeCols[i];
          var v = getVal(r, k);
          if (!predicateFor(k).test(v)) return false;
        }
        return true;
      });
    }

    // Sort
    rows.sort(function(a, b){
      var av = getVal(a, state.sortKey);
      var bv = getVal(b, state.sortKey);
      if (av == null) av = state.sortDir === "asc" ? Infinity : -Infinity;
      if (bv == null) bv = state.sortDir === "asc" ? Infinity : -Infinity;
      if (typeof av === "string" || typeof bv === "string") {
        av = String(av); bv = String(bv);
        return state.sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
      }
      return state.sortDir === "asc" ? av - bv : bv - av;
    });

    // ---- Build table HTML ----
    // Group header row
    var groupRow = blocks.map(function(b, i){
      var span = b.colKeys.length;
      var sepCls = i > 0 ? "group-sep" : "";
      if (!b.groupLabel) {
        return '<th class="no-group '+sepCls+'" colspan="'+span+'"></th>';
      }
      return '<th class="'+sepCls+'" colspan="'+span+'">'+b.groupLabel+'</th>';
    }).join("");

    // Column header row
    var colRow = "";
    blocks.forEach(function(b, bi){
      b.colKeys.forEach(function(k, ci){
        var def = COLS[k] || { label: k };
        var sortAttr = k === state.sortKey
          ? ' aria-sort="' + (state.sortDir === "asc" ? "ascending" : "descending") + '"'
          : "";
        var cls = [];
        if (def.num) cls.push("num");
        if (bi > 0 && ci === 0) cls.push("group-sep");
        if ((state.filters[k] || "").trim()) cls.push("has-filter");
        var titleAttr = def.title ? ' title="' + def.title.replace(/"/g, "&quot;") + '"' : "";
        colRow += '<th class="'+cls.join(" ")+'"'+sortAttr+titleAttr+' data-col-key="'+k+'">'+def.label+'</th>';
      });
    });

    // Filter row (third thead row). Only rendered when filtersVisible is true.
    var filterRow = "";
    if (state.filtersVisible) {
      blocks.forEach(function(b, bi){
        b.colKeys.forEach(function(k, ci){
          var def = COLS[k] || {};
          var raw = state.filters[k] || "";
          var p = raw.trim() ? buildPredicate(raw, k) : null;
          var inputCls = [];
          if (def.num) inputCls.push("num-filter");
          if (p && p.invalid) inputCls.push("invalid");
          else if (raw.trim()) inputCls.push("active");
          var thCls = [];
          if (bi > 0 && ci === 0) thCls.push("group-sep");
          var placeholder = def.num ? (def.fmt === "pct" || def.fmt === "pct0" ? ">10%" : ">150") : "";
          filterRow += '<th class="'+thCls.join(" ")+'">' +
            '<input type="text" class="'+inputCls.join(" ")+'" data-filter-key="'+k+'" ' +
            'value="'+raw.replace(/"/g,"&quot;")+'" placeholder="'+placeholder+'"></th>';
        });
      });
    }

    // Body
    var body = rows.map(function(r){
      var cells = "";
      blocks.forEach(function(b, bi){
        b.colKeys.forEach(function(k, ci){
          var def = COLS[k] || {};
          var v = getVal(r, k);
          var cls = [];
          if (def.num) cls.push("num");
          if (def.cls) cls.push(def.cls);
          if (bi > 0 && ci === 0) cls.push("group-sep");
          cells += '<td class="'+cls.join(" ")+'">'+fmtCell(v, def.fmt)+'</td>';
        });
      });
      return '<tr>'+cells+'</tr>';
    }).join("");

    var theadFilter = state.filtersVisible
      ? '<tr class="asw-filter-row">'+filterRow+'</tr>'
      : "";
    bodyEl.innerHTML = rows.length || state.filtersVisible
      ? '<table class="asw-table">' +
          '<thead>' +
            '<tr class="asw-group-row">'+groupRow+'</tr>' +
            '<tr class="asw-col-row">'+colRow+'</tr>' +
            theadFilter +
          '</thead>' +
          '<tbody>'+ (rows.length ? body : '<tr><td colspan="'+cols.length+'" class="asw-empty">No rows match filters.</td></tr>') +'</tbody>' +
        '</table>'
      : '<div class="asw-empty">No rows.</div>';

    // "42 of 240 players" when any narrowing applied; plain "240 players" otherwise.
    // The denominator counts rows already narrowed by position/sub-tab (the
    // "universe" for this tab), so the fraction stays meaningful.
    var universe = allRows.slice();
    if (posFilter && posFilter.length) {
      universe = universe.filter(function(r){ return posFilter.indexOf(r.position) >= 0; });
    }
    if (tab.subTabs) {
      var st = tab.subTabs.find(function(x){ return x.id === state.activeSubTab; }) || tab.subTabs[0];
      if (st && st.positions && st.positions.length) {
        universe = universe.filter(function(r){ return st.positions.indexOf(r.position) >= 0; });
      }
    }
    var total = universe.length;
    var narrowed = rows.length !== total;
    var countLabel = narrowed
      ? (rows.length + " of " + total + " players")
      : (total + " player" + (total === 1 ? "" : "s"));
    var filterCount = countActiveFilters();
    var filterHint = filterCount ? " · " + filterCount + " filter" + (filterCount === 1 ? "" : "s") : "";
    metaEl.textContent = (state.lastQuery || "") + " · " + countLabel + (searchQ ? " (search)" : "") + filterHint;

    // Wire sort (column-header clicks)
    bodyEl.querySelectorAll("th[data-col-key]").forEach(function(el){
      el.addEventListener("click", function(){
        var key = el.getAttribute("data-col-key");
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDir = (COLS[key] && COLS[key].num) ? "desc" : "asc";
        }
        render();
      });
    });

    // Wire filter-row inputs. Debounce keystrokes so typing doesn't thrash.
    // After the debounced render() fires, the input node is destroyed/recreated —
    // so we capture focus + caret before render and restore on the new element.
    if (state.filtersVisible) {
      var debTimer = null;
      bodyEl.querySelectorAll("input[data-filter-key]").forEach(function(inp){
        // Restore focus to this field if it was the pending one (handles the
        // re-render that ran while user was typing).
        if (pendingFocus && pendingFocus.key === inp.getAttribute("data-filter-key")) {
          requestAnimationFrame(function(){
            inp.focus();
            try {
              var pos = Math.min(pendingFocus.pos, inp.value.length);
              inp.setSelectionRange(pos, pos);
            } catch(e) {}
            pendingFocus = null;
          });
        }
        inp.addEventListener("input", function(){
          var key = inp.getAttribute("data-filter-key");
          state.filters[key] = inp.value;
          invalidatePredicateCache();
          updateFilterToggleLabel();
          // Live-validate this input's visual state without a full render
          var raw = inp.value.trim();
          inp.classList.remove("active","invalid");
          if (raw) {
            var p = buildPredicate(raw, key);
            inp.classList.add(p && p.invalid ? "invalid" : "active");
          }
          clearTimeout(debTimer);
          debTimer = setTimeout(function(){
            // Before re-render, record where the caret is so render() can
            // hand focus back to the freshly-mounted input.
            pendingFocus = { key: key, pos: inp.selectionStart || inp.value.length };
            render();
          }, 250);
        });
      });
    }
  }

  // Focus hand-off across renders (filter-row typing restores caret position)
  var pendingFocus = null;

  // ---------- Render the column-group chip bar + filter-row toggle ----------
  var _filterToggleBtn = null;
  var _filterClearBtn = null;

  function renderColsBar() {
    var tab = TABS[state.activeTab];
    var label = colsBarEl.querySelector(".asw-cols-label");
    colsBarEl.innerHTML = "";
    colsBarEl.appendChild(label);
    (tab.groups || []).forEach(function(g){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "asw-col-chip";
      btn.setAttribute("data-group-id", g.id);
      btn.setAttribute("aria-pressed", state.visibleGroups.has(g.id) ? "true" : "false");
      btn.textContent = g.label;
      btn.addEventListener("click", function(){
        if (state.visibleGroups.has(g.id)) state.visibleGroups.delete(g.id);
        else state.visibleGroups.add(g.id);
        btn.setAttribute("aria-pressed", state.visibleGroups.has(g.id) ? "true" : "false");
        render();
      });
      colsBarEl.appendChild(btn);
    });
    // Right side: filter toggle + clear
    var spacer = document.createElement("span");
    spacer.className = "asw-cols-spacer";
    colsBarEl.appendChild(spacer);

    _filterToggleBtn = document.createElement("button");
    _filterToggleBtn.type = "button";
    _filterToggleBtn.className = "asw-filter-toggle";
    _filterToggleBtn.setAttribute("aria-pressed", state.filtersVisible ? "true" : "false");
    _filterToggleBtn.title = "Show inline column filters — type >150, <5, 10%, 150-300, etc.";
    _filterToggleBtn.addEventListener("click", function(){
      state.filtersVisible = !state.filtersVisible;
      _filterToggleBtn.setAttribute("aria-pressed", state.filtersVisible ? "true" : "false");
      render();
    });
    colsBarEl.appendChild(_filterToggleBtn);

    _filterClearBtn = document.createElement("button");
    _filterClearBtn.type = "button";
    _filterClearBtn.className = "asw-filter-clear";
    _filterClearBtn.textContent = "Clear";
    _filterClearBtn.title = "Clear all column filters";
    _filterClearBtn.addEventListener("click", function(){
      state.filters = {};
      invalidatePredicateCache();
      updateFilterToggleLabel();
      render();
    });
    colsBarEl.appendChild(_filterClearBtn);

    updateFilterToggleLabel();
  }

  function updateFilterToggleLabel() {
    if (!_filterToggleBtn) return;
    var n = countActiveFilters();
    _filterToggleBtn.textContent = n ? "☰ Filters (" + n + ")" : "☰ Filters";
    if (_filterClearBtn) _filterClearBtn.style.display = n ? "" : "none";
  }

  // ---------- Render the sub-tab chips (DL/DB only) ----------
  function renderSubTabs() {
    var tab = TABS[state.activeTab];
    if (!tab.subTabs) {
      subTabsEl.classList.remove("visible");
      subTabsEl.innerHTML = '<span class="asw-subtabs-label">Sub-position</span>';
      return;
    }
    subTabsEl.classList.add("visible");
    subTabsEl.innerHTML = '<span class="asw-subtabs-label">' + tab.label + '</span>';
    tab.subTabs.forEach(function(st){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "asw-subtab";
      btn.setAttribute("data-subtab", st.id);
      btn.setAttribute("aria-pressed", state.activeSubTab === st.id ? "true" : "false");
      btn.textContent = st.label;
      btn.addEventListener("click", function(){
        state.activeSubTab = st.id;
        subTabsEl.querySelectorAll(".asw-subtab").forEach(function(x){
          x.setAttribute("aria-pressed", x === btn ? "true" : "false");
        });
        render();
      });
      subTabsEl.appendChild(btn);
    });
  }

  // ---------- Filter helpers ----------
  function getScope(){
    var btn = document.querySelector("[data-scope][aria-pressed='true']");
    return btn ? btn.getAttribute("data-scope") : "ups";
  }
  function getSelectedSeasons(){
    var sel = [];
    for (var i = 0; i < seasonsSel.options.length; i++) {
      if (seasonsSel.options[i].selected) sel.push(parseInt(seasonsSel.options[i].value, 10));
    }
    sel = sel.filter(function(s){ return s >= MIN_SEASON; });
    return sel.length ? sel : [defaultSeason];
  }
  function getSelectedTeams(){
    var sel = [];
    for (var i = 0; i < teamSel.options.length; i++) {
      if (teamSel.options[i].selected) sel.push(teamSel.options[i].value);
    }
    if (sel.indexOf("__ALL__") >= 0) return [];
    return sel;
  }

  // ---------- Fetch for the current tab's workerPos ----------
  function runQuery() {
    var tab = TABS[state.activeTab];
    var workerPos = tab.workerPos;
    var seasons = getSelectedSeasons();
    var scope = getScope();
    var teams = getSelectedTeams();
    state.sortKey = null;
    bodyEl.innerHTML = '<div class="asw-loading">Fetching…</div>';
    metaEl.textContent = "";
    // Server-side min_games=1 — real game-count filtering is done per-column
    // in the header filter row (type a number into G). Keep limit=500 so
    // multi-season queries still fit the D1 row cap.
    var url = API_BASE + "/api/advanced-stats-leaderboard" +
      "?seasons=" + encodeURIComponent(seasons.join(",")) +
      "&pos="    + encodeURIComponent(workerPos) +
      "&include_post=" + (scope === "full" ? "1" : "0") +
      "&min_games=1" +
      "&limit=500";
    Promise.all([
      fetch(url).then(function(r){
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }),
      leagueStatePromise,
    ]).then(function(pair){
      var j = pair[0];
      var rows = Array.isArray(j.rows) ? j.rows : [];
      rows = applyLiveOwnership(rows);
      // Team filter (post-ownership-overlay)
      if (teams.length) {
        var wantFA = teams.indexOf("FA") >= 0;
        var wantFids = {};
        teams.forEach(function(t){ if (t !== "FA") wantFids[padFid(t)] = true; });
        rows = rows.filter(function(r){
          if (!r.mfl_franchise_id) return wantFA;
          return wantFids[r.mfl_franchise_id] === true;
        });
      }
      state.rowsByWorkerPos[workerPos] = rows;
      var seasonLabel = seasons.length === 1 ? String(seasons[0])
                      : seasons.length <= 3 ? seasons.sort(function(a,b){return b-a}).join(", ")
                      : seasons.sort(function(a,b){return a-b})[0] + "-" + seasons.sort(function(a,b){return b-a})[0];
      var teamLabel = "";
      if (teams.length === 1) {
        teamLabel = " · " + (teams[0] === "FA" ? "Free Agents" : (fidToName[padFid(teams[0])] || teams[0]));
      } else if (teams.length > 1) {
        teamLabel = " · " + teams.length + " teams";
      }
      state.lastQuery = tab.label + " · " + seasonLabel + " · " + (scope === "full" ? "Full" : "UPS") + teamLabel;
      render();
    }).catch(function(e){
      bodyEl.innerHTML = '<div class="asw-err">Query failed: '+(e && e.message || e)+'</div>';
      metaEl.textContent = "";
    });
  }

  // ---------- Tab switching ----------
  function activateTab(tabId) {
    if (!TABS[tabId]) return;
    state.activeTab = tabId;
    state.activeSubTab = "all";
    state.sortKey = null;
    // Per-column filters are scoped to a position — they rarely make sense
    // across tabs (RuAtt≥150 becomes noise on a DB table). Clear on switch.
    state.filters = {};
    invalidatePredicateCache();
    resetVisibleGroupsForTab(tabId);
    tabsEl.querySelectorAll(".asw-tab").forEach(function(btn){
      btn.setAttribute("aria-pressed", btn.getAttribute("data-tab") === tabId ? "true" : "false");
    });
    renderSubTabs();
    renderColsBar();
    runQuery();
  }

  // ---------- Wiring ----------
  tabsEl.querySelectorAll(".asw-tab").forEach(function(btn){
    btn.addEventListener("click", function(){ activateTab(btn.getAttribute("data-tab")); });
  });
  scopeBtns.forEach(function(b){
    b.addEventListener("click", function(){
      scopeBtns.forEach(function(x){ x.setAttribute("aria-pressed", x === b ? "true" : "false"); });
      runQuery();
    });
  });
  [seasonsSel, teamSel].forEach(function(el){
    el.addEventListener("change", runQuery);
  });
  searchEl.addEventListener("input", function(){ if ((state.rowsByWorkerPos[TABS[state.activeTab].workerPos] || []).length) render(); });

  // ---------- Initial load ----------
  resetVisibleGroupsForTab(state.activeTab);
  renderSubTabs();
  renderColsBar();
  runQuery();
})();
</script>
</body>
</html>
