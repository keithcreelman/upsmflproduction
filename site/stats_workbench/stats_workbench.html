    csvBtn.addEventListener("click", exportCsv);
    colsBarEl.appendChild(csvBtn);

    _filterClearBtn = document.createElement("button");
    _filterClearBtn.type = "button";
    _filterClearBtn.className = "asw-filter-clear";
    _filterClearBtn.textContent = "Clear";
    _filterClearBtn.title = "Clear all column filters";
    _filterClearBtn.addEventListener("click", function(){
      state.filters = {};
      invalidatePredicateCache();
      updateFilterToggleLabel();
      render();
    });
    colsBarEl.appendChild(_filterClearBtn);

    updateFilterToggleLabel();
  }

  function updateFilterToggleLabel() {
    if (!_filterToggleBtn) return;
    var n = countActiveFilters();
    _filterToggleBtn.textContent = n ? "☰ Filters (" + n + ")" : "☰ Filters";
    if (_filterClearBtn) _filterClearBtn.style.display = n ? "" : "none";
  }

  // ---------- Render sub-position chips inline inside the active tab button ----------
  // (Phase A cleanup: dropped the separate sub-tabs row. DL/DB get an
  // inline chip cluster rendered inside their own tab button — only
  // shows when that tab is active via CSS [aria-pressed="true"].)
  function renderSubTabs() {
    // Clear any existing sub-chip groups first
    tabsEl.querySelectorAll(".asw-subtab-group").forEach(function(g){ g.remove(); });
    var tab = TABS[state.activeTab];
    if (!tab.subTabs) return;
    var parentBtn = tabsEl.querySelector('[data-tab="' + state.activeTab + '"]');
    if (!parentBtn) return;
    var group = document.createElement("span");
    group.className = "asw-subtab-group";
    tab.subTabs.forEach(function(st){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "asw-subtab";
      btn.setAttribute("data-subtab", st.id);
      btn.setAttribute("aria-pressed", state.activeSubTab === st.id ? "true" : "false");
      btn.textContent = st.label;
      btn.addEventListener("click", function(e){
        // Swallow the click so it doesn't bubble up to the parent tab
        // (would re-activate the tab and reset state).
        e.stopPropagation();
        state.activeSubTab = st.id;
        group.querySelectorAll(".asw-subtab").forEach(function(x){
          x.setAttribute("aria-pressed", x === btn ? "true" : "false");
        });
        render();
      });
      group.appendChild(btn);
    });
    parentBtn.appendChild(group);
  }

  // ---------- Scope presets + custom week picker ----------
  // Scope is now one of: mfl_reg (1-14), mfl_playoffs (15-17),
  // mfl_total (1-17, default), full (1-22), custom (explicit list).
  var SCOPE_RANGES = {
    mfl_reg:      { min: 1,  max: 14, label: "MFL Reg" },
    mfl_playoffs: { min: 15, max: 17, label: "MFL Playoffs" },
    mfl_total:    { min: 1,  max: 17, label: "MFL Total" },
    full:         { min: 1,  max: 22, label: "Full + NFL Playoffs" },
  };
  // Custom weeks as a [start, end] range (two dropdowns) — replaces the
  // 22-chip picker that was painful to use. Contiguous-only, which
  // covers the realistic cases (first-N, last-N, playoffs, arbitrary
  // sub-window). Non-contiguous analysis was fringe enough to cut.
  var weeksLabelEl = document.getElementById("asw-weeks-label");
  var weekStartSel = document.getElementById("asw-week-start");
  var weekEndSel   = document.getElementById("asw-week-end");

  (function populateWeekSelects(){
    for (var w = 1; w <= 22; w++) {
      var a = document.createElement("option");
      a.value = String(w); a.textContent = "Wk " + w;
      if (w === 1)  a.selected = true;
      weekStartSel.appendChild(a);
      var b = document.createElement("option");
      b.value = String(w); b.textContent = "Wk " + w;
      if (w === 17) b.selected = true;
      weekEndSel.appendChild(b);
    }
  })();

  function getCustomWeekRange(){
    var lo = parseInt(weekStartSel.value, 10);
    var hi = parseInt(weekEndSel.value, 10);
    if (!Number.isFinite(lo)) lo = 1;
    if (!Number.isFinite(hi)) hi = 22;
    if (lo > hi) { var t = lo; lo = hi; hi = t; } // auto-swap on inversion
    return { lo: Math.max(1, lo), hi: Math.min(22, hi) };
  }

  function getScope(){
    return scopeSel ? scopeSel.value : "mfl_total";
  }
  function getScopeLabel(){
    var s = getScope();
    if (s === "custom") {
      var r = getCustomWeekRange();
      return "Wks " + r.lo + "-" + r.hi;
    }
    return (SCOPE_RANGES[s] && SCOPE_RANGES[s].label) || s;
  }
  function getScopeQueryParams(){
    var s = getScope();
    if (s === "custom") {
      var r = getCustomWeekRange();
      return "&week_min=" + r.lo + "&week_max=" + r.hi;
    }
    var preset = SCOPE_RANGES[s] || SCOPE_RANGES.mfl_total;
    return "&week_min=" + preset.min + "&week_max=" + preset.max;
  }
  function updateCustomPickerVisibility(){
    if (getScope() === "custom") weeksLabelEl.removeAttribute("hidden");
    else weeksLabelEl.setAttribute("hidden", "");
  }
  weekStartSel.addEventListener("change", runQuery);
  weekEndSel.addEventListener("change", runQuery);
  function getSelectedSeasons(){
    var sel = [];
    for (var i = 0; i < seasonsSel.options.length; i++) {
      if (seasonsSel.options[i].selected) sel.push(parseInt(seasonsSel.options[i].value, 10));
    }
    sel = sel.filter(function(s){ return s >= MIN_SEASON; });
    return sel.length ? sel : [defaultSeason];
  }
  function getSelectedTeams(){
    var sel = [];
    for (var i = 0; i < teamSel.options.length; i++) {
      if (teamSel.options[i].selected) sel.push(teamSel.options[i].value);
    }
    // "All (league-wide)" wins over everything else — returns [] meaning no filter.
    if (sel.indexOf("__ALL__") >= 0) return [];
    return sel;
  }

  // ---------- Fetch for the current tab's workerPos ----------
  function runQuery() {
    var tab = TABS[state.activeTab];
    var workerPos = tab.workerPos;
    var seasons = getSelectedSeasons();
    var scope = getScope();
    var teams = getSelectedTeams();
    state.sortKey = null;
    bodyEl.innerHTML = '<div class="asw-loading">Fetching…</div>';
    metaEl.textContent = "";
    // Server-side min_games=1 — real game-count filtering is done per-column
    // in the header filter row (type a number into G). Keep limit=500 so
    // multi-season queries still fit the D1 row cap.
    var url = API_BASE + "/api/advanced-stats-leaderboard" +
      "?seasons=" + encodeURIComponent(seasons.join(",")) +
      "&pos="    + encodeURIComponent(workerPos) +
      getScopeQueryParams() +
      "&min_games=1" +
      "&limit=500";
    Promise.all([
      fetch(url).then(function(r){
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      }),
      leagueStatePromise,
    ]).then(function(pair){
      var j = pair[0];
      var rows = Array.isArray(j.rows) ? j.rows : [];
      rows = applyLiveOwnership(rows);
      // Team filter (post-ownership-overlay)
      // Special values:
      //   [] / __ALL__        → no filter (every player)
      //   __ROSTERED__        → any active franchise roster (exclude FAs)
      //   FA                  → free agents only
      //   <fid>               → that specific franchise
      // Multi-select: if __ROSTERED__ picked alongside specific fids,
      // __ROSTERED__ wins (superset). If FA also picked, add FAs back.
      if (teams.length) {
        var wantAllRostered = teams.indexOf("__ROSTERED__") >= 0;
        var wantFA = teams.indexOf("FA") >= 0;
        var wantFids = {};
        teams.forEach(function(t){
          if (t !== "FA" && t !== "__ROSTERED__" && t !== "__ALL__") wantFids[padFid(t)] = true;
        });
        rows = rows.filter(function(r){
          if (!r.mfl_franchise_id) return wantFA;
          if (wantAllRostered) return true;
          return wantFids[r.mfl_franchise_id] === true;
        });
      }
      state.rowsByWorkerPos[workerPos] = rows;
      var seasonLabel = seasons.length === 1 ? String(seasons[0])
                      : seasons.length <= 3 ? seasons.sort(function(a,b){return b-a}).join(", ")
                      : seasons.sort(function(a,b){return a-b})[0] + "-" + seasons.sort(function(a,b){return b-a})[0];
      var teamLabel = "";
      if (teams.length === 1) {
        var t0 = teams[0];
        teamLabel = " · " + (
          t0 === "FA"           ? "Free Agents" :
          t0 === "__ROSTERED__" ? "All Rostered" :
          (fidToName[padFid(t0)] || t0)
        );
      } else if (teams.length > 1) {
        teamLabel = " · " + teams.length + " teams";
      }
      state.lastQuery = tab.label + " · " + seasonLabel + " · " + getScopeLabel() + teamLabel;
      render();
    }).catch(function(e){
      bodyEl.innerHTML = '<div class="asw-err">Query failed: '+(e && e.message || e)+'</div>';
      metaEl.textContent = "";
    });
  }

  // ---------- Tab switching ----------
  function activateTab(tabId) {
    if (!TABS[tabId]) return;
    state.activeTab = tabId;
    state.activeSubTab = "all";
    state.sortKey = null;
    // Per-column filters are scoped to a position — they rarely make sense
    // across tabs (RuAtt≥150 becomes noise on a DB table). Clear on switch.
    state.filters = {};
    invalidatePredicateCache();
    resetVisibleGroupsForTab(tabId);
    tabsEl.querySelectorAll(".asw-tab").forEach(function(btn){
      btn.setAttribute("aria-pressed", btn.getAttribute("data-tab") === tabId ? "true" : "false");
    });
    renderSubTabs();
    renderColsBar();
    runQuery();
  }

  // ---------- Wiring ----------
  tabsEl.querySelectorAll(".asw-tab").forEach(function(btn){
    btn.addEventListener("click", function(){ activateTab(btn.getAttribute("data-tab")); });
  });
  scopeSel.addEventListener("change", function(){
    updateCustomPickerVisibility();
    runQuery();
  });
  // Initial visibility sync (default scope is mfl_total → picker hidden)
  updateCustomPickerVisibility();
  [seasonsSel, teamSel].forEach(function(el){
    el.addEventListener("change", runQuery);
  });
  searchEl.addEventListener("input", function(){ if ((state.rowsByWorkerPos[TABS[state.activeTab].workerPos] || []).length) render(); });

  // ---------- Comparison mode ----------
  // Top-of-page sticky bar shows selected players as removable chips +
  // a prominent "Compare →" button. The Compare button opens a side-by-
  // side drawer reusing cached leaderboard rows (no refetch needed for
  // aggregate comparisons). Drill-down drawer (single-player) and
  // compare drawer share the drawer DOM.
  var compareBarEl    = document.getElementById("asw-compare-bar");
  var compareChipsEl  = document.getElementById("asw-compare-chips");
  var compareGoBtn    = document.getElementById("asw-compare-go");
  var compareClearBtn = document.getElementById("asw-compare-clear");

  function renderCompareBar() {
    var ids = Array.from(state.compareSet);
    if (!ids.length) {
      compareBarEl.setAttribute("hidden", "");
      return;
    }
    compareBarEl.removeAttribute("hidden");
    compareChipsEl.innerHTML = ids.map(function(gid){
      var row = state.compareRows[gid] || {};
      var name = row.player_name || gid;
      var team = row.team || "";
      var teamSuffix = team ? " · " + team : "";
      return '<span class="asw-compare-chip" data-compare-chip="'+gid+'">' +
        escapeHtml(name) + escapeHtml(teamSuffix) +
        '<button type="button" aria-label="Remove" data-remove-gsis="'+gid+'">×</button>' +
        '</span>';
    }).join("");
    compareGoBtn.textContent = "Compare " + ids.length + " player" + (ids.length === 1 ? "" : "s") + " →";
    compareGoBtn.disabled = ids.length < 2;

    // Wire chip × removes (re-rendered each call)
    compareChipsEl.querySelectorAll("[data-remove-gsis]").forEach(function(btn){
      btn.addEventListener("click", function(){
        var gid = btn.getAttribute("data-remove-gsis");
        state.compareSet.delete(gid);
        // Uncheck matching checkbox(es) in table
        bodyEl.querySelectorAll('input.asw-compare-check[data-compare-gsis="'+gid+'"]').forEach(function(c){
          c.checked = false;
        });
        renderCompareBar();
      });
    });
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function clearCompareSet() {
    state.compareSet.clear();
    bodyEl.querySelectorAll(".asw-compare-check").forEach(function(c){ c.checked = false; });
    renderCompareBar();
  }

  // Build the comparison drawer: rows = metrics (from active tab's
  // visible groups), cols = players. Best/worst values per row flagged
  // with heat-style classes so eye can pick out advantages instantly.
  function openCompareDrawer() {
    var ids = Array.from(state.compareSet);
    if (ids.length < 2) return;
    var players = ids.map(function(gid){ return state.compareRows[gid]; }).filter(Boolean);
    if (players.length < 2) return;

    drawerScrim.removeAttribute("hidden");
    drawerScrim.classList.add("open");
    drawerEl.classList.add("open");
    drawerEl.setAttribute("aria-hidden", "false");

    // Drawer state resets (not single-player mode here)
    drawerState.playerRow = null;
    drawerState.weekRows = null;
    drawerState.allYearRows = null;
    drawerState.seasonRows = null;
    // Hide the Week/Season view toggle — it's single-player only.
    var toggleBox = document.getElementById("asw-drawer-view-toggle");
    if (toggleBox) toggleBox.style.display = "none";

    drawerTitle.textContent = "Comparison";
    drawerSub.textContent = players.length + " players · " + getScopeLabel();

    var blocks = buildBlocks();
    var tab = TABS[state.activeTab];

    // Each block → section header row + one row per metric
    var sections = blocks.slice(1).map(function(b){
      var groupHeader = '<tr class="asw-compare-section-row">' +
        '<td colspan="'+(players.length + 1)+'">'+ (b.groupLabel || "") +'</td></tr>';
      var rows = b.colKeys.map(function(k){
        var def = COLS[k] || { label: k };
        // Compute each player's value for this metric
        var vals = players.map(function(p){ return getVal(p, k); });
        var numericVals = vals.filter(function(v){ return typeof v === "number" && !isNaN(v); });
        var best = numericVals.length ? (def.invertRank ? Math.min.apply(null, numericVals) : Math.max.apply(null, numericVals)) : null;
        var worst = numericVals.length ? (def.invertRank ? Math.max.apply(null, numericVals) : Math.min.apply(null, numericVals)) : null;
        var cells = players.map(function(p){
          var v = getVal(p, k);
          var cls = ["num"];
          if (typeof v === "number" && !isNaN(v) && numericVals.length > 1) {
            if (v === best && best !== worst) cls.push("best");
            else if (v === worst && best !== worst) cls.push("worst");
          }
          return '<td class="'+cls.join(" ")+'">' + fmtCell(v, def.fmt) + '</td>';
        }).join("");
        return '<tr><td class="metric">'+ escapeHtml(def.label) +'</td>' + cells + '</tr>';
      }).join("");
      return groupHeader + rows;
    }).join("");

    var playerHeaders = players.map(function(p){
      var team = p.team || "";
      var mfl  = p.mfl_franchise_name || "FA";
      var pos  = p.position || "";
      return '<th class="player num">' +
        escapeHtml(p.player_name || "—") +
        '<span class="sub">'+ escapeHtml((pos ? pos + " · " : "") + team + " · " + mfl) +'</span>' +
        '</th>';
    }).join("");

    drawerBody.innerHTML =
      '<section class="asw-drawer-section">' +
        '<h3>Head-to-head (' + tab.label + ')</h3>' +
        '<div class="asw-table-wrap"><table class="asw-compare-table">' +
          '<thead><tr><th>Metric</th>' + playerHeaders + '</tr></thead>' +
          '<tbody>' + sections + '</tbody>' +
        '</table></div>' +
      '</section>';
  }

  compareClearBtn.addEventListener("click", clearCompareSet);
  compareGoBtn.addEventListener("click", openCompareDrawer);

  // ---------- CSV export ----------
  // Exports exactly what's on screen: visible rows (post search + per-
  // column filter + sub-tab filter), visible columns (identity +
  // active column groups). Numbers go raw (no pct/dec formatting) so
  // Excel/Google Sheets can parse them cleanly. Strings with commas,
  // quotes, or newlines get RFC-4180 quoted.
  function csvEscape(v) {
    var s = (v == null) ? "" : String(v);
    if (/[,"\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function exportCsv() {
    var rows = state.lastRows || [];
    var cols = state.lastCols || [];
    if (!rows.length || !cols.length) return;
    var header = cols.map(function(k){
      return csvEscape((COLS[k] && COLS[k].label) || k);
    }).join(",");
    var body = rows.map(function(r){
      return cols.map(function(k){
        var v = getVal(r, k);
        if (v == null || (typeof v === "number" && isNaN(v))) return "";
        if (typeof v === "number") return String(v);
        return csvEscape(v);
      }).join(",");
    }).join("\n");
    var tab = TABS[state.activeTab];
    var seasons = getSelectedSeasons();
    var seasonPart = seasons.length ? seasons.sort(function(a,b){return a-b;}).join("-") : "all";
    var fname = "upsmfl_stats_" + (tab.label || state.activeTab).toLowerCase().replace(/[^a-z0-9]+/g, "") +
      "_" + seasonPart + ".csv";
    var blob = new Blob([header + "\n" + body], { type: "text/csv;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  // ---------- Drill-down drawer (row click → per-week view) ----------
  // Drawer state lives outside `state` since it's ephemeral UI-only and
  // doesn't need to survive tab switches. Null means closed.
  var drawerEl       = document.getElementById("asw-drawer");
  var drawerScrim    = document.getElementById("asw-drawer-scrim");
  var drawerTitle    = document.getElementById("asw-drawer-title");
  var drawerSub      = document.getElementById("asw-drawer-sub");
  var drawerBody     = document.getElementById("asw-drawer-body");
  var drawerCloseBtn = document.getElementById("asw-drawer-close");
  var drawerViewBtns = document.querySelectorAll('#asw-drawer-view-toggle [data-view]');

  // Drawer-scoped state — cache both weekly (selected seasons) and
  // per-season-aggregated (all-years) rows so toggle is instant after
  // first fetch of each.
  var drawerState = {
    playerRow:    null,
    weekRows:     null,  // raw rows from /api/advanced-stats-player-weekly, selected-seasons scope
    allYearRows:  null,  // raw rows from same endpoint but ALL seasons (for By Season aggregation)
    seasonRows:   null,  // aggregated one-row-per-season synthesized from allYearRows
    view:         "weekly",
  };

  // When the drawer's metric dropdown picks metric X, the table below
  // the chart narrows to [X + these related cols] instead of dumping
  // every visible column group. Each entry is the short list of
  // supporting metrics that give context without going crazy.
  // Missing entry → table shows just the picked metric.
  var METRIC_FOCUS = {
    // Receiving
    rec_yds:             ["targets", "receptions", "y_per_r"],
    targets:             ["receptions", "rec_yds", "rec_per_t"],
    receptions:          ["targets", "rec_yds"],
    rec_tds:             ["targets", "receptions", "rec_yds"],
    y_per_t:             ["targets", "rec_yds"],
    y_per_r:             ["receptions", "rec_yds"],
    rec_per_t:           ["receptions", "targets"],
    receiving_adot:      ["targets", "receiving_air_yards", "rec_yds"],
    receiving_air_yards: ["targets", "receiving_adot", "rec_yds"],
    receiving_yac_per_r: ["receptions", "rec_yds"],
    receiving_drops:     ["targets", "receiving_drop_pct"],
    receiving_drop_pct:  ["receiving_drops", "targets"],
    receiving_rat:       ["targets", "receptions"],
    rec_brtkl:           ["receptions", "rec_per_br"],
    rec_per_br:          ["rec_brtkl", "receptions"],
    target_share:        ["targets", "rec_share"],
    rec_share:           ["receptions", "target_share"],
    rec_yds_share:       ["rec_yds", "target_share"],
    // Rushing
    rush_yds:            ["rush_att", "y_per_a", "rush_tds"],
    rush_att:            ["rush_yds", "y_per_a"],
    rush_tds:            ["rush_att", "rush_yds"],
    y_per_a:             ["rush_att", "rush_yds"],
    ybc_per_a:           ["rush_att", "yac_per_a"],
    yac_per_a:           ["rush_att", "ybc_per_a"],
    rush_brtkl:          ["rush_att", "att_per_br"],
    att_per_br:          ["rush_brtkl", "rush_att"],
    rush_share:          ["rush_att", "rush_yds_share"],
    rush_yds_share:      ["rush_yds", "rush_share"],
    rz_target_share:     ["targets_i20", "targets"],
    rz_rec_share:        ["rec_i20", "receptions"],
    ez_target_share:     ["targets_ez", "targets"],
    rz_rush_share:       ["rush_att_i20", "rush_att"],
    gl_rush_share:       ["rush_att_i5", "rush_att"],
    rush_att_i20:        ["rush_att", "rush_att_i5"],
    rush_att_i5:         ["rush_att", "rush_att_i20"],
    targets_i20:         ["targets", "rec_i20"],
    targets_ez:          ["targets", "targets_i20"],
    rec_i20:             ["targets_i20", "receptions"],
    // Passing
    pass_yds:            ["pass_att", "pass_cmp", "cmp_pct"],
    pass_att:            ["pass_cmp", "cmp_pct"],
    pass_cmp:            ["pass_att", "cmp_pct"],
    cmp_pct:             ["pass_att", "pass_cmp"],
    pass_tds:            ["pass_att", "pass_yds"],
    ypa:                 ["pass_att", "pass_yds"],
    pass_ints:           ["pass_att", "int_pct"],
    int_pct:             ["pass_att", "pass_ints"],
    pass_sacks:          ["pass_sack_yds", "pass_att"],
    pass_sack_yds:       ["pass_sacks"],
    passing_adot:        ["pass_att", "passing_air_yards"],
    passing_air_yards:   ["pass_att", "passing_adot"],
    passing_yards_after_catch: ["pass_cmp", "pass_yds"],
    passing_bad_throw_pct: ["pass_att"],
    passing_pressure_pct: ["passing_times_pressured", "pass_att"],
    passing_times_pressured: ["passing_pressure_pct", "pass_att"],
    pass_att_i20:        ["pass_att", "pass_att_ez"],
    pass_att_ez:         ["pass_att", "pass_att_i20"],
    // IDP
    def_tackles_total:   ["def_tackles_ast", "def_tfl"],
    def_tackles_ast:     ["def_tackles_total"],
    def_tfl:             ["def_tackles_total"],
    def_sacks:           ["def_pressures", "def_press_rate"],
    def_pressures:       ["def_sacks", "def_press_rate"],
    def_press_rate:      ["def_pressures", "def_sacks"],
    def_pass_def:        ["def_ints"],
    def_ff:              ["def_fr"],
    def_fr:              ["def_ff"],
    def_ints:            ["def_pass_def"],
    def_tds:             ["def_ints", "def_fr"],
    def_missed_tackles:  ["def_missed_tackle_pct", "def_tackles_total"],
    def_missed_tackle_pct: ["def_missed_tackles", "def_tackles_total"],
    def_adot:            ["def_yards_allowed", "def_passer_rating_allowed"],
    def_passer_rating_allowed: ["def_yards_allowed", "def_adot"],
    def_yards_allowed:   ["def_passer_rating_allowed"],
    // Kicker
    fg_made:             ["fg_att", "fg_pct", "avg_fg_make"],
    fg_att:              ["fg_made", "fg_pct"],
    fg_miss:             ["fg_att", "fg_pct"],
    fg_pct:              ["fg_made", "fg_att"],
    avg_fg_make:         ["avg_fg_att", "fg_made"],
    avg_fg_att:          ["avg_fg_make", "fg_att"],
    xp_made:             ["xp_att", "xp_pct"],
    xp_pct:              ["xp_made", "xp_att"],
    // Punter
    punts:               ["punt_yds", "punt_avg"],
    punt_yds:            ["punts", "punt_avg"],
    punt_avg:            ["punts", "punt_yds"],
    punt_net_avg:        ["punt_avg", "punts"],
    punt_inside20:       ["punts", "punt_i20_pct"],
    punt_i20_pct:        ["punt_inside20", "punts"],
    punt_tb:             ["punts", "punt_tb_pct"],
    punt_tb_pct:         ["punt_tb", "punts"],
    punt_avg_spot:       ["punts", "punt_yds"],
  };

  // Key metrics to chart per tab — picked to match the pos's most load-
  // bearing volume + efficiency stats. Client falls back to the current
  // sort key if the tab config is missing here.
  var CHART_METRICS_BY_TAB = {
    qb:       ["pass_yds", "pass_tds", "pass_ints"],
    rb:       ["rush_yds", "rush_att", "targets"],
    wr:       ["rec_yds", "targets", "receptions"],
    te:       ["rec_yds", "targets", "receptions"],
    flex_o:   ["rec_yds", "rush_yds"],
    dl:       ["def_sacks", "def_pressures", "def_tackles_total"],
    lb:       ["def_tackles_total", "def_sacks", "def_tfl"],
    db:       ["def_tackles_total", "def_pass_def", "def_ints"],
    flex_idp: ["def_tackles_total", "def_sacks", "def_pass_def"],
    pk:       ["fg_made", "fg_att", "xp_made"],
    pn:       ["punts", "punt_yds", "punt_inside20"],
  };

  function closeDrawer() {
    drawerEl.classList.remove("open");
    drawerScrim.classList.remove("open");
    drawerScrim.setAttribute("hidden", "");
    drawerEl.setAttribute("aria-hidden", "true");
    // Clear active-row highlight
    bodyEl.querySelectorAll("tbody tr.is-active").forEach(function(x){
      x.classList.remove("is-active");
    });
  }

  function openDrawer(playerRow) {
    drawerScrim.removeAttribute("hidden");
    drawerScrim.classList.add("open");
    drawerEl.classList.add("open");
    drawerEl.setAttribute("aria-hidden", "false");

    // Reset drawer-scoped state for the new player
    drawerState.playerRow   = playerRow;
    drawerState.weekRows    = null;
    drawerState.allYearRows = null;
    drawerState.seasonRows  = null;
    drawerState.view        = "weekly";
    drawerViewBtns.forEach(function(b){
      b.setAttribute("aria-pressed", b.getAttribute("data-view") === "weekly" ? "true" : "false");
    });
    // Toggle is single-player-only; the compare-drawer path hides it.
    var toggleBox = document.getElementById("asw-drawer-view-toggle");
    if (toggleBox) toggleBox.style.display = "";

    var name = playerRow.player_name || "—";
    var nfl = playerRow.team || "—";
    var mfl = playerRow.mfl_franchise_name || "FA";
    var pos = playerRow.position || "";
    drawerTitle.textContent = name;

    // Subtitle now carries MFL contract details (salary / years / AAV)
    // + season fantasy totals (points / PPG) pulled from the leaderboard
    // row. Per-week rendering doesn't include these because they're
    // season-aggregates, not per-week values — surfacing them once in
    // the header avoids spamming identical values on every week row.
    var metaParts = [(pos ? pos : ""), nfl, mfl].filter(Boolean);
    // Keep Salary adjacent to AAV (Keith 2026-04-24: "salary NEXT to AAV
    // rather than sticking yrs remain in between").
    if (playerRow.mfl_salary != null) metaParts.push("Salary " + fmtCell(playerRow.mfl_salary, "money"));
    if (playerRow.mfl_aav != null) metaParts.push("AAV " + fmtCell(playerRow.mfl_aav, "money"));
    if (playerRow.mfl_years_remaining != null) metaParts.push(playerRow.mfl_years_remaining + " yr" + (playerRow.mfl_years_remaining === 1 ? "" : "s") + " left");
    if (playerRow.mfl_points != null) metaParts.push(fmtCell(playerRow.mfl_points, "dec1") + " MFL pts");
    if (playerRow.mfl_ppg != null) metaParts.push(fmtCell(playerRow.mfl_ppg, "dec1") + " PPG");
    drawerSub.textContent = metaParts.join(" · ");
    drawerBody.innerHTML = '<div class="asw-loading">Fetching week-by-week…</div>';

    // Fetch weekly-scoped data using current leaderboard filters
    var seasons = getSelectedSeasons();
    var url = API_BASE + "/api/advanced-stats-player-weekly" +
      "?gsis_id=" + encodeURIComponent(playerRow.gsis_id) +
      "&seasons=" + encodeURIComponent(seasons.join(",")) +
      getScopeQueryParams();
    fetch(url)
      .then(function(r){
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function(j){
        drawerState.weekRows = Array.isArray(j.rows) ? j.rows : [];
        if (!drawerState.weekRows.length) {
          drawerBody.innerHTML = '<div class="asw-empty">No week-by-week data for this season filter.</div>';
          return;
        }
        renderDrawerContent();
      })
      .catch(function(e){
        drawerBody.innerHTML = '<div class="asw-err">Drill-down failed: ' + (e && e.message || e) + '</div>';
      });
  }

  // Fetch all-seasons rows for By Season view. Omits the seasons param
  // so we get every year the player has data for, but honors the main
  // screen's scope (Keith 2026-04-24 — "MFL Reg" on the main view means
  // MFL Reg per-season in the drawer too, not full-year regardless).
  function fetchAllYears() {
    if (!drawerState.playerRow) return Promise.reject(new Error("no player"));
    var url = API_BASE + "/api/advanced-stats-player-weekly" +
      "?gsis_id=" + encodeURIComponent(drawerState.playerRow.gsis_id) +
      getScopeQueryParams();
    return fetch(url).then(function(r){
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    });
  }

  // Heuristic — does this column represent a rate/% that should be AVG'd
  // across weeks rather than SUM'd? Covers both fmt-based and name-based
  // cases so we don't need to mark every column individually.
  function isRateColumn(key, def) {
    if (def && (def.fmt === "pct" || def.fmt === "pct0")) return true;
    if (/_pct$|_rate$|_per_|_avg$|_pct_|_adot$/.test(key)) return true;
    return false;
  }

  // Collapse an array of weekly rows into one synthetic row per season.
  // Counting stats are SUM'd, rate stats AVG'd. Computed columns ignored
  // (their `compute` function runs naturally on the aggregated row).
  function aggregateBySeason(weekRows) {
    var bySeason = {};
    weekRows.forEach(function(r){
      var s = r.season;
      if (!bySeason[s]) bySeason[s] = [];
      bySeason[s].push(r);
    });

    // Collect ALL column keys seen across rows + COLS — some may not
    // appear on every row (e.g., PFR cols for pre-2018 weeks).
    var keySet = {};
    weekRows.forEach(function(r){ Object.keys(r).forEach(function(k){ keySet[k] = true; }); });

    return Object.keys(bySeason).map(function(s){
      var rows = bySeason[s];
      var agg = { season: parseInt(s, 10), week: null };
      // Games played = weeks with ANY offensive/defensive production
      agg.games = rows.filter(function(r){
        return (r.rush_att||0) + (r.targets||0) + (r.pass_att||0) +
               (r.def_tackles_total||0) + (r.fg_att||0) + (r.punts||0) +
               (r.def_tackles_ast||0) > 0;
      }).length;

      Object.keys(keySet).forEach(function(k){
        if (k === "season" || k === "week" || k === "games") return;
        var def = COLS[k] || {};
        if (def.compute) return; // computed columns derive from aggregates
        var vals = [];
        rows.forEach(function(r){ if (typeof r[k] === "number") vals.push(r[k]); });
        if (!vals.length) { agg[k] = null; return; }
        if (isRateColumn(k, def)) {
          agg[k] = vals.reduce(function(a,b){return a+b;}, 0) / vals.length;
        } else {
          agg[k] = vals.reduce(function(a,b){return a+b;}, 0);
        }
      });

      // Passthrough identity fields from the last weekly row (player may
      // have changed teams mid-season — show the final affiliation)
      var last = rows[rows.length - 1];
      ["team","opponent","position","pos_group","mfl_franchise_id",
       "mfl_franchise_name","mfl_pid","gsis_id","player_name"].forEach(function(k){
        agg[k] = last && last[k];
      });
      return agg;
    }).sort(function(a, b){ return b.season - a.season; });
  }

  // Dispatcher — renders weekly or seasonal view using the drawerState
  // cache, fetching lazily when switching to By Season for the first time.
  function renderDrawerContent() {
    if (drawerState.view === "weekly") {
      if (drawerState.weekRows) renderDrawer(drawerState.playerRow, drawerState.weekRows, "weekly");
      return;
    }
    // season mode
    if (drawerState.seasonRows) {
      renderDrawer(drawerState.playerRow, drawerState.seasonRows, "season");
      return;
    }
    drawerBody.innerHTML = '<div class="asw-loading">Fetching all seasons…</div>';
    fetchAllYears().then(function(j){
      drawerState.allYearRows = Array.isArray(j.rows) ? j.rows : [];
      drawerState.seasonRows = aggregateBySeason(drawerState.allYearRows);
      if (!drawerState.seasonRows.length) {
        drawerBody.innerHTML = '<div class="asw-empty">No career data.</div>';
        return;
      }
      renderDrawer(drawerState.playerRow, drawerState.seasonRows, "season");
    }).catch(function(e){
      drawerBody.innerHTML = '<div class="asw-err">All-seasons fetch failed: ' + (e && e.message || e) + '</div>';
    });
  }

  // Build a simple SVG line chart for a single metric across a series of
  // rows (weeks OR seasons). Returns an HTML string embedding the SVG.
  // Keep this dependency-free so the workbench stays a single drop-in file.
  function buildMiniChart(metricKey, label, weekRows, mode) {
    var def = COLS[metricKey] || { label: metricKey };
    var W = 520, H = 110, PAD_L = 36, PAD_R = 8, PAD_T = 10, PAD_B = 20;
    var innerW = W - PAD_L - PAD_R;
    var innerH = H - PAD_T - PAD_B;

    // Build (x, y) series. x = sequential index (we preserve input order
    // which is season DESC, week ASC).
    var points = weekRows.map(function(r, i){
      var v = getVal(r, metricKey);
      return { x: i, y: (typeof v === "number" && !isNaN(v)) ? v : null, row: r };
    });
    var validYs = points.map(function(p){ return p.y; }).filter(function(y){ return y != null; });
    if (!validYs.length) {
      return '<div class="asw-chart"><div class="asw-chart-title">'+label+'</div>' +
             '<div class="asw-empty" style="padding:16px">No values.</div></div>';
    }
    var yMin = Math.min.apply(null, validYs.concat([0]));
    var yMax = Math.max.apply(null, validYs);
    if (yMax === yMin) yMax = yMin + 1;
    var xCount = Math.max(1, points.length - 1);

    function sx(i){ return PAD_L + (i / xCount) * innerW; }
    function sy(v){ return PAD_T + innerH - ((v - yMin) / (yMax - yMin)) * innerH; }

    // Build path d-attribute, breaking on nulls
    var d = "";
    var penUp = true;
    points.forEach(function(p){
      if (p.y == null) { penUp = true; return; }
      d += (penUp ? "M" : "L") + sx(p.x).toFixed(1) + " " + sy(p.y).toFixed(1) + " ";
      penUp = false;
    });

    // Dots + hover title on every valid point (format depends on mode)
    var dots = points.map(function(p){
      if (p.y == null) return "";
      var stamp = mode === "season"
        ? String(p.row.season || "")
        : (p.row.season || "") + " W" + (p.row.week || "");
      var label = stamp + ": " + fmtCell(p.y, def.fmt);
      return '<circle class="pt" cx="'+sx(p.x).toFixed(1)+'" cy="'+sy(p.y).toFixed(1)+'" r="2.8">' +
             '<title>'+label.replace(/</g,"&lt;")+'</title></circle>';
    }).join("");

    // Y-axis labels (min / max / mid)
    var yMid = (yMin + yMax) / 2;
    var yTicks = [yMin, yMid, yMax].map(function(v){
      var y = sy(v).toFixed(1);
      return '<text class="axis" x="'+(PAD_L-4)+'" y="'+y+'" text-anchor="end" dy="3">' + fmtCell(v, def.fmt) + '</text>' +
             '<line class="grid" x1="'+PAD_L+'" y1="'+y+'" x2="'+(W-PAD_R)+'" y2="'+y+'"/>';
    }).join("");

    // Zero line when it's inside the range
    var zeroLine = "";
    if (yMin < 0 && yMax > 0) {
      var z = sy(0).toFixed(1);
      zeroLine = '<line class="zero" x1="'+PAD_L+'" y1="'+z+'" x2="'+(W-PAD_R)+'" y2="'+z+'"/>';
    }

    return '<div class="asw-chart">' +
             '<div class="asw-chart-title">'+label+'</div>' +
             '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">' +
               yTicks + zeroLine +
               '<path class="line" d="'+d+'"/>' +
               dots +
             '</svg>' +
           '</div>';
  }

  // Render drawer body: chart + table (week-by-week OR per-season).
  // mode: "weekly" shows (Season, Wk) as leftmost sticky cols.
  // mode: "season" shows (Season) only; each row is one year.
  function renderDrawer(playerRow, rows, mode) {
    var tab = TABS[state.activeTab];
    mode = mode || "weekly";
    var isSeason = mode === "season";

    // Default chart metric — first entry in the tab's chart list, or
    // fall back to the leaderboard's active sort key. Remembered across
    // re-renders via drawerState.chartMetric so the user's pick survives
    // By Week ↔ By Season toggles.
    var defaultMetrics = (CHART_METRICS_BY_TAB[state.activeTab] || []).filter(function(k){ return COLS[k]; });
    if (!drawerState.chartMetric || !COLS[drawerState.chartMetric]) {
      drawerState.chartMetric = defaultMetrics[0] || state.sortKey || "games";
    }
    var chartMetric = drawerState.chartMetric;

    // Grouped metric dropdown — reuses the tab's column-group structure
    // so charts are organized the same way the leaderboard cols are.
    var metricSelectHtml = (function(){
      var opts = (tab.groups || []).map(function(g){
        var innerOpts = g.cols
          .filter(function(k){ return COLS[k] && COLS[k].num; })
          .map(function(k){
            var sel = k === chartMetric ? ' selected' : '';
            return '<option value="'+k+'"'+sel+'>'+ escapeHtml(COLS[k].label || k) +'</option>';
          }).join("");
        if (!innerOpts) return "";
        return '<optgroup label="'+ escapeHtml(g.label) +'">'+ innerOpts +'</optgroup>';
      }).filter(Boolean).join("");
      return '<select id="asw-chart-metric" style="background:var(--panel-alt);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;min-width:200px">' + opts + '</select>';
    })();
    var chartsHtml =
      '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">' +
        '<span style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700">Chart</span>' +
        metricSelectHtml +
      '</div>' +
      '<div id="asw-chart-mount">' +
        buildMiniChart(chartMetric, (COLS[chartMetric] && COLS[chartMetric].label) || chartMetric, rows, mode) +
      '</div>';

    // Metric-focused table (Keith 2026-04-24): instead of dumping every
    // visible column group, show a narrow strip centered on the chart
    // metric. Structure:
    //   [Season, Wk|G, MFL Pts, Snaps, Snap%] + [chartMetric, ...supports]
    // Identical columns in Weekly and Season modes so eye-to-eye
    // comparison works when toggling views.
    var usageGroup = (tab.groups || []).find(function(g){ return g.id === "usage"; });
    var usageSuffix = usageGroup
      ? usageGroup.cols.filter(function(c){ return c !== "games" && COLS[c]; })
      : [];
    var supports = METRIC_FOCUS[chartMetric] || [];
    var tableCols = [chartMetric].concat(supports);
    // Dedupe + drop any keys not in COLS (stale refs)
    var seen = {};
    tableCols = tableCols.filter(function(k){
      if (!k || seen[k] || !COLS[k]) return false;
      seen[k] = true;
      return true;
    });

    // Single-row header — Season | Wk(or G) | MFL Pts | Snaps | Snap% | [metric] | [supports]
    var colHeader = isSeason
      ? '<th class="week-col">Season</th><th class="week-col num">G</th><th class="week-col num">MFL Pts</th>'
      : '<th class="week-col">Season</th><th class="week-col">Wk</th><th class="week-col num">MFL Pts</th>';
    colHeader += usageSuffix.map(function(k){
      var d = COLS[k] || { label: k };
      return '<th class="num">' + escapeHtml(d.label) + '</th>';
    }).join("");
    colHeader += tableCols.map(function(k, i){
      var d = COLS[k] || { label: k };
      var cls = d.num ? "num" : "";
      // Accent the picked chart metric so the eye knows which col drives the chart
      var accent = i === 0 ? ' style="color:var(--accent)"' : "";
      return '<th class="'+cls+'"'+accent+' title="'+escapeHtml(d.title || "")+'">'+ escapeHtml(d.label) +'</th>';
    }).join("");

    var body = rows.map(function(r){
      var leftCells = isSeason
        ? '<td class="week-col">'+(r.season||"")+'</td>' +
          '<td class="week-col num">'+(r.games != null ? r.games : "—")+'</td>' +
          '<td class="week-col num">'+ fmtCell(r.mfl_points, "dec1") +'</td>'
        : '<td class="week-col">'+(r.season||"")+'</td>' +
          '<td class="week-col">'+(r.week||"")+'</td>' +
          '<td class="week-col num">'+ fmtCell(r.mfl_points, "dec1") +'</td>';
      var cells = leftCells;
      usageSuffix.forEach(function(k){
        var d = COLS[k] || {};
        var v = getVal(r, k);
        cells += '<td class="num">'+ fmtCell(v, d.fmt) +'</td>';
      });
      tableCols.forEach(function(k, i){
        var d = COLS[k] || {};
        var v = getVal(r, k);
        var cls = d.num ? "num" : "";
        var accent = i === 0 ? ' style="color:var(--accent);font-weight:600"' : "";
        cells += '<td class="'+cls+'"'+accent+'>'+ fmtCell(v, d.fmt) +'</td>';
      });
      return '<tr>'+cells+'</tr>';
    }).join("");

    var sectionLabel = isSeason
      ? 'Year-over-year · ' + rows.length + ' seasons'
      : 'Week-by-week · ' + rows.length + ' weeks';

    drawerBody.innerHTML =
      '<section class="asw-drawer-section">' +
        '<h3>Trend (' + tab.label + (isSeason ? ' · By Season' : ' · By Week') + ')</h3>' +
        chartsHtml +
      '</section>' +
      '<section class="asw-drawer-section">' +
        '<h3>' + sectionLabel + '</h3>' +
        '<div class="asw-table-wrap"><table class="asw-table asw-week-table">' +
          '<thead>' +
            '<tr class="asw-group-row">' + groupHeader + '</tr>' +
            '<tr class="asw-col-row">' + colHeader + '</tr>' +
          '</thead>' +
          '<tbody>' + body + '</tbody>' +
        '</table></div>' +
      '</section>';

    // Wire the metric dropdown — swap only the chart mount, not the
    // whole drawer body (preserves table scroll + week-by-week state).
    var sel = document.getElementById("asw-chart-metric");
    var mount = document.getElementById("asw-chart-mount");
    if (sel && mount) {
      sel.addEventListener("change", function(){
        drawerState.chartMetric = sel.value;
        var k = drawerState.chartMetric;
        mount.innerHTML = buildMiniChart(k, (COLS[k] && COLS[k].label) || k, rows, mode);
      });
    }
  }

  drawerCloseBtn.addEventListener("click", closeDrawer);
  drawerScrim.addEventListener("click", closeDrawer);
  document.addEventListener("keydown", function(e){
    if (e.key === "Escape" && drawerEl.classList.contains("open")) closeDrawer();
  });
  // By Week / By Season view toggle
  drawerViewBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      var view = btn.getAttribute("data-view");
      if (drawerState.view === view) return;
      drawerState.view = view;
      drawerViewBtns.forEach(function(x){
        x.setAttribute("aria-pressed", x === btn ? "true" : "false");
      });
      renderDrawerContent();
    });
  });

  // ---------- URL state ----------
  // Serialize the full current view (tab, sub, seasons, scope, teams,
  // groups, sort, heat, filter-row visibility, per-column filters,
  // search) into window.location.hash so a copied URL reproduces the
  // exact view. Hash avoids server round-trips and keeps it out of
  // history (replaceState).
  function syncUrl() {
    try {
      var params = new URLSearchParams();
      params.set("tab", state.activeTab);
      if (state.activeSubTab && state.activeSubTab !== "all") params.set("sub", state.activeSubTab);
      var seasons = getSelectedSeasons();
      if (seasons.length) params.set("seasons", seasons.join(","));
      var scope = getScope();
      if (scope === "custom") {
        var r = getCustomWeekRange();
        params.set("scope", "custom");
        params.set("week_min", String(r.lo));
        params.set("week_max", String(r.hi));
      } else {
        params.set("scope", scope);
      }
      var teams = [];
      for (var ti = 0; ti < teamSel.options.length; ti++) {
        if (teamSel.options[ti].selected) teams.push(teamSel.options[ti].value);
      }
      if (teams.length && !(teams.length === 1 && teams[0] === "__ALL__")) {
        params.set("teams", teams.join(","));
      }
      var groups = Array.from(state.visibleGroups).sort();
      if (groups.length) params.set("groups", groups.join(","));
      if (state.sortKey) params.set("sort", state.sortKey + "." + state.sortDir);
      if (state.heatOn) params.set("heat", "1");
      if (state.filtersVisible) params.set("fv", "1");
      Object.keys(state.filters).forEach(function(k){
        var v = (state.filters[k] || "").trim();
        if (v) params.set("f." + k, v);
      });
      if (searchEl.value) params.set("q", searchEl.value);
      var hash = "#" + params.toString();
      if (window.location.hash !== hash) {
        history.replaceState(null, "", hash);
      }
    } catch (e) { /* URL API unavailable — silently ignore */ }
  }

  // Read URL on boot. Returns true if any URL state was applied so the
  // initial-load bootstrap can skip its default group reset.
  function readStateFromUrl() {
    var hash = String(window.location.hash || "").replace(/^#/, "");
    if (!hash) return false;
    var params;
    try { params = new URLSearchParams(hash); } catch (e) { return false; }
    var touched = false;

    var t = params.get("tab");
    if (t && TABS[t]) { state.activeTab = t; touched = true; }
    var sub = params.get("sub");
    if (sub) { state.activeSubTab = sub; touched = true; }

    var seasonsParam = params.get("seasons");
    if (seasonsParam) {
      var wanted = {};
      seasonsParam.split(",").forEach(function(s){
        var y = parseInt(s, 10);
        if (y) wanted[y] = true;
      });
      for (var i = 0; i < seasonsSel.options.length; i++) {
        seasonsSel.options[i].selected = !!wanted[parseInt(seasonsSel.options[i].value, 10)];
      }
      touched = true;
    }

    var scope = params.get("scope");
    if (scope === "custom") {
      scopeSel.value = "custom";
      var wmin = parseInt(params.get("week_min"), 10);
      var wmax = parseInt(params.get("week_max"), 10);
      if (Number.isFinite(wmin) && wmin >= 1 && wmin <= 22) weekStartSel.value = String(wmin);
      if (Number.isFinite(wmax) && wmax >= 1 && wmax <= 22) weekEndSel.value   = String(wmax);
      touched = true;
    } else if (scope) {
      scopeSel.value = scope;
      touched = true;
    } else if (params.get("weeks")) {
      // Legacy URLs used weeks=1,2,3 (list). Collapse to a [lo,hi] range.
      var wks = params.get("weeks").split(",").map(function(w){ return parseInt(w, 10); })
                     .filter(function(w){ return w >= 1 && w <= 22; });
      if (wks.length) {
        scopeSel.value = "custom";
        weekStartSel.value = String(Math.min.apply(null, wks));
        weekEndSel.value   = String(Math.max.apply(null, wks));
        touched = true;
      }
    }

    // Teams — franchise options arrive async. Defer to leagueStatePromise.
    var teamsParam = params.get("teams");
    if (teamsParam) {
      leagueStatePromise.then(function(){
        var wants = {};
        teamsParam.split(",").forEach(function(t){ if (t) wants[t] = true; });
        for (var j = 0; j < teamSel.options.length; j++) {
          teamSel.options[j].selected = !!wants[teamSel.options[j].value];
        }
        runQuery();
      });
      touched = true;
    }

    var groupsParam = params.get("groups");
    if (groupsParam) {
      state.visibleGroups = new Set(groupsParam.split(",").filter(Boolean));
      touched = true;
    }

    var sortParam = params.get("sort");
    if (sortParam) {
      var parts = sortParam.split(".");
      state.sortKey = parts[0] || null;
      state.sortDir = parts[1] === "asc" ? "asc" : "desc";
      touched = true;
    }
    if (params.get("heat") === "1") { state.heatOn = true; touched = true; }
    if (params.get("fv") === "1")   { state.filtersVisible = true; touched = true; }
    params.forEach(function(v, k){
      if (k.indexOf("f.") === 0) { state.filters[k.slice(2)] = v; touched = true; }
    });
    if (params.get("q")) { searchEl.value = params.get("q"); touched = true; }
    return touched;
  }

  // ---------- Initial load ----------
  var urlApplied = readStateFromUrl();
  if (!urlApplied || state.visibleGroups.size === 0) {
    resetVisibleGroupsForTab(state.activeTab);
  }
  // Highlight the active tab (readStateFromUrl doesn't touch aria-pressed on tabs)
  tabsEl.querySelectorAll(".asw-tab").forEach(function(btn){
    btn.setAttribute("aria-pressed", btn.getAttribute("data-tab") === state.activeTab ? "true" : "false");
  });
  renderSubTabs();
  renderColsBar();
  updateCustomPickerVisibility();
  runQuery();

  // Keep URL in sync after every render (covers sort/filter/heat/group
  // toggle changes in addition to the runQuery path).
  (function(){
    var origRender = render;
    render = function(){ origRender.apply(null, arguments); syncUrl(); };
  })();
})();
</script>
</body>
</html>
