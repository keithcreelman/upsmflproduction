<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UPS Standings</title>
  <style>
    :root {
      --bg: #061a3a;
      --panel: #0d2b57;
      --line: #2a4f86;
      --text: #e8effa;
      --muted: #b9c8e2;
      --gold: #e7be59;
      --navy: #05224f;
      --warn: #ff8a65;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: "Open Sans", Arial, sans-serif;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px;
    }
    .card {
      background: linear-gradient(180deg, rgba(14,44,88,0.98), rgba(8,29,61,0.98));
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 24, 52, 0.55);
      flex-wrap: wrap;
    }
    .title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.04em;
    }
    .sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--line);
      background: #123768;
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
    }
    .btn.active {
      background: var(--gold);
      color: var(--navy);
      border-color: #d8aa41;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .select {
      border: 1px solid var(--line);
      background: #0e2c58;
      color: var(--text);
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .toggleWrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .toggleWrap input {
      accent-color: var(--gold);
    }
    .tableWrap {
      overflow: auto;
      max-height: 70vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }
    th, td {
      border-bottom: 1px solid rgba(42,79,134,0.65);
      padding: 8px 10px;
      font-size: 13px;
      white-space: nowrap;
    }
    th {
      color: #ffdf87;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 11px;
      background: rgba(9,33,67,0.8);
      position: sticky;
      top: 0;
      z-index: 1;
      user-select: none;
    }
    th.is-sortable {
      cursor: pointer;
    }
    th .sort {
      opacity: 0.7;
      margin-left: 4px;
      font-size: 10px;
    }
    th.is-sorted .sort {
      opacity: 1;
      color: #fff7d8;
    }
    tr:nth-child(even) td {
      background: rgba(255,255,255,0.02);
    }
    tr.divisionHeader td {
      background: rgba(13, 47, 93, 0.9) !important;
      color: #ffdf87;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .frRow {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 180px;
    }
    .icon {
      width: 22px;
      height: 22px;
      object-fit: cover;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      flex: 0 0 auto;
    }
    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .muted {
      color: var(--muted);
    }
    .tbFlag {
      display: inline-block;
      margin-left: 6px;
      border: 1px solid rgba(255,138,101,0.7);
      color: #ffd4c6;
      background: rgba(255,138,101,0.16);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.02em;
      padding: 1px 6px;
      cursor: help;
    }
    /* Division Race Module */
    .div-module { padding: 8px 12px; }
    .div-module-controls {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .div-module-controls .btn { font-size: 11px; padding: 4px 10px; }
    .div-group { margin-bottom: 14px; }
    .div-group-header {
      background: rgba(13, 47, 93, 0.9);
      color: #ffdf87;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px 6px 0 0;
      border-bottom: 2px solid var(--gold);
    }
    .div-table { width: 100%; border-collapse: collapse; min-width: 0; }
    .div-table th {
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em;
      font-size: 10px; padding: 5px 8px; text-align: left;
      background: rgba(9,33,67,0.6); border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .div-table th.num { text-align: right; }
    .div-table td { padding: 7px 8px; font-size: 13px; border-bottom: 1px solid rgba(42,79,134,0.4); }
    .div-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .div-table tr.div-row { cursor: pointer; transition: background 0.15s; }
    .div-table tr.div-row:hover { background: rgba(231,190,89,0.08); }
    .div-table tr.div-row-expanded { background: rgba(231,190,89,0.06); }
    .div-h2h-inline { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .div-h2h-inline .h2h-pair { margin-right: 6px; }
    .div-h2h-inline .h2h-w { color: #a5d6a7; }
    .div-h2h-inline .h2h-l { color: #ef9a9a; }
    .div-h2h-inline .h2h-e { color: var(--muted); }
    .div-dropdown { display: none; }
    .div-dropdown.open { display: table-row; }
    .div-dropdown-inner {
      padding: 8px 12px 10px 12px;
      background: rgba(5, 24, 52, 0.7);
      border-bottom: 2px solid var(--line);
    }
    .div-dropdown-title {
      font-size: 11px; font-weight: 800; color: var(--gold);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .div-dd-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 4px 16px;
    }
    .div-dd-rec {
      font-size: 12px; display: flex; justify-content: space-between; gap: 8px;
      padding: 2px 0; border-bottom: 1px solid rgba(42,79,134,0.25);
    }
    .div-dd-opp { color: var(--text); }
    .div-dd-wlt { font-variant-numeric: tabular-nums; font-weight: 700; }
    .pf-rel-pos { color: #a5d6a7; }
    .pf-rel-neg { color: #ef9a9a; }
    /* H2H Matrix */
    .h2h-col-header {
      text-align: center;
      padding: 6px 4px;
      min-width: 52px;
    }
    .h2h-icon {
      width: 18px;
      height: 18px;
      display: block;
      margin: 0 auto 2px;
    }
    .h2h-abbrev {
      font-size: 9px;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    .h2h-cell {
      text-align: center;
      font-size: 11px;
      padding: 6px 3px;
    }
    .h2h-self {
      background: rgba(42, 79, 134, 0.3);
      text-align: center;
      color: var(--muted);
    }
    .h2h-win {
      background: rgba(76, 175, 80, 0.15);
      color: #a5d6a7;
    }
    .h2h-loss {
      background: rgba(244, 67, 54, 0.12);
      color: #ef9a9a;
    }
    .h2h-even {
      background: transparent;
    }
    table.h2h-table {
      min-width: 1100px;
    }
    table.h2h-table td:first-child,
    table.h2h-table th:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(9, 33, 67, 0.95);
    }
    /* Mobile responsive */
    @media (max-width: 960px) {
      .wrap { padding: 6px; }
      .head { padding: 8px 10px; flex-direction: column; align-items: flex-start; }
      .controls { width: 100%; justify-content: flex-start; }
      .title { font-size: 18px; }
      .tableWrap {
        margin-left: -6px;
        margin-right: -6px;
        padding: 0 6px;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }
      table { min-width: 720px; }
    }
    @media (max-width: 720px) {
      table { min-width: 580px; }
      th, td { padding: 6px 6px; font-size: 12px; }
      th { font-size: 10px; }
      .frRow { min-width: 140px; gap: 6px; }
      .icon { width: 18px; height: 18px; }
      .btn { padding: 5px 8px; font-size: 11px; }
      .hide-mobile { display: none !important; }
    }
    @media (max-width: 480px) {
      table { min-width: 420px; }
      th, td { padding: 5px 4px; font-size: 11px; }
      .frRow { min-width: 120px; }
      .icon { width: 16px; height: 16px; }
      .title { font-size: 16px; }
      .sub { font-size: 10px; }
      .btn { padding: 4px 7px; font-size: 10px; }
      .toggles { gap: 4px; }
      .h2h-cell { font-size: 9px; padding: 4px 2px; }
      .h2h-col-header { min-width: 40px; padding: 4px 2px; }
      .h2h-icon { width: 14px; height: 14px; }
      .h2h-abbrev { font-size: 8px; }
      .hide-mobile-sm { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div>
          <div class="title">Standings Snapshot</div>
          <div class="sub" id="metaLine">Loading...</div>
        </div>
        <div class="controls">
          <div class="toggles">
            <button class="btn active" data-view="records">W-L-T</button>
            <button class="btn" data-view="pct">Percentages</button>
            <button class="btn" data-view="points">Points</button>
            <button class="btn" data-view="division">Division Race</button>
            <button class="btn" data-view="wildcard">Wildcard Race</button>
            <button class="btn" data-view="h2h">H2H</button>
          </div>
          <label class="field">Season
            <select id="seasonSelect" class="select"></select>
          </label>
          <label id="showLeadersWrap" class="toggleWrap" style="display:none;">
            <input id="showLeadersChk" type="checkbox" />
            Show Division Leaders
          </label>
        </div>
      </div>
      <div class="tableWrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const $ = (s) => document.querySelector(s);
      const safe = (v) => (v === null || v === undefined ? "" : String(v));
      const n = (v, d = 0) => {
        const x = Number(v);
        return Number.isFinite(x) ? x : d;
      };
      const esc = (s) =>
        safe(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      const eqNum = (a, b) => Math.abs(n(a) - n(b)) < 1e-9;
      const cmpDesc = (a, b) => n(b) - n(a);
      const cmpText = (a, b) => safe(a).localeCompare(safe(b));

      const u = new URL(window.location.href);
      const L = safe(u.searchParams.get("L") || "25625");
      const SOURCE_L = safe(u.searchParams.get("SOURCE_L") || u.searchParams.get("DATA_L") || "74598");
      const YEAR = Number(safe(u.searchParams.get("YEAR") || "2026")) || 2026;

      const state = {
        leagueId: L,
        sourceLeagueId: SOURCE_L,
        season: YEAR,
        requestedSeason: YEAR,
        rows: [],
        meta: {},
        view: "records",
        sortKey: "franchise",
        sortDir: "asc",
        showDivisionLeaders: false,
        divMode: "raw",
        pointsMode: "raw",
        expandedRow: null,
      };

      function pctFromWlt(o) {
        const w = n(o && o.w, 0);
        const l = n(o && o.l, 0);
        const t = n(o && o.t, 0);
        const g = w + l + t;
        return g > 0 ? (w + 0.5 * t) / g : 0;
      }

      function fmtWlt(o) {
        const w = n(o && o.w, 0), l = n(o && o.l, 0), t = n(o && o.t, 0);
        return `${w}-${l}-${t}`;
      }

      function fmtPct(v) { return n(v, 0).toFixed(3); }

      function fmtNum(v) {
        const x = n(v, 0);
        return Number.isInteger(x) ? x.toLocaleString() : x.toFixed(1);
      }

      function leagueAvgPF(rows) {
        if (!rows || !rows.length) return 0;
        var sum = 0;
        rows.forEach(function (r) { sum += n(r.points_for, 0); });
        return sum / rows.length;
      }

      function fmtRel(val, avg) {
        var diff = val - avg;
        var sign = diff >= 0 ? "+" : "";
        return sign + diff.toFixed(1);
      }

      function getDivisionMates(row, allRows) {
        return (allRows || []).filter(function (r) {
          return r.division === row.division && r.franchise_id !== row.franchise_id;
        });
      }

      function normalizeRows(rows) {
        return (rows || []).map((r) => ({
          franchise_id: safe(r.franchise_id),
          franchise_name: safe(r.franchise_name),
          icon: safe(r.icon || r.logo),
          logo: safe(r.logo),
          division: safe(r.division),
          division_name: safe(r.division_name || (r.division ? `Division ${r.division}` : "Division")),
          all_play: r.all_play || { w: 0, l: 0, t: 0 },
          all_play_pct: n(r.all_play_pct, pctFromWlt(r.all_play)),
          overall: r.overall || { w: 0, l: 0, t: 0 },
          overall_pct: n(r.overall_pct, pctFromWlt(r.overall)),
          divisional: r.divisional || { w: 0, l: 0, t: 0 },
          divisional_pct: n(r.divisional_pct, pctFromWlt(r.divisional)),
          points_for: n(r.points_for, 0),
          off_points: n(r.off_points, 0),
          def_points: n(r.def_points, 0),
          potential_points: n(r.potential_points, 0),
          efficiency: n(r.efficiency, 0),
          h2h: r.h2h || {},
        }));
      }

      function hasPlayedGames(rows) {
        return (rows || []).some((r) => {
          const overallGames = n(r.overall && r.overall.w) + n(r.overall && r.overall.l) + n(r.overall && r.overall.t);
          return overallGames > 0 || n(r.points_for) > 0;
        });
      }

      async function fetchSeasonSnapshot(sourceLeagueId, hostLeagueId, year) {
        const candidateLeagueIds = Array.from(
          new Set([
            safe(sourceLeagueId),
            safe(hostLeagueId),
            "74598",
            "25625",
          ].filter(Boolean))
        );
        const candidates = candidateLeagueIds.map((leagueId) => `./standings_${leagueId}_${year}.json`);
        for (const path of candidates) {
          try {
            const res = await fetch(path, { cache: "no-store" });
            if (!res.ok) continue;
            const j = await res.json();
            return j;
          } catch (e) {}
        }
        return null;
      }

      async function loadSeason(year, allowFallback) {
        const y = Number(year) || YEAR;
        let payload = await fetchSeasonSnapshot(state.sourceLeagueId, state.leagueId, y);
        let loadedYear = y;
        if (!payload && allowFallback) {
          payload = await fetchSeasonSnapshot(state.sourceLeagueId, state.leagueId, y - 1);
          loadedYear = y - 1;
        }
        if (!payload) {
          state.rows = [];
          state.meta = {};
          state.season = y;
          render();
          return;
        }

        let rows = normalizeRows(payload && payload.rows);
        if (allowFallback && !hasPlayedGames(rows)) {
          const fallback = await fetchSeasonSnapshot(state.sourceLeagueId, state.leagueId, y - 1);
          const fallbackRows = normalizeRows(fallback && fallback.rows);
          if (fallback && hasPlayedGames(fallbackRows)) {
            payload = fallback;
            rows = fallbackRows;
            loadedYear = y - 1;
          }
        }

        state.rows = rows;
        state.meta = payload && payload.meta ? payload.meta : {};
        state.season = loadedYear;

        const seasonSelect = $("#seasonSelect");
        if (seasonSelect) seasonSelect.value = String(loadedYear);
        render();
      }

      function buildSeasonOptions() {
        const opts = [state.requestedSeason, state.requestedSeason - 1];
        const uniq = Array.from(new Set(opts.filter((v) => Number.isFinite(v) && v > 0)));
        const seasonSelect = $("#seasonSelect");
        if (!seasonSelect) return;
        seasonSelect.innerHTML = uniq
          .map((y) => `<option value="${y}">${y}</option>`)
          .join("");
      }

      function iconFranchiseCell(r) {
        return `
          <div class="frRow">
            <img class="icon" alt="" src="${esc(r.icon || r.logo || "")}" onerror="this.style.display='none'"/>
            <span>${esc(r.franchise_name || r.franchise_id || "")}</span>
          </div>
        `;
      }

      function getSortValue(row, key) {
        if (key === "franchise") return safe(row.franchise_name || row.franchise_id);
        if (key === "all_play_wlt") return pctFromWlt(row.all_play);
        if (key === "overall_wlt") return pctFromWlt(row.overall);
        if (key === "divisional_wlt") return pctFromWlt(row.divisional);
        if (key === "all_play_pct") return n(row.all_play_pct);
        if (key === "overall_pct") return n(row.overall_pct);
        if (key === "divisional_pct") return n(row.divisional_pct);
        if (key === "points_for") return n(row.points_for);
        if (key === "off_points") return n(row.off_points);
        if (key === "def_points") return n(row.def_points);
        if (key === "potential_points") return n(row.potential_points);
        if (key === "efficiency") return n(row.efficiency);
        if (key === "division") return safe(row.division_name || row.division);
        if (key === "h2h_total_wins") {
          var map = row.h2h || {};
          var tw = 0;
          Object.keys(map).forEach(function (k) { tw += n((map[k] || {}).w, 0); });
          return tw;
        }
        if (key === "seed") return n(row.wildcard_rank, 999);
        if (key === "rank") return n(row.division_rank, 999);
        if (key === "leader") return row.is_division_leader ? 0 : 1;
        return safe(row[key]);
      }

      function sortRows(rows) {
        const key = state.sortKey || "franchise";
        const dir = state.sortDir === "desc" ? -1 : 1;
        const arr = (rows || []).slice();
        arr.sort((a, b) => {
          const av = getSortValue(a, key);
          const bv = getSortValue(b, key);
          let cmp = 0;
          if (typeof av === "number" && typeof bv === "number") {
            cmp = av === bv ? 0 : av > bv ? 1 : -1;
          } else {
            cmp = safe(av).localeCompare(safe(bv));
          }
          if (cmp === 0) {
            cmp = safe(a.franchise_name).localeCompare(safe(b.franchise_name));
          }
          return cmp * dir;
        });
        return arr;
      }

      function headCell(key, label, sortable) {
        const isSorted = sortable && state.sortKey === key;
        const arrow = !sortable ? "" : isSorted ? (state.sortDir === "asc" ? "▲" : "▼") : "↕";
        return `<th class="${sortable ? "is-sortable" : ""} ${isSorted ? "is-sorted" : ""}" ${sortable ? `data-sort-key="${esc(key)}"` : ""}>${esc(label)}${sortable ? ` <span class="sort">${arrow}</span>` : ""}</th>`;
      }

      function h2hPctInCluster(row, cluster) {
        const map = row && row.h2h ? row.h2h : {};
        let w = 0, l = 0, t = 0, g = 0;
        (cluster || []).forEach((opp) => {
          if (!opp || opp.franchise_id === row.franchise_id) return;
          const rec = map[opp.franchise_id] || null;
          if (!rec) return;
          const rw = n(rec.w, 0);
          const rl = n(rec.l, 0);
          const rt = n(rec.t, 0);
          const rg = n(rec.games, rw + rl + rt);
          w += rw; l += rl; t += rt; g += rg;
        });
        return g > 0 ? (w + 0.5 * t) / g : -1;
      }

      function rankDivisionGroup(groupRows) {
        const base = (groupRows || []).slice().sort((a, b) =>
          cmpDesc(a.overall_pct, b.overall_pct) ||
          cmpDesc(a.divisional_pct, b.divisional_pct) ||
          cmpText(a.franchise_name, b.franchise_name)
        );

        const buckets = [];
        base.forEach((r) => {
          const key = `${fmtPct(r.overall_pct)}|${fmtPct(r.divisional_pct)}`;
          let bucket = buckets.find((b) => b.key === key);
          if (!bucket) {
            bucket = { key, rows: [] };
            buckets.push(bucket);
          }
          bucket.rows.push({ ...r, _tb_note: "" });
        });

        const ranked = [];
        buckets.forEach((bucket) => {
          const cluster = bucket.rows;
          if (cluster.length === 1) {
            ranked.push(cluster[0]);
            return;
          }

          cluster.forEach((r) => {
            r._cluster_h2h_pct = h2hPctInCluster(r, cluster);
          });

          cluster.sort((a, b) =>
            cmpDesc(a._cluster_h2h_pct, b._cluster_h2h_pct) ||
            cmpDesc(a.points_for, b.points_for) ||
            cmpDesc(a.all_play_pct, b.all_play_pct) ||
            cmpText(a.franchise_name, b.franchise_name)
          );

          for (let i = 1; i < cluster.length; i += 1) {
            const prev = cluster[i - 1];
            const curr = cluster[i];
            if (!eqNum(prev.overall_pct, curr.overall_pct)) continue;
            if (!eqNum(prev.divisional_pct, curr.divisional_pct)) continue;
            if (!eqNum(prev._cluster_h2h_pct, curr._cluster_h2h_pct)) {
              curr._tb_note = "Tiebreaker used: Head-to-head record among tied teams.";
            } else if (!eqNum(prev.points_for, curr.points_for)) {
              curr._tb_note = "Tiebreaker used: Total points scored.";
            } else if (!eqNum(prev.all_play_pct, curr.all_play_pct)) {
              curr._tb_note = "Tiebreaker used: All-play winning percentage.";
            } else {
              curr._tb_note = "Tie remains after configured tiebreakers.";
            }
          }

          ranked.push(...cluster);
        });

        ranked.forEach((r, idx) => {
          r.division_rank = idx + 1;
          r.is_division_leader = idx === 0;
        });
        return ranked;
      }

      function buildDivisionRace(rows) {
        const byDiv = new Map();
        (rows || []).forEach((r) => {
          const key = safe(r.division || "NA");
          if (!byDiv.has(key)) byDiv.set(key, []);
          byDiv.get(key).push(r);
        });

        const divisions = Array.from(byDiv.keys()).sort((a, b) => cmpText(a, b));
        return divisions.map((divKey) => {
          const group = byDiv.get(divKey) || [];
          const ranked = rankDivisionGroup(group);
          const divName = ranked[0] ? safe(ranked[0].division_name || `Division ${divKey}`) : `Division ${divKey}`;
          return { division: divKey, division_name: divName, rows: ranked };
        });
      }

      function buildWildcardRace(rows, showLeaders) {
        const divisionRace = buildDivisionRace(rows);
        const leaderSet = new Set();
        divisionRace.forEach((d) => {
          if (d.rows && d.rows[0]) leaderSet.add(d.rows[0].franchise_id);
        });

        const pool = (rows || []).map((r) => ({
          ...r,
          is_division_leader: leaderSet.has(r.franchise_id),
          _tb_note: "",
        }));
        const filtered = showLeaders ? pool : pool.filter((r) => !r.is_division_leader);

        filtered.sort((a, b) =>
          cmpDesc(a.all_play_pct, b.all_play_pct) ||
          cmpDesc(n(a.all_play && a.all_play.w), n(b.all_play && b.all_play.w)) ||
          cmpDesc(a.overall_pct, b.overall_pct) ||
          cmpDesc(a.points_for, b.points_for) ||
          cmpText(a.franchise_name, b.franchise_name)
        );

        for (let i = 1; i < filtered.length; i += 1) {
          const prev = filtered[i - 1];
          const curr = filtered[i];
          if (!eqNum(prev.all_play_pct, curr.all_play_pct)) continue;
          if (n(prev.all_play && prev.all_play.w) !== n(curr.all_play && curr.all_play.w)) {
            curr._tb_note = "Wildcard tiebreaker: All-play wins.";
          } else if (!eqNum(prev.overall_pct, curr.overall_pct)) {
            curr._tb_note = "Wildcard tiebreaker: Overall winning percentage.";
          } else if (!eqNum(prev.points_for, curr.points_for)) {
            curr._tb_note = "Wildcard tiebreaker: Total points scored.";
          } else {
            curr._tb_note = "Wildcard tie remains after configured tiebreakers.";
          }
        }

        filtered.forEach((r, idx) => {
          r.wildcard_rank = idx + 1;
        });
        return filtered;
      }

      function renderStandard(view) {
        // Points view: show relativity toggle
        var pointsToggleWrap = document.getElementById("pointsModeWrap");
        if (view === "points") {
          if (!pointsToggleWrap) {
            pointsToggleWrap = document.createElement("div");
            pointsToggleWrap.id = "pointsModeWrap";
            pointsToggleWrap.className = "div-module-controls";
            pointsToggleWrap.style.padding = "6px 12px 0";
            pointsToggleWrap.innerHTML =
              '<button class="btn pts-toggle' + (state.pointsMode === "raw" ? " active" : "") + '" data-pts-mode="raw">Raw</button>'
              + '<button class="btn pts-toggle' + (state.pointsMode === "rel" ? " active" : "") + '" data-pts-mode="rel">vs Avg</button>';
            $(".tableWrap").insertBefore(pointsToggleWrap, $("table"));
          } else {
            pointsToggleWrap.style.display = "";
            pointsToggleWrap.querySelectorAll(".pts-toggle").forEach(function (b) {
              b.classList.toggle("active", b.getAttribute("data-pts-mode") === state.pointsMode);
            });
          }
        } else if (pointsToggleWrap) {
          pointsToggleWrap.style.display = "none";
        }

        const isRel = view === "points" && state.pointsMode === "rel";
        const avgPF = isRel ? leagueAvgPF(state.rows || []) : 0;
        const avgOff = isRel ? (function () { var s=0; (state.rows||[]).forEach(function(r){s+=n(r.off_points,0);}); return s/((state.rows||[]).length||1); })() : 0;
        const avgDef = isRel ? (function () { var s=0; (state.rows||[]).forEach(function(r){s+=n(r.def_points,0);}); return s/((state.rows||[]).length||1); })() : 0;
        const avgPP = isRel ? (function () { var s=0; (state.rows||[]).forEach(function(r){s+=n(r.potential_points,0);}); return s/((state.rows||[]).length||1); })() : 0;

        const cols = view === "records"
          ? [
              { key: "franchise", label: "Franchise", hide: "" },
              { key: "all_play_wlt", label: "All Play", hide: "" },
              { key: "overall_wlt", label: "Overall", hide: "" },
              { key: "divisional_wlt", label: "Divisional", hide: "hide-mobile" },
            ]
          : view === "pct"
          ? [
              { key: "franchise", label: "Franchise", hide: "" },
              { key: "all_play_pct", label: "All Play %", hide: "" },
              { key: "overall_pct", label: "Overall %", hide: "" },
              { key: "divisional_pct", label: "Divisional %", hide: "hide-mobile" },
            ]
          : [
              { key: "franchise", label: "Franchise", hide: "" },
              { key: "points_for", label: isRel ? "PF vs Avg" : "PF", hide: "" },
              { key: "off_points", label: isRel ? "Off vs Avg" : "Off Pts", hide: "hide-mobile-sm" },
              { key: "def_points", label: isRel ? "Def vs Avg" : "Def Pts", hide: "hide-mobile" },
              { key: "potential_points", label: isRel ? "PP vs Avg" : "Potential", hide: "hide-mobile" },
              { key: "efficiency", label: "Efficiency", hide: "hide-mobile-sm" },
            ];

        $("#thead").innerHTML = `<tr>${cols.map((c) => {
          const cls = c.hide ? ` class="${c.hide}"` : "";
          const isSorted = state.sortKey === c.key;
          const arrow = isSorted ? (state.sortDir === "asc" ? "▲" : "▼") : "↕";
          return `<th class="is-sortable ${isSorted ? "is-sorted" : ""} ${c.hide}" data-sort-key="${esc(c.key)}">${esc(c.label)} <span class="sort">${arrow}</span></th>`;
        }).join("")}</tr>`;
        const sorted = sortRows(state.rows || []);
        $("#tbody").innerHTML = sorted
          .map((r) => {
            const row = cols
              .map((c) => {
                const cls = c.hide ? ` class="${c.hide}${c.key !== "franchise" ? " num" : ""}"` : (c.key !== "franchise" ? ' class="num"' : "");
                if (c.key === "franchise") return `<td${c.hide ? ' class="' + c.hide + '"' : ""}>${iconFranchiseCell(r)}</td>`;
                if (c.key === "all_play_wlt") return `<td class="num ${c.hide}">${fmtWlt(r.all_play)}</td>`;
                if (c.key === "overall_wlt") return `<td class="num ${c.hide}">${fmtWlt(r.overall)}</td>`;
                if (c.key === "divisional_wlt") return `<td class="num ${c.hide}">${fmtWlt(r.divisional)}</td>`;
                if (c.key === "all_play_pct") return `<td class="num ${c.hide}">${fmtPct(r.all_play_pct)}</td>`;
                if (c.key === "overall_pct") return `<td class="num ${c.hide}">${fmtPct(r.overall_pct)}</td>`;
                if (c.key === "divisional_pct") return `<td class="num ${c.hide}">${fmtPct(r.divisional_pct)}</td>`;
                if (isRel && c.key === "points_for") { var d=r.points_for-avgPF; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`; }
                if (isRel && c.key === "off_points") { var d=r.off_points-avgOff; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`; }
                if (isRel && c.key === "def_points") { var d=r.def_points-avgDef; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`; }
                if (isRel && c.key === "potential_points") { var d=r.potential_points-avgPP; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`; }
                return `<td class="num ${c.hide}">${fmtNum(r[c.key])}</td>`;
              })
              .join("");
            return `<tr>${row}</tr>`;
          })
          .join("");
      }

      function renderDivisionRace() {
        const divisions = buildDivisionRace(state.rows || []);
        const allRows = state.rows || [];
        const avgPF = leagueAvgPF(allRows);
        const isPct = state.divMode === "pct";

        // Build into tableWrap directly — no thead/tbody for this module
        $("#thead").innerHTML = "";
        $("#tbody").innerHTML = "";

        var wrap = $(".tableWrap");
        // Remove previous div module if exists
        var prev = wrap.querySelector(".div-module");
        if (prev) prev.remove();

        var mod = document.createElement("div");
        mod.className = "div-module";

        // RAW ↔ % toggle
        var controls = '<div class="div-module-controls">'
          + '<button class="btn div-toggle' + (!isPct ? " active" : "") + '" data-div-mode="raw">RAW</button>'
          + '<button class="btn div-toggle' + (isPct ? " active" : "") + '" data-div-mode="pct">%</button>'
          + '</div>';
        mod.innerHTML = controls;

        divisions.forEach(function (d) {
          var g = document.createElement("div");
          g.className = "div-group";
          var headerHtml = '<div class="div-group-header">' + esc(d.division_name) + '</div>';

          // Table
          var cols;
          if (isPct) {
            cols = '<tr><th>Team</th><th class="num">Overall %</th><th class="num">Div %</th>'
              + '<th class="num">All-Play %</th><th class="num">PF vs Avg</th></tr>';
          } else {
            cols = '<tr><th>Team</th><th class="num">Overall</th><th class="num">Divisional</th>'
              + '<th>Div H2H</th><th class="num">PF</th><th class="num">All Play</th></tr>';
          }

          var bodyRows = "";
          (d.rows || []).forEach(function (r) {
            var fid = r.franchise_id;
            var isExpanded = state.expandedRow === fid;
            var expandCls = isExpanded ? " div-row-expanded" : "";

            if (isPct) {
              var pfRel = fmtRel(r.points_for, avgPF);
              var pfCls = r.points_for >= avgPF ? "pf-rel-pos" : "pf-rel-neg";
              bodyRows += '<tr class="div-row' + expandCls + '" data-fid="' + esc(fid) + '">'
                + '<td>' + esc(r.franchise_name) + '</td>'
                + '<td class="num">' + fmtPct(r.overall_pct) + '</td>'
                + '<td class="num">' + fmtPct(r.divisional_pct) + '</td>'
                + '<td class="num">' + fmtPct(r.all_play_pct) + '</td>'
                + '<td class="num ' + pfCls + '">' + pfRel + '</td>'
                + '</tr>';
            } else {
              // Build inline div H2H
              var mates = getDivisionMates(r, allRows);
              var h2hHtml = '<span class="div-h2h-inline">';
              mates.forEach(function (m) {
                var rec = (r.h2h || {})[m.franchise_id];
                if (rec && n(rec.games, 0) > 0) {
                  var p = n(rec.pct, 0.5);
                  var cls = p > 0.5 ? "h2h-w" : p < 0.5 ? "h2h-l" : "h2h-e";
                  // Abbreviate opponent name to first word or first 6 chars
                  var abbr = (m.franchise_name || "").split(/[\s\u00a0]/)[0].substring(0, 8);
                  h2hHtml += '<span class="h2h-pair"><span class="' + cls + '">' + esc(abbr) + ' ' + n(rec.w,0) + '-' + n(rec.l,0) + '</span></span> ';
                }
              });
              h2hHtml += '</span>';

              bodyRows += '<tr class="div-row' + expandCls + '" data-fid="' + esc(fid) + '">'
                + '<td>' + esc(r.franchise_name) + '</td>'
                + '<td class="num">' + fmtWlt(r.overall) + '</td>'
                + '<td class="num">' + fmtWlt(r.divisional) + '</td>'
                + '<td>' + h2hHtml + '</td>'
                + '<td class="num">' + fmtNum(r.points_for) + '</td>'
                + '<td class="num">' + fmtWlt(r.all_play) + '</td>'
                + '</tr>';
            }

            // Dropdown row (full H2H vs all opponents)
            var ddColspan = isPct ? 5 : 6;
            var ddStyle = isExpanded ? ' class="div-dropdown open"' : ' class="div-dropdown"';
            bodyRows += '<tr' + ddStyle + ' data-dd-fid="' + esc(fid) + '">'
              + '<td colspan="' + ddColspan + '">'
              + '<div class="div-dropdown-inner">'
              + '<div class="div-dropdown-title">All H2H Records — ' + esc(r.franchise_name) + '</div>'
              + '<div class="div-dd-grid">';

            // All opponents sorted by name
            var opps = allRows.filter(function (o) { return o.franchise_id !== fid; })
              .slice().sort(function (a, b) { return safe(a.franchise_name).localeCompare(safe(b.franchise_name)); });
            opps.forEach(function (opp) {
              var rec = (r.h2h || {})[opp.franchise_id];
              var wlt = rec && n(rec.games, 0) > 0 ? (n(rec.w,0) + '-' + n(rec.l,0) + '-' + n(rec.t,0)) : '—';
              var p = rec ? n(rec.pct, 0.5) : 0.5;
              var cls = (!rec || n(rec.games,0) === 0) ? "" : (p > 0.5 ? "h2h-w" : p < 0.5 ? "h2h-l" : "h2h-e");
              var divTag = opp.division === r.division ? ' ★' : '';
              bodyRows += '<div class="div-dd-rec">'
                + '<span class="div-dd-opp">' + esc(opp.franchise_name) + divTag + '</span>'
                + '<span class="div-dd-wlt ' + cls + '">' + wlt + '</span>'
                + '</div>';
            });

            bodyRows += '</div></div></td></tr>';
          });

          g.innerHTML = headerHtml
            + '<table class="div-table">'
            + '<thead>' + cols + '</thead>'
            + '<tbody>' + bodyRows + '</tbody>'
            + '</table>';
          mod.appendChild(g);
        });

        // Hide the main table, show module
        $("table").style.display = "none";
        wrap.appendChild(mod);
      }

      function renderWildcardRace() {
        const rows = buildWildcardRace(state.rows || [], !!state.showDivisionLeaders);
        $("#thead").innerHTML =
          "<tr>" +
          headCell("seed", "Seed", false) +
          headCell("franchise", "Franchise", true) +
          headCell("division", "Division", true) +
          headCell("all_play_wlt", "All Play", true) +
          headCell("all_play_pct", "All Play %", true) +
          headCell("overall_pct", "Overall %", true) +
          headCell("points_for", "PF", true) +
          headCell("leader", "Leader", false) +
          headCell("tb", "TB Notice", false) +
          "</tr>";

        // Apply hide-mobile classes to header cells
        const thEls = document.querySelectorAll("#thead th");
        if (thEls[7]) thEls[7].classList.add("hide-mobile");  // Leader
        if (thEls[8]) thEls[8].classList.add("hide-mobile");   // TB Notice

        const sorted = state.sortKey && state.sortKey !== "seed"
          ? sortRows(rows)
          : rows;

        $("#tbody").innerHTML = sorted
          .map((r) => {
            const leader = r.is_division_leader ? "Yes" : "No";
            const tb = r._tb_note
              ? `<span class="tbFlag" title="${esc(r._tb_note)}">TB</span>`
              : "";
            return (
              `<tr>` +
                `<td class="num">${n(r.wildcard_rank, 0)}</td>` +
                `<td>${iconFranchiseCell(r)}</td>` +
                `<td>${esc(r.division_name || r.division || "")}</td>` +
                `<td class="num">${fmtWlt(r.all_play)}</td>` +
                `<td class="num">${fmtPct(r.all_play_pct)}</td>` +
                `<td class="num">${fmtPct(r.overall_pct)}</td>` +
                `<td class="num">${fmtNum(r.points_for)}</td>` +
                `<td class="hide-mobile">${leader}</td>` +
                `<td class="hide-mobile">${tb}</td>` +
              `</tr>`
            );
          })
          .join("");
      }

      function renderH2H() {
        const sorted = sortRows(state.rows || []);
        let headerHtml = headCell("franchise", "Franchise", true);
        sorted.forEach(function (col) {
          const abbrev = esc((col.franchise_name || "").substring(0, 4));
          const iconUrl = esc(col.icon || col.logo || "");
          headerHtml += '<th class="h2h-col-header" title="' + esc(col.franchise_name) + '">'
            + '<img class="icon h2h-icon" alt="" src="' + iconUrl + '" onerror="this.style.display=\'none\'" />'
            + '<div class="h2h-abbrev">' + abbrev + '</div>'
            + '</th>';
        });
        headerHtml += headCell("h2h_total_wins", "Total", true);
        $("#thead").innerHTML = "<tr>" + headerHtml + "</tr>";

        let bodyHtml = "";
        sorted.forEach(function (row) {
          let rowHtml = "<td>" + iconFranchiseCell(row) + "</td>";
          let totalW = 0;
          sorted.forEach(function (col) {
            if (col.franchise_id === row.franchise_id) {
              rowHtml += '<td class="h2h-self">&mdash;</td>';
            } else {
              const rec = (row.h2h || {})[col.franchise_id];
              if (rec && n(rec.games, 0) > 0) {
                const pct = n(rec.pct, 0.5);
                const cls = pct > 0.5 ? "h2h-win" : pct < 0.5 ? "h2h-loss" : "h2h-even";
                rowHtml += '<td class="num h2h-cell ' + cls + '">' + fmtWlt(rec) + '</td>';
                totalW += n(rec.w, 0);
              } else {
                rowHtml += '<td class="num h2h-cell muted">&mdash;</td>';
              }
            }
          });
          rowHtml += '<td class="num">' + totalW + '</td>';
          bodyHtml += "<tr>" + rowHtml + "</tr>";
        });
        $("#tbody").innerHTML = bodyHtml;
      }

      function renderMeta() {
        const m = state.meta || {};
        $("#metaLine").textContent = `L ${safe(m.league_id || state.sourceLeagueId || state.leagueId)} | Season ${safe(m.season || state.season)} | Updated ${safe(m.generated_at_utc || "")}`;
      }

      function render() {
        renderMeta();
        document.querySelectorAll(".btn[data-view]").forEach((b) => {
          b.classList.toggle("active", b.getAttribute("data-view") === state.view);
        });
        const showLeadersWrap = $("#showLeadersWrap");
        if (showLeadersWrap) showLeadersWrap.style.display = state.view === "wildcard" ? "" : "none";
        const tbl = document.querySelector("table");
        if (tbl) tbl.classList.toggle("h2h-table", state.view === "h2h");

        // Clean up div module when leaving division view
        var prevMod = document.querySelector(".div-module");
        if (prevMod && state.view !== "division") {
          prevMod.remove();
          if (tbl) tbl.style.display = "";
        }

        if (state.view === "records" || state.view === "pct" || state.view === "points") {
          if (tbl) tbl.style.display = "";
          renderStandard(state.view);
        } else if (state.view === "division") {
          renderDivisionRace();
        } else if (state.view === "h2h") {
          if (tbl) tbl.style.display = "";
          renderH2H();
        } else {
          if (tbl) tbl.style.display = "";
          renderWildcardRace();
        }
      }

      document.addEventListener("click", (e) => {
        // Division module: RAW ↔ % toggle
        const divToggle = e.target && e.target.closest ? e.target.closest(".div-toggle") : null;
        if (divToggle) {
          state.divMode = safe(divToggle.getAttribute("data-div-mode") || "raw");
          state.expandedRow = null;
          render();
          return;
        }
        // Division module: row click → expand/collapse dropdown
        const divRow = e.target && e.target.closest ? e.target.closest("tr.div-row") : null;
        if (divRow) {
          var fid = safe(divRow.getAttribute("data-fid"));
          state.expandedRow = state.expandedRow === fid ? null : fid;
          // Toggle without full re-render for speed
          document.querySelectorAll("tr.div-dropdown").forEach(function (dd) {
            var ddFid = safe(dd.getAttribute("data-dd-fid"));
            dd.classList.toggle("open", ddFid === state.expandedRow);
          });
          document.querySelectorAll("tr.div-row").forEach(function (row) {
            row.classList.toggle("div-row-expanded", safe(row.getAttribute("data-fid")) === state.expandedRow);
          });
          return;
        }
        // Points module: Raw ↔ vs Avg toggle
        const ptsToggle = e.target && e.target.closest ? e.target.closest(".pts-toggle") : null;
        if (ptsToggle) {
          state.pointsMode = safe(ptsToggle.getAttribute("data-pts-mode") || "raw");
          render();
          return;
        }
        // View mode buttons
        const viewBtn = e.target && e.target.closest ? e.target.closest(".btn[data-view]") : null;
        if (viewBtn) {
          state.view = safe(viewBtn.getAttribute("data-view") || "records");
          if (state.view !== "wildcard") state.showDivisionLeaders = false;
          state.sortKey = "franchise";
          state.sortDir = "asc";
          state.expandedRow = null;
          render();
          return;
        }
        const th = e.target && e.target.closest ? e.target.closest("th[data-sort-key]") : null;
        if (!th) return;
        const key = safe(th.getAttribute("data-sort-key"));
        if (!key) return;
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDir = key === "franchise" ? "asc" : "desc";
        }
        render();
      });

      const seasonSelect = $("#seasonSelect");
      if (seasonSelect) {
        seasonSelect.addEventListener("change", async (e) => {
          const y = Number(safe(e.target.value || state.season)) || state.season;
          await loadSeason(y, false);
        });
      }

      const showLeadersChk = $("#showLeadersChk");
      if (showLeadersChk) {
        showLeadersChk.checked = false;
        showLeadersChk.addEventListener("change", (e) => {
          state.showDivisionLeaders = !!e.target.checked;
          if (state.view === "wildcard") render();
        });
      }

      function postHeight() {
        try {
          var h = document.documentElement.scrollHeight;
          if (window.parent !== window) {
            window.parent.postMessage({ type: "ups-standings-height", height: h }, "*");
          }
        } catch (e) {}
      }

      var _origRender = render;
      render = function () { _origRender(); setTimeout(postHeight, 50); };
      window.addEventListener("resize", postHeight);

      async function init() {
        buildSeasonOptions();
        await loadSeason(state.requestedSeason, true);
      }

      init();
    })();
  </script>
</body>
</html>
