                }
              });
              h2hHtml += '</span>';

              bodyRows += '<tr class="div-row' + expandCls + '" data-fid="' + esc(fid) + '">'
                + '<td>' + esc(r.franchise_name) + '</td>'
                + '<td class="num">' + fmtWlt(r.overall) + '</td>'
                + '<td class="num">' + fmtWlt(r.divisional) + '</td>'
                + '<td>' + h2hHtml + '</td>'
                + '<td class="num">' + fmtNum(r.points_for) + '</td>'
                + '<td class="num">' + fmtWlt(r.all_play) + '</td>'
                + '</tr>';
            }

            // Dropdown row (H2H or All-Play vs all opponents)
            var ddColspan = isPct ? 5 : 6;
            var ddStyle = isExpanded ? ' class="div-dropdown open"' : ' class="div-dropdown"';
            var isAP = state.ddMode === "allplay";
            var ddTitle = isAP ? "All-Play vs Opponent — " : "All H2H Records — ";
            bodyRows += '<tr' + ddStyle + ' data-dd-fid="' + esc(fid) + '">'
              + '<td colspan="' + ddColspan + '">'
              + '<div class="div-dropdown-inner">'
              + '<div class="div-module-controls" style="margin-bottom:6px">'
              + '<button class="btn dd-mode-toggle' + (!isAP ? " active" : "") + '" data-dd-mode="h2h">H2H</button>'
              + '<button class="btn dd-mode-toggle' + (isAP ? " active" : "") + '" data-dd-mode="allplay">All-Play</button>'
              + '</div>'
              + '<div class="div-dropdown-title">' + ddTitle + esc(r.franchise_name) + '</div>'
              + '<div class="div-dd-grid">';

            // All opponents sorted by name
            var opps = allRows.filter(function (o) { return o.franchise_id !== fid; })
              .slice().sort(function (a, b) { return safe(a.franchise_name).localeCompare(safe(b.franchise_name)); });
            opps.forEach(function (opp) {
              var wlt, p, cls;
              if (isAP && Object.keys(state.weeklyScores).length > 0) {
                var apRec = computeAllPlayVsOpp(fid, opp.franchise_id, state.weeklyScores, rng[0], rng[1]);
                var apGames = apRec.w + apRec.l + apRec.t;
                wlt = apGames > 0 ? (apRec.w + '-' + apRec.l + '-' + apRec.t) : '—';
                p = apGames > 0 ? (apRec.w + 0.5 * apRec.t) / apGames : 0.5;
                cls = apGames === 0 ? "" : (p > 0.5 ? "h2h-w" : p < 0.5 ? "h2h-l" : "h2h-e");
              } else {
                var rec = (r.h2h || {})[opp.franchise_id];
                wlt = rec && n(rec.games, 0) > 0 ? (n(rec.w,0) + '-' + n(rec.l,0) + '-' + n(rec.t,0)) : '—';
                p = rec ? n(rec.pct, 0.5) : 0.5;
                cls = (!rec || n(rec.games,0) === 0) ? "" : (p > 0.5 ? "h2h-w" : p < 0.5 ? "h2h-l" : "h2h-e");
              }
              var divTag = opp.division === r.division ? ' ★' : '';
              bodyRows += '<div class="div-dd-rec">'
                + '<span class="div-dd-opp">' + esc(opp.franchise_name) + divTag + '</span>'
                + '<span class="div-dd-wlt ' + cls + '">' + wlt + '</span>'
                + '</div>';
            });

            bodyRows += '</div></div></td></tr>';
          });

          g.innerHTML = headerHtml
            + '<table class="div-table">'
            + '<thead>' + cols + '</thead>'
            + '<tbody>' + bodyRows + '</tbody>'
            + '</table>';
          mod.appendChild(g);
        });

        // Hide the main table, show module
        $("table").style.display = "none";
        wrap.appendChild(mod);
      }

      /* ── Playoff Preview Renderer ── */
      function renderPlayoffPreview() {
        var data = buildPlayoffSeeding(state.rows || []);
        var playoff = data.playoff;   // seeds 1-6
        var consolation = data.consolation; // seeds 1-6 (Hawk Tuah)

        $("#thead").innerHTML = "";
        $("#tbody").innerHTML = "";

        var wrap = $(".tableWrap");
        var prev = wrap.querySelector(".po-module");
        if (prev) prev.remove();

        var mod = document.createElement("div");
        mod.className = "po-module";

        // Helper: build a seed row
        function seedRow(r, isHawk) {
          var numCls = isHawk ? "po-seed-num po-hawk-seed-num" : "po-seed-num";
          var badge = "";
          if (r._po_path === "DIV") badge = '<span class="po-seed-badge po-badge-dw">DIV</span>';
          else if (r._po_path === "WC") badge = '<span class="po-seed-badge po-badge-wc">WC</span>';
          if (!isHawk && r._po_seed <= 2) badge += '<span class="po-seed-badge po-badge-bye">BYE</span>';

          return '<div class="po-seed-row">'
            + '<div class="' + numCls + '">#' + r._po_seed + '</div>'
            + '<div class="po-seed-team">'
            +   '<div class="po-seed-name">' + badge + esc(r.franchise_name) + '</div>'
            +   '<div class="po-seed-why">' + esc(r._po_why) + '</div>'
            + '</div>'
            + '<div class="po-stats">'
            +   '<span>' + fmtWlt(r.all_play) + ' AP</span>'
            +   '<span>' + fmtNum(r.points_for) + ' PF</span>'
            +   '<span>' + fmtPct(r.all_play_pct) + '</span>'
            + '</div>'
            + '</div>';
        }

        // Helper: build a matchup card (clickable with dropdown)
        function matchupCard(a, b) {
          var mkey = a.franchise_id + "-" + b.franchise_id;
          var isExp = state.expandedMatchup === mkey;
          var card = '<div class="po-matchup po-matchup-clickable" data-matchup="' + esc(mkey) + '" style="cursor:pointer">'
            + '<span class="po-matchup-seed">#' + a._po_seed + '</span>'
            + '<span class="po-matchup-team">' + esc(a.franchise_name) + '</span>'
            + '<span class="po-matchup-vs">VS</span>'
            + '<span class="po-matchup-team" style="text-align:right">' + esc(b.franchise_name) + '</span>'
            + '<span class="po-matchup-seed">#' + b._po_seed + '</span>'
            + '</div>';
          if (isExp) {
            card += matchupDropdown(a, b);
          }
          return card;
        }

        // Expanded dropdown for a matchup: reg-season meetings + tale of the tape
        function matchupDropdown(a, b) {
          var dd = '<div style="padding:8px 10px; background:rgba(5,24,52,0.7); border:1px solid var(--line); border-top:none; border-radius:0 0 8px 8px; margin-top:-7px; margin-bottom:6px;">';
          // Regular season meetings (weeks 1-14)
          dd += '<div class="div-dropdown-title">Regular Season Meetings</div>';
          var meetings = 0;
          for (var w = 1; w <= 14; w++) {
            var wm = (state.weeklyMatchups || {})[String(w)] || [];
            for (var mi = 0; mi < wm.length; mi++) {
              var m = wm[mi];
              var aScore = -1, bScore = -1;
              if (m.home === a.franchise_id && m.away === b.franchise_id) {
                aScore = m.homeScore; bScore = m.awayScore;
              } else if (m.home === b.franchise_id && m.away === a.franchise_id) {
                aScore = m.awayScore; bScore = m.homeScore;
              }
              if (aScore >= 0) {
                var winCls = aScore > bScore ? "pf-rel-pos" : aScore < bScore ? "pf-rel-neg" : "";
                dd += '<div style="font-size:12px; padding:2px 0; border-bottom:1px solid rgba(42,79,134,0.2);">'
                  + 'Week ' + w + ': <span class="' + winCls + '">' + esc(a.franchise_name) + ' ' + fmtNum(aScore) + '</span>'
                  + ' &ndash; <span class="' + (aScore < bScore ? "pf-rel-pos" : aScore > bScore ? "pf-rel-neg" : "") + '">'
                  + fmtNum(bScore) + ' ' + esc(b.franchise_name) + '</span></div>';
                meetings++;
              }
            }
          }
          if (meetings === 0) {
            dd += '<div class="po-bye-note">No regular-season meetings found.</div>';
          }
          // Tale of the tape: per-week averages
          var rng = rangeWeeks(state.range);
          var aWp = weeksPlayed(a.franchise_id, state.weeklyScores, 1, 14);
          var bWp = weeksPlayed(b.franchise_id, state.weeklyScores, 1, 14);
          if (aWp > 0 && bWp > 0) {
            dd += '<div class="div-dropdown-title" style="margin-top:8px;">Tale of the Tape (per week, regular season)</div>';
            dd += '<table class="div-table" style="margin-bottom:0;"><thead><tr>'
              + '<th></th><th class="num">' + esc(a.franchise_name) + '</th>'
              + '<th class="num">' + esc(b.franchise_name) + '</th></tr></thead><tbody>';
            var stats = [
              ["PF/wk", a.points_for / aWp, b.points_for / bWp],
              ["OP/wk", a.off_points / aWp, b.off_points / bWp],
              ["DP/wk", a.def_points / aWp, b.def_points / bWp],
            ];
            stats.forEach(function (s) {
              var aCls = s[1] > s[2] ? "pf-rel-pos" : s[1] < s[2] ? "pf-rel-neg" : "";
              var bCls = s[2] > s[1] ? "pf-rel-pos" : s[2] < s[1] ? "pf-rel-neg" : "";
              dd += '<tr><td style="font-size:12px;">' + s[0] + '</td>'
                + '<td class="num ' + aCls + '" style="font-size:12px;">' + fmtNum(s[1]) + '</td>'
                + '<td class="num ' + bCls + '" style="font-size:12px;">' + fmtNum(s[2]) + '</td></tr>';
            });
            dd += '</tbody></table>';
          }
          dd += '</div>';
          return dd;
        }

        var html = "";

        // ─── Playoff Seeds ───
        html += '<div class="po-section">'
          + '<div class="po-section-title">Projected Playoff Seeds</div>';
        playoff.forEach(function (r) { html += seedRow(r, false); });
        html += '</div>';

        // ─── Round 1 Matchups ───
        // #1 and #2 have byes, #3v#6, #4v#5
        html += '<div class="po-section">'
          + '<div class="po-section-title">Round 1 — Matchups</div>'
          + '<div class="po-bye-note">#1 ' + esc(playoff[0].franchise_name) + ' and #2 ' + esc(playoff[1].franchise_name) + ' receive first-round byes</div>'
          + matchupCard(playoff[2], playoff[5])   // 3v6
          + matchupCard(playoff[3], playoff[4]);   // 4v5
        html += '</div>';

        // ─── Reseeding note ───
        html += '<div class="po-section">'
          + '<div class="po-section-title">Bracket Rules</div>'
          + '<div class="po-bye-note">Reseed every round — lowest remaining seed plays highest remaining seed.</div>'
          + '</div>';

        // ─── Hawk Tuah Consolation Bowl ───
        if (consolation.length > 0) {
          html += '<div class="po-section">'
            + '<div class="po-section-title po-hawk-title">Hawk Tuah Consolation Bowl</div>';
          consolation.forEach(function (r) { html += seedRow(r, true); });

          // Consolation matchups: same bracket — #1&#2 byes, 3v6, 4v5
          if (consolation.length >= 6) {
            html += '<div style="margin-top:8px">'
              + '<div class="po-bye-note">#1 ' + esc(consolation[0].franchise_name) + ' and #2 ' + esc(consolation[1].franchise_name) + ' receive first-round byes</div>'
              + matchupCard(consolation[2], consolation[5])
              + matchupCard(consolation[3], consolation[4])
              + '</div>';
          }
          html += '</div>';
        }

        mod.innerHTML = html;
        $("table").style.display = "none";
        wrap.appendChild(mod);
      }

      function renderWildcardRace() {
        const rows = buildWildcardRace(state.rows || [], !!state.showDivisionLeaders);
        $("#thead").innerHTML =
          "<tr>" +
          headCell("seed", "Seed", false) +
          headCell("franchise", "Franchise", true) +
          headCell("division", "Division", true) +
          headCell("all_play_wlt", "All Play", true) +
          headCell("all_play_pct", "All Play %", true) +
          headCell("overall_pct", "Overall %", true) +
          headCell("points_for", "PF", true) +
          headCell("leader", "Leader", false) +
          headCell("tb", "TB Notice", false) +
          "</tr>";

        // Apply hide-mobile classes to header cells
        const thEls = document.querySelectorAll("#thead th");
        if (thEls[7]) thEls[7].classList.add("hide-mobile");  // Leader
        if (thEls[8]) thEls[8].classList.add("hide-mobile");   // TB Notice

        const sorted = state.sortKey && state.sortKey !== "seed"
          ? sortRows(rows)
          : rows;

        $("#tbody").innerHTML = sorted
          .map((r) => {
            const leader = r.is_division_leader ? "Yes" : "No";
            const tb = r._tb_note
              ? `<span class="tbFlag" title="${esc(r._tb_note)}">TB</span>`
              : "";
            return (
              `<tr>` +
                `<td class="num">${n(r.wildcard_rank, 0)}</td>` +
                `<td>${iconFranchiseCell(r)}</td>` +
                `<td>${esc(r.division_name || r.division || "")}</td>` +
                `<td class="num">${fmtWlt(r.all_play)}</td>` +
                `<td class="num">${fmtPct(r.all_play_pct)}</td>` +
                `<td class="num">${fmtPct(r.overall_pct)}</td>` +
                `<td class="num">${fmtNum(r.points_for)}</td>` +
                `<td class="hide-mobile">${leader}</td>` +
                `<td class="hide-mobile">${tb}</td>` +
              `</tr>`
            );
          })
          .join("");
      }

      function renderH2H() {
        const sorted = sortRows(state.rows || []);
        let headerHtml = headCell("franchise", "Franchise", true);
        sorted.forEach(function (col) {
          const abbrev = esc((col.franchise_name || "").substring(0, 4));
          const iconUrl = esc(col.icon || col.logo || "");
          headerHtml += '<th class="h2h-col-header" title="' + esc(col.franchise_name) + '">'
            + '<img class="icon h2h-icon" alt="" src="' + iconUrl + '" onerror="this.style.display=\'none\'" />'
            + '<div class="h2h-abbrev">' + abbrev + '</div>'
            + '</th>';
        });
        headerHtml += headCell("h2h_total_wins", "Total", true);
        $("#thead").innerHTML = "<tr>" + headerHtml + "</tr>";

        let bodyHtml = "";
        sorted.forEach(function (row) {
          let rowHtml = "<td>" + iconFranchiseCell(row) + "</td>";
          let totalW = 0;
          sorted.forEach(function (col) {
            if (col.franchise_id === row.franchise_id) {
              rowHtml += '<td class="h2h-self">&mdash;</td>';
            } else {
              const rec = (row.h2h || {})[col.franchise_id];
              if (rec && n(rec.games, 0) > 0) {
                const pct = n(rec.pct, 0.5);
                const cls = pct > 0.5 ? "h2h-win" : pct < 0.5 ? "h2h-loss" : "h2h-even";
                rowHtml += '<td class="num h2h-cell ' + cls + '">' + fmtWlt(rec) + '</td>';
                totalW += n(rec.w, 0);
              } else {
                rowHtml += '<td class="num h2h-cell muted">&mdash;</td>';
              }
            }
          });
          rowHtml += '<td class="num">' + totalW + '</td>';
          bodyHtml += "<tr>" + rowHtml + "</tr>";
        });
        $("#tbody").innerHTML = bodyHtml;
      }

      function renderMeta() {
        const m = state.meta || {};
        $("#metaLine").textContent = `L ${safe(m.league_id || state.sourceLeagueId || state.leagueId)} | Season ${safe(m.season || state.season)} | Updated ${safe(m.generated_at_utc || "")}`;
      }

      function render() {
        if (state.view === "playoff") state.view = "division";
        syncRangeControls();
        syncModeSelect();
        renderMeta();
        document.querySelectorAll(".btn[data-view]").forEach((b) => {
          b.classList.toggle("active", b.getAttribute("data-view") === state.view);
        });
        const showLeadersWrap = $("#showLeadersWrap");
        if (showLeadersWrap) showLeadersWrap.style.display = state.view === "wildcard" ? "" : "none";
        const tbl = document.querySelector("table");
        if (tbl) tbl.classList.toggle("h2h-table", state.view === "h2h");

        // Clean up custom modules when leaving their views
        var prevDivMod = document.querySelector(".div-module");
        if (prevDivMod && state.view !== "division") {
          prevDivMod.remove();
          if (tbl) tbl.style.display = "";
        }
        var prevPoMod = document.querySelector(".po-module");
        if (prevPoMod && state.view !== "playoff") {
          prevPoMod.remove();
          if (tbl) tbl.style.display = "";
        }
        // Hide points-mode toggle and sub-tabs when not in Points Breakdown
        var ptsModeEl = document.getElementById("pointsModeWrap");
        if (ptsModeEl && state.view !== "points") {
          ptsModeEl.style.display = "none";
        }
        var ptsTabEl = document.getElementById("pointsTabWrap");
        if (ptsTabEl && state.view !== "points") {
          ptsTabEl.style.display = "none";
        }

        if (state.view === "records" || state.view === "pct" || state.view === "points") {
          if (tbl) tbl.style.display = "";
          renderStandard(state.view);
        } else if (state.view === "division") {
          renderDivisionRace();
        } else if (state.view === "playoff") {
          renderPlayoffPreview();
        } else if (state.view === "h2h") {
          if (tbl) tbl.style.display = "";
          renderH2H();
        } else {
          if (tbl) tbl.style.display = "";
          renderWildcardRace();
        }
      }

      document.addEventListener("click", (e) => {
        // Range selector
        var rangeBtn = e.target && e.target.closest ? e.target.closest(".range-btn") : null;
        if (rangeBtn) {
          applyRangePreset(safe(rangeBtn.getAttribute("data-range") || "regular"));
          state.expandedRow = null;
          state.expandedMatchup = null;
          render();
          return;
        }
        // Dropdown mode toggle (H2H ↔ All-Play)
        var ddModeBtn = e.target && e.target.closest ? e.target.closest(".dd-mode-toggle") : null;
        if (ddModeBtn) {
          state.ddMode = safe(ddModeBtn.getAttribute("data-dd-mode") || "h2h");
          render();
          return;
        }
        // Playoff matchup expand/collapse
        var poMatchup = e.target && e.target.closest ? e.target.closest(".po-matchup-clickable") : null;
        if (poMatchup) {
          var mkey = safe(poMatchup.getAttribute("data-matchup"));
          state.expandedMatchup = state.expandedMatchup === mkey ? null : mkey;
          render();
          return;
        }
        // Points sub-tab
        var ptsTab = e.target && e.target.closest ? e.target.closest(".points-tab") : null;
        if (ptsTab) {
          state.pointsTab = safe(ptsTab.getAttribute("data-pts-tab") || "points");
          render();
          return;
        }
        // Division module: RAW ↔ % toggle
        const divToggle = e.target && e.target.closest ? e.target.closest(".div-toggle") : null;
        if (divToggle) {
          state.divMode = safe(divToggle.getAttribute("data-div-mode") || "raw");
          state.expandedRow = null;
          render();
          return;
        }
        // Division module: row click → expand/collapse dropdown
        const divRow = e.target && e.target.closest ? e.target.closest("tr.div-row") : null;
        if (divRow) {
          var fid = safe(divRow.getAttribute("data-fid"));
          state.expandedRow = state.expandedRow === fid ? null : fid;
          // Toggle without full re-render for speed
          document.querySelectorAll("tr.div-dropdown").forEach(function (dd) {
            var ddFid = safe(dd.getAttribute("data-dd-fid"));
            dd.classList.toggle("open", ddFid === state.expandedRow);
          });
          document.querySelectorAll("tr.div-row").forEach(function (row) {
            row.classList.toggle("div-row-expanded", safe(row.getAttribute("data-fid")) === state.expandedRow);
          });
          return;
        }
        // Points module: Raw ↔ vs Avg toggle
        const ptsToggle = e.target && e.target.closest ? e.target.closest(".pts-toggle") : null;
        if (ptsToggle) {
          state.pointsMode = safe(ptsToggle.getAttribute("data-pts-mode") || "raw");
          render();
          return;
        }
        // View mode buttons
        const viewBtn = e.target && e.target.closest ? e.target.closest(".btn[data-view]") : null;
        if (viewBtn) {
          state.view = safe(viewBtn.getAttribute("data-view") || "records");
          if (state.view !== "wildcard") state.showDivisionLeaders = false;
          state.sortKey = "franchise";
          state.sortDir = "asc";
          state.expandedRow = null;
          state.expandedMatchup = null;
          state.pointsTab = "points";
          state.ddMode = "h2h";
          render();
          return;
        }
        const th = e.target && e.target.closest ? e.target.closest("th[data-sort-key]") : null;
        if (!th) return;
        const key = safe(th.getAttribute("data-sort-key"));
        if (!key) return;
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
        } else {
          state.sortKey = key;
          state.sortDir = key === "franchise" ? "asc" : "desc";
        }
        render();
      });

      const seasonSelect = $("#seasonSelect");
      if (seasonSelect) {
        seasonSelect.addEventListener("change", async (e) => {
          const y = Number(safe(e.target.value || state.season)) || state.season;
          await loadSeason(y, false);
        });
      }

      const showLeadersChk = $("#showLeadersChk");
      if (showLeadersChk) {
        showLeadersChk.checked = false;
        showLeadersChk.addEventListener("change", (e) => {
          state.showDivisionLeaders = !!e.target.checked;
          if (state.view === "wildcard") render();
        });
      }

      const rangeStartSelect = $("#rangeStartSelect");
      if (rangeStartSelect) {
        rangeStartSelect.addEventListener("change", function (e) {
          state.rangeStartWeek = clampWeek(e.target.value);
          syncRangePresetFromWeeks();
          state.expandedRow = null;
          state.expandedMatchup = null;
          render();
        });
      }

      const rangeEndSelect = $("#rangeEndSelect");
      if (rangeEndSelect) {
        rangeEndSelect.addEventListener("change", function (e) {
          state.rangeEndWeek = clampWeek(e.target.value);
          syncRangePresetFromWeeks();
          state.expandedRow = null;
          state.expandedMatchup = null;
          render();
        });
      }

      const modeSelect = $("#modeSelect");
      if (modeSelect) {
        modeSelect.addEventListener("change", function (e) {
          var val = safe(e.target && e.target.value || "raw");
          if (state.view === "division") {
            state.divMode = (val === "pct" ? "pct" : "raw");
          } else if (state.view === "points") {
            state.pointsMode = (val === "rel" ? "rel" : "raw");
          }
          render();
        });
      }

      function postHeight() {
        try {
          var h = document.documentElement.scrollHeight;
          if (window.parent !== window) {
            window.parent.postMessage({ type: "ups-standings-height", height: h }, "*");
          }
        } catch (e) {}
      }

      var _origRender = render;
      render = function () { _origRender(); setTimeout(postHeight, 50); };
      window.addEventListener("resize", postHeight);

      async function init() {
        buildSeasonOptions();
        await loadSeason(state.requestedSeason, true);
      }

      init();
    })();
  </script>
</body>
</html>
