<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UPS Standings</title>
  <style>
    :root {
      --bg: #061a3a;
      --panel: #0d2b57;
      --line: #2a4f86;
      --text: #e8effa;
      --muted: #b9c8e2;
      --gold: #e7be59;
      --navy: #05224f;
      --warn: #ff8a65;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: "Open Sans", Arial, sans-serif;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 10px;
    }
    .card {
      background: linear-gradient(180deg, rgba(14,44,88,0.98), rgba(8,29,61,0.98));
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 24, 52, 0.55);
      flex-wrap: wrap;
    }
    .title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.04em;
    }
    .sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }
    .toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--line);
      background: #123768;
      color: var(--text);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
    }
    .btn.active {
      background: var(--gold);
      color: var(--navy);
      border-color: #d8aa41;
    }
    .field {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .select {
      border: 1px solid var(--line);
      background: #0e2c58;
      color: var(--text);
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .toggleWrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .toggleWrap input {
      accent-color: var(--gold);
    }
    .tableWrap {
      overflow: auto;
      max-height: 70vh;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }
    th, td {
      border-bottom: 1px solid rgba(42,79,134,0.65);
      padding: 8px 10px;
      font-size: 13px;
      white-space: nowrap;
    }
    th {
      color: #ffdf87;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 11px;
      background: rgba(9,33,67,0.8);
      position: sticky;
      top: 0;
      z-index: 1;
      user-select: none;
    }
    th.is-sortable {
      cursor: pointer;
    }
    th .sort {
      opacity: 0.7;
      margin-left: 4px;
      font-size: 10px;
    }
    th.is-sorted .sort {
      opacity: 1;
      color: #fff7d8;
    }
    tr:nth-child(even) td {
      background: rgba(255,255,255,0.02);
    }
    tr.divisionHeader td {
      background: rgba(13, 47, 93, 0.9) !important;
      color: #ffdf87;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .frRow {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 180px;
    }
    .icon {
      width: 22px;
      height: 22px;
      object-fit: cover;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06);
      flex: 0 0 auto;
    }
    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .muted {
      color: var(--muted);
    }
    .tbFlag {
      display: inline-block;
      margin-left: 6px;
      border: 1px solid rgba(255,138,101,0.7);
      color: #ffd4c6;
      background: rgba(255,138,101,0.16);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.02em;
      padding: 1px 6px;
      cursor: help;
    }
    /* Division Race Module */
    .div-module { padding: 8px 12px; }
    .div-module-controls {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .div-module-controls .btn { font-size: 11px; padding: 4px 10px; }
    .div-group { margin-bottom: 14px; }
    .div-group-header {
      background: rgba(13, 47, 93, 0.9);
      color: #ffdf87;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px 6px 0 0;
      border-bottom: 2px solid var(--gold);
    }
    .div-table { width: 100%; border-collapse: collapse; min-width: 0; }
    .div-table th {
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em;
      font-size: 10px; padding: 5px 8px; text-align: left;
      background: rgba(9,33,67,0.6); border-bottom: 1px solid var(--line);
      font-weight: 700;
    }
    .div-table th.num { text-align: right; }
    .div-table td { padding: 7px 8px; font-size: 13px; border-bottom: 1px solid rgba(42,79,134,0.4); }
    .div-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .div-table tr.div-row { cursor: pointer; transition: background 0.15s; }
    .div-table tr.div-row:hover { background: rgba(231,190,89,0.08); }
    .div-table tr.div-row-expanded { background: rgba(231,190,89,0.06); }
    .div-h2h-inline { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .div-h2h-inline .h2h-pair { margin-right: 6px; }
    .div-h2h-inline .h2h-w { color: #a5d6a7; }
    .div-h2h-inline .h2h-l { color: #ef9a9a; }
    .div-h2h-inline .h2h-e { color: var(--muted); }
    .div-dropdown { display: none; }
    .div-dropdown.open { display: table-row; }
    .div-dropdown-inner {
      padding: 8px 12px 10px 12px;
      background: rgba(5, 24, 52, 0.7);
      border-bottom: 2px solid var(--line);
    }
    .div-dropdown-title {
      font-size: 11px; font-weight: 800; color: var(--gold);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .div-dd-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 4px 16px;
    }
    .div-dd-rec {
      font-size: 12px; display: flex; justify-content: space-between; gap: 8px;
      padding: 2px 0; border-bottom: 1px solid rgba(42,79,134,0.25);
    }
    .div-dd-opp { color: var(--text); }
    .div-dd-wlt { font-variant-numeric: tabular-nums; font-weight: 700; }
    .pf-rel-pos { color: #a5d6a7; }
    .pf-rel-neg { color: #ef9a9a; }
    /* Range Selector */
    .range-selector {
      display: inline-flex; gap: 0; border-radius: 999px; overflow: hidden;
      border: 1px solid var(--line); margin-left: auto;
    }
    .range-stack {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      margin-left: auto;
      min-width: max-content;
    }
    .range-btn {
      border: none; background: #0e2c58; color: var(--muted);
      padding: 5px 12px; font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      border-right: 1px solid var(--line);
    }
    .range-btn:last-child { border-right: none; }
    .range-btn.active { background: #1a4a7a; color: var(--text); }
    .range-advanced {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .range-advanced .field {
      white-space: nowrap;
    }
    .range-advanced .select {
      min-width: 66px;
    }
    /* Points sub-tabs */
    .points-tabs {
      display: flex; gap: 0; margin: 0 12px; border-bottom: 2px solid var(--line);
    }
    .points-tab {
      background: transparent; border: none; color: var(--muted);
      padding: 6px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .points-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    /* Playoff Preview Module */
    .po-module { padding: 10px 12px; }
    .po-section { margin-bottom: 16px; }
    .po-section-title {
      font-size: 12px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.04em; color: #ffdf87; margin-bottom: 8px;
      padding-bottom: 4px; border-bottom: 1px solid var(--line);
    }
    .po-seed-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-bottom: 1px solid rgba(42,79,134,0.35);
      transition: background 0.15s;
    }
    .po-seed-row:hover { background: rgba(231,190,89,0.06); }
    .po-seed-num {
      font-size: 18px; font-weight: 900; color: var(--gold);
      min-width: 28px; text-align: center; flex: 0 0 auto;
    }
    .po-seed-team { flex: 1; min-width: 0; }
    .po-seed-name { font-size: 13px; font-weight: 700; }
    .po-seed-why {
      font-size: 11px; color: var(--muted); margin-top: 2px;
      white-space: normal; line-height: 1.3;
    }
    .po-seed-badge {
      display: inline-block; font-size: 10px; font-weight: 800;
      padding: 1px 7px; border-radius: 999px; margin-right: 6px;
      letter-spacing: 0.02em; vertical-align: middle;
    }
    .po-badge-dw {
      background: rgba(231,190,89,0.2); color: #ffdf87;
      border: 1px solid rgba(231,190,89,0.5);
    }
    .po-badge-wc {
      background: rgba(100,181,246,0.15); color: #90caf9;
      border: 1px solid rgba(100,181,246,0.4);
    }
    .po-badge-bye {
      background: rgba(165,214,167,0.15); color: #a5d6a7;
      border: 1px solid rgba(165,214,167,0.4);
    }
    .po-stats {
      display: flex; gap: 12px; flex: 0 0 auto;
      font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums;
    }
    .po-stats span { white-space: nowrap; }
    .po-matchup {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; margin-bottom: 6px;
      background: rgba(5, 24, 52, 0.5);
      border: 1px solid rgba(42,79,134,0.4);
      border-radius: 8px;
    }
    .po-matchup-seed {
      font-size: 14px; font-weight: 900; color: var(--gold);
      min-width: 22px; text-align: center;
    }
    .po-matchup-team {
      flex: 1; font-size: 13px; font-weight: 700; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .po-matchup-vs {
      font-size: 11px; font-weight: 900; color: var(--muted);
      padding: 0 4px; flex: 0 0 auto;
    }
    .po-bye-note {
      font-size: 11px; color: var(--muted); font-style: italic;
      padding: 4px 10px;
    }
    .po-hawk-title {
      color: var(--warn); border-bottom-color: rgba(255,138,101,0.4);
    }
    .po-hawk-seed-num { color: var(--warn); }
    @media (max-width: 720px) {
      .po-stats { gap: 8px; font-size: 10px; }
      .po-seed-row { gap: 6px; padding: 6px 8px; }
      .po-seed-num { font-size: 15px; min-width: 22px; }
      .po-matchup { padding: 6px 8px; }
    }
    @media (max-width: 480px) {
      .po-stats { display: none; }
    }
    /* H2H Matrix */
    .h2h-col-header {
      text-align: center;
      padding: 6px 4px;
      min-width: 52px;
    }
    .h2h-icon {
      width: 18px;
      height: 18px;
      display: block;
      margin: 0 auto 2px;
    }
    .h2h-abbrev {
      font-size: 9px;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    .h2h-cell {
      text-align: center;
      font-size: 11px;
      padding: 6px 3px;
    }
    .h2h-self {
      background: rgba(42, 79, 134, 0.3);
      text-align: center;
      color: var(--muted);
    }
    .h2h-win {
      background: rgba(76, 175, 80, 0.15);
      color: #a5d6a7;
    }
    .h2h-loss {
      background: rgba(244, 67, 54, 0.12);
      color: #ef9a9a;
    }
    .h2h-even {
      background: transparent;
    }
    table.h2h-table {
      min-width: 1100px;
    }
    table.h2h-table td:first-child,
    table.h2h-table th:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(9, 33, 67, 0.95);
    }
    /* Mobile responsive */
    @media (max-width: 960px) {
      .wrap { padding: 6px; }
      .head { padding: 8px 10px; flex-direction: column; align-items: flex-start; }
      .controls { width: 100%; justify-content: flex-start; }
      .range-stack { margin-left: 0; align-items: flex-start; min-width: 0; width: 100%; }
      .range-selector { margin-left: 0; }
      .range-advanced { justify-content: flex-start; }
      .title { font-size: 18px; }
      .tableWrap {
        margin-left: -6px;
        margin-right: -6px;
        padding: 0 6px;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }
      table { min-width: 720px; }
    }
    @media (max-width: 720px) {
      table { min-width: 580px; }
      th, td { padding: 6px 6px; font-size: 12px; }
      th { font-size: 10px; }
      .frRow { min-width: 140px; gap: 6px; }
      .icon { width: 18px; height: 18px; }
      .btn { padding: 5px 8px; font-size: 11px; }
      .hide-mobile { display: none !important; }
    }
    @media (max-width: 480px) {
      table { min-width: 420px; }
      th, td { padding: 5px 4px; font-size: 11px; }
      .frRow { min-width: 120px; }
      .icon { width: 16px; height: 16px; }
      .title { font-size: 16px; }
      .sub { font-size: 10px; }
      .btn { padding: 4px 7px; font-size: 10px; }
      .toggles { gap: 4px; }
      .h2h-cell { font-size: 9px; padding: 4px 2px; }
      .h2h-col-header { min-width: 40px; padding: 4px 2px; }
      .h2h-icon { width: 14px; height: 14px; }
      .h2h-abbrev { font-size: 8px; }
      .hide-mobile-sm { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div>
          <div class="title">Standings Snapshot</div>
          <div class="sub" id="metaLine">Loading...</div>
        </div>
        <div class="controls">
          <div class="toggles">
            <button class="btn active" data-view="division">Divisional</button>
            <button class="btn" data-view="points">Points Breakdown</button>
          </div>
          <label class="field">Season
            <select id="seasonSelect" class="select"></select>
          </label>
          <div class="range-stack">
            <div class="range-selector" id="rangeSelector">
              <button class="range-btn active" data-range="regular">Regular (1-14)</button>
              <button class="range-btn" data-range="playoffs">Playoffs (15-17)</button>
              <button class="range-btn" data-range="full">Full (1-17)</button>
            </div>
            <div class="range-advanced">
              <label class="field">Start
                <select id="rangeStartSelect" class="select"></select>
              </label>
              <label class="field">End
                <select id="rangeEndSelect" class="select"></select>
              </label>
              <label id="modeSelectWrap" class="field" style="display:none;">Mode
                <select id="modeSelect" class="select"></select>
              </label>
            </div>
          </div>
          <label id="showLeadersWrap" class="toggleWrap" style="display:none;">
            <input id="showLeadersChk" type="checkbox" />
            Show Division Leaders
          </label>
        </div>
      </div>
      <div class="tableWrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      const $ = (s) => document.querySelector(s);
      const safe = (v) => (v === null || v === undefined ? "" : String(v));
      const n = (v, d = 0) => {
        const x = Number(v);
        return Number.isFinite(x) ? x : d;
      };
      const esc = (s) =>
        safe(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      const eqNum = (a, b) => Math.abs(n(a) - n(b)) < 1e-9;
      const cmpDesc = (a, b) => n(b) - n(a);
      const cmpText = (a, b) => safe(a).localeCompare(safe(b));

      const u = new URL(window.location.href);
      const L = safe(u.searchParams.get("L") || "25625");
      const SOURCE_L = safe(u.searchParams.get("SOURCE_L") || u.searchParams.get("DATA_L") || "74598");
      const YEAR = Number(safe(u.searchParams.get("YEAR") || "2026")) || 2026;

      const state = {
        leagueId: L,
        sourceLeagueId: SOURCE_L,
        season: YEAR,
        requestedSeason: YEAR,
        rows: [],
        meta: {},
        view: "division",
        sortKey: "franchise",
        sortDir: "asc",
        showDivisionLeaders: false,
        divMode: "raw",
        pointsMode: "raw",
        expandedRow: null,
        weeklyScores: {},
        weeklyMatchups: {},
        weeklyOffPoints: {},
        weeklyDefPoints: {},
        weeklyPotentialPoints: {},
        range: "regular",
        rangeStartWeek: 1,
        rangeEndWeek: 14,
        ddMode: "h2h",
        expandedMatchup: null,
        pointsTab: "points",
      };

      function pctFromWlt(o) {
        const w = n(o && o.w, 0);
        const l = n(o && o.l, 0);
        const t = n(o && o.t, 0);
        const g = w + l + t;
        return g > 0 ? (w + 0.5 * t) / g : 0;
      }

      function fmtWlt(o) {
        const w = n(o && o.w, 0), l = n(o && o.l, 0), t = n(o && o.t, 0);
        return `${w}-${l}-${t}`;
      }

      function fmtPct(v) { return n(v, 0).toFixed(3); }

      function fmtNum(v) {
        const x = n(v, 0);
        return x.toLocaleString(undefined, { minimumFractionDigits: Number.isInteger(x) ? 0 : 1, maximumFractionDigits: 1 });
      }

      function leagueAvgPF(rows) {
        if (!rows || !rows.length) return 0;
        var sum = 0;
        rows.forEach(function (r) { sum += n(r.points_for, 0); });
        return sum / rows.length;
      }

      function fmtRel(val, avg) {
        var diff = val - avg;
        var sign = diff >= 0 ? "+" : "";
        return sign + diff.toFixed(1);
      }

      function getDivisionMates(row, allRows) {
        return (allRows || []).filter(function (r) {
          return r.division === row.division && r.franchise_id !== row.franchise_id;
        });
      }

      function weeksPlayed(franchiseId, ws, startWeek, endWeek) {
        var count = 0;
        for (var w = startWeek; w <= endWeek; w++) {
          var wk = (ws || {})[String(w)] || {};
          if (n(wk[franchiseId], 0) > 0) count++;
        }
        return count;
      }

      function computeAllPlayVsOpp(teamId, oppId, ws, startWeek, endWeek) {
        var w = 0, l = 0, t = 0;
        for (var wk = startWeek; wk <= endWeek; wk++) {
          var scores = (ws || {})[String(wk)] || {};
          var ts = n(scores[teamId], 0);
          var os = n(scores[oppId], 0);
          if (ts > os) w++;
          else if (ts < os) l++;
          else t++;
        }
        return { w: w, l: l, t: t };
      }

      function rangeWeeks(range) {
        if (range === "playoffs") return [15, 17];
        if (range === "full") return [1, 17];
        return [1, 14]; // "regular" default
      }

      function clampWeek(v) {
        var out = Math.max(1, Math.min(17, parseInt(v, 10) || 1));
        return out;
      }

      function applyRangePreset(name) {
        var bounds = rangeWeeks(name);
        state.range = safe(name || "regular");
        state.rangeStartWeek = bounds[0];
        state.rangeEndWeek = bounds[1];
      }

      function syncRangePresetFromWeeks() {
        var sW = clampWeek(state.rangeStartWeek);
        var eW = clampWeek(state.rangeEndWeek);
        if (sW > eW) {
          var tmp = sW; sW = eW; eW = tmp;
        }
        state.rangeStartWeek = sW;
        state.rangeEndWeek = eW;
        if (sW === 1 && eW === 14) state.range = "regular";
        else if (sW === 15 && eW === 17) state.range = "playoffs";
        else if (sW === 1 && eW === 17) state.range = "full";
        else state.range = "custom";
      }

      function currentRangeWeeks() {
        syncRangePresetFromWeeks();
        return [state.rangeStartWeek, state.rangeEndWeek];
      }

      function populateWeekSelects() {
        var startSel = document.getElementById("rangeStartSelect");
        var endSel = document.getElementById("rangeEndSelect");
        if (!startSel || !endSel) return;
        if (startSel.dataset.built === "1" && endSel.dataset.built === "1") return;
        var opts = [];
        for (var w = 1; w <= 17; w += 1) {
          opts.push('<option value="' + w + '">Week ' + w + '</option>');
        }
        startSel.innerHTML = opts.join("");
        endSel.innerHTML = opts.join("");
        startSel.dataset.built = "1";
        endSel.dataset.built = "1";
      }

      function syncRangeControls() {
        populateWeekSelects();
        syncRangePresetFromWeeks();
        document.querySelectorAll(".range-btn").forEach(function (b) {
          var key = safe(b.getAttribute("data-range"));
          b.classList.toggle("active", key === state.range);
        });
        var startSel = document.getElementById("rangeStartSelect");
        var endSel = document.getElementById("rangeEndSelect");
        if (startSel) startSel.value = String(state.rangeStartWeek);
        if (endSel) endSel.value = String(state.rangeEndWeek);
      }

      function syncModeSelect() {
        var wrap = document.getElementById("modeSelectWrap");
        var sel = document.getElementById("modeSelect");
        if (!wrap || !sel) return;

        var modeType = "";
        var opts = [];
        if (state.view === "division") {
          modeType = "division";
          opts = [
            { value: "raw", label: "Raw" },
            { value: "pct", label: "%" }
          ];
        } else if (state.view === "points" && state.pointsTab === "points") {
          modeType = "points";
          opts = [
            { value: "raw", label: "Raw" },
            { value: "rel", label: "vs Avg" }
          ];
        } else {
          wrap.style.display = "none";
          sel.innerHTML = "";
          sel.dataset.modeType = "";
          return;
        }

        wrap.style.display = "";
        if (sel.dataset.modeType !== modeType) {
          sel.innerHTML = opts.map(function (opt) {
            return '<option value="' + esc(opt.value) + '">' + esc(opt.label) + '</option>';
          }).join("");
          sel.dataset.modeType = modeType;
        }

        var current = modeType === "division" ? safe(state.divMode || "raw") : safe(state.pointsMode || "raw");
        var valid = opts.some(function (opt) { return opt.value === current; });
        if (!valid) current = opts[0].value;
        if (modeType === "division") state.divMode = current;
        else state.pointsMode = current;
        if (sel.value !== current) sel.value = current;
      }

      function pointsInRange(franchiseId, ws, startWeek, endWeek) {
        var total = 0;
        for (var w = startWeek; w <= endWeek; w++) {
          var wk = (ws || {})[String(w)] || {};
          total += n(wk[franchiseId], 0);
        }
        return total;
      }

      function avgPerWeekFromMap(rows, ws, startWeek, endWeek) {
        var len = Math.max(1, endWeek - startWeek + 1);
        var sum = 0;
        (rows || []).forEach(function (r) {
          sum += pointsInRange(r.franchise_id, ws, startWeek, endWeek);
        });
        return (sum / Math.max(1, (rows || []).length)) / len;
      }

      function cloneH2HMap(map) {
        var out = {};
        Object.keys(map || {}).forEach(function (oppId) {
          var rec = map[oppId] || {};
          out[oppId] = {
            w: n(rec.w, 0),
            l: n(rec.l, 0),
            t: n(rec.t, 0),
            games: n(rec.games, n(rec.w, 0) + n(rec.l, 0) + n(rec.t, 0)),
            pct: n(rec.pct, 0),
          };
        });
        return out;
      }

      function emptyWlt() { return { w: 0, l: 0, t: 0 }; }

      function bumpWlt(rec, side, oppSide) {
        if (!rec) return;
        if (side > oppSide) rec.w += 1;
        else if (side < oppSide) rec.l += 1;
        else rec.t += 1;
      }

      function upsertH2H(row, oppId) {
        if (!row.h2h) row.h2h = {};
        if (!row.h2h[oppId]) row.h2h[oppId] = { w: 0, l: 0, t: 0, games: 0, pct: 0 };
        return row.h2h[oppId];
      }

      function finalizeH2HMap(row) {
        Object.keys(row.h2h || {}).forEach(function (oppId) {
          var rec = row.h2h[oppId];
          rec.games = n(rec.w, 0) + n(rec.l, 0) + n(rec.t, 0);
          rec.pct = rec.games > 0 ? (n(rec.w, 0) + 0.5 * n(rec.t, 0)) / rec.games : 0;
        });
      }

      function deriveRowsForRange(baseRows, startWeek, endWeek) {
        var rows = (baseRows || []).map(function (r) {
          return {
            franchise_id: safe(r.franchise_id),
            franchise_name: safe(r.franchise_name),
            icon: safe(r.icon),
            logo: safe(r.logo),
            division: safe(r.division),
            division_name: safe(r.division_name),
            all_play: { w: n(r.all_play && r.all_play.w, 0), l: n(r.all_play && r.all_play.l, 0), t: n(r.all_play && r.all_play.t, 0) },
            all_play_pct: n(r.all_play_pct, 0),
            overall: { w: n(r.overall && r.overall.w, 0), l: n(r.overall && r.overall.l, 0), t: n(r.overall && r.overall.t, 0) },
            overall_pct: n(r.overall_pct, 0),
            divisional: { w: n(r.divisional && r.divisional.w, 0), l: n(r.divisional && r.divisional.l, 0), t: n(r.divisional && r.divisional.t, 0) },
            divisional_pct: n(r.divisional_pct, 0),
            points_for: n(r.points_for, 0),
            off_points: n(r.off_points, 0),
            def_points: n(r.def_points, 0),
            potential_points: n(r.potential_points, 0),
            efficiency: n(r.efficiency, 0),
            h2h: cloneH2HMap(r.h2h || {}),
          };
        });

        var byId = {};
        rows.forEach(function (r) { byId[r.franchise_id] = r; });

        var hasWeeklyScores = Object.keys(state.weeklyScores || {}).length > 0;
        var hasWeeklyMatchups = Object.keys(state.weeklyMatchups || {}).length > 0;
        var hasWeeklyOff = Object.keys(state.weeklyOffPoints || {}).length > 0;
        var hasWeeklyDef = Object.keys(state.weeklyDefPoints || {}).length > 0;
        var hasWeeklyPotential = Object.keys(state.weeklyPotentialPoints || {}).length > 0;

        if (hasWeeklyScores) {
          rows.forEach(function (r) {
            r.all_play = emptyWlt();
            r.points_for = 0;
          });
        }
        if (hasWeeklyMatchups) {
          rows.forEach(function (r) {
            r.overall = emptyWlt();
            r.divisional = emptyWlt();
            r.h2h = {};
          });
        }
        if (hasWeeklyOff) rows.forEach(function (r) { r.off_points = 0; });
        if (hasWeeklyDef) rows.forEach(function (r) { r.def_points = 0; });
        if (hasWeeklyPotential) rows.forEach(function (r) { r.potential_points = 0; });

        var sW = clampWeek(startWeek);
        var eW = clampWeek(endWeek);
        if (sW > eW) { var tmp = sW; sW = eW; eW = tmp; }

        function sumMapIntoRows(mapObj, key) {
          for (var w = sW; w <= eW; w += 1) {
            var wk = (mapObj || {})[String(w)] || {};
            Object.keys(wk).forEach(function (fid) {
              var row = byId[fid];
              if (!row) return;
              row[key] += n(wk[fid], 0);
            });
          }
        }

        if (hasWeeklyScores) sumMapIntoRows(state.weeklyScores, "points_for");
        if (hasWeeklyOff) sumMapIntoRows(state.weeklyOffPoints, "off_points");
        if (hasWeeklyDef) sumMapIntoRows(state.weeklyDefPoints, "def_points");
        if (hasWeeklyPotential) sumMapIntoRows(state.weeklyPotentialPoints, "potential_points");

        if (hasWeeklyScores) {
          for (var w1 = sW; w1 <= eW; w1 += 1) {
            var wkScores = (state.weeklyScores || {})[String(w1)] || {};
            var entries = Object.keys(wkScores).filter(function (fid) { return !!byId[fid]; }).map(function (fid) {
              return { fid: fid, score: n(wkScores[fid], 0) };
            });
            if (!entries.length) continue;
            var anyPlayed = entries.some(function (e) { return Math.abs(e.score) > 0; });
            if (!anyPlayed) continue;
            for (var i = 0; i < entries.length; i += 1) {
              for (var j = i + 1; j < entries.length; j += 1) {
                var a = entries[i], b = entries[j];
                bumpWlt(byId[a.fid].all_play, a.score, b.score);
                bumpWlt(byId[b.fid].all_play, b.score, a.score);
              }
            }
          }
        }

        if (hasWeeklyMatchups) {
          for (var w2 = sW; w2 <= eW; w2 += 1) {
            var wm = (state.weeklyMatchups || {})[String(w2)] || [];
            (wm || []).forEach(function (m) {
              var home = byId[safe(m.home)];
              var away = byId[safe(m.away)];
              if (!home || !away) return;
              var hs = n(m.homeScore, 0);
              var as = n(m.awayScore, 0);
              if (Math.abs(hs) === 0 && Math.abs(as) === 0) return;

              bumpWlt(home.overall, hs, as);
              bumpWlt(away.overall, as, hs);

              var hRec = upsertH2H(home, away.franchise_id);
              var aRec = upsertH2H(away, home.franchise_id);
              bumpWlt(hRec, hs, as);
              bumpWlt(aRec, as, hs);

              if (safe(home.division) === safe(away.division)) {
                bumpWlt(home.divisional, hs, as);
                bumpWlt(away.divisional, as, hs);
              }
            });
          }
        }

        rows.forEach(function (r) {
          r.all_play_pct = pctFromWlt(r.all_play);
          r.overall_pct = pctFromWlt(r.overall);
          r.divisional_pct = pctFromWlt(r.divisional);
          finalizeH2HMap(r);
          if (n(r.potential_points, 0) > 0) {
            r.efficiency = (n(r.points_for, 0) / n(r.potential_points, 1)) * 100;
          }
        });

        return rows;
      }

      function normalizeRows(rows) {
        return (rows || []).map((r) => ({
          franchise_id: safe(r.franchise_id),
          franchise_name: safe(r.franchise_name),
          icon: safe(r.icon || r.logo),
          logo: safe(r.logo),
          division: safe(r.division),
          division_name: safe(r.division_name || (r.division ? `Division ${r.division}` : "Division")),
          all_play: r.all_play || { w: 0, l: 0, t: 0 },
          all_play_pct: n(r.all_play_pct, pctFromWlt(r.all_play)),
          overall: r.overall || { w: 0, l: 0, t: 0 },
          overall_pct: n(r.overall_pct, pctFromWlt(r.overall)),
          divisional: r.divisional || { w: 0, l: 0, t: 0 },
          divisional_pct: n(r.divisional_pct, pctFromWlt(r.divisional)),
          points_for: n(r.points_for, 0),
          off_points: n(r.off_points, 0),
          def_points: n(r.def_points, 0),
          potential_points: n(r.potential_points, 0),
          efficiency: n(r.efficiency, 0),
          h2h: r.h2h || {},
        }));
      }

      function hasPlayedGames(rows) {
        return (rows || []).some((r) => {
          const overallGames = n(r.overall && r.overall.w) + n(r.overall && r.overall.l) + n(r.overall && r.overall.t);
          return overallGames > 0 || n(r.points_for) > 0;
        });
      }

      async function fetchSeasonSnapshot(sourceLeagueId, hostLeagueId, year) {
        const candidateLeagueIds = Array.from(
          new Set([
            safe(sourceLeagueId),
            safe(hostLeagueId),
            "74598",
            "25625",
          ].filter(Boolean))
        );
        const candidates = candidateLeagueIds.map((leagueId) => `./standings_${leagueId}_${year}.json`);
        for (const path of candidates) {
          try {
            const res = await fetch(path, { cache: "no-store" });
            if (!res.ok) continue;
            const j = await res.json();
            return j;
          } catch (e) {}
        }
        return null;
      }

      function cleanupBeforeRender() {
        // Tear down custom module DOM
        var dm = document.querySelector(".div-module");
        if (dm) dm.remove();
        var pm = document.querySelector(".po-module");
        if (pm) pm.remove();
        var tbl = document.querySelector("table");
        if (tbl) tbl.style.display = "";
        $("#thead").innerHTML = "";
        $("#tbody").innerHTML = "";
        // Reset sub-view state
        state.expandedRow = null;
        state.expandedMatchup = null;
        state.divMode = "raw";
        state.pointsMode = "raw";
      }

      async function loadSeason(year, allowFallback) {
        const y = Number(year) || YEAR;
        let payload = await fetchSeasonSnapshot(state.sourceLeagueId, state.leagueId, y);
        let loadedYear = y;
        if (!payload && allowFallback) {
          payload = await fetchSeasonSnapshot(state.sourceLeagueId, state.leagueId, y - 1);
          loadedYear = y - 1;
        }
        if (!payload) {
          state.rows = [];
          state.meta = {};
          state.season = y;
          state.weeklyScores = {};
          state.weeklyMatchups = {};
          state.weeklyOffPoints = {};
          state.weeklyDefPoints = {};
          state.weeklyPotentialPoints = {};
          cleanupBeforeRender();
          render();
          return;
        }

        let rows = normalizeRows(payload && payload.rows);
        if (allowFallback && !hasPlayedGames(rows)) {
          const fallback = await fetchSeasonSnapshot(state.sourceLeagueId, state.leagueId, y - 1);
          const fallbackRows = normalizeRows(fallback && fallback.rows);
          if (fallback && hasPlayedGames(fallbackRows)) {
            payload = fallback;
            rows = fallbackRows;
            loadedYear = y - 1;
          }
        }

        state.rows = rows;
        state.meta = payload && payload.meta ? payload.meta : {};
        state.season = loadedYear;
        state.weeklyScores = payload && payload.weeklyScores ? payload.weeklyScores : {};
        state.weeklyMatchups = payload && payload.weeklyMatchups ? payload.weeklyMatchups : {};
        state.weeklyOffPoints = payload && payload.weeklyOffPoints ? payload.weeklyOffPoints : {};
        state.weeklyDefPoints = payload && payload.weeklyDefPoints ? payload.weeklyDefPoints : {};
        state.weeklyPotentialPoints = payload && payload.weeklyPotentialPoints ? payload.weeklyPotentialPoints : {};

        const seasonSelect = $("#seasonSelect");
        if (seasonSelect) seasonSelect.value = String(loadedYear);
        cleanupBeforeRender();
        render();
      }

      function buildSeasonOptions() {
        const firstSeason = 2010;
        const topSeason = Math.max(firstSeason, Number(state.requestedSeason) || YEAR);
        const opts = [];
        for (let y = topSeason; y >= firstSeason; y -= 1) {
          opts.push(y);
        }
        const uniq = Array.from(new Set(opts.filter((v) => Number.isFinite(v) && v > 0)));
        const seasonSelect = $("#seasonSelect");
        if (!seasonSelect) return;
        seasonSelect.innerHTML = uniq
          .map((y) => `<option value="${y}">${y}</option>`)
          .join("");
      }

      function iconFranchiseCell(r) {
        return `
          <div class="frRow">
            <img class="icon" alt="" src="${esc(r.icon || r.logo || "")}" onerror="this.style.display='none'"/>
            <span>${esc(r.franchise_name || r.franchise_id || "")}</span>
          </div>
        `;
      }

      function getSortValue(row, key) {
        if (key === "franchise") return safe(row.franchise_name || row.franchise_id);
        if (key === "all_play_wlt") return pctFromWlt(row.all_play);
        if (key === "overall_wlt") return pctFromWlt(row.overall);
        if (key === "divisional_wlt") return pctFromWlt(row.divisional);
        if (key === "all_play_pct") return n(row.all_play_pct);
        if (key === "overall_pct") return n(row.overall_pct);
        if (key === "divisional_pct") return n(row.divisional_pct);
        if (key === "points_for") return n(row.points_for);
        if (key === "off_points") return n(row.off_points);
        if (key === "def_points") return n(row.def_points);
        if (key === "potential_points") return n(row.potential_points);
        if (key === "efficiency") return n(row.efficiency);
        if (key === "division") return safe(row.division_name || row.division);
        if (key === "h2h_total_wins") {
          var map = row.h2h || {};
          var tw = 0;
          Object.keys(map).forEach(function (k) { tw += n((map[k] || {}).w, 0); });
          return tw;
        }
        if (key === "seed") return n(row.wildcard_rank, 999);
        if (key === "rank") return n(row.division_rank, 999);
        if (key === "leader") return row.is_division_leader ? 0 : 1;
        return safe(row[key]);
      }

      function sortRows(rows) {
        const key = state.sortKey || "franchise";
        const dir = state.sortDir === "desc" ? -1 : 1;
        const arr = (rows || []).slice();
        arr.sort((a, b) => {
          const av = getSortValue(a, key);
          const bv = getSortValue(b, key);
          let cmp = 0;
          if (typeof av === "number" && typeof bv === "number") {
            cmp = av === bv ? 0 : av > bv ? 1 : -1;
          } else {
            cmp = safe(av).localeCompare(safe(bv));
          }
          if (cmp === 0) {
            cmp = safe(a.franchise_name).localeCompare(safe(b.franchise_name));
          }
          return cmp * dir;
        });
        return arr;
      }

      function headCell(key, label, sortable) {
        const isSorted = sortable && state.sortKey === key;
        const arrow = !sortable ? "" : isSorted ? (state.sortDir === "asc" ? "▲" : "▼") : "↕";
        return `<th class="${sortable ? "is-sortable" : ""} ${isSorted ? "is-sorted" : ""}" ${sortable ? `data-sort-key="${esc(key)}"` : ""}>${esc(label)}${sortable ? ` <span class="sort">${arrow}</span>` : ""}</th>`;
      }

      function h2hPctInCluster(row, cluster) {
        const map = row && row.h2h ? row.h2h : {};
        let w = 0, l = 0, t = 0, g = 0;
        (cluster || []).forEach((opp) => {
          if (!opp || opp.franchise_id === row.franchise_id) return;
          const rec = map[opp.franchise_id] || null;
          if (!rec) return;
          const rw = n(rec.w, 0);
          const rl = n(rec.l, 0);
          const rt = n(rec.t, 0);
          const rg = n(rec.games, rw + rl + rt);
          w += rw; l += rl; t += rt; g += rg;
        });
        return g > 0 ? (w + 0.5 * t) / g : -1;
      }

      function rankDivisionGroup(groupRows) {
        const base = (groupRows || []).slice().sort((a, b) =>
          cmpDesc(a.overall_pct, b.overall_pct) ||
          cmpDesc(a.divisional_pct, b.divisional_pct) ||
          cmpText(a.franchise_name, b.franchise_name)
        );

        const buckets = [];
        base.forEach((r) => {
          const key = `${fmtPct(r.overall_pct)}|${fmtPct(r.divisional_pct)}`;
          let bucket = buckets.find((b) => b.key === key);
          if (!bucket) {
            bucket = { key, rows: [] };
            buckets.push(bucket);
          }
          bucket.rows.push({ ...r, _tb_note: "" });
        });

        const ranked = [];
        buckets.forEach((bucket) => {
          const cluster = bucket.rows;
          if (cluster.length === 1) {
            ranked.push(cluster[0]);
            return;
          }

          cluster.forEach((r) => {
            r._cluster_h2h_pct = h2hPctInCluster(r, cluster);
          });

          cluster.sort((a, b) =>
            cmpDesc(a._cluster_h2h_pct, b._cluster_h2h_pct) ||
            cmpDesc(a.points_for, b.points_for) ||
            cmpDesc(a.all_play_pct, b.all_play_pct) ||
            cmpText(a.franchise_name, b.franchise_name)
          );

          for (let i = 1; i < cluster.length; i += 1) {
            const prev = cluster[i - 1];
            const curr = cluster[i];
            if (!eqNum(prev.overall_pct, curr.overall_pct)) continue;
            if (!eqNum(prev.divisional_pct, curr.divisional_pct)) continue;
            if (!eqNum(prev._cluster_h2h_pct, curr._cluster_h2h_pct)) {
              curr._tb_note = "Tiebreaker used: Head-to-head record among tied teams.";
            } else if (!eqNum(prev.points_for, curr.points_for)) {
              curr._tb_note = "Tiebreaker used: Total points scored.";
            } else if (!eqNum(prev.all_play_pct, curr.all_play_pct)) {
              curr._tb_note = "Tiebreaker used: All-play winning percentage.";
            } else {
              curr._tb_note = "Tiebreaker used: Power rank (commissioner discretion).";
            }
          }

          ranked.push(...cluster);
        });

        ranked.forEach((r, idx) => {
          r.division_rank = idx + 1;
          r.is_division_leader = idx === 0;
        });
        return ranked;
      }

      function buildDivisionRace(rows) {
        const byDiv = new Map();
        (rows || []).forEach((r) => {
          const key = safe(r.division || "NA");
          if (!byDiv.has(key)) byDiv.set(key, []);
          byDiv.get(key).push(r);
        });

        const divisions = Array.from(byDiv.keys()).sort((a, b) => cmpText(a, b));
        return divisions.map((divKey) => {
          const group = byDiv.get(divKey) || [];
          const ranked = rankDivisionGroup(group);
          const divName = ranked[0] ? safe(ranked[0].division_name || `Division ${divKey}`) : `Division ${divKey}`;
          return { division: divKey, division_name: divName, rows: ranked };
        });
      }

      function buildWildcardRace(rows, showLeaders) {
        const divisionRace = buildDivisionRace(rows);
        const leaderSet = new Set();
        divisionRace.forEach((d) => {
          if (d.rows && d.rows[0]) leaderSet.add(d.rows[0].franchise_id);
        });

        const pool = (rows || []).map((r) => ({
          ...r,
          is_division_leader: leaderSet.has(r.franchise_id),
          _tb_note: "",
        }));
        const filtered = showLeaders ? pool : pool.filter((r) => !r.is_division_leader);

        filtered.sort((a, b) =>
          cmpDesc(a.all_play_pct, b.all_play_pct) ||
          cmpDesc(a.points_for, b.points_for) ||
          cmpDesc(a.overall_pct, b.overall_pct) ||
          cmpText(a.franchise_name, b.franchise_name)
        );

        // H2H sub-sort within tied clusters
        for (let start = 0; start < filtered.length; ) {
          let end = start + 1;
          while (
            end < filtered.length &&
            eqNum(filtered[end].all_play_pct, filtered[start].all_play_pct) &&
            eqNum(filtered[end].points_for, filtered[start].points_for) &&
            eqNum(filtered[end].overall_pct, filtered[start].overall_pct)
          ) end++;
          if (end - start > 1) {
            const cluster = filtered.slice(start, end);
            cluster.forEach((r) => { r._wc_h2h_pct = h2hPctInCluster(r, cluster); });
            cluster.sort((a, b) => cmpDesc(a._wc_h2h_pct, b._wc_h2h_pct) || cmpText(a.franchise_name, b.franchise_name));
            for (let i = 0; i < cluster.length; i++) filtered[start + i] = cluster[i];
          }
          start = end;
        }

        for (let i = 1; i < filtered.length; i += 1) {
          const prev = filtered[i - 1];
          const curr = filtered[i];
          if (!eqNum(prev.all_play_pct, curr.all_play_pct)) continue;
          if (!eqNum(prev.points_for, curr.points_for)) {
            curr._tb_note = "Wildcard tiebreaker: Total points scored.";
          } else if (!eqNum(prev.overall_pct, curr.overall_pct)) {
            curr._tb_note = "Wildcard tiebreaker: Overall winning percentage.";
          } else if (prev._wc_h2h_pct !== undefined && !eqNum(prev._wc_h2h_pct, curr._wc_h2h_pct)) {
            curr._tb_note = "Wildcard tiebreaker: Head-to-head record among tied teams.";
          } else {
            curr._tb_note = "Wildcard tie remains after configured tiebreakers.";
          }
        }

        filtered.forEach((r, idx) => {
          r.wildcard_rank = idx + 1;
        });
        return filtered;
      }

      /* ── Playoff Seeding Engine ── */
      function buildPlayoffSeeding(rows) {
        // Step 1: Identify division winners via existing rankDivisionGroup
        var divRace = buildDivisionRace(rows);
        var divWinners = [];
        var nonWinners = [];
        var divWinnerIds = new Set();

        divRace.forEach(function (d) {
          if (d.rows && d.rows[0]) {
            var w = { ...d.rows[0], _po_path: "DIV", _po_div: d.division_name };
            divWinners.push(w);
            divWinnerIds.add(w.franchise_id);
          }
        });

        // Step 2: Build wild card pool (non-winners), sorted by WC tiebreakers
        var wcPool = (rows || []).filter(function (r) {
          return !divWinnerIds.has(r.franchise_id);
        }).map(function (r) {
          return { ...r, _po_path: "WC", _tb_note: "" };
        });

        // WC sort: All-Play% → PF → Overall%
        wcPool.sort(function (a, b) {
          return cmpDesc(a.all_play_pct, b.all_play_pct)
            || cmpDesc(a.points_for, b.points_for)
            || cmpDesc(a.overall_pct, b.overall_pct)
            || cmpText(a.franchise_name, b.franchise_name);
        });

        // H2H sub-sort within WC tied clusters
        for (var start = 0; start < wcPool.length; ) {
          var end = start + 1;
          while (
            end < wcPool.length &&
            eqNum(wcPool[end].all_play_pct, wcPool[start].all_play_pct) &&
            eqNum(wcPool[end].points_for, wcPool[start].points_for) &&
            eqNum(wcPool[end].overall_pct, wcPool[start].overall_pct)
          ) end++;
          if (end - start > 1) {
            var cl = wcPool.slice(start, end);
            cl.forEach(function (r) { r._wc_h2h_pct = h2hPctInCluster(r, cl); });
            cl.sort(function (a, b) { return cmpDesc(a._wc_h2h_pct, b._wc_h2h_pct) || cmpText(a.franchise_name, b.franchise_name); });
            for (var i = 0; i < cl.length; i++) wcPool[start + i] = cl[i];
          }
          start = end;
        }

        var wildCards = wcPool.slice(0, 2);
        wildCards.forEach(function (r) { r._po_path = "WC"; });

        // Step 3: Combine 6 playoff teams, sort ALL by all-play
        var allSix = divWinners.concat(wildCards);
        allSix.sort(function (a, b) {
          return cmpDesc(a.all_play_pct, b.all_play_pct)
            || cmpDesc(a.points_for, b.points_for)
            || cmpText(a.franchise_name, b.franchise_name);
        });

        // Step 4: Enforce constraint — top 2 seeds MUST be division winners
        // Find div winners in the sorted list and ensure they get seeds 1-2
        var dwInTop = [];
        var wcInAll = [];
        allSix.forEach(function (r) {
          if (r._po_path === "DIV") dwInTop.push(r);
          else wcInAll.push(r);
        });

        // Seed list: first 2 must be DW sorted by all-play, then remaining sorted by all-play
        var seeded = [];
        // Top-2 DW by all-play
        dwInTop.sort(function (a, b) {
          return cmpDesc(a.all_play_pct, b.all_play_pct)
            || cmpDesc(a.points_for, b.points_for)
            || cmpText(a.franchise_name, b.franchise_name);
        });
        seeded.push(dwInTop[0], dwInTop[1]);

        // Remaining: the other DWs + WCs, sorted by all-play
        var rest = dwInTop.slice(2).concat(wcInAll);
        rest.sort(function (a, b) {
          return cmpDesc(a.all_play_pct, b.all_play_pct)
            || cmpDesc(a.points_for, b.points_for)
            || cmpText(a.franchise_name, b.franchise_name);
        });
        seeded = seeded.concat(rest);

        // Step 5: Assign seed numbers and "why" explanations
        seeded.forEach(function (r, idx) {
          r._po_seed = idx + 1;
          var why = [];
          if (r._po_path === "DIV") {
            why.push("Div winner (" + esc(r._po_div || r.division_name) + ")");
          } else {
            why.push("Wild card");
          }
          why.push("All-Play: " + fmtPct(r.all_play_pct) + " (" + fmtWlt(r.all_play) + ")");
          if (r._po_seed <= 2) why.push("BYE — Round 1");
          if (r._tb_note) why.push(r._tb_note);
          r._po_why = why.join(" · ");
        });

        // Step 6: Consolation bowl — bottom 6 teams
        var playoffIds = new Set(seeded.map(function (r) { return r.franchise_id; }));
        var consolation = (rows || []).filter(function (r) {
          return !playoffIds.has(r.franchise_id);
        }).map(function (r) { return { ...r, _po_path: "HAWK" }; });

        consolation.sort(function (a, b) {
          return cmpDesc(a.all_play_pct, b.all_play_pct)
            || cmpDesc(a.points_for, b.points_for)
            || cmpText(a.franchise_name, b.franchise_name);
        });

        consolation.forEach(function (r, idx) {
          r._po_seed = idx + 1;
          r._po_why = "All-Play: " + fmtPct(r.all_play_pct) + " (" + fmtWlt(r.all_play) + ")";
        });

        return { playoff: seeded, consolation: consolation };
      }

      function renderStandard(view) {

          pointsToggleWrap.style.display = "none";

          return;
        }

        const isRel = view === "points" && state.pointsMode === "rel";
        const rng = currentRangeWeeks();
        const viewRows = deriveRowsForRange(state.rows || [], rng[0], rng[1]);
        const avgPF = isRel ? leagueAvgPF(viewRows) : 0;
        const avgOff = isRel ? (function () { var s=0; (viewRows||[]).forEach(function(r){s+=n(r.off_points,0);}); return s/((viewRows||[]).length||1); })() : 0;
        const avgDef = isRel ? (function () { var s=0; (viewRows||[]).forEach(function(r){s+=n(r.def_points,0);}); return s/((viewRows||[]).length||1); })() : 0;
        const avgPP = isRel ? (function () { var s=0; (viewRows||[]).forEach(function(r){s+=n(r.potential_points,0);}); return s/((viewRows||[]).length||1); })() : 0;
        const avgEff = isRel ? (function () { var s=0; (viewRows||[]).forEach(function(r){s+=n(r.efficiency,0);}); return s/((viewRows||[]).length||1); })() : 0;
        // Compute range-aware points-per-week baselines.
        const hasWeekly = isRel && Object.keys(state.weeklyScores).length > 0;
        const hasWeeklyOff = isRel && Object.keys(state.weeklyOffPoints || {}).length > 0;
        const hasWeeklyDef = isRel && Object.keys(state.weeklyDefPoints || {}).length > 0;
        const hasWeeklyPotential = isRel && Object.keys(state.weeklyPotentialPoints || {}).length > 0;
        var rangeLen = Math.max(1, (rng[1] - rng[0] + 1));
        var avgPFPerWeek = 0;
        var avgOffPerWeek = 0;
        var avgDefPerWeek = 0;
        var avgPotentialPerWeek = 0;
        if (hasWeekly) avgPFPerWeek = avgPerWeekFromMap(state.rows || [], state.weeklyScores, rng[0], rng[1]);
        if (hasWeeklyOff) avgOffPerWeek = avgPerWeekFromMap(state.rows || [], state.weeklyOffPoints, rng[0], rng[1]);
        if (hasWeeklyDef) avgDefPerWeek = avgPerWeekFromMap(state.rows || [], state.weeklyDefPoints, rng[0], rng[1]);
        if (hasWeeklyPotential) avgPotentialPerWeek = avgPerWeekFromMap(state.rows || [], state.weeklyPotentialPoints, rng[0], rng[1]);

        const cols = view === "records"
          ? [
              { key: "franchise", label: "Franchise", hide: "" },
              { key: "all_play_wlt", label: "All Play", hide: "" },
              { key: "overall_wlt", label: "Overall", hide: "" },
              { key: "divisional_wlt", label: "Divisional", hide: "hide-mobile" },

          ? [
              { key: "franchise", label: "Franchise", hide: "" },

              { key: "overall_pct", label: "Overall %", hide: "" },
              { key: "divisional_pct", label: "Divisional %", hide: "hide-mobile" },

              { key: "off_points", label: isRel ? (hasWeeklyOff ? "Off/wk vs Avg" : "Off vs Avg") : "Off Pts", hide: "" },
              { key: "def_points", label: isRel ? (hasWeeklyDef ? "Def/wk vs Avg" : "Def vs Avg") : "Def Pts", hide: "" },
              { key: "potential_points", label: isRel ? (hasWeeklyPotential ? "PP/wk vs Avg" : "PP vs Avg") : "Potential", hide: "hide-mobile" },
              { key: "efficiency", label: isRel ? "Eff vs Avg" : "Efficiency", hide: "hide-mobile" },

        $("#thead").innerHTML = `<tr>${cols.map((c) => {
          const cls = c.hide ? ` class="${c.hide}"` : "";
          const isSorted = state.sortKey === c.key;
          const arrow = isSorted ? (state.sortDir === "asc" ? "▲" : "▼") : "↕";
          return `<th class="is-sortable ${isSorted ? "is-sorted" : ""} ${c.hide}" data-sort-key="${esc(c.key)}">${esc(c.label)} <span class="sort">${arrow}</span></th>`;
        }).join("")}</tr>`;
        const sorted = (function () {
          const key = state.sortKey || "franchise";
          const dir = state.sortDir === "desc" ? -1 : 1;
          const arr = (viewRows || []).slice();
          arr.sort(function (a, b) {
            var av, bv;
            if (view === "points" && isRel) {
              if (key === "points_for" && hasWeekly) {
                av = (pointsInRange(a.franchise_id, state.weeklyScores, rng[0], rng[1]) / rangeLen) - avgPFPerWeek;
                bv = (pointsInRange(b.franchise_id, state.weeklyScores, rng[0], rng[1]) / rangeLen) - avgPFPerWeek;
              } else if (key === "off_points" && hasWeeklyOff) {
                av = (pointsInRange(a.franchise_id, state.weeklyOffPoints, rng[0], rng[1]) / rangeLen) - avgOffPerWeek;
                bv = (pointsInRange(b.franchise_id, state.weeklyOffPoints, rng[0], rng[1]) / rangeLen) - avgOffPerWeek;
              } else if (key === "def_points" && hasWeeklyDef) {
                av = (pointsInRange(a.franchise_id, state.weeklyDefPoints, rng[0], rng[1]) / rangeLen) - avgDefPerWeek;
                bv = (pointsInRange(b.franchise_id, state.weeklyDefPoints, rng[0], rng[1]) / rangeLen) - avgDefPerWeek;
              } else if (key === "potential_points" && hasWeeklyPotential) {
                av = (pointsInRange(a.franchise_id, state.weeklyPotentialPoints, rng[0], rng[1]) / rangeLen) - avgPotentialPerWeek;
                bv = (pointsInRange(b.franchise_id, state.weeklyPotentialPoints, rng[0], rng[1]) / rangeLen) - avgPotentialPerWeek;
              } else if (key === "off_points") {
                av = a.off_points - avgOff; bv = b.off_points - avgOff;
              } else if (key === "def_points") {
                av = a.def_points - avgDef; bv = b.def_points - avgDef;
              } else if (key === "potential_points") {
                av = a.potential_points - avgPP; bv = b.potential_points - avgPP;
              } else if (key === "points_for") {
                av = a.points_for - avgPF; bv = b.points_for - avgPF;
              } else if (key === "efficiency") {
                av = a.efficiency - avgEff; bv = b.efficiency - avgEff;
              } else {
                av = getSortValue(a, key); bv = getSortValue(b, key);
              }
            } else {
              av = getSortValue(a, key); bv = getSortValue(b, key);
            }

            var cmp = 0;
            if (typeof av === "number" && typeof bv === "number") cmp = av === bv ? 0 : av > bv ? 1 : -1;
            else cmp = safe(av).localeCompare(safe(bv));
            if (cmp === 0) cmp = safe(a.franchise_name).localeCompare(safe(b.franchise_name));
            return cmp * dir;
          });
          return arr;
        })();
        $("#tbody").innerHTML = sorted
          .map((r) => {
            const row = cols
              .map((c) => {
                const cls = c.hide ? ` class="${c.hide}${c.key !== "franchise" ? " num" : ""}"` : (c.key !== "franchise" ? ' class="num"' : "");
                if (c.key === "franchise") return `<td${c.hide ? ' class="' + c.hide + '"' : ""}>${iconFranchiseCell(r)}</td>`;
                if (c.key === "all_play_wlt") return `<td class="num ${c.hide}">${fmtWlt(r.all_play)}</td>`;
                if (c.key === "overall_wlt") return `<td class="num ${c.hide}">${fmtWlt(r.overall)}</td>`;
                if (c.key === "divisional_wlt") return `<td class="num ${c.hide}">${fmtWlt(r.divisional)}</td>`;
                if (c.key === "all_play_pct") return `<td class="num ${c.hide}">${fmtPct(r.all_play_pct)}</td>`;
                if (c.key === "overall_pct") return `<td class="num ${c.hide}">${fmtPct(r.overall_pct)}</td>`;
                if (c.key === "divisional_pct") return `<td class="num ${c.hide}">${fmtPct(r.divisional_pct)}</td>`;
                if (isRel && c.key === "points_for") {
                  if (hasWeekly) {
                    var teamPFPerWeek = pointsInRange(r.franchise_id, state.weeklyScores, rng[0], rng[1]) / rangeLen;
                    var d = teamPFPerWeek - avgPFPerWeek;
                    return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)} /wk</td>`;
                  }
                  var d=r.points_for-avgPF; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`;
                }
                if (isRel && c.key === "off_points") {
                  if (hasWeeklyOff) {
                    var d=(pointsInRange(r.franchise_id, state.weeklyOffPoints, rng[0], rng[1]) / rangeLen)-avgOffPerWeek;
                    return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)} /wk</td>`;
                  }
                  var d=r.off_points-avgOff; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`;
                }
                if (isRel && c.key === "def_points") {
                  if (hasWeeklyDef) {
                    var d=(pointsInRange(r.franchise_id, state.weeklyDefPoints, rng[0], rng[1]) / rangeLen)-avgDefPerWeek;
                    return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)} /wk</td>`;
                  }
                  var d=r.def_points-avgDef; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`;
                }
                if (isRel && c.key === "potential_points") {
                  if (hasWeeklyPotential) {
                    var d=(pointsInRange(r.franchise_id, state.weeklyPotentialPoints, rng[0], rng[1]) / rangeLen)-avgPotentialPerWeek;
                    return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)} /wk</td>`;
                  }
                  var d=r.potential_points-avgPP; return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`;
                }
                if (isRel && c.key === "efficiency") {
                  var d = n(r.efficiency, 0) - avgEff;
                  return `<td class="num ${c.hide} ${d>=0?"pf-rel-pos":"pf-rel-neg"}">${d>=0?"+":""}${d.toFixed(1)}</td>`;
                }
                return `<td class="num ${c.hide}">${fmtNum(r[c.key])}</td>`;
              })
              .join("");
            return `<tr>${row}</tr>`;
          })
          .join("");
      }

      function renderWeeklyHighScorer() {
        var ws = state.weeklyScores || {};
        var franchiseHighWeeks = {}; // {fid: [{week, score}, ...]}
        var rng = currentRangeWeeks();

        for (var w = rng[0]; w <= rng[1]; w++) {
          var weekData = ws[String(w)] || {};
          var maxScore = -1;
          var maxFids = [];
          Object.keys(weekData).forEach(function (fid) {
            var sc = n(weekData[fid], 0);
            if (sc > maxScore) { maxScore = sc; maxFids = [fid]; }
            else if (sc === maxScore && sc > 0) { maxFids.push(fid); }
          });
          maxFids.forEach(function (fid) {
            if (!franchiseHighWeeks[fid]) franchiseHighWeeks[fid] = [];
            franchiseHighWeeks[fid].push({ week: w, score: maxScore });
          });
        }

        var rangeRows = deriveRowsForRange(state.rows || [], rng[0], rng[1]);
        var ranked = (rangeRows || []).map(function (r) {
          var hw = franchiseHighWeeks[r.franchise_id] || [];
          return { ...r, highWeeks: hw, highCount: hw.length, winnings: hw.length * 30 };
        });
        ranked.sort(function (a, b) {
          return b.highCount - a.highCount || b.points_for - a.points_for;
        });

        $("#thead").innerHTML = '<tr>'
          + '<th>Team</th>'
          + '<th>High-Score Weeks</th>'
          + '<th class="num">Count</th>'
          + '<th class="num">Winnings</th>'
          + '</tr>';

        var noData = Object.keys(ws).length === 0;
        if (noData) {
          $("#tbody").innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px;">Weekly score data not available. Regenerate standings snapshot to enable this feature.</td></tr>';
          return;
        }

        $("#tbody").innerHTML = ranked.map(function (r) {
          var weeksStr = r.highWeeks.map(function (hw) {
            return 'Wk' + hw.week + ' (' + fmtNum(hw.score) + ')';
          }).join(', ') || '&mdash;';
          return '<tr>'
            + '<td>' + iconFranchiseCell(r) + '</td>'
            + '<td style="white-space:normal;font-size:12px;">' + weeksStr + '</td>'
            + '<td class="num">' + r.highCount + '</td>'
            + '<td class="num">$' + fmtNum(r.winnings) + '</td>'
            + '</tr>';
        }).join('');
      }

        $("#tbody").innerHTML = "";

              mates.forEach(function (m) {
                var rec = (r.h2h || {})[m.franchise_id];
                if (rec && n(rec.games, 0) > 0) {
                  var p = n(rec.pct, 0.5);
                  var cls = p > 0.5 ? "h2h-w" : p < 0.5 ? "h2h-l" : "h2h-e";
