<!-- UPS Extension Assistant — Standalone HPM (markup only)
     Assets loaded by loader.js; no inline scripts required.

     Wire in MFL Admin → Custom HTML → Message 8:
       <script data-ups-partial="hpm-ext-assist"
               src="https://cdn.jsdelivr.net/gh/keithcreelman/upsmflproduction@main/site/loader.js">
       </script>

     The ?ext=chat param auto-opens the drawer.
-->
<div id="ups-extension-assistant-page" class="ups-ext-page">
  <div class="ups-ext-shell">
    <div class="ups-ext-shell__header">
      <div class="ups-ext-shell__eyebrow">UPS Hot Links</div>
      <h1 class="ups-ext-shell__title">Extension Assistant</h1>
      <p class="ups-ext-shell__subtitle">
        Ask questions about UPS league extensions, eligibility, AAV, TCV, and how to submit.
      </p>
    </div>
    <div class="ups-ext-shell__actions">
      <button id="extAssistLaunchBtn" type="button" class="ups-ext-shell__launch">
        Open Extension Assistant
      </button>
    </div>
    <div id="ups-extension-assistant-root" class="ups-ext-shell__mount"></div>
  </div>
</div>
