name: Post Deadline Reminders

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: post-deadline-reminders
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder worker
        env:
          COMMISH_API_KEY: ${{ secrets.COMMISH_API_KEY }}
          MFL_LEAGUE_ID: ${{ secrets.MFL_LEAGUE_ID }}
          UPS_WORKER_BASE_URL: ${{ secrets.UPS_WORKER_BASE_URL }}
        run: |
          if [ -z "${COMMISH_API_KEY}" ]; then
            echo "Missing required secret: COMMISH_API_KEY"
            exit 1
          fi
          if [ -z "${MFL_LEAGUE_ID}" ]; then
            echo "Missing required secret: MFL_LEAGUE_ID"
            exit 1
          fi
          WORKER_BASE="${UPS_WORKER_BASE_URL:-https://upsmflproduction.keith-creelman.workers.dev}"
          curl --fail --silent --show-error \
            -X POST \
            "${WORKER_BASE}/admin/deadline-reminders/run?APIKEY=${COMMISH_API_KEY}&L=${MFL_LEAGUE_ID}&YEAR=2026" \
            -H "Content-Type: application/json" \
            -d '{}'
