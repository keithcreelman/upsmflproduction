name: Post Deadline Reminders

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: post-deadline-reminders
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder worker
        env:
          COMMISH_API_KEY: ${{ secrets.COMMISH_API_KEY }}
          MFL_USER_ID: ${{ secrets.MFL_USER_ID }}
          MFL_LEAGUE_ID: ${{ secrets.MFL_LEAGUE_ID }}
          UPS_WORKER_BASE_URL: ${{ secrets.UPS_WORKER_BASE_URL }}
        run: |
          WORKER_BASE="${UPS_WORKER_BASE_URL:-https://upsmflproduction.keith-creelman.workers.dev}"
          LEAGUE_ID="${MFL_LEAGUE_ID:-74598}"
          if [ -n "${COMMISH_API_KEY}" ]; then
            AUTH_QS="APIKEY=${COMMISH_API_KEY}"
          elif [ -n "${MFL_USER_ID}" ]; then
            AUTH_QS="MFL_USER_ID=${MFL_USER_ID}"
          else
            echo "Missing auth secret: COMMISH_API_KEY or MFL_USER_ID"
            exit 1
          fi
          curl --fail --silent --show-error \
            -X POST \
            "${WORKER_BASE}/admin/deadline-reminders/run?${AUTH_QS}&L=${LEAGUE_ID}&YEAR=2026" \
            -H "Content-Type: application/json" \
            -d '{}'
