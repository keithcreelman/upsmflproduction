name = "upsmflproduction"
main = "src/index.js"
compatibility_date = "2026-02-02"

# Hourly drop → cap-penalty scan at :05 past each hour (RULE-WORKFLOW-004).
# The worker's scheduled() handler:
#   1. calls /admin/import-drop-penalties logic to post new cap penalties to MFL
#      (dedupes by scanning MFL's own salaryAdjustments for ups_drop_penalty
#      ledger keys — MFL is the canonical ledger, no separate KV needed)
#   2. for each newly posted penalty, POSTs a Discord Cap Penalty Announcement
#      to the Cap Penalties channel.
#   3. at 09:05 UTC, snapshots MFL public exports to R2 bucket (Phase 2
#      backup — see docs/BACKUP_STRATEGY.md).
[triggers]
crons = ["5 * * * *"]

# R2 bucket for MFL data snapshots + DB backups.
# Access via `env.UPS_MFL_BACKUPS.put(key, body)` inside the Worker.
[[r2_buckets]]
binding = "UPS_MFL_BACKUPS"
bucket_name = "ups-mfl-backups"

# D1 database for Phase 3 — structured MFL data + corrections override
# layer. Worker reads via `env.UPS_MFL_DB.prepare(...).all()`.
# Migrations live in worker/migrations/ and are applied via
# `wrangler d1 migrations apply ups-mfl-db --remote` (or --local for dev).
[[d1_databases]]
binding = "UPS_MFL_DB"
database_name = "ups-mfl-db"
database_id = "8cfe1ddd-749e-476a-9c2c-a359410c6fc1"
migrations_dir = "migrations"
